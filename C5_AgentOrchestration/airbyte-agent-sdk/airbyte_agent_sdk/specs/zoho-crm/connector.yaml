openapi: 3.1.0

info:
  title: Zoho CRM API Connector
  version: 1.0.3
  description: >
    Connector for the Zoho CRM API, providing access to CRM modules including
    leads, contacts, accounts, deals, campaigns, tasks, events, calls, products,
    quotes, and invoices. Supports OAuth 2.0 authentication with regional
    data center support (US, EU, AU, IN, CN, JP). Supports read operations
    (list and get) for all entities, and write operations (create and update)
    for leads, contacts, accounts, deals, and tasks.
  x-airbyte-connector-name: zoho-crm
  x-airbyte-connector-definition-id: 4942d392-c7b5-4271-91f9-3b4f4e51eb3e
  x-airbyte-platform-availability:
    state: experimental
    reason: Requires additional QA testing
  x-airbyte-replication-version: "0.1.3"
  x-airbyte-replication-compatibility: ">=0.1.3, <1.0.0"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Zoho CRM API Documentation
      url: https://www.zoho.com/crm/developer/docs/api/v2/
    - type: authentication_guide
      title: Zoho OAuth 2.0
      url: https://www.zoho.com/crm/developer/docs/api/v2/oauth-overview.html
    - type: rate_limits
      title: Zoho API Limits
      url: https://www.zoho.com/crm/developer/docs/api/v2/api-limits.html
  x-airbyte-example-questions:
    direct:
      - "List all leads"
      - "Show me details for a specific lead"
      - "List all contacts"
      - "List all accounts"
      - "List all open deals"
      - "Show me details for a specific deal"
      - "List all campaigns"
      - "List all tasks"
      - "List all events"
      - "List recent calls"
      - "List all products"
      - "List all quotes"
      - "List all invoices"
      - "Create a new lead named John Smith at Acme Corp"
      - "Update the status of lead to Contacted"
      - "Create a new contact with email jane@example.com"
      - "Create a new account called Global Industries"
      - "Create a deal called Enterprise License worth $50,000"
      - "Update the deal stage to Closed Won"
      - "Create a task to follow up with the client"
      - "Update the task priority to High"
    search:
      - "Show me leads created in the last 30 days"
      - "Which deals have the highest amount?"
      - "List all contacts at a specific company"
      - "What is the total revenue across all deals by stage?"
      - "Show me overdue tasks"
      - "Which campaigns generated the most leads?"
      - "Summarize the deal pipeline by stage"
      - "Show me accounts with the highest annual revenue"
      - "List all events scheduled for this week"
      - "What are the top-performing products by unit price?"
      - "Show me all invoices that are past due"
      - "Break down leads by source and industry"
    unsupported:
