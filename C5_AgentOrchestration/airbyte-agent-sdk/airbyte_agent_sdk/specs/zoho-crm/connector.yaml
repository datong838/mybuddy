servers:
  - url: "https://www.zohoapis.{dc_region}"
    description: Zoho CRM API server (region-specific)
    variables:
      dc_region:
        default: com
        description: >
          The Zoho data center region domain suffix:
          - com (US)
          - com.au (AU)
          - eu (EU)
          - in (IN)
          - com.cn (CN)
          - jp (JP)
        enum:
          - com
          - com.au
          - eu
          - in
          - com.cn
          - jp
    x-airbyte-replication-environment-mapping:
      dc_region:
        source: dc_region
        format: >-
          {{ 'com' if value|upper == 'US'
              else 'com.au' if value|upper == 'AU'
              else 'eu' if value|upper == 'EU'
              else 'in' if value|upper == 'IN'
              else 'com.cn' if value|upper == 'CN'
              else 'jp' if value|upper == 'JP'
              else 'com' }}
    x-airbyte-replication-environment-constants:
      edition: "Free"

security:
  - oauth2: []

paths:
  # ── Leads ──────────────────────────────────────────────────────────────
  "/crm/v2/Leads":
    get:
      summary: List leads
      description: Returns a paginated list of leads
      operationId: listLeads
      x-airbyte-entity: leads
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        more_records: $.info.more_records
        page: $.info.page
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Number of records per page
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 200
        - name: page_token
          in: query
          description: Page token for fetching beyond 2000 records
          schema:
            type: string
        - name: sort_by
          in: query
          description: Field to sort by
          schema:
            type: string
        - name: sort_order
          in: query
          description: Sort order
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsList"
    post:
      summary: Create a lead
      description: Creates a new lead record in Zoho CRM
      operationId: createLead
      x-airbyte-entity: leads
      x-airbyte-action: create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadCreateParams"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WriteResponse"
        "400":
          description: Invalid input

  "/crm/v2/Leads/{id}":
    get:
      summary: Get a lead
      description: Get a single lead by ID
      operationId: getLead
      x-airbyte-entity: leads
      x-airbyte-action: get
      x-airbyte-record-extractor: $.data[0]
      parameters:
        - name: id
          in: path
          required: true
          description: Lead ID
          schema:
            type: string
      responses:
        "200":
          description: Lead object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsList"
        "404":
          description: Lead not found
    put:
      summary: Update a lead
      description: Updates an existing lead record in Zoho CRM
      operationId: updateLead
      x-airbyte-entity: leads
      x-airbyte-action: update
      parameters:
        - name: id
          in: path
          required: true
          description: Lead ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdateParams"
      responses:
        "200":
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WriteResponse"
        "404":
          description: Lead not found

