components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: >
        Zoho CRM OAuth 2.0 authentication. Requires registering a client
        application in the Zoho Developer Console. The access token uses
        the format "Zoho-oauthtoken {token}" in the Authorization header,
        but the SDK handles Bearer tokens natively.
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.zoho.com/oauth/v2/auth
          tokenUrl: https://accounts.zoho.com/oauth/v2/token
          refreshUrl: https://accounts.zoho.com/oauth/v2/token
          scopes:
            ZohoCRM.modules.ALL: Access all CRM modules
            ZohoCRM.settings.ALL: Access all CRM settings
            ZohoCRM.users.ALL: Access all CRM users
      x-airbyte-token-refresh:
        auth_style: body
        body_format: form
      x-airbyte-auth-config:
        title: "Zoho CRM OAuth 2.0"
        type: object
        required:
          - client_id
          - client_secret
          - refresh_token
        properties:
          client_id:
            type: string
            title: "Client ID"
            description: "OAuth 2.0 Client ID from Zoho Developer Console"
          client_secret:
            type: string
            title: "Client Secret"
            description: "OAuth 2.0 Client Secret from Zoho Developer Console"
          refresh_token:
            type: string
            title: "Refresh Token"
            description: "OAuth 2.0 Refresh Token (does not expire)"
        auth_mapping:
          client_id: "${client_id}"
          client_secret: "${client_secret}"
          refresh_token: "${refresh_token}"
        additional_headers:
          Authorization: "Zoho-oauthtoken {{ access_token }}"
        replication_auth_key_mapping:
          client_id: "client_id"
          client_secret: "client_secret"
          refresh_token: "refresh_token"
        replication_auth_key_constants:
          environment: "Production"

  schemas:
    # ── Shared sub-schemas ─────────────────────────────────────────────
    Owner:
      type: object
      description: Record owner reference
      properties:
        name:
          type: string
          description: Owner name
        id:
          type: string
          description: Owner ID
        email:
          type: string
          description: Owner email address

    CreatedBy:
      type: object
      description: User who created the record
      properties:
        name:
          type: string
          description: User name
        id:
          type: string
          description: User ID
        email:
          type: string
          description: User email

    ModifiedBy:
      type: object
      description: User who last modified the record
      properties:
        name:
          type: string
          description: User name
        id:
          type: string
          description: User ID
        email:
          type: string
          description: User email

    LookupRef:
      type: object
      description: Lookup reference to another record
      properties:
        name:
          type: string
          description: Referenced record name
        id:
          type: string
          description: Referenced record ID

    PaginationInfo:
      type: object
      description: Pagination metadata
      properties:
        per_page:
          type: integer
          description: Records per page
        count:
          type: integer
          description: Number of records in current page
        page:
          type: integer
          description: Current page number
        more_records:
          type: boolean
          description: Whether more records exist
        sort_by:
          type: string
          description: Field sorted by
        sort_order:
          type: string
          description: Sort direction

    # ── Lead ───────────────────────────────────────────────────────────
    Lead:
      type: object
      x-airbyte-entity-name: leads
      x-airbyte-stream-name: incremental_leads_zoho_crm_stream
      x-airbyte-ai-hints:
