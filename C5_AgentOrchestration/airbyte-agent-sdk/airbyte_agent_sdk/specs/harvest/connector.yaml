servers:
  - url: https://api.harvestapp.com/v2
    description: Harvest API V2 server

security:
  - oauth2: []
  - bearer: []

paths:
  /users:
    get:
      summary: List all users
      description: Returns a paginated list of users in the Harvest account
      operationId: listUsers
      x-airbyte-entity: users
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.users
      x-airbyte-meta-extractor:
        next_link: $.links.next
      parameters:
        - name: per_page
          in: query
          description: Number of records per page (max 2000)
          schema:
            type: integer
            minimum: 1
            maximum: 2000
            default: 50
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersList"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /users/{id}:
    get:
      summary: Get a user
      description: Get a single user by ID
      operationId: getUser
      x-airbyte-entity: users
      x-airbyte-action: get
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
        "401":
          description: Unauthorized

