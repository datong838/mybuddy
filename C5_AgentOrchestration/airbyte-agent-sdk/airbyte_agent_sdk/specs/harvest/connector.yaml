openapi: 3.1.0

info:
  title: Harvest API Connector
  version: 1.0.5
  description: |
    Connector for the Harvest time-tracking and invoicing API (v2). Provides read access
    to time tracking data including users, clients, projects, tasks, time entries, invoices,
    estimates, expenses, and more. Harvest is a cloud-based time tracking and invoicing
    solution that helps teams track time, manage projects, and streamline invoicing.
  x-airbyte-connector-name: harvest
  x-airbyte-connector-definition-id: fe2b4084-3386-4d3b-9ad6-308f61a6f1e6
  x-airbyte-replication-version: "1.2.42"
  x-airbyte-replication-compatibility: ">=1.2.42, <2.0.0"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Harvest API V2 Documentation
      url: https://help.getharvest.com/api-v2/
  x-airbyte-example-questions:
    direct:
      - "List all users in Harvest"
      - "Show me all active projects"
      - "List all clients"
      - "Show me recent time entries"
      - "List all invoices"
      - "Show me all tasks"
      - "List all expense categories"
      - "Get company information"
    search:
      - "How many hours were logged last week?"
      - "Which projects have the most time entries?"
      - "Show me all unbilled time entries"
      - "What are the active projects for a specific client?"
      - "List all overdue invoices"
      - "Which users logged the most hours this month?"
    unsupported:
      - "Create a new time entry in Harvest"
      - "Update a project budget"
      - "Delete an invoice"
      - "Start a timer for a task"

  x-airbyte-skip-suggested-streams:
    - project_assignments
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Harvest.
    properties:
      account_id:
        type: string
        title: Account ID
        description: >-
          Your Harvest account ID. Required for all API requests.
    required:
      - account_id
    replication_config_key_mapping:
      account_id: account_id
    replication_config_constants:
      replication_start_date: "{{ day_delta(-180, '%Y-%m-%dT%H:%M:%SZ') }}"
