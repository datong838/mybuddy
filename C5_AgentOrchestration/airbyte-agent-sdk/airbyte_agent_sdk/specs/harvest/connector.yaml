components:
  securitySchemes:
    oauth2:
      type: oauth2
      x-airbyte-untested: true
      description: >
        Harvest OAuth 2.0 authentication using client credentials and refresh token.
        A Harvest-Account-Id header is required with every request.
      flows:
        authorizationCode:
          authorizationUrl: https://id.getharvest.com/oauth2/authorize
          tokenUrl: https://id.getharvest.com/api/v2/oauth2/token
          refreshUrl: https://id.getharvest.com/api/v2/oauth2/token
          scopes: {}
      x-airbyte-auth-config:
        title: OAuth 2.0
        type: object
        required:
          - client_id
          - client_secret
          - refresh_token
          - account_id
        properties:
          client_id:
            type: string
            title: Client ID
          client_secret:
            type: string
            title: Client Secret
          refresh_token:
            type: string
            title: Refresh Token
            description: Your Harvest OAuth2 refresh token
          account_id:
            type: string
            title: Account ID
            description: Your Harvest account ID
        auth_mapping:
          client_id: "${client_id}"
          client_secret: "${client_secret}"
          refresh_token: "${refresh_token}"
        additional_headers:
          Harvest-Account-Id: "{{ account_id }}"
        replication_auth_key_mapping:
          credentials.refresh_token: "refresh_token"
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          account_id: "account_id"
        replication_auth_key_constants:
          credentials.auth_type: "Client"
          replication_start_date: "{{ day_delta(-180, '%Y-%m-%dT%H:%M:%SZ') }}"

    bearer:
      type: http
      scheme: bearer
      description: >
        Harvest Personal Access Token (PAT) authentication.
        A Harvest-Account-Id header is required with every request.
      x-airbyte-auth-config:
        title: Personal Access Token
        type: object
        required:
          - token
          - account_id
        properties:
          token:
            type: string
            title: Personal Access Token
            description: Your Harvest personal access token
          account_id:
            type: string
            title: Account ID
            description: Your Harvest account ID
        auth_mapping:
          token: "${token}"
        additional_headers:
          Harvest-Account-Id: "{{ account_id }}"
        replication_auth_key_mapping:
          credentials.api_token: "token"
          account_id: "account_id"
        replication_auth_key_constants:
          credentials.auth_type: "Token"
          replication_start_date: "{{ day_delta(-180, '%Y-%m-%dT%H:%M:%SZ') }}"

  schemas:
    PaginationLinks:
      type: object
      description: Pagination links for navigating result pages
      properties:
        first:
          type: ["null", "string"]
          description: URL to the first page of results
        previous:
          type: ["null", "string"]
          description: URL to the previous page of results
        next:
          type: ["null", "string"]
          description: URL to the next page of results
        last:
          type: ["null", "string"]
