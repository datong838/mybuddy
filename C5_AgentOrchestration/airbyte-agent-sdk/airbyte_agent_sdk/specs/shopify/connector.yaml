    # ── Metafield Mutation Schemas ─────────────────────────────────────

    MetafieldsSetParams:
      type: object
      description: |
        Parameters for setting (creating or updating) metafields atomically.
        Supports up to 25 metafields per call.
      required:
      - metafields
      properties:
        metafields:
          type: array
          description: List of metafields to set
          items:
            type: object
            required:
            - namespace
            - key
            - type
            - value
            - ownerId
            properties:
              namespace:
                type: string
                description: "Metafield namespace (e.g. 'custom')"
              key:
                type: string
                description: "Metafield key (e.g. 'color')"
              type:
                type: string
                description: "Metafield type (e.g. 'single_line_text_field', 'number_integer', 'boolean')"
              value:
                type: string
                description: "Metafield value"
              ownerId:
                type: string
                description: "GraphQL GID of the owner resource (e.g. gid://shopify/Product/123)"

    MetafieldDeleteParams:
      type: object
      description: |
        Parameters for deleting metafields. Identify each metafield by
        ownerId + namespace + key.
      required:
      - metafields
      properties:
        metafields:
          type: array
          description: List of metafield identifiers to delete
          items:
            type: object
            required:
            - ownerId
            - namespace
            - key
            properties:
              ownerId:
                type: string
                description: "GraphQL GID of the owner resource (e.g. gid://shopify/Product/123)"
              namespace:
                type: string
                description: "Metafield namespace (e.g. 'custom')"
              key:
                type: string
                description: "Metafield key (e.g. 'color')"

    MetafieldsSetPayload:
      type: object
      properties:
        userErrors:
          type: array
          items:
            $ref: "#/components/schemas/GraphQLUserError"
        metafields:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              namespace:
                type: ["string", "null"]
              key:
                type: ["string", "null"]
              value:
                type: ["string", "null"]
              type:
                type: ["string", "null"]
              updatedAt:
                type: ["string", "null"]
                format: date-time

    MetafieldDeletePayload:
      type: object
      properties:
        deletedMetafields:
          type: ["array", "null"]
          items:
            type: ["object", "null"]
            properties:
              key:
                type: ["string", "null"]
              namespace:
                type: ["string", "null"]
              ownerId:
                type: ["string", "null"]
        userErrors:
          type: array
          items:
            $ref: "#/components/schemas/GraphQLUserError"

    MetafieldsSetResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            metafieldsSet:
              $ref: "#/components/schemas/MetafieldsSetPayload"

    MetafieldDeleteResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            metafieldsDelete:
              $ref: "#/components/schemas/MetafieldDeletePayload"

    # ── Collection Mutation Schemas ────────────────────────────────────

    CollectionCreateParams:
      type: object
      description: Parameters for creating a collection (custom or smart).
      required:
      - input
      properties:
        input:
          type: object
          required:
          - title
          properties:
            title:
              type: string
              description: Collection title
            descriptionHtml:
              type: string
              description: Collection description in HTML
            handle:
              type: string
              description: URL handle for the collection
            sortOrder:
              type: string
              enum: [ALPHA_ASC, ALPHA_DESC, BEST_SELLING, CREATED, CREATED_DESC, MANUAL, PRICE_ASC, PRICE_DESC]
              description: Sort order for products
            templateSuffix:
              type: string
              description: Liquid template suffix
            ruleSet:
              type: object
              description: Rule set for smart collections
              properties:
                appliedDisjunctively:
                  type: boolean
                  description: Whether rules are OR (true) or AND (false)
                rules:
                  type: array
                  items:
                    type: object
                    properties:
                      column:
                        type: string
                        description: "Rule column (e.g. TAG, TITLE, VENDOR)"
                      relation:
                        type: string
                        description: "Rule relation (e.g. EQUALS, CONTAINS)"
                      condition:
                        type: string
                        description: "Rule condition value"

    CollectionUpdateParams:
      type: object
      description: Parameters for updating a collection.
      required:
      - input
      properties:
        input:
          type: object
          required:
          - id
          properties:
            id:
              type: string
              description: "The GraphQL GID of the collection"
            title:
              type: string
            descriptionHtml:
              type: string
            handle:
              type: string
            sortOrder:
              type: string
              enum: [ALPHA_ASC, ALPHA_DESC, BEST_SELLING, CREATED, CREATED_DESC, MANUAL, PRICE_ASC, PRICE_DESC]

    CollectionDeleteParams:
