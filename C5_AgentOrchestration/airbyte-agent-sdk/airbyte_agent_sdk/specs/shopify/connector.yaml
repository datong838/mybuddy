            handle:
              type: ["string", "null"]
            descriptionHtml:
              type: ["string", "null"]
            sortOrder:
              type: ["string", "null"]
            templateSuffix:
              type: ["string", "null"]
            updatedAt:
              type: ["string", "null"]
              format: date-time

    CollectionUpdatePayload:
      type: object
      properties:
        userErrors:
          type: array
          items:
            $ref: "#/components/schemas/GraphQLUserError"
        collection:
