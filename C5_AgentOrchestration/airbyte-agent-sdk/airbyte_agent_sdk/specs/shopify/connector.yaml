      - Product Variants
      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: "mutation productVariantsBulkCreate($productId: ID!, $variants: [ProductVariantsBulkInput!]!) { productVariantsBulkCreate(productId: $productId, variants: $variants) { userErrors { field message } productVariants { id title price sku barcode compareAtPrice inventoryQuantity } } }"
          variables:
            productId: "{{ productId }}"
            variants: "{{ variants }}"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantsCreateParams"
      responses:
        "200":
          description: Product variants created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariantsMutationResponse"

  "/graphql.json:productVariantsBulkUpdate":
    post:
      summary: Update product variants
      description: |
        Updates one or more product variants via GraphQL mutation.
