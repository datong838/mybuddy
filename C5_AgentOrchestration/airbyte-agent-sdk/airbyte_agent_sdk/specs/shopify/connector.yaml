            blogId:
              type: string
              description: "GraphQL GID of the blog this article belongs to"
            body:
              type: string
              description: Article body content (HTML)
            handle:
              type: string
              description: URL handle for the article
            isPublished:
              type: boolean
              description: Whether the article is published
            tags:
              type: array
              items:
                type: string
            author:
              type: object
              description: "Author of the article. Required by Shopify's articleCreate mutation (ArticleCreateInput.author is non-null)."
