            reason:
              type: string
              description: "Reason for the adjustment (e.g. 'correction', 'other')"
            referenceDocumentUri:
              type: string
              description: "URI for the reference document"
            quantities:
              type: array
              description: Quantities to set
              items:
                type: object
                required:
                - inventoryItemId
                - locationId
                - quantity
                properties:
                  inventoryItemId:
                    type: string
                    description: "GraphQL GID of the inventory item"
                  locationId:
                    type: string
                    description: "GraphQL GID of the location"
                  quantity:
                    type: integer
                    description: Absolute quantity to set

    InventoryAdjustQuantitiesParams:
      type: object
      description: Parameters for adjusting inventory quantities relatively (add/subtract).
      required:
      - input
      properties:
        input:
          type: object
          required:
          - name
          - reason
          - changes
          properties:
            name:
              type: string
              description: "Quantity name (e.g. 'available')"
            reason:
              type: string
              description: "Reason for the adjustment"
            referenceDocumentUri:
              type: string
              description: "URI for the reference document"
            changes:
              type: array
              description: Inventory changes to apply
              items:
                type: object
                required:
                - inventoryItemId
                - locationId
                - delta
                properties:
                  inventoryItemId:
                    type: string
                    description: "GraphQL GID of the inventory item"
                  locationId:
                    type: string
                    description: "GraphQL GID of the location"
                  delta:
                    type: integer
                    description: "Amount to adjust (positive to add, negative to subtract)"

