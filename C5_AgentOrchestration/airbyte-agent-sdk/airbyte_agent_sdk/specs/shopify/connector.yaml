    # ── Customer Mutation Schemas ──────────────────────────────────────

    CustomerCreateParams:
      type: object
      description: |
        Parameters for creating a customer. Provide fields inside the 'input' object.
        At least one of email, phone, firstName, or lastName is required.
      required:
      - input
      properties:
        input:
          type: object
          description: "CustomerInput object"
          properties:
            email:
              type: string
              description: Customer email address
            firstName:
              type: string
              description: Customer first name
            lastName:
              type: string
              description: Customer last name
            phone:
              type: string
              description: "Customer phone number (E.164 format, e.g. +16465555555)"
            note:
              type: string
              description: Note about the customer
            tags:
              type: array
              items:
                type: string
              description: Tags to associate with the customer
            taxExempt:
              type: boolean
              description: Whether the customer is tax exempt
            addresses:
              type: array
              description: List of customer addresses
              items:
                type: object
                properties:
                  address1:
                    type: string
                  address2:
                    type: string
                  city:
                    type: string
                  province:
                    type: string
                  zip:
                    type: string
                  countryCode:
                    type: string
                  phone:
                    type: string
                  firstName:
                    type: string
                  lastName:
                    type: string

    CustomerUpdateParams:
      type: object
      description: |
        Parameters for updating a customer. The input.id field is required.
        All other fields are optional for partial updates.
      required:
      - input
      properties:
        input:
          type: object
          description: "CustomerInput object with id"
          required:
          - id
          properties:
            id:
              type: string
              description: "The GraphQL GID of the customer (e.g. gid://shopify/Customer/123)"
            email:
              type: string
              description: Customer email address
            firstName:
              type: string
              description: Customer first name
            lastName:
              type: string
              description: Customer last name
            phone:
              type: string
              description: "Customer phone number (E.164 format)"
            note:
              type: string
              description: Note about the customer
            tags:
              type: array
              items:
                type: string
              description: Tags to associate with the customer
            taxExempt:
              type: boolean
              description: Whether the customer is tax exempt

    CustomerDeleteParams:
      type: object
      description: Parameters for deleting a customer. Only succeeds if the customer has no orders.
      required:
      - input
      properties:
        input:
          type: object
          required:
          - id
          properties:
            id:
              type: string
              description: "The GraphQL GID of the customer to delete (e.g. gid://shopify/Customer/123)"

    GraphQLCustomer:
      type: object
      description: Customer returned from GraphQL mutation
      properties:
        id:
          type: string
          description: GraphQL GID
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        taxExempt:
          type: ["boolean", "null"]
        createdAt:
          type: ["string", "null"]
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    CustomerCreatePayload:
      type: object
      properties:
        userErrors:
          type: array
          items:
            $ref: "#/components/schemas/GraphQLUserError"
        customer:
          $ref: "#/components/schemas/GraphQLCustomer"

    CustomerUpdatePayload:
      type: object
      properties:
        userErrors:
          type: array
          items:
            $ref: "#/components/schemas/GraphQLUserError"
        customer:
          $ref: "#/components/schemas/GraphQLCustomer"

    CustomerDeletePayload:
      type: object
      properties:
        userErrors:
          type: array
          items:
            $ref: "#/components/schemas/GraphQLUserError"
        deletedCustomerId:
          type: ["string", "null"]
          description: GID of the deleted customer

    CustomerMutationResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            customerCreate:
              $ref: "#/components/schemas/CustomerCreatePayload"
            customerUpdate:
              $ref: "#/components/schemas/CustomerUpdatePayload"

    CustomerDeleteResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            customerDelete:
              $ref: "#/components/schemas/CustomerDeletePayload"

