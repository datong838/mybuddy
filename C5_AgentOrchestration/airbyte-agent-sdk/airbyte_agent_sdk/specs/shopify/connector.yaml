components:
  securitySchemes:
    shopifyAccessToken:
      type: apiKey
      in: header
      name: X-Shopify-Access-Token
      description: Shopify Admin API access token
      x-airbyte-auth-config:
        title: "Access Token Authentication"
        type: object
        required:
        - api_key
        properties:
          api_key:
            type: string
            title: "Access Token"
            description: "Your Shopify Admin API access token"
        auth_mapping:
          api_key: "${api_key}"
        replication_auth_key_mapping:
          credentials.api_password: "api_key"
        replication_auth_key_constants:
          credentials.auth_method: "api_password"

    shopifyOAuth:
      type: oauth2
      x-airbyte-untested: true
      description: Shopify OAuth 2.0 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://{{shop}}.myshopify.com/admin/oauth/authorize
          tokenUrl: https://{{shop}}.myshopify.com/admin/oauth/access_token
          scopes: {}
      x-airbyte-token-refresh:
        header: "X-Shopify-Access-Token"
        prefix: ""
      x-airbyte-auth-config:
        title: "OAuth2"
        type: object
        required:
        - access_token
        properties:
          client_id:
            type: string
            title: "Client ID"
            description: "Your Shopify OAuth2 application client ID"
          client_secret:
            type: string
            title: "Client Secret"
            description: "Your Shopify OAuth2 application client secret"
          access_token:
            type: string
            title: "Access Token"
            description: "Your Shopify OAuth2 access token"
        auth_mapping:
          access_token: "${access_token}"
          client_id: "${client_id}"
          client_secret: "${client_secret}"
        replication_auth_key_mapping:
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          credentials.access_token: "access_token"
        replication_auth_key_constants:
          credentials.auth_method: "oauth2.0"

  schemas:
    Customer:
