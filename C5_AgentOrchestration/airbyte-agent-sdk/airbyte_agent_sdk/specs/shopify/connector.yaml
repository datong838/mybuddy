      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: "mutation productVariantsBulkDelete($productId: ID!, $variantsIds: [ID!]!) { productVariantsBulkDelete(productId: $productId, variantsIds: $variantsIds) { userErrors { field message } product { id title } } }"
          variables:
