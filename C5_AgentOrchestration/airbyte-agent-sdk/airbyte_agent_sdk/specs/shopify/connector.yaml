  # ──────────────────────────────────────────────────────────────────────
  # GraphQL Write Operations (mutations via POST /graphql.json)
  # ──────────────────────────────────────────────────────────────────────

  # ── Customers ────────────────────────────────────────────────────────

  "/graphql.json:customerCreate":
    post:
      summary: Create a customer
      description: |
        Creates a new customer in the store via GraphQL mutation.
        Requires at least one of: email, phone, firstName, or lastName.
      operationId: Customers_Create
      x-airbyte-entity: customers
      x-airbyte-action: create
      x-airbyte-ai-hints:
        summary: "Create a new Shopify customer"
        when_to_use: "When the user asks to add, create, or register a new customer"
        trigger_phrases: ["create a customer", "add a customer", "new customer", "register a buyer"]
        freshness: live
        search_strategy: "Use customers.create with an input containing at least email or first/last name. Requires write_customers scope. To look up existing customers use customers.list/get."
        example_questions:
          - "Create a customer with email test@example.com"
      x-airbyte-record-extractor: $.data.customerCreate
      x-airbyte-path-override:
        path: /graphql.json
      tags:
      - Customers
      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: "mutation customerCreate($input: CustomerInput!) { customerCreate(input: $input) { userErrors { field message } customer { id email firstName lastName phone note tags taxExempt createdAt updatedAt } } }"
          variables:
            input: "{{ input }}"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreateParams"
      responses:
        "200":
          description: Customer created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerMutationResponse"

  "/graphql.json:customerUpdate":
    post:
      summary: Update a customer
      description: |
        Updates an existing customer via GraphQL mutation.
        All fields except id are optional for partial updates.
      operationId: Customers_Update
      x-airbyte-entity: customers
      x-airbyte-action: update
      x-airbyte-ai-hints:
        summary: "Update an existing Shopify customer"
        when_to_use: "When the user asks to edit, change, or correct a customer's details"
        trigger_phrases: ["update a customer", "edit customer", "change customer email", "fix customer info"]
        freshness: live
        search_strategy: "Use customers.update with the customer GID and the fields to change. Requires write_customers scope."
        example_questions:
          - "Update a customer's first name"
          - "Change a customer's phone number"
      x-airbyte-record-extractor: $.data.customerUpdate
      x-airbyte-path-override:
        path: /graphql.json
      tags:
      - Customers
      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: "mutation customerUpdate($input: CustomerInput!) { customerUpdate(input: $input) { userErrors { field message } customer { id email firstName lastName phone note tags taxExempt createdAt updatedAt } } }"
          variables:
            input: "{{ input }}"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdateParams"
      responses:
        "200":
          description: Customer updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerMutationResponse"

  "/graphql.json:customerDelete":
    post:
      summary: Delete a customer
      description: |
        Deletes a customer from the store via GraphQL mutation.
        Only succeeds if the customer has no orders. This action is irreversible.
      operationId: Customers_Delete
      x-airbyte-entity: customers
      x-airbyte-action: delete
      x-airbyte-ai-hints:
        summary: "Delete a Shopify customer"
        when_to_use: "When the user asks to remove or delete a customer permanently"
        trigger_phrases: ["delete a customer", "remove customer", "erase a buyer"]
        freshness: live
        search_strategy: "Use customers.delete with the customer GID. Irreversible. Requires write_customers scope."
        example_questions:
          - "Delete a customer from Shopify"
      x-airbyte-record-extractor: $.data.customerDelete
      x-airbyte-path-override:
        path: /graphql.json
      tags:
      - Customers
      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: "mutation customerDelete($input: CustomerDeleteInput!) { customerDelete(input: $input) { userErrors { field message } deletedCustomerId } }"
          variables:
            input: "{{ input }}"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerDeleteParams"
      responses:
        "200":
          description: Customer deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDeleteResponse"

  # ── Products ─────────────────────────────────────────────────────────

  "/graphql.json:productCreate":
    post:
      summary: Create a product
      description: |
        Creates a new product via GraphQL mutation.
        Creates the product with a default variant. Use productVariantsBulkCreate
        to add additional variants afterwards.
