servers:
- url: https://{shop}.myshopify.com/admin/api/2025-10
  description: Shopify Admin REST API Server
  variables:
    shop:
      default: my-store
      description: Your Shopify store name (e.g., 'my-store' from my-store.myshopify.com)
  x-airbyte-replication-environment-mapping:
    shop: shop

security:
- shopifyOAuth: []
- shopifyAccessToken: []

paths:
  /customers.json:
    get:
      summary: List all customers
      description: Returns a list of customers from the store
      operationId: Customers_List
      x-airbyte-entity: customers
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.customers
      x-airbyte-meta-extractor:
        next_page_url: "@link.next"
      tags:
      - Customers
      parameters:
      - name: limit
        in: query
        description: Maximum number of results to return (max 250)
        schema:
          type: integer
          minimum: 1
