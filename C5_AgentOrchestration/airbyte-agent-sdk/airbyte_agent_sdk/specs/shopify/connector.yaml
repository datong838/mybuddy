    # ── Product Variants Mutation Schemas ───────────────────────────────

    ProductVariantsCreateParams:
      type: object
      description: Parameters for bulk creating product variants.
      required:
      - productId
      - variants
      properties:
        productId:
          type: string
          description: "The GraphQL GID of the product (e.g. gid://shopify/Product/123)"
        variants:
          type: array
          description: List of variants to create
          items:
            type: object
            properties:
              price:
                type: string
                description: Variant price
              barcode:
                type: string
                description: Variant barcode
              compareAtPrice:
                type: string
                description: Compare-at price
              inventoryItem:
                type: object
                description: >-
                  Inventory-item attributes for the variant. As of Admin API
                  2024-07+ the SKU is no longer a variant-level field and must be
                  set here (a top-level sku is ignored/rejected by
                  productVariantsBulkCreate).
                properties:
                  sku:
                    type: string
                    description: Variant SKU (set via inventoryItem.sku)
              optionValues:
                type: array
                description: >-
                  Required in practice: each variant must supply one option value
                  for EVERY option defined on the product. A product with options
                  Color and Size needs both here; a product with only the default
                  option needs a single "Title" entry. Omitting an option (or
                  optionValues entirely) causes a userErrors rejection.
                items:
                  type: object
                  required:
                  - optionName
                  - name
                  properties:
                    optionName:
                      type: string
                      description: >-
                        Name of the product option this value belongs to (e.g.
                        "Color", "Size", or "Title" for a single-option product).
                    name:
                      type: string
                      description: >-
                        The option value (e.g. "Large"). If the value already
                        exists on the option it is linked; otherwise a new option
                        value is created.

    ProductVariantsUpdateParams:
      type: object
      description: Parameters for bulk updating product variants.
      required:
      - productId
      - variants
      properties:
        productId:
          type: string
          description: "The GraphQL GID of the product"
        variants:
          type: array
          description: List of variants to update (each must include id)
          items:
            type: object
            required:
            - id
            properties:
              id:
                type: string
                description: "The GraphQL GID of the variant"
              price:
                type: string
              barcode:
                type: string
              compareAtPrice:
                type: string
              inventoryItem:
                type: object
                description: >-
                  Inventory-item attributes for the variant. As of Admin API
                  2024-07+ the SKU is no longer a variant-level field and must be
                  set here (a top-level sku is ignored/rejected by
                  productVariantsBulkUpdate, which silently returns null instead
                  of updating).
                properties:
                  sku:
                    type: string
                    description: Variant SKU (set via inventoryItem.sku)

    ProductVariantsDeleteParams:
      type: object
      description: Parameters for bulk deleting product variants. Cannot delete the last variant.
      required:
      - productId
      - variantsIds
      properties:
        productId:
          type: string
          description: "The GraphQL GID of the product"
        variantsIds:
          type: array
          items:
            type: string
          description: "List of variant GIDs to delete"

    GraphQLProductVariant:
      type: object
      properties:
        id:
          type: string
        title:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        sku:
          type: ["string", "null"]
        barcode:
          type: ["string", "null"]
        compareAtPrice:
          type: ["string", "null"]
        inventoryQuantity:
          type: ["integer", "null"]

    ProductVariantsBulkCreatePayload:
      type: object
      properties:
        userErrors:
          type: array
          items:
            $ref: "#/components/schemas/GraphQLUserError"
        productVariants:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/GraphQLProductVariant"

    ProductVariantsBulkUpdatePayload:
      type: object
      properties:
        userErrors:
          type: array
          items:
            $ref: "#/components/schemas/GraphQLUserError"
        productVariants:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/GraphQLProductVariant"

    ProductVariantsBulkDeletePayload:
      type: object
      properties:
        userErrors:
          type: array
          items:
            $ref: "#/components/schemas/GraphQLUserError"
        product:
          type: ["object", "null"]
          properties:
            id:
              type: string
            title:
              type: ["string", "null"]

    ProductVariantsMutationResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            productVariantsBulkCreate:
              $ref: "#/components/schemas/ProductVariantsBulkCreatePayload"
            productVariantsBulkUpdate:
              $ref: "#/components/schemas/ProductVariantsBulkUpdatePayload"

