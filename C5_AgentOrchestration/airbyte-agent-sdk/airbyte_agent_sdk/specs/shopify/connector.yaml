        freshness: live
        search_strategy: "Use products.create with a title (required) and optional descriptionHtml, vendor, productType, status. Requires write_products scope. Add variants via product_variants.create."
        example_questions:
          - "Create a product called 'Summer T-Shirt'"
      x-airbyte-record-extractor: $.data.productCreate
      x-airbyte-path-override:
        path: /graphql.json
      tags:
      - Products
      requestBody:
        required: true
