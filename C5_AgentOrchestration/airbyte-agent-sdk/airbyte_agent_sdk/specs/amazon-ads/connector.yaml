components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: Amazon Ads OAuth 2.0 authentication with automatic token refresh
      flows:
        authorizationCode:
          authorizationUrl: https://www.amazon.com/ap/oa
          tokenUrl: https://api.amazon.com/auth/o2/token
          refreshUrl: https://api.amazon.com/auth/o2/token
          scopes:
            advertising::campaign_management: Access to campaign management APIs
            cpc_advertising:campaign_management: Access to CPC advertising campaign management
      x-airbyte-auth-config:
        title: "OAuth2 Authentication"
        type: object
        required:
          - refresh_token
        properties:
          client_id:
            type: string
            title: Client ID
            description: The client ID of your Amazon Ads API application
          client_secret:
            type: string
            title: Client Secret
            description: The client secret of your Amazon Ads API application
          refresh_token:
            type: string
            title: Refresh Token
            description: The refresh token obtained from the OAuth authorization flow
        auth_mapping:
          client_id: "${client_id}"
          client_secret: "${client_secret}"
          refresh_token: "${refresh_token}"
        replication_auth_key_mapping:
          client_id: "client_id"
          client_secret: "client_secret"
          refresh_token: "refresh_token"
        additional_headers:
          Amazon-Advertising-API-ClientId: "{{ client_id }}"

