  schemas:
    # Issue Schemas
    Issue:
      type: object
      x-airbyte-entity-name: issues
      x-airbyte-stream-name: issues
      x-airbyte-ai-hints:
        summary: "Engineering issues, bugs, feature requests, and feedback intake items"
        when_to_use: "Engineering, bug, or roadmap questions about tracked issues"
        trigger_phrases: ["is there a ticket", "known bug", "feature request", "Linear issue", "engineering status"]
        freshness: live
        search_strategy: "Search across both title and description for best results (use OR filter)"
        example_questions:
          - "Is there a ticket for the OAuth issue?"
          - "What's the status of the API rate limiting feature?"
          - "Show me high-priority bugs assigned to the team"
      description: Linear issue object
      required:
        - id
        - title
      properties:
        id:
          type: string
          description: Unique issue identifier
        title:
          type: string
          description: Issue title
        description:
          oneOf:
            - type: string
            - type: "null"
          description: Issue description
        state:
          oneOf:
            - type: object
              properties:
                id:
                  type: string
                  description: Workflow state UUID for status update operations
                name:
                  type: string
            - type: "null"
          description: Issue workflow state with ID for status transitions
        priority:
          oneOf:
            - type: number
            - type: "null"
          description: Issue priority (0-4)
        assignee:
          oneOf:
            - type: object
              properties:
                id:
                  type: string
                  description: Unique user identifier (UUID) for assignment operations
                name:
                  type: string
                email:
                  type: string
            - type: "null"
          description: Assigned user with ID for reassignment workflows
        team:
          oneOf:
            - type: object
              properties:
                id:
                  type: string
                name:
                  type: string
            - type: "null"
          description: Team the issue belongs to
        project:
          oneOf:
            - type: object
              properties:
                id:
                  type: string
                name:
                  type: string
            - type: "null"
          description: Project the issue belongs to
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

