servers:
  - url: https://api.linear.app
    description: Linear API server

security:
  - linearOAuth: []
  - apiKeyAuth: []

paths:
  # Issues Resource
  "/graphql:listIssues":
    post:
      summary: List issues
      description: Returns a paginated list of issues via GraphQL with pagination support
      operationId: listIssues
      x-airbyte-entity: issues
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.data.issues.nodes
      x-airbyte-meta-extractor:
