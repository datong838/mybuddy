components:
  securitySchemes:
    linearOAuth:
      type: oauth2
      x-airbyte-untested: true
      description: Linear OAuth 2.0 authentication with automatic token refresh
      flows:
        authorizationCode:
          authorizationUrl: https://linear.app/oauth/authorize
          tokenUrl: https://api.linear.app/oauth/token
          refreshUrl: https://api.linear.app/oauth/token
          scopes:
            read: Read access for the user's account
            write: Write access for the user's account
            issues:create: Allows creating new issues and their attachments
            comments:create: Allows creating new issue comments
      x-airbyte-oauth-scopes:
        - scope: "read"
          mode: read
          description: Read access for the user's account
          entities:
            - issues
            - projects
            - teams
            - users
            - comments
            - workflow_states
        - scope: "write"
