components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication with refresh token
      flows:
        authorizationCode:
          authorizationUrl: https://www.linkedin.com/oauth/v2/authorization
          tokenUrl: https://www.linkedin.com/oauth/v2/accessToken
          refreshUrl: https://www.linkedin.com/oauth/v2/accessToken
          scopes:
            r_ads: Read access to advertising accounts
            r_ads_reporting: Retrieve reporting for advertising accounts
      x-airbyte-token-refresh:
        auth_style: body
        body_format: form
      x-airbyte-auth-config:
        title: "OAuth 2.0 Authentication"
        type: object
        required:
        - refresh_token
        - client_id
        - client_secret
        properties:
          refresh_token:
            type: string
            title: "Refresh Token"
            description: "OAuth 2.0 refresh token for automatic renewal"
          client_id:
            type: string
            title: "Client ID"
            description: "OAuth 2.0 application client ID"
          client_secret:
            type: string
            title: "Client Secret"
            description: "OAuth 2.0 application client secret"
        auth_mapping:
          refresh_token: "${refresh_token}"
          client_id: "${client_id}"
          client_secret: "${client_secret}"
        replication_auth_key_mapping:
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          credentials.refresh_token: "refresh_token"
        replication_auth_key_constants:
          credentials.auth_method: "oAuth2.0"

  schemas:
    Account:
      type: object
      x-airbyte-entity-name: accounts
      x-airbyte-stream-name: accounts
      x-airbyte-ai-hints:
        summary: "LinkedIn Ads accounts with status and billing information"
        when_to_use: "Questions about ad account details or account-level settings"
        trigger_phrases: ["linkedin ads account", "ad account"]
        freshness: live
        search_strategy: "List all accessible accounts"
        example_questions:
          - "What LinkedIn Ads accounts do I have?"
      description: LinkedIn ad account object
      properties:
        id:
          type:
          - "null"
          - integer
          description: Unique account identifier
        name:
          type:
          - "null"
          - string
          description: Account name
        currency:
          type:
          - "null"
          - string
          description: Currency code used by the account
        status:
          type:
          - "null"
          - string
          description: Account status (ACTIVE, PAUSED, etc.)
        type:
          type:
          - "null"
          - string
          description: Account type
        reference:
          type:
          - "null"
          - string
          description: Reference organization URN
        test:
          type:
          - "null"
          - boolean
          description: Whether this is a test account
        changeAuditStamps:
          type:
          - "null"
          - object
          description: Creation and last modification audit stamps
          properties:
            created:
              type:
              - "null"
              - object
              properties:
                actor:
                  type:
                  - "null"
                  - string
                time:
                  type:
                  - "null"
                  - integer
            lastModified:
              type:
              - "null"
              - object
              properties:
                actor:
                  type:
                  - "null"
                  - string
                time:
                  type:
                  - "null"
                  - integer
        notifiedOnCampaignOptimization:
          type:
          - "null"
          - boolean
          description: Notification flag for campaign optimization
        notifiedOnCreativeApproval:
          type:
          - "null"
          - boolean
          description: Notification flag for creative approval
        notifiedOnCreativeRejection:
          type:
          - "null"
          - boolean
          description: Notification flag for creative rejection
