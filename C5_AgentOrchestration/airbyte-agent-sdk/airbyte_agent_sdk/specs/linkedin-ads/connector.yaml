openapi: 3.1.0

info:
  title: LinkedIn Ads API Connector
  version: 1.0.6
  description: >
    Connector for the LinkedIn Ads Marketing API. Provides access to ad accounts,
    campaigns, campaign groups, creatives, conversions, and ad analytics data.
    Supports OAuth 2.0 and direct access token authentication. Use this connector
    to retrieve advertising performance metrics, manage campaign structures, and
    monitor creative assets across your LinkedIn advertising accounts.
  x-airbyte-connector-name: linkedin-ads
  x-airbyte-connector-definition-id: 137ece28-5434-455c-8f34-69dc3782f451
  x-airbyte-platform-availability:
    state: experimental
    reason: Requires additional QA testing
  x-airbyte-replication-version: "5.6.9"
  x-airbyte-replication-compatibility: ">=5.6.9, <6.0.0"
  x-airbyte-external-documentation-urls:
  - type: api_reference
    title: LinkedIn Marketing API Documentation
    url: https://learn.microsoft.com/en-us/linkedin/marketing/
  x-airbyte-skip-auth-methods:
  - bearer
  x-airbyte-example-questions:
    direct:
    - "List all my LinkedIn ad accounts"
    - "Show me all campaigns in my ad account"
    - "List all campaign groups"
    - "Show me the creatives for my campaigns"
    - "List all conversions configured for my ad accounts"
    - "Show me account users for my LinkedIn ads accounts"
    - "Show me campaign analytics for my LinkedIn ad campaigns"
    - "Show me creative analytics for my ad creatives"
    search:
    - "Which campaigns have the highest click-through rate?"
    - "What is the total ad spend across all campaigns this month?"
    - "Show me campaigns with status ACTIVE"
    - "Which creatives have the most impressions?"
    - "Compare campaign performance by cost type"
    unsupported:
    - "Create a new campaign"
    - "Update campaign budgets"
    - "Delete an ad creative"
    - "Pause a campaign"
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from LinkedIn Ads.
    properties:
      account_ids:
        type: array
        title: Account IDs
        description: >-
          Specify the account IDs to pull data from, separated by a space. Leave
          this field empty if you want to pull the data from all accounts accessible
          by the authenticated user. See the LinkedIn docs to locate these IDs.
        items:
          type: integer
        default: []
      start_date:
        type: string
        title: Start Date
        description: "UTC date in the format YYYY-MM-DD. Any data before this date will not be replicated."
        format: date
    required:
    - start_date
    replication_config_key_mapping:
      account_ids: account_ids
      start_date: start_date
    replication_config_constants:
      start_date: "{{ day_delta(-180, '%Y-%m-%d') }}"
  x-airbyte-entity-relationships:
  - source_entity: campaigns
    target_entity: accounts
    foreign_key: account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: campaign_groups
    target_entity: accounts
    foreign_key: account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: creatives
    target_entity: accounts
