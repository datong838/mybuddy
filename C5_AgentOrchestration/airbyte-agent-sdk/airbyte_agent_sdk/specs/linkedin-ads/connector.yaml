servers:
- url: https://api.linkedin.com/rest
  description: LinkedIn Marketing API server

security:
- oauth2: []

paths:
  /adAccounts:
    get:
      summary: List ad accounts
      description: Returns a list of ad accounts the authenticated user has access to
      operationId: listAccounts
      x-airbyte-entity: accounts
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.elements
      x-airbyte-record-transform:
        account_urn: "urn:li:sponsoredAccount:{{ record.id }}"
      x-airbyte-meta-extractor:
        nextPageToken: $.metadata.nextPageToken
      parameters:
      - name: q
        in: query
        required: true
        description: "LinkedIn API finder method for querying ad accounts"
        schema:
          type: string
          default: search
      - name: pageSize
        in: query
        description: Number of items per page
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 100
      - name: pageToken
        in: query
        description: Token for the next page of results
        schema:
          type: string
      - name: LinkedIn-Version
        in: header
        required: true
        schema:
          type: string
          default: "202601"
      responses:
        "200":
          description: List of ad accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsList"
        "401":
          description: Unauthorized

  /adAccounts/{id}:
    get:
      summary: Get an ad account
      description: Get a single ad account by ID
      operationId: getAccount
      x-airbyte-entity: accounts
      x-airbyte-action: get
      parameters:
      - name: id
        in: path
        required: true
        description: Ad account ID
        schema:
          type: integer
      - name: LinkedIn-Version
        in: header
        required: true
        schema:
          type: string
          default: "202601"
      responses:
        "200":
          description: Ad account object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Account not found
        "401":
          description: Unauthorized

  /adAccountUsers:
    get:
      summary: List account users
      description: Returns a list of users associated with ad accounts
      operationId: listAccountUsers
      x-airbyte-entity: account_users
      x-airbyte-action: list
      x-airbyte-record-extractor: $.elements
      x-airbyte-meta-extractor:
        nextPageToken: $.metadata.nextPageToken
      parameters:
      - name: q
        in: query
        required: true
        description: "LinkedIn API finder method for querying by account URN"
        schema:
          type: string
          default: accounts
      - name: accounts
        in: query
        description: "Account URN, e.g. urn:li:sponsoredAccount:123456"
        required: true
        schema:
          type: string
      - name: count
        in: query
        description: Number of items per page
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 100
      - name: start
        in: query
        description: Offset for pagination
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: LinkedIn-Version
        in: header
        required: true
        schema:
          type: string
          default: "202601"
      responses:
        "200":
          description: List of account users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountUsersList"
        "401":
          description: Unauthorized

  /adAccounts/{account_id}/adCampaigns:
    get:
      summary: List campaigns
      description: Returns a list of campaigns for an ad account
      operationId: listCampaigns
      x-airbyte-entity: campaigns
      x-airbyte-action: list
      x-airbyte-record-extractor: $.elements
      x-airbyte-record-transform:
        campaign_analytics_param: "List(urn:li:sponsoredCampaign:{{ record.id }})"
      x-airbyte-meta-extractor:
        nextPageToken: $.metadata.nextPageToken
      parameters:
      - name: account_id
        in: path
        required: true
        description: Ad account ID
        schema:
          type: integer
      - name: q
        in: query
        required: true
        description: "LinkedIn API finder method for querying campaigns"
        schema:
          type: string
          default: search
      - name: pageSize
        in: query
        description: Number of items per page
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 100
      - name: pageToken
        in: query
        description: Token for the next page of results
        schema:
          type: string
      - name: LinkedIn-Version
        in: header
        required: true
        schema:
          type: string
          default: "202601"
      - name: X-Restli-Protocol-Version
        in: header
        required: true
        schema:
          type: string
          default: "2.0.0"
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignsList"
        "401":
