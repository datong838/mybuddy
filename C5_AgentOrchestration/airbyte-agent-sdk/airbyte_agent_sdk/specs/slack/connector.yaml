# Slack API Connector
# OpenAPI 3.1 specification with Airbyte extensions

openapi: 3.1.0

info:
  title: Slack API Connector
  version: 0.1.22
  description: |
    Slack is a business communication platform that offers messaging, file sharing, and integrations
    with other tools. This connector provides read access to users, channels, channel members, channel
    messages, and threads for workspace analytics. It also supports write operations including sending,
    updating, deleting, and scheduling messages, sending ephemeral messages, creating and renaming
    channels, archiving channels, joining channels, removing users from channels, setting channel topics
    and purposes, adding and removing reactions, pinning messages, adding bookmarks, and inviting users
    to channels.
  x-airbyte-connector-name: slack
  x-airbyte-connector-definition-id: c2281cee-86f9-4a86-bb48-d23286b4c7bd
  x-airbyte-replication-version: "3.2.11"
  x-airbyte-replication-compatibility: ">=3.2.11, <4.0.0"
  x-airbyte-example-questions:
    direct:
      - "List all users in my Slack workspace"
      - "Show me all public channels"
      - "List members of a public channel"
      - "Show me recent messages in a public channel"
      - "Show me thread replies for a recent message"
      - "List all channels I have access to"
      - "Show me user details for a workspace member"
      - "List channel members for a public channel"
      - "Send a message to a channel saying 'Hello team!'"
      - "Post a message in the general channel"
      - "Update the most recent message in a channel"
      - "Create a new public channel called 'project-updates'"
      - "Create a private channel named 'team-internal'"
      - "Rename a channel to 'new-channel-name'"
      - "Set the topic for a channel to 'Daily standup notes'"
      - "Update the purpose of a channel"
      - "Add a thumbsup reaction to the latest message in a channel"
      - "React with :rocket: to the latest message in a channel"
      - "Reply to a recent thread with 'Thanks for the update!'"
      - "Invite a user to a channel"
      - "Add a team member to the #project-updates channel"
      - "Send an ephemeral message to a user in a channel"
      - "Whisper a private reminder to a user in #general"
      - "Schedule a message in a channel for tomorrow at 9am"
      - "Send a reminder to a channel at 5pm today"
      - "Delete the bot's last message in a channel"
      - "Remove the :thumbsup: reaction from a message"
      - "Archive the #old-project channel"
      - "Remove a user from the #team channel"
      - "Pin the latest important message in a channel"
      - "Add a bookmark link to a channel"
      - "Join the #announcements channel"
      - "Have the bot join a public channel"
    search:
      - "What messages were posted in channel {channel_id} last week?"
      - "Show me the conversation history for channel {channel_id}"
      - "Search for messages mentioning {keyword} in channel {channel_id}"
    unsupported:
      - "Delete channel {channel_id}"
      - "Create a new user in the workspace"
      - "Update user profile information"
      - "Unarchive a channel"
  x-airbyte-auth-tooltip:
    "API Token Credentials": |
      Bot tokens always start with `xoxb-`. Slack supports multiple token types, but we require bot tokens. Do not use other token types.

      The list of entities might be different depending on how you authenticate.
    "Default OAuth2.0 authorization": |
      The list of entities might be different depending on how you authenticate.
  x-airbyte-skip-suggested-streams:
    - channel_members
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Slack Web API Documentation
      url: https://api.slack.com/methods
    - type: api_release_history
      title: Slack API Changelog
      url: https://api.slack.com/changelog

  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Slack.
    properties:
      start_date:
        type: string
        title: Start Date
        description: UTC date and time in the format YYYY-MM-DDTHH:mm:ssZ from which to start replicating data.
        format: date-time
      lookback_window:
        type: integer
        title: Lookback Window
        description: Number of days to look back when syncing data (0-365).
      join_channels:
        type: boolean
        title: Join Channels
        description: Whether to automatically join public channels to sync messages.
      include_archived_channels:
        type: boolean
        title: Include Archived Channels
        description: Whether to include archived channels in the sync. When disabled (default), archived channels are excluded from the Slack API response, reducing the number of API calls for downstream streams such as channel_messages, threads, and channel_members.
      threads_ignore_no_replies:
        type: boolean
        title: Ignore Messages With No Replies in Threads Stream
        description: When enabled, the threads stream will skip messages that have no replies, reducing the number of API calls. Disabled by default to make the Threads stream contain unthreaded messages in its records.
      include_private_channels:
        type: boolean
        title: Include Private Channels
        description: Whether to read from private channels the bot is a member of. When disabled (default), only public channels are replicated.
    required:
      - start_date
      - lookback_window
      - join_channels
    replication_config_key_mapping:
      start_date: start_date
      lookback_window: lookback_window
      join_channels: join_channels
    replication_config_constants:
      start_date: "{{ day_delta(-30, '%Y-%m-%dT%H:%M:%SZ') }}"
      lookback_window: 0
      join_channels: true
      threads_ignore_no_replies: true
      # Keep these false so the agent doesn't automatically join/read archived or
      # private channels under the hood.
      include_archived_channels: false
      include_private_channels: false

