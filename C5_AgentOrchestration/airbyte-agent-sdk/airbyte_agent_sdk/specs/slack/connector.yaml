components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Slack Bot Token or User Token authentication
      x-airbyte-auth-config:
        title: "Token Authentication"
        type: object
        required:
          - bot_key
        properties:
          bot_key:
            type: string
            title: "Bot Key"
            description: "Your Slack Bot Key (xoxb-) or User Token (xoxp-)"
        auth_mapping:
          token: "${bot_key}"
        replication_auth_key_mapping:
          credentials.api_token: "bot_key"
        replication_auth_key_constants:
          credentials.option_title: "API Token Credentials"

    oauth2:
      type: oauth2
      x-airbyte-untested: true
      description: Slack OAuth 2.0 authentication for workspace installations
      flows:
        authorizationCode:
          authorizationUrl: https://slack.com/oauth/v2/authorize
          tokenUrl: https://slack.com/api/oauth.v2.access
          refreshUrl: https://slack.com/api/oauth.v2.access
          scopes:
            users:read: View people in a workspace
            channels:read: View basic information about public channels in a workspace
            channels:history: View messages and other content in public channels
            groups:read: View basic information about private channels
            groups:history: View messages and other content in private channels
            mpim:read: View basic information about group direct messages
            mpim:history: View messages and other content in group direct messages
            chat:write: Send messages on behalf of the authenticated user
            channels:manage: Create, rename, archive, and set topics or purposes for public channels
            groups:write: Create, rename, archive, and set topics or purposes for private channels
            reactions:write: Add and remove emoji reactions to messages
            pins:write: Pin and unpin messages in channels
            bookmarks:write: Add and manage channel bookmarks
            channels:join: Join public channels in a workspace
      x-airbyte-oauth-scopes:
        - scope: "users:read"
          mode: read
          entities:
            - users
        - scope: "channels:read"
          mode: read
          entities:
            - channels
        - scope: "channels:history"
          mode: read
          entities:
            - channel_messages
            - threads
        - scope: "groups:read"
          mode: read
          entities:
            - channels
        - scope: "groups:history"
          mode: read
          entities:
            - channel_messages
            - threads
        - scope: "mpim:read"
          mode: read
          entities:
            - channels
        - scope: "mpim:history"
          mode: read
          entities:
            - channel_messages
            - threads
        - scope: "chat:write"
          mode: write
          entities:
            - messages
            - ephemeral_messages
            - scheduled_messages
        - scope: "channels:manage"
          mode: write
          entities:
            - channels
            - channel_topics
            - channel_purposes
            - channel_archives
            - channel_kicks
            - channel_invites
        - scope: "groups:write"
          mode: write
          entities:
            - channels
            - channel_topics
            - channel_purposes
            - channel_archives
            - channel_kicks
            - channel_invites
        - scope: "reactions:write"
          mode: write
          entities:
            - reactions
        - scope: "pins:write"
          mode: write
          entities:
            - pins
        - scope: "bookmarks:write"
          mode: write
          entities:
            - bookmarks
        - scope: "channels:join"
          mode: write
          entities:
            - channel_joins
      x-airbyte-auth-config:
        title: "OAuth 2.0 Authentication"
        type: object
        required:
          - access_token
        properties:
          client_id:
            type: string
            title: "Client ID"
            description: "Your Slack App's Client ID"
          client_secret:
            type: string
            title: "Client Secret"
            description: "Your Slack App's Client Secret"
          access_token:
            type: string
            title: "Access Token"
            description: "OAuth access token (bot token from oauth.v2.access response)"
        auth_mapping:
          client_id: "${client_id}"
          client_secret: "${client_secret}"
          access_token: "${access_token}"
        replication_auth_key_mapping:
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          credentials.access_token: "access_token"
        replication_auth_key_constants:
          credentials.option_title: "Default OAuth2.0 authorization"

  schemas:
    User:
      type: object
      x-airbyte-entity-name: users
      x-airbyte-stream-name: users
      x-airbyte-ai-hints:
        summary: "Slack workspace members, their profiles, roles, and contact info"
        when_to_use: "Looking up a person in Slack by name, email, or role, or listing workspace members"
