          $ref: "#/components/schemas/Channel"

    ChannelPurposeParams:
      type: object
      description: Parameters for setting channel purpose
      required:
        - channel
        - purpose
      properties:
        channel:
          type: string
          description: Channel ID to set purpose for
        purpose:
          type: string
          description: New purpose text (max 250 characters)

    ChannelPurposeResponse:
      type: object
      description: Response from setting channel purpose
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        channel:
          $ref: "#/components/schemas/Channel"

    # Channel Invite Schemas
    ChannelInviteParams:
      type: object
      description: Parameters for inviting users to a channel
      required:
        - channel
        - users
      properties:
        channel:
          type: string
          description: The ID of the public or private channel to invite user(s) to
        users:
          type: string
          description: A comma separated list of user IDs. Up to 1000 users may be listed.
        force:
          type: boolean
          description: When set to true and multiple user IDs are provided, continue inviting the valid ones while disregarding invalid IDs. Defaults to false.

    ChannelInviteResponse:
      type: object
      description: Response from inviting users to a channel
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        channel:
          $ref: "#/components/schemas/Channel"

    # Reaction Schemas
    ReactionAddParams:
      type: object
      description: Parameters for adding a reaction
      required:
        - channel
        - timestamp
        - name
      properties:
        channel:
          type: string
          description: Channel ID containing the message
        timestamp:
          type: string
          description: Timestamp of the message to react to
        name:
          type: string
          description: Reaction emoji name (without colons, e.g., "thumbsup")

    ReactionAddResponse:
      type: object
      description: Response from adding a reaction
      properties:
        ok:
          type: boolean
          description: Whether the request was successful

    # Reaction Remove Schemas
    ReactionRemoveParams:
      type: object
      description: Parameters for removing a reaction from a message
      required:
        - channel
        - timestamp
        - name
      properties:
        channel:
          type: string
          description: Channel ID containing the message
        timestamp:
          type: string
          description: Timestamp of the message to remove reaction from
        name:
          type: string
          description: Reaction emoji name to remove (without colons, e.g., "thumbsup")

    ReactionRemoveResponse:
      type: object
      description: Response from removing a reaction
      properties:
        ok:
          type: boolean
          description: Whether the request was successful

    # Ephemeral Message Schemas
    EphemeralMessageCreateParams:
      type: object
      description: Parameters for sending an ephemeral message visible only to one user
      required:
        - channel
        - user
        - text
      properties:
        channel:
          type: string
          description: Channel, private group, or IM channel to send the ephemeral message to. Can be an encoded ID or a name.
        user:
          type: string
          description: ID of the user who will receive the ephemeral message. The user should be in the channel specified by the channel argument.
        text:
          type: string
          description: Message text content (supports mrkdwn formatting). How this field works depends on whether blocks are also provided.
        thread_ts:
          type: string
          description: Provide another message's ts value to post this ephemeral message in a thread. The thread must already be active.
        blocks:
          type: array
          description: Block Kit blocks for rich message layout. When set, `text` is used as the notification fallback.
          items:
            type: object
            additionalProperties: true
        mrkdwn:
          type: boolean
          description: Whether to render mrkdwn formatting in `text` (default true).

    EphemeralMessageCreateResponse:
      type: object
      description: Response from sending an ephemeral message
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        message_ts:
          type: [string, "null"]
          description: Ephemeral message timestamp. Note this cannot be used with chat.update.

    # Scheduled Message Schemas
    ScheduledMessageCreateParams:
      type: object
      description: Parameters for scheduling a message for future delivery
      required:
        - channel
        - text
        - post_at
      properties:
        channel:
          type: string
          description: Channel, private group, or DM channel to send the scheduled message to. Can be an encoded ID or a name.
        text:
          type: string
          description: Message text content (supports mrkdwn formatting). How this field works depends on whether blocks are also provided.
        post_at:
          type: integer
          description: Unix timestamp representing the future time the message should post to Slack. Must be within 120 days.
        thread_ts:
          type: string
          description: Provide another message's ts value to make this message a reply. Avoid using a reply's ts value; use its parent instead.
        reply_broadcast:
          type: boolean
          description: Used in conjunction with thread_ts and indicates whether reply should be made visible to everyone in the channel. Defaults to false.
        unfurl_links:
          type: boolean
          description: Pass true to enable unfurling of primarily text-based content.
        unfurl_media:
          type: boolean
          description: Pass false to disable unfurling of media content.
        blocks:
          type: array
          description: Block Kit blocks for rich message layout. When set, `text` is used as the notification fallback.
          items:
            type: object
            additionalProperties: true
        mrkdwn:
          type: boolean
          description: Whether to render mrkdwn formatting in `text` (default true).

    ScheduledMessageCreateResponse:
      type: object
      description: Response from scheduling a message
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        channel:
          type: [string, "null"]
          description: Channel ID where the message will be posted
        scheduled_message_id:
          type: [string, "null"]
          description: ID of the scheduled message. Use with chat.deleteScheduledMessage to cancel.
        post_at:
          type: [integer, "null"]
          description: Unix timestamp when the message will be posted
        message:
          oneOf:
            - $ref: "#/components/schemas/ScheduledMessageContent"
            - type: "null"
          description: The scheduled message content

    ScheduledMessageContent:
      type: object
      description: Content of a scheduled message
      properties:
        text:
          type: [string, "null"]
          description: Message text content
        username:
          type: [string, "null"]
          description: Username that will post the message
        bot_id:
          type: [string, "null"]
          description: Bot ID if scheduled by a bot
        type:
          type: [string, "null"]
          description: Message type (e.g., "delayed_message")
        subtype:
          type: [string, "null"]
          description: Message subtype (e.g., "bot_message")
        user:
          type: [string, "null"]
          description: User ID who scheduled the message
        team:
          type: [string, "null"]
          description: Team ID of the workspace
        app_id:
          type: [string, "null"]
          description: App ID if scheduled by an app
        bot_profile:
          type: [object, "null"]
          description: Bot profile information if scheduled by a bot
        blocks:
          type: [array, "null"]
          description: Rich text block elements in the message
          items:
            type: object
        attachments:
          type: [array, "null"]
          items:
            $ref: "#/components/schemas/Attachment"
          description: Message attachments

    # Message Delete Schemas
    MessageDeleteParams:
      type: object
      description: Parameters for deleting a message. Bot tokens can only delete messages posted by the bot.
      required:
        - channel
        - ts
      properties:
        channel:
          type: string
          description: Channel ID containing the message to be deleted
        ts:
          type: string
          description: Timestamp of the message to be deleted

    MessageDeleteResponse:
      type: object
      description: Response from deleting a message
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        channel:
          type: [string, "null"]
          description: Channel ID where the message was deleted
        ts:
          type: [string, "null"]
          description: Timestamp of the deleted message

    # Channel Archive Schemas
    ChannelArchiveParams:
      type: object
      description: Parameters for archiving a channel
      required:
        - channel
      properties:
        channel:
          type: string
          description: ID of the channel to archive

    ChannelArchiveResponse:
      type: object
      description: Response from archiving a channel
      properties:
        ok:
          type: boolean
          description: Whether the request was successful

    # Channel Kick Schemas
    ChannelKickParams:
      type: object
      description: Parameters for removing a user from a channel
      required:
        - channel
        - user
      properties:
        channel:
          type: string
          description: ID of the channel to remove the user from
        user:
          type: string
          description: User ID to be removed from the channel

    ChannelKickResponse:
      type: object
      description: Response from removing a user from a channel
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        errors:
          type: [object, "null"]
          description: Error details, empty object on success

    # Channel Join Schemas
    ChannelJoinParams:
      type: object
      description: Parameters for joining a channel
      required:
        - channel
      properties:
        channel:
          type: string
          description: ID of the channel to join

    ChannelJoinResponse:
      type: object
      description: Response from joining a channel
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        channel:
          $ref: "#/components/schemas/Channel"
        warning:
          type: string
          description: Warning message if applicable
        response_metadata:
          type: object
          description: Additional response metadata
          properties:
            warnings:
              type: array
              items:
                type: string
              description: List of warning messages

    # Pin Schemas
    PinAddParams:
      type: object
      description: Parameters for pinning a message to a channel
      required:
        - channel
        - timestamp
      properties:
        channel:
          type: string
          description: Channel ID to pin the message to
        timestamp:
          type: string
          description: Timestamp of the message to pin

    PinAddResponse:
      type: object
      description: Response from pinning a message
      properties:
        ok:
          type: boolean
          description: Whether the request was successful

    # Bookmark Schemas
    BookmarkAddParams:
      type: object
      description: Parameters for adding a bookmark to a channel
      required:
        - channel_id
        - title
        - type
      properties:
        channel_id:
          type: string
          description: Channel ID to add the bookmark to
        title:
          type: string
          description: Title for the bookmark
        type:
          type: string
          description: Type of the bookmark (e.g., "link")
        link:
          type: string
          description: URL to bookmark (required for link type). Must begin with http:// or https://.
        emoji:
          type: string
          description: Emoji tag to apply to the bookmark (e.g., ":rocket:")

    BookmarkAddResponse:
      type: object
      description: Response from adding a bookmark
      properties:
        ok:
          type: boolean
          description: Whether the request was successful
        bookmark:
          $ref: "#/components/schemas/Bookmark"

    Bookmark:
      type: object
      description: A channel bookmark
      properties:
        id:
          type: [string, "null"]
          description: Bookmark ID
        channel_id:
          type: [string, "null"]
          description: Channel ID the bookmark belongs to
        title:
          type: [string, "null"]
          description: Bookmark title
        link:
          type: [string, "null"]
          description: Bookmark URL
        emoji:
          type: [string, "null"]
          description: Emoji tag
        icon_url:
          type: [string, "null"]
          description: Icon URL (e.g., favicon)
        type:
          type: [string, "null"]
          description: Bookmark type (e.g., "link")
        entity_id:
          type: [string, "null"]
          description: Entity ID if bookmarking a message or file
        date_created:
          type: [integer, "null"]
          description: Unix timestamp of bookmark creation
        date_updated:
          type: [integer, "null"]
          description: Unix timestamp of last update
        rank:
          type: [string, "null"]
          description: Sort rank
        last_updated_by_user_id:
          type: [string, "null"]
          description: User ID of last updater
        last_updated_by_team_id:
          type: [string, "null"]
          description: Team ID of last updater
        shortcut_id:
          type: [string, "null"]
          description: Shortcut ID if applicable
        app_id:
          type: [string, "null"]
          description: App ID if created by an app
