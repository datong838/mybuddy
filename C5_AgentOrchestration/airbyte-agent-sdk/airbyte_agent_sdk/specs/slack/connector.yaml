servers:
  - url: https://slack.com/api
    description: Slack API server

security:
  - bearerAuth: []
  - oauth2: []

paths:
  "/users.list":
    get:
      summary: List users
      description: Returns a list of all users in the Slack workspace
      operationId: listUsers
      x-airbyte-entity: users
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.members
      x-airbyte-meta-extractor:
        next_cursor: $.response_metadata.next_cursor
      parameters:
        - name: cursor
          in: query
          description: Pagination cursor for next page
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Number of users to return per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 200
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"
        "401":
          description: Unauthorized

  "/users.info":
    get:
      summary: Get a user
      description: Get information about a single user by ID
      operationId: getUser
      x-airbyte-entity: users
      x-airbyte-action: get
      x-airbyte-record-extractor: $.user
      parameters:
        - name: user
          in: query
          required: true
          description: User ID
          schema:
            type: string
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: User not found
        "401":
          description: Unauthorized

  "/conversations.list":
    get:
      summary: List channels
      description: Returns a list of all channels in the Slack workspace
      operationId: listChannels
      x-airbyte-entity: channels
      x-airbyte-action: list
      x-airbyte-record-extractor: $.channels
      x-airbyte-meta-extractor:
        next_cursor: $.response_metadata.next_cursor
      parameters:
        - name: cursor
          in: query
          description: Pagination cursor for next page
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Number of channels to return per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 200
        - name: types
          in: query
          description: Mix and match channel types (public_channel, private_channel, mpim, im)
          required: false
          schema:
            type: string
            default: public_channel
        - name: exclude_archived
          in: query
          description: Exclude archived channels
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: List of channels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelsListResponse"
        "401":
          description: Unauthorized

  "/conversations.info":
    get:
      summary: Get a channel
      description: Get information about a single channel by ID
      operationId: getChannel
      x-airbyte-entity: channels
      x-airbyte-action: get
      x-airbyte-record-extractor: $.channel
      parameters:
        - name: channel
          in: query
          required: true
          description: Channel ID
          schema:
            type: string
      responses:
        "200":
          description: Channel object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResponse"
        "404":
          description: Channel not found
        "401":
          description: Unauthorized

  "/conversations.history":
    get:
      summary: List channel messages
      description: Returns messages from a channel
      operationId: listChannelMessages
      x-airbyte-entity: channel_messages
      x-airbyte-action: list
      x-airbyte-record-extractor: $.messages
      x-airbyte-meta-extractor:
        next_cursor: $.response_metadata.next_cursor
        has_more: $.has_more
      parameters:
        - name: channel
          in: query
          required: true
          description: Channel ID to get messages from
          schema:
            type: string
        - name: cursor
          in: query
          description: Pagination cursor for next page
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Number of messages to return per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: oldest
          in: query
          description: Start of time range (Unix timestamp)
          required: false
          schema:
            type: string
        - name: latest
          in: query
          description: End of time range (Unix timestamp)
          required: false
          schema:
            type: string
        - name: inclusive
          in: query
          description: Include messages with oldest or latest timestamps
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesListResponse"
        "401":
          description: Unauthorized

  "/conversations.replies":
    get:
      summary: List thread replies
      description: Returns messages in a thread (thread replies from conversations.replies endpoint)
      operationId: listThreadReplies
      x-airbyte-entity: threads
      x-airbyte-action: list
      x-airbyte-record-extractor: $.messages
