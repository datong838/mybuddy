              properties:
                statement:
                  type: string
                  description: >-
                    SQL DELETE statement to remove records
                    (e.g., DELETE FROM logs WHERE id = 99)
                database:
                  type: string
                  description: Database context for the statement
                schema:
                  type: string
                  description: Schema context for the statement
                warehouse:
                  type: string
