  "/api/v2/statements:record_create":
    post:
      summary: Create records
      description: >-
        Execute a SQL INSERT statement to create one or more new rows in a
        Snowflake table (e.g., INSERT INTO users (name, email) VALUES
        ('Alice', 'alice@example.com')). Intended for row insertion only.
        This is not a general-purpose SQL endpoint: it does not perform DDL/DCL
        (DROP, TRUNCATE, GRANT, CREATE TABLE) — issue the matching CRUD action
        for the operation you intend. Parameterized bind variables (the SQL API
        bindings field / ? placeholders) are not supported in this beta; inline
        literal values into the statement.
      operationId: createRecord
      x-airbyte-entity: record
      x-airbyte-action: create
      x-airbyte-path-override:
        path: /api/v2/statements
      parameters:
        - name: requestId
          in: query
          required: false
          schema:
            type: string
          description: >-
            Unique request ID for this DML statement. Reuse the SAME requestId when
            resubmitting after a network error or timeout so Snowflake deduplicates
            instead of executing the statement again.
        - name: retry
          in: query
          required: false
          schema:
            type: boolean
          description: >-
            Set to true when resubmitting a previously-sent statement with the same
            requestId, so Snowflake treats it as a safe retry rather than a new DML.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - statement
              properties:
                statement:
                  type: string
                  description: >-
                    SQL INSERT statement to create new records
                    (e.g., INSERT INTO users (name, email) VALUES ('Alice', 'alice@example.com'))
                database:
                  type: string
                  description: Database context for the statement
                schema:
                  type: string
                  description: Schema context for the statement
                warehouse:
                  type: string
                  description: Warehouse to use for execution
                role:
                  type: string
                  description: Role to use for execution
                timeout:
                  type: integer
                  description: Timeout in seconds for the statement execution
                parameters:
                  type: object
                  description: Session parameters for the statement execution
                  additionalProperties: true
      responses:
        "200":
          description: Result of the INSERT operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordResponse"

  "/api/v2/statements:record_update":
    post:
      summary: Update records
      description: >-
        Execute a SQL UPDATE statement to modify existing rows in a Snowflake
        table (e.g., UPDATE users SET email = 'new@example.com' WHERE id = 7).
        Intended for row modification only. This is not a general-purpose SQL
        endpoint: it does not perform DDL/DCL (DROP, TRUNCATE, GRANT, ALTER)
