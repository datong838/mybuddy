      operationId: listDatabases
      x-airbyte-entity: databases
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-meta-extractor:
        next_page_url: "@link.next"
        request_id: "$.requestId"
        statement_handle: "$.statementHandle"
        partition_info: "$.resultSetMetaData.partitionInfo"
      x-airbyte-path-override:
        path: /api/v2/statements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                statement:
                  type: string
                  default: "SHOW DATABASES"
                  enum:
                    - "SHOW DATABASES"
                  description: SQL statement to execute
                database:
                  type: string
                  description: Database context for the statement
                schema:
                  type: string
                  description: Schema context for the statement
                warehouse:
                  type: string
                  description: Warehouse to use for execution
                role:
                  type: string
                  description: Role to use for execution
                timeout:
                  type: integer
                  description: Timeout in seconds for the statement execution
                parameters:
                  type: object
                  description: Session parameters for the statement execution
                  additionalProperties: true
      responses:
        "200":
          description: List of databases
          content:
            application/json:
              schema:
