  "/api/v2/statements:record_delete":
    post:
      summary: Delete records
      description: >-
        Execute a SQL DELETE statement to remove rows from a Snowflake table
        (e.g., DELETE FROM logs WHERE id = 99). Intended for row deletion only.
        This is not a general-purpose SQL endpoint: it does not perform DDL/DCL
        (DROP, TRUNCATE, GRANT, CREATE) — issue the matching CRUD action for the
        operation you intend. Parameterized bind variables (the SQL API bindings
        field / ? placeholders) are not supported in this beta; inline literal
        values into the statement.
      operationId: deleteRecord
      x-airbyte-entity: record
      x-airbyte-action: delete
      x-airbyte-path-override:
