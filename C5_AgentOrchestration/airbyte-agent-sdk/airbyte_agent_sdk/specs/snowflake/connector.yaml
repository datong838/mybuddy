openapi: 3.1.0

info:
  title: Snowflake SQL API Connector
  version: 1.0.0
  description: |
    Connects to Snowflake via the SQL REST API (POST /api/v2/statements) to query
    metadata about databases, schemas, tables, views, warehouses, and columns,
    to read records from tables and views, and to create, update, and delete
    records in tables. Uses Programmatic Access Token (PAT) authentication.
    Metadata operations execute SHOW commands; record operations execute the SQL
    statement you provide. This connector is experimental (beta): record actions
    run arbitrary SQL bounded only by the connected PAT's Snowflake role, so scope
    that role to least privilege (read-only for read-only use cases).
    Parameterized bind variables (the SQL API `bindings` field / `?` placeholders)
    are not supported in this beta; inline literal values into the statement.
  x-airbyte-connector-name: snowflake
  x-airbyte-connector-definition-id: e2d65910-8c8b-40a1-ae7d-ee2416b2bfa2
  x-airbyte-platform-availability:
    state: experimental
    reason: Requires additional QA testing
  x-airbyte-replication-version: "1.1.0"
  x-airbyte-replication-compatibility: ">=1.1.0, <2.0.0"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Snowflake SQL API Reference
      url: https://docs.snowflake.com/en/developer-guide/sql-api/reference
    - type: api_reference
      title: Snowflake PAT Authentication
      url: https://docs.snowflake.com/en/user-guide/programmatic-access-tokens
  x-airbyte-skip-auth-methods:
    - basic
    - api_key
  x-airbyte-example-questions:
    direct:
      - "List all databases in Snowflake"
      - "Show me all schemas"
      - "What tables are available?"
      - "List all views"
      - "Show me the warehouses"
      - "What columns does my data have?"
      - "Get the record with id 42 from the users table"
      - "List all records from the orders table"
      - "Insert a new row into the customers table"
      - "Update the email for user 7 in the users table"
      - "Delete the record with id 99 from the logs table"
    search:
      - "Find all tables in the ANALYTICS database"
      - "Which warehouses are currently running?"
      - "Show me all views in the PUBLIC schema"
      - "What databases were created this month?"
      - "Find all orders placed in the last 30 days"
      - "Search for users with email ending in @example.com"
  x-airbyte-replication-config:
    title: Snowflake Connection Settings
    description: >-
      Database, warehouse, and role settings required for connecting to
      Snowflake. These map to the corresponding Airbyte source-snowflake
      configuration fields.
    properties:
      database:
        type: string
        title: Database
        description: The database for Airbyte to access data.
      warehouse:
        type: string
        title: Warehouse
        description: The warehouse for Airbyte to access data.
      role:
        type: string
        title: Role
        description: The role for Airbyte to access Snowflake.
    required:
      - database
      - warehouse
      - role
    replication_config_key_mapping:
      database: database
      warehouse: warehouse
      role: role
  x-airbyte-skip-context-store: >-
    Snowflake is a database source connector — streams are dynamically discovered
    from user tables/views at connection time, not from a fixed API schema.
    There are no predefined Airbyte streams to map to the Context Store.

servers:
  - url: https://{account}.snowflakecomputing.com
    description: Snowflake SQL API Server
    variables:
      account:
        default: orgname-accountname
        description: >-
          Snowflake account identifier in the format orgname-accountname
          (e.g., myorg-myaccount)
    x-airbyte-replication-environment-mapping:
      host:
        source: account
        format: "{value}.snowflakecomputing.com"

