                  description: Session parameters for the statement execution
                  additionalProperties: true
      responses:
        "200":
          description: Result of the DELETE operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordResponse"

  "/api/v2/statements/{statementHandle}:partition":
    get:
      summary: Get result partition
      description: >-
        Continuation helper for Snowflake list actions. Use this only after a
        databases, schemas, tables, views, warehouses, or columns list response
        includes a next_page_url or multiple partitionInfo entries. The initial
        list response contains partition 0; call this action with partition 1,
        2, and so on to retrieve additional rows for the same SHOW statement.
        This is not a standalone Snowflake resource and does not execute new
        SQL.
      operationId: getResultPartition
      x-airbyte-entity: result_partitions
      x-airbyte-action: get
      x-airbyte-untested: true
      x-airbyte-path-override:
        path: /api/v2/statements/{statementHandle}
      parameters:
        - name: statementHandle
          in: path
          required: true
          description: >-
            Statement handle returned by the initial list response metadata.
            Reuse this value when fetching additional partitions for that same
            result set.
          schema:
            type: string
        - name: partition
          in: query
          required: true
          description: >-
            Zero-based partition number to retrieve. The initial list response
            contains partition 0; request partition 1 or higher for subsequent
            pages.
          schema:
            type: integer
            minimum: 0
        - name: requestId
          in: query
          required: false
          description: >-
            Optional request ID from the initial list response metadata. Pass it
            through when available to continue the same Snowflake SQL API
            request.
          schema:
            type: string
      responses:
        "200":
          description: Additional result rows for the original list statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultPartitionResponse"

components:
  securitySchemes:
    snowflakePAT:
      type: http
      scheme: bearer
      description: Snowflake Programmatic Access Token (PAT) authentication
      x-airbyte-auth-config:
        title: PAT Authentication
        type: object
        required:
          - programmatic_access_token
        properties:
          programmatic_access_token:
            type: string
            title: Programmatic Access Token
            airbyte_secret: true
            description: >-
              Snowflake Programmatic Access Token (PAT) for authentication.
              Generate one via ALTER USER ADD PROGRAMMATIC ACCESS TOKEN in Snowflake.
        auth_mapping:
          token: "${programmatic_access_token}"
        additional_headers:
          X-Snowflake-Authorization-Token-Type: PROGRAMMATIC_ACCESS_TOKEN
        replication_auth_key_mapping:
          credentials.programmatic_access_token: "programmatic_access_token"
        replication_auth_key_constants:
          credentials.auth_type: "Programmatic Access Token"

  schemas:
    RowType:
      type: object
      description: Column metadata describing a single column in the result set
      properties:
        name:
          type: string
          description: Column name
        database:
          type: string
          description: Database name
        schema:
          type: string
          description: Schema name
        table:
          type: string
          description: Table name
        type:
          type: string
          description: Snowflake data type (text, fixed, real, boolean, etc.)
        scale:
          oneOf:
            - type: integer
            - type: "null"
          description: Decimal scale for numeric types
        precision:
          oneOf:
            - type: integer
            - type: "null"
          description: Numeric precision
        length:
          oneOf:
            - type: integer
            - type: "null"
          description: Maximum character length
        nullable:
          type: boolean
          description: Whether the column allows null values
        byteLength:
          oneOf:
            - type: integer
            - type: "null"
          description: Maximum byte length
        collation:
          oneOf:
            - type: string
            - type: "null"
          description: Collation specification

    PartitionInfo:
      type: object
      description: Information about a result partition
      properties:
        rowCount:
          type: integer
          description: Number of rows in this partition
        uncompressedSize:
          type: integer
          description: Uncompressed size of the partition in bytes
        compressedSize:
          type: integer
          description: Compressed size of the partition in bytes

    ResultSetMetaData:
      type: object
      description: Metadata about the result set
      properties:
        numRows:
          type: integer
          description: Total number of rows in the result set
        format:
          type: string
          description: Format of the result data (e.g., jsonv2)
        rowType:
          type: array
          items:
            $ref: "#/components/schemas/RowType"
          description: Column metadata for each column in the result set
        partitionInfo:
          type: array
          items:
            $ref: "#/components/schemas/PartitionInfo"
          description: Information about result partitions

    StatementResponse:
      type: object
      description: >-
        Response from the Snowflake SQL API containing result set metadata
        and data rows. Used by all SHOW statement operations.
      properties: &statement_response_properties
        requestId:
          type: string
          description: Unique request identifier for the API call
        resultSetMetaData:
          $ref: "#/components/schemas/ResultSetMetaData"
        data:
          type: array
          items:
            type: array
            items:
              oneOf:
                - type: string
                - type: "null"
          description: >-
            Result rows as an array of arrays. Each inner array is a row
            with values as strings, matching the column order from
            resultSetMetaData.rowType.
        code:
          type: string
          description: Snowflake status code (e.g., 090001 for success)
        statementStatusUrl:
          type: string
          description: URL to check statement execution status
        sqlState:
          type: string
          description: SQL state code (e.g., 00000 for success)
        statementHandle:
          type: string
          description: Unique handle for the executed statement
        message:
          type: string
          description: Human-readable status message
        createdOn:
          type: integer
          description: Unix timestamp (milliseconds) when the statement was created
        stats:
          type: object
          description: >-
            DML statistics returned for INSERT, UPDATE, DELETE, and MERGE
            statements. Not present for SELECT or SHOW queries.
          properties:
            numRowsInserted:
              type: integer
              description: Number of rows inserted
            numRowsDeleted:
              type: integer
              description: Number of rows deleted
            numRowsUpdated:
              type: integer
              description: Number of rows updated
            numDmlDuplicates:
              type: integer
              description: Number of duplicate rows skipped

    DatabasesResponse:
      type: object
      properties: *statement_response_properties
      x-airbyte-entity-name: databases
      x-airbyte-ai-hints:
        summary: "Snowflake databases accessible to the current user"
        when_to_use: "When listing available databases or checking database metadata"
        trigger_phrases:
          - "list databases"
          - "show databases"
          - "what databases exist"
        freshness: live
        search_strategy: "Execute SHOW DATABASES via the SQL API"
        example_questions:
          - "What databases are available in Snowflake?"
          - "List all Snowflake databases"

    SchemasResponse:
      type: object
      properties: *statement_response_properties
      x-airbyte-entity-name: schemas
      x-airbyte-ai-hints:
        summary: "Snowflake schemas within databases"
        when_to_use: "When listing schemas or exploring database structure"
        trigger_phrases:
          - "list schemas"
          - "show schemas"
          - "what schemas exist"
        freshness: live
        search_strategy: "Execute SHOW SCHEMAS via the SQL API"
        example_questions:
          - "What schemas are in this database?"
          - "Show all schemas"

    TablesResponse:
      type: object
      properties: *statement_response_properties
      x-airbyte-entity-name: tables
      x-airbyte-ai-hints:
        summary: "Snowflake tables with metadata like row count, size, and clustering"
        when_to_use: "When listing tables or checking table properties"
        trigger_phrases:
          - "list tables"
          - "show tables"
          - "what tables exist"
        freshness: live
        search_strategy: "Execute SHOW TABLES via the SQL API"
        example_questions:
          - "What tables are available?"
          - "Show me all tables in the database"

    ViewsResponse:
      type: object
      properties: *statement_response_properties
      x-airbyte-entity-name: views
      x-airbyte-ai-hints:
        summary: "Snowflake views including materialized views"
        when_to_use: "When listing views or checking view definitions"
        trigger_phrases:
          - "list views"
          - "show views"
          - "what views exist"
        freshness: live
        search_strategy: "Execute SHOW VIEWS via the SQL API"
        example_questions:
          - "What views are defined?"
          - "Show all views in the schema"

    WarehousesResponse:
      type: object
      properties: *statement_response_properties
      x-airbyte-entity-name: warehouses
      x-airbyte-ai-hints:
        summary: "Snowflake virtual warehouses with state, size, and configuration"
        when_to_use: "When listing warehouses or checking warehouse status"
        trigger_phrases:
          - "list warehouses"
          - "show warehouses"
          - "warehouse status"
        freshness: live
        search_strategy: "Execute SHOW WAREHOUSES via the SQL API"
        example_questions:
          - "What warehouses are configured?"
          - "Which warehouses are running?"

    ColumnsResponse:
      type: object
      properties: *statement_response_properties
      x-airbyte-entity-name: columns
      x-airbyte-ai-hints:
        summary: "Snowflake table and view columns with data types and metadata"
        when_to_use: "When listing columns or inspecting table schema"
        trigger_phrases:
          - "list columns"
          - "show columns"
          - "what columns exist"
          - "table schema"
        freshness: live
        search_strategy: "Execute SHOW COLUMNS via the SQL API"
        example_questions:
          - "What columns does this table have?"
          - "Show me the column definitions"

    RecordResponse:
      type: object
      properties: *statement_response_properties
      x-airbyte-entity-name: record
      x-airbyte-ai-hints:
        summary: >-
          Read, create, update, and delete rows in Snowflake tables and views
          via the SQL API. Each CRUD action maps to its SQL verb.
        when_to_use: >-
          When the user wants to query, insert, update, or delete actual data
          records in Snowflake tables or views. Use the get action for single-row
          SELECT, list for multi-row SELECT, create for INSERT, update for UPDATE,
          and delete for DELETE.
        trigger_phrases:
          - "query records"
          - "select from table"
          - "insert into table"
          - "update record"
          - "delete record"
        freshness: live
        search_strategy: >-
          Use the record action that matches the intended CRUD operation (get/list
          for SELECT, create for INSERT, update for UPDATE, delete for DELETE).
          Pass the SQL statement in the request body; it should match that action's
          SQL verb. Set database, schema, warehouse, and role fields as needed for
          execution context.
        example_questions:
          - "Get the record with id 42 from the users table"
          - "List all records from the orders table"
          - "Insert a new row into the customers table"
          - "Update the email for user 7 in the users table"
          - "Delete the record with id 99 from the logs table"

    ResultPartitionResponse:
      type: object
      properties: *statement_response_properties
      x-airbyte-entity-name: result_partitions
      x-airbyte-ai-hints:
        summary: "Continuation helper for additional Snowflake list result partitions"
        when_to_use: >-
          Use only after a Snowflake list response includes a next_page_url or
          multiple resultSetMetaData.partitionInfo entries. The original list
          response contains partition 0; request partition 1 or higher here to
          fetch more rows for the same SHOW result set.
        trigger_phrases:
          - "next partition"
          - "more Snowflake results"
          - "continue pagination"
          - "fetch the next page"
        freshness: live
        search_strategy: >-
          Reuse the statement_handle and request_id returned in the prior list
          action metadata, then call this get action with the next partition
          number. Do not use this entity to execute new SQL or discover
          metadata from scratch.
        example_questions:
          - "Fetch the next Snowflake result partition"
          - "Continue the previous Snowflake columns listing"

