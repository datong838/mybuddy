  "/api/v2/statements:record_get":
    post:
      summary: Get a record
      description: >-
        Execute a SQL SELECT statement and return the result set. Typically used to
        retrieve a single row by filtering on a unique identifier (e.g., SELECT *
        FROM users WHERE id = 42). The result is returned as rows, the same shape
        as the list action; when the SELECT targets one row the result contains a
        single row. Intended for row retrieval only. This is not a general-purpose
        SQL endpoint: it does not perform DDL/DCL (DROP, TRUNCATE, GRANT, CREATE)
        — issue the matching CRUD action for the operation you intend.
        Parameterized bind variables (the SQL API bindings field / ? placeholders)
        are not supported in this beta; inline literal values into the statement.
      operationId: getRecord
      x-airbyte-entity: record
      x-airbyte-action: get
      x-airbyte-path-override:
        path: /api/v2/statements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - statement
              properties:
                statement:
                  type: string
                  description: >-
                    SQL SELECT statement to retrieve a single record
                    (e.g., SELECT * FROM users WHERE id = 42)
                database:
                  type: string
                  description: Database context for the statement
                schema:
                  type: string
                  description: Schema context for the statement
                warehouse:
                  type: string
                  description: Warehouse to use for execution
                role:
                  type: string
                  description: Role to use for execution
                timeout:
                  type: integer
                  description: Timeout in seconds for the statement execution
                parameters:
                  type: object
                  description: Session parameters for the statement execution
                  additionalProperties: true
      responses:
        "200":
          description: Query result set (single-row when the SELECT targets one row)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordResponse"

  "/api/v2/statements:record_list":
    post:
      summary: List records
      description: >-
        Execute a SQL SELECT query that returns multiple records from a Snowflake
        table or view. Use this action when you need to retrieve a set of rows,
        optionally with filtering, sorting, or limiting (e.g., SELECT * FROM
        orders WHERE status = 'active' ORDER BY created_at DESC LIMIT 100).
        Intended for row retrieval only. This is not a general-purpose SQL
        endpoint: it does not perform DDL/DCL (DROP, TRUNCATE, GRANT, CREATE)
        — issue the matching CRUD action for the operation you intend.
        Parameterized bind variables (the SQL API bindings field / ? placeholders)
