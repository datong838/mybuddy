servers:
  - url: https://harvest.greenhouse.io/v1
    description: Greenhouse Harvest API server

security:
  - basicAuth: []

paths:
  "/candidates":
    get:
      summary: List candidates
      description: Returns a paginated list of all candidates in the organization
      operationId: listCandidates
      x-airbyte-entity: candidates
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-meta-extractor:
        next: "@link.next"
      parameters:
        - name: per_page
          in: query
          description: Number of items to return per page (max 500)
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: List of candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"
        "401":
          description: Unauthorized
        "422":
          description: Unprocessable Entity

  "/candidates/{id}":
    get:
      summary: Get a candidate
      description: Get a single candidate by ID
      operationId: getCandidate
      x-airbyte-entity: candidates
      x-airbyte-action: get
      parameters:
        - name: id
          in: path
          required: true
          description: Candidate ID
          schema:
            type: integer
      responses:
        "200":
          description: Candidate object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
        "404":
          description: Candidate not found
        "401":
          description: Unauthorized

  "/applications":
    get:
      summary: List applications
      description: Returns a paginated list of all applications
      operationId: listApplications
      x-airbyte-entity: applications
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: "@link.next"
      parameters:
        - name: per_page
          in: query
          description: Number of items to return per page (max 500)
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: created_before
          in: query
          description: Filter by applications created before this timestamp
          schema:
            type: string
            format: date-time
        - name: created_after
          in: query
          description: Filter by applications created after this timestamp
          schema:
            type: string
            format: date-time
        - name: last_activity_after
          in: query
          description: Filter by applications with activity after this timestamp
          schema:
            type: string
            format: date-time
        - name: job_id
          in: query
          description: Filter by job ID
          schema:
            type: integer
        - name: status
          in: query
          description: Filter by application status
          schema:
            type: string
            enum: [active, rejected, hired]
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"
        "401":
