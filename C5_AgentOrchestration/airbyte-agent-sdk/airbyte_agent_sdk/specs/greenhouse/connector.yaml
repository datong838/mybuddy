components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic authentication (API token as username, blank password)
      x-airbyte-auth-config:
        title: "Harvest API Key Authentication"
        type: object
        required:
          - api_key
        properties:
          api_key:
            type: string
            title: "Harvest API Key"
            description: "Your Greenhouse Harvest API Key from the Dev Center"
        auth_mapping:
          username: "${api_key}"
          password: ""
        replication_auth_key_mapping:
          api_key: "api_key"

  schemas:
    Candidate:
      type: object
      x-airbyte-entity-name: candidates
      x-airbyte-stream-name: candidates
      x-airbyte-ai-hints:
        summary: "Job candidates with application history and contact details"
        when_to_use: "Looking up candidate information or hiring pipeline data"
        trigger_phrases: ["greenhouse candidate", "applicant", "who applied"]
        freshness: live
        search_strategy: "Search by name or email"
        example_questions:
          - "Find a candidate in Greenhouse"
          - "List recent candidates"
      description: Greenhouse candidate object
      properties:
        id:
          type: integer
          description: Unique candidate identifier
        first_name:
          type: string
          description: Candidate's first name
        last_name:
          type: string
          description: Candidate's last name
        company:
          type: [string, "null"]
          description: Candidate's current company
        title:
          type: [string, "null"]
          description: Candidate's current title
        created_at:
          type: string
          format: date-time
          description: When the candidate was created
        updated_at:
          type: string
          format: date-time
          description: When the candidate was last updated
        last_activity:
          type: string
          format: date-time
          description: When the last activity occurred
        is_private:
          type: boolean
          description: Whether the candidate is private
        photo_url:
          type: [string, "null"]
          description: URL to candidate's photo
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
          description: Candidate attachments (resumes, cover letters, etc.)
        application_ids:
          type: array
          items:
            type: integer
          description: IDs of candidate's applications
        phone_numbers:
          type: array
          items:
            type: object
          description: Candidate phone numbers
        addresses:
          type: array
          items:
            type: object
          description: Candidate addresses
        email_addresses:
          type: array
          items:
            type: object
          description: Candidate email addresses
        website_addresses:
          type: array
          items:
            type: object
          description: Candidate website addresses
        social_media_addresses:
          type: array
          items:
            type: object
          description: Candidate social media addresses
        recruiter:
          type: [object, "null"]
          description: Recruiter information
        coordinator:
          type: [object, "null"]
          description: Coordinator information
        can_email:
          type: boolean
          description: Whether the candidate can be emailed
        tags:
          type: array
          items:
            type: string
          description: Candidate tags
        custom_fields:
          type: object
          description: Custom field values

    Application:
      type: object
      x-airbyte-entity-name: applications
      x-airbyte-stream-name: applications
      x-airbyte-ai-hints:
        summary: "Job applications with stage, status, and interview details"
        when_to_use: "Questions about application status or hiring pipeline progress"
        trigger_phrases: ["application status", "hiring stage", "interview status"]
        freshness: live
        search_strategy: "Filter by candidate, job, or status"
        example_questions:
          - "What stage is an application in?"
      description: Greenhouse application object
      properties:
        id:
          type: integer
          description: Unique application identifier
        candidate_id:
          type: integer
          description: ID of the associated candidate
        prospect:
          type: boolean
          description: Whether this is a prospect application
        applied_at:
          type: string
          format: date-time
          description: When the application was submitted
        rejected_at:
          type: [string, "null"]
          format: date-time
          description: When the application was rejected
        last_activity_at:
          type: string
          format: date-time
          description: When the last activity occurred
        location:
          type: [object, "null"]
          description: Application location
        source:
          type: object
          description: Application source
        credited_to:
          type: object
          description: User credited with the application
        rejection_reason:
          type: [object, "null"]
          description: Rejection reason if rejected
        rejection_details:
          type: [object, "null"]
          description: Additional rejection details
        jobs:
          type: array
          items:
            type: object
          description: Jobs associated with the application
        job_post_id:
          type: [integer, "null"]
          description: ID of the job post
        status:
          type: string
          description: Application status
        current_stage:
          type: [object, "null"]
          description: Current stage of the application
        answers:
          type: array
          items:
            type: object
          description: Application question answers
        prospective_office:
          type: [object, "null"]
          description: Prospective office
