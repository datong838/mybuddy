openapi: 3.1.0

info:
  title: incident.io API Connector
  version: 1.0.4
  description: |
    Connect to the incident.io API to access incident management data including
    incidents, alerts, escalations, users, teams, schedules, and more. incident.io is an
    on-call, status pages, and incident response platform. This connector provides
    read-only access to core incident management entities via the v1, v2, and v3 APIs.
    Requires an API key from your incident.io dashboard (Pro plan or above).
  x-airbyte-connector-name: incident-io
  x-airbyte-connector-display-name: Incident.io
  x-airbyte-connector-definition-id: 7926da90-399e-4f9f-9833-52d8dc3fcb29
  x-airbyte-replication-version: "0.1.30"
  x-airbyte-replication-compatibility: ">=0.1.30, <1.0.0"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: incident.io API reference
      url: https://api-docs.incident.io/
    - type: authentication_guide
      title: incident.io authentication
      url: https://api-docs.incident.io/#section/Authentication
    - type: status_page
      title: incident.io Status
      url: https://status.incident.io/
  x-airbyte-example-questions:
    direct:
      - "List all incidents"
      - "Show all open incidents"
      - "List all alerts"
      - "Show all users"
      - "List all escalations"
      - "Show all on-call schedules"
      - "List all severities"
      - "Show all incident statuses"
      - "List all custom fields"
      - "List all teams"
    search:
      - "Which incidents were created this week?"
      - "What are the most recent high-severity incidents?"
      - "Who is currently on-call?"
      - "How many incidents are in triage status?"
      - "What incidents were updated today?"
    unsupported:
      - "Create a new incident"
      - "Update an incident's severity"
      - "Delete an alert"
      - "Assign someone to an incident role"
  x-airbyte-context-store:
    disable_compaction: true
    entities:
      - entity: incidents
        x-airbyte-name: incidents
        suggested: true
        fields:
          - name: created_at
            type: ["null", "string"]
            description: When the incident was created
          - name: creator
            type: ["null", "object"]
            description: The user who created the incident
            properties:
              user:
                type: ["null", "object"]
                properties:
                  email:
                    type: ["null", "string"]
                  id:
                    type: ["null", "string"]
                  name:
                    type: ["null", "string"]
                  role:
                    type: ["null", "string"]
                  slack_user_id:
                    type: ["null", "string"]
          - name: custom_field_entries
            type: ["null", "array"]
            description: Custom field values for the incident
          - name: duration_metrics
            type: ["null", "array"]
            description: Duration metrics associated with the incident
          - name: has_debrief
            type: ["null", "boolean"]
            description: Whether the incident has had a debrief
          - name: id
            type: ["null", "string"]
            description: Unique identifier for the incident
          - name: incident_role_assignments
            type: ["null", "array"]
            description: Role assignments for the incident
          - name: incident_status
            type: ["null", "object"]
            description: Current status of the incident
            properties:
              category:
                type: ["null", "string"]
              created_at:
                type: ["null", "string"]
              description:
                type: ["null", "string"]
              id:
                type: ["null", "string"]
              name:
                type: ["null", "string"]
              rank:
                type: ["null", "number"]
              updated_at:
                type: ["null", "string"]
          - name: incident_timestamp_values
            type: ["null", "array"]
            description: Timestamp values for the incident
          - name: incident_type
            type: ["null", "object"]
            description: Type of the incident
            properties:
              create_in_triage:
                type: ["null", "string"]
              created_at:
                type: ["null", "string"]
              description:
                type: ["null", "string"]
              id:
                type: ["null", "string"]
              is_default:
                type: ["null", "boolean"]
              name:
                type: ["null", "string"]
              private_incidents_only:
                type: ["null", "boolean"]
              updated_at:
                type: ["null", "string"]
          - name: mode
            type: ["null", "string"]
            description: "Mode of the incident: standard, retrospective, test, or tutorial"
          - name: name
            type: ["null", "string"]
            description: Name/title of the incident
          - name: permalink
            type: ["null", "string"]
            description: Link to the incident in the dashboard
          - name: reference
            type: ["null", "string"]
            description: Human-readable reference (e.g. INC-123)
          - name: severity
            type: ["null", "object"]
            description: Severity of the incident
            properties:
              created_at:
                type: ["null", "string"]
              description:
                type: ["null", "string"]
              id:
                type: ["null", "string"]
              name:
                type: ["null", "string"]
              rank:
                type: ["null", "number"]
              updated_at:
                type: ["null", "string"]
          - name: slack_channel_id
            type: ["null", "string"]
            description: Slack channel ID for the incident
          - name: slack_channel_name
            type: ["null", "string"]
            description: Slack channel name for the incident
          - name: slack_team_id
            type: ["null", "string"]
            description: Slack team/workspace ID
          - name: summary
            type: ["null", "string"]
            description: Detailed summary of the incident
          - name: updated_at
            type: ["null", "string"]
            description: When the incident was last updated
          - name: visibility
            type: ["null", "string"]
            description: Whether the incident is public or private
          - name: workload_minutes_late
            type: ["null", "number"]
            description: Minutes of workload classified as late
          - name: workload_minutes_sleeping
            type: ["null", "number"]
            description: Minutes of workload classified as sleeping
          - name: workload_minutes_total
            type: ["null", "number"]
            description: Total workload minutes
          - name: workload_minutes_working
            type: ["null", "number"]
            description: Minutes of workload classified as working
      - entity: alerts
        x-airbyte-name: alerts
        suggested: true
        fields:
          - name: alert_source_id
            type: ["null", "string"]
            description: ID of the alert source that generated this alert
          - name: attributes
            type: ["null", "array"]
            description: Structured alert attributes
          - name: created_at
            type: ["null", "string"]
            description: When the alert was created
          - name: deduplication_key
            type: ["null", "string"]
            description: Deduplication key uniquely referencing this alert
          - name: description
            type: ["null", "string"]
            description: Description of the alert
          - name: id
