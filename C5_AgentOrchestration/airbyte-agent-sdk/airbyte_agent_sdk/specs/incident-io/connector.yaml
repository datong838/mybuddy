          - name: resolved_at
            type: ["null", "string"]
            description: When the alert was resolved
          - name: source_url
            type: ["null", "string"]
            description: Link to the alert in the upstream system
          - name: status
            type: ["null", "string"]
            description: "Status of the alert: firing or resolved"
          - name: title
            type: ["null", "string"]
            description: Title of the alert
          - name: updated_at
            type: ["null", "string"]
            description: When the alert was last updated
      - entity: users
        x-airbyte-name: users
        suggested: true
        fields:
          - name: base_role
            type: ["null", "object"]
            description: Base role assigned to the user
            properties:
              description:
