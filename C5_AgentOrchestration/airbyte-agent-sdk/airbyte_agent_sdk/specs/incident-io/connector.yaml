servers:
  - url: https://api.incident.io
    description: incident.io API server

security:
  - bearerAuth: []

paths:
  # ── Incidents ──
  /v2/incidents:
    get:
      summary: List incidents
      description: List all incidents for the organisation with cursor-based pagination.
      operationId: listIncidents
      x-airbyte-entity: incidents
      x-airbyte-action: list
      x-airbyte-record-extractor: $.incidents
      x-airbyte-meta-extractor:
        next_cursor: $.pagination_meta.after
      parameters:
        - name: page_size
          in: query
          description: Number of incidents per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 250
            default: 25
        - name: after
          in: query
          description: Cursor for the next page of results
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of incidents
          content:
            application/json:
              schema:
                type: object
                properties:
                  incidents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Incident"
                  pagination_meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /v2/incidents/{id}:
    get:
      summary: Get an incident
      description: Get a single incident by ID or numeric reference.
      operationId: getIncident
      x-airbyte-entity: incidents
      x-airbyte-action: get
      x-airbyte-record-extractor: $.incident
      parameters:
        - name: id
          in: path
          required: true
          description: Incident ID or numeric reference
          schema:
            type: string
      responses:
        "200":
          description: Incident details
          content:
            application/json:
              schema:
                type: object
                properties:
                  incident:
                    $ref: "#/components/schemas/Incident"

  # ── Alerts ──
  /v2/alerts:
    get:
      summary: List alerts
      description: List all alerts for the account with cursor-based pagination.
      operationId: listAlerts
      x-airbyte-entity: alerts
      x-airbyte-action: list
      x-airbyte-record-extractor: $.alerts
      x-airbyte-meta-extractor:
        next_cursor: $.pagination_meta.after
      parameters:
        - name: page_size
          in: query
          description: Number of alerts per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 25
        - name: after
          in: query
          description: Cursor for the next page of results
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Alert"
                  pagination_meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /v2/alerts/{id}:
    get:
      summary: Get an alert
      description: Show a single alert by ID.
      operationId: getAlert
      x-airbyte-entity: alerts
      x-airbyte-action: get
      x-airbyte-record-extractor: $.alert
      parameters:
        - name: id
          in: path
          required: true
          description: Alert ID
          schema:
            type: string
      responses:
        "200":
          description: Alert details
          content:
            application/json:
              schema:
                type: object
                properties:
                  alert:
                    $ref: "#/components/schemas/Alert"

  # ── Escalations ──
  /v2/escalations:
    get:
      summary: List escalations
      description: List all escalations for the account with cursor-based pagination.
      operationId: listEscalations
      x-airbyte-entity: escalations
      x-airbyte-action: list
      x-airbyte-record-extractor: $.escalations
      x-airbyte-meta-extractor:
        next_cursor: $.pagination_meta.after
      parameters:
        - name: page_size
          in: query
          description: Number of escalations per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 25
        - name: after
          in: query
          description: Cursor for the next page of results
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of escalations
          content:
            application/json:
              schema:
                type: object
                properties:
                  escalations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Escalation"
                  pagination_meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /v2/escalations/{id}:
    get:
      summary: Get an escalation
      description: Show a specific escalation by ID.
      operationId: getEscalation
      x-airbyte-entity: escalations
      x-airbyte-action: get
      x-airbyte-record-extractor: $.escalation
      parameters:
        - name: id
          in: path
          required: true
          description: Escalation ID
          schema:
            type: string
      responses:
        "200":
          description: Escalation details
          content:
            application/json:
              schema:
                type: object
                properties:
                  escalation:
                    $ref: "#/components/schemas/Escalation"

  # ── Users ──
  /v2/users:
    get:
      summary: List users
      description: List all users for the organisation with cursor-based pagination.
      operationId: listUsers
      x-airbyte-entity: users
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.users
      x-airbyte-meta-extractor:
        next_cursor: $.pagination_meta.after
      parameters:
        - name: page_size
          in: query
          description: Number of users per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: after
          in: query
          description: Cursor for the next page of results
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  pagination_meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /v2/users/{id}:
    get:
      summary: Get a user
      description: Get a single user by ID.
      operationId: getUser
      x-airbyte-entity: users
      x-airbyte-action: get
      x-airbyte-record-extractor: $.user
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"

  # ── Incident Updates ──
  /v2/incident_updates:
    get:
      summary: List incident updates
      description: List all incident updates for the organisation with cursor-based pagination.
      operationId: listIncidentUpdates
      x-airbyte-entity: incident_updates
      x-airbyte-action: list
      x-airbyte-record-extractor: $.incident_updates
      x-airbyte-meta-extractor:
        next_cursor: $.pagination_meta.after
      parameters:
        - name: page_size
          in: query
          description: Number of incident updates per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: after
