          - name: id
            type: ["null", "string"]
            description: Unique identifier for the user
          - name: name
            type: ["null", "string"]
            description: Full name of the user
          - name: role
            type: ["null", "string"]
            description: Deprecated role field
          - name: slack_user_id
            type: ["null", "string"]
            description: Slack user ID
      - entity: incident_updates
        x-airbyte-name: incident_updates
        suggested: true
        fields:
          - name: created_at
            type: ["null", "string"]
            description: When the update was created
          - name: id
            type: ["null", "string"]
            description: Unique identifier for the incident update
          - name: incident_id
            type: ["null", "string"]
            description: ID of the incident this update belongs to
          - name: message
            type: ["null", "string"]
            description: Update message content
          - name: new_incident_status
            type: ["null", "object"]
            description: New incident status set by this update
            properties:
              category:
                type: ["null", "string"]
              created_at:
                type: ["null", "string"]
              description:
                type: ["null", "string"]
              id:
                type: ["null", "string"]
              name:
                type: ["null", "string"]
              rank:
                type: ["null", "number"]
              updated_at:
                type: ["null", "string"]
          - name: new_severity
            type: ["null", "object"]
            description: New severity set by this update
            properties:
              created_at:
                type: ["null", "string"]
              description:
                type: ["null", "string"]
              id:
                type: ["null", "string"]
              name:
                type: ["null", "string"]
              rank:
                type: ["null", "number"]
              updated_at:
                type: ["null", "string"]
          - name: updater
            type: ["null", "object"]
            description: Who made this update
            properties:
              user:
                type: ["null", "object"]
                properties:
                  email:
                    type: ["null", "string"]
                  id:
                    type: ["null", "string"]
                  name:
                    type: ["null", "string"]
                  role:
                    type: ["null", "string"]
                  slack_user_id:
                    type: ["null", "string"]
      - entity: incident_roles
        x-airbyte-name: incident_roles
        suggested: true
        fields:
          - name: created_at
