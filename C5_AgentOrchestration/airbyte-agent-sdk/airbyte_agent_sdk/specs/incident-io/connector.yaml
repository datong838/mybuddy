          - name: name
            type: ["null", "string"]
            description: Name of the status
          - name: rank
            type: ["null", "number"]
            description: Rank for ordering
          - name: updated_at
            type: ["null", "string"]
            description: When the status was last updated
      - entity: incident_timestamps
