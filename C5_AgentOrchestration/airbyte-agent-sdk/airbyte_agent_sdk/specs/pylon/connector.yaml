          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIssueResponse"
        "404":
          description: Issue not found
        "401":
          description: Unauthorized

  "/issues/{id}/messages":
    get:
      summary: List issue messages
      description: Returns all messages on an issue (customer-facing replies and internal notes)
      operationId: listIssueMessages
      x-airbyte-entity: messages
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        next_cursor: $.pagination.cursor
        has_next_page: $.pagination.has_next_page
      parameters:
      - name: id
        in: path
        required: true
        description: The ID of the issue to fetch messages for
        schema:
          type: string
      - name: cursor
        in: query
        description: Cursor for pagination
        required: false
        schema:
          type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesResponse"
        "400":
          description: Bad request
        "404":
          description: Issue not found
        "401":
          description: Unauthorized

  "/issues/{id}/note":
    post:
      summary: Create an issue note
      description: Create an internal note on an issue
      operationId: createIssueNote
      x-airbyte-entity: issue_notes
      x-airbyte-action: create
      parameters:
      - name: id
        in: path
        required: true
        description: The ID of the issue to add a note to
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueNoteCreateParams"
      responses:
        "200":
          description: Note created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueNoteResponse"
        "400":
          description: Bad request
        "404":
          description: Issue not found
        "401":
          description: Unauthorized

  "/issues/{id}/threads":
    post:
      summary: Create an issue thread
      description: Create a new thread on an issue
      operationId: createIssueThread
      x-airbyte-entity: issue_threads
      x-airbyte-action: create
      parameters:
      - name: id
        in: path
        required: true
        description: The ID of the issue to create a thread on
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueThreadCreateParams"
      responses:
        "200":
          description: Thread created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueThreadResponse"
        "400":
          description: Bad request
        "404":
          description: Issue not found
        "401":
          description: Unauthorized

  "/accounts":
    get:
      summary: List accounts
      description: Get a list of accounts
      operationId: listAccounts
      x-airbyte-entity: accounts
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        next_cursor: $.pagination.cursor
        has_next_page: $.pagination.has_next_page
      parameters:
      - name: cursor
        in: query
        description: Cursor for pagination
        required: false
        schema:
          type: string
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsResponse"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
    post:
      summary: Create an account
      description: Create a new account
      operationId: createAccount
      x-airbyte-entity: accounts
      x-airbyte-action: create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountCreateParams"
      responses:
        "200":
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  "/accounts/{id}":
    get:
      summary: Get an account
      description: Get a single account by ID
      operationId: getAccount
      x-airbyte-entity: accounts
      x-airbyte-action: get
      x-airbyte-record-extractor: $.data
      parameters:
      - name: id
        in: path
        required: true
        description: The ID of the account
        schema:
          type: string
      responses:
