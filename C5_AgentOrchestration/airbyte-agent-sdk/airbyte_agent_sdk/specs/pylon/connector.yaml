components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Bearer token authentication. Create an API token in Pylon settings."
      x-airbyte-auth-config:
        title: "API Token Authentication"
        type: object
        required:
        - api_token
        properties:
          api_token:
            type: string
            title: "API Token"
            description: "Your Pylon API token. Only admin users can create API tokens."
        auth_mapping:
          token: "${api_token}"
        replication_auth_key_mapping:
          api_token: "api_token"

  schemas:
    Pagination:
      type: object
      properties:
        cursor:
          type: [string, "null"]
          description: The cursor for the next page of results
        has_next_page:
          type: boolean
          description: Indicates if there is a next page of results

    MiniAccount:
      type: object
      properties:
        id:
          type: [string, "null"]
          description: The ID of the account

    MiniUser:
      type: object
      properties:
        email:
          type: [string, "null"]
          description: The email of the user
        id:
          type: [string, "null"]
          description: The ID of the user

    MiniContact:
      type: object
      properties:
        email:
          type: [string, "null"]
          description: The email of the contact
        id:
          type: [string, "null"]
          description: The ID of the contact

    MiniTeam:
      type: object
      properties:
        id:
          type: [string, "null"]
          description: The ID of the team

    SlackInfo:
      type: object
      properties:
        channel_id:
          type: [string, "null"]
          description: The Slack channel ID associated with the issue
        message_ts:
          type: [string, "null"]
          description: The root message ID of Slack message that started issue
        workspace_id:
          type: [string, "null"]
          description: The Slack workspace ID associated with the issue

    IssueChatWidgetInfo:
      type: object
      properties:
        page_url:
          type: [string, "null"]
          description: The URL of the page the user was on when starting the chat widget issue

    CSATResponse:
      type: object
      properties:
        comment:
          type: [string, "null"]
          description: The comment of the CSAT response
        score:
          type: [integer, "null"]
          description: The score of the CSAT response

    CustomFieldValue:
      type: object
      properties:
        slug:
          type: [string, "null"]
          description: The slug of the custom field
        value:
          type: [string, "null"]
          description: The value of the custom field
        values:
          type: [array, "null"]
          items:
            type: string
          description: The values for multi-valued custom fields

    ExternalIssue:
      type: object
      properties:
        external_id:
          type: [string, "null"]
          description: The external ID of the external issue
        link:
          type: [string, "null"]
          description: Link to the product issue
        source:
          type: [string, "null"]
          description: The source of the external issue

    Issue:
      type: object
      x-airbyte-entity-name: issues
      x-airbyte-stream-name: issues
      x-airbyte-ai-hints:
        summary: "Customer support threads, open issues, response timelines, and who replied"
        when_to_use: "Support issue or customer response questions"
        trigger_phrases: ["did they get back", "support issue", "ticket for", "open issues", "did someone follow up"]
        freshness: live
        search_strategy: "Search by title. If no results, try resolving by account name."
        example_questions:
          - "Did Marathon get back to us on the integration issue?"
          - "What are the open support tickets for Acme?"
          - "Who last replied to the billing thread?"
      properties:
        id:
          type: string
          description: The ID of the issue
        account:
          oneOf:
          - $ref: "#/components/schemas/MiniAccount"
          - type: "null"
        assignee:
          oneOf:
          - $ref: "#/components/schemas/MiniUser"
          - type: "null"
        attachment_urls:
          type: [array, "null"]
          items:
            type: string
          description: The attachment URLs attached to this issue
        author_unverified:
          type: [boolean, "null"]
          description: Whether any message on the issue has an unverified author identity
        body_html:
          type: [string, "null"]
          description: The body of the issue in HTML format
        business_hours_first_response_seconds:
          type: [integer, "null"]
          description: Business hours time in seconds for first response
        business_hours_resolution_seconds:
          type: [integer, "null"]
          description: Business hours time in seconds for resolution
        business_hours_time_in_status_seconds:
          type: [object, "null"]
          additionalProperties:
            type: integer
          description: A map of status slug to the business hours time in seconds the issue has spent in that status
        chat_widget_info:
          oneOf:
          - $ref: "#/components/schemas/IssueChatWidgetInfo"
          - type: "null"
        created_at:
          type: [string, "null"]
          description: The time the issue was created
        csat_responses:
          type: [array, "null"]
          items:
            $ref: "#/components/schemas/CSATResponse"
          description: The CSAT responses of the issue
        custom_fields:
          type: [object, "null"]
          additionalProperties:
            $ref: "#/components/schemas/CustomFieldValue"
          description: Custom field values associated with the issue
        customer_portal_visible:
          type: [boolean, "null"]
          description: Whether the issue is visible in the customer portal
        external_issues:
          type: [array, "null"]
          items:
            $ref: "#/components/schemas/ExternalIssue"
          description: The external issues associated with the issue
        first_response_seconds:
          type: [integer, "null"]
          description: Time in seconds for first response
        first_response_time:
          type: [string, "null"]
          description: The time of the first response
        latest_message_time:
          type: [string, "null"]
          description: The time of the latest message in the issue
        link:
          type: [string, "null"]
          description: The link to the issue in Pylon
        number:
          type: [integer, "null"]
          description: The number of the issue
        number_of_touches:
          type: [integer, "null"]
          description: The number of times the issue has been touched
        requester:
          oneOf:
          - $ref: "#/components/schemas/MiniContact"
          - type: "null"
        resolution_seconds:
          type: [integer, "null"]
          description: Time in seconds for resolution
        resolution_time:
          type: [string, "null"]
          description: The time of the resolution
        slack:
          oneOf:
          - $ref: "#/components/schemas/SlackInfo"
          - type: "null"
        snoozed_until_time:
          type: [string, "null"]
          description: The time the issue was snoozed until
        source:
          oneOf:
          - type: string
            enum:
            - slack
            - microsoft_teams
            - microsoft_teams_chat
            - chat_widget
            - email
            - manual
            - form
            - discord
            - whatsapp
            - sms
            - telegram
          - type: "null"
        state:
          type: [string, "null"]
          description: The state of the issue
        tags:
          type: [array, "null"]
          items:
            type: string
          description: Tags associated with the issue
        team:
          oneOf:
          - $ref: "#/components/schemas/MiniTeam"
          - type: "null"
        title:
          type: [string, "null"]
          description: The title of the issue
        time_in_status_seconds:
          type: [object, "null"]
          additionalProperties:
            type: integer
          description: A map of status slug to the time in seconds the issue has spent in that status
        type:
          oneOf:
          - type: string
            enum:
            - conversation
            - ticket
          - type: "null"
        updated_at:
          type: [string, "null"]
          description: The time the issue was last updated

    IssuesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
          description: The request ID for tracking

    IssueResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Issue"
        request_id:
          type: string
          description: The request ID for tracking

    MessageAuthor:
      type: object
      properties:
        avatar_url:
          type: [string, "null"]
        contact:
          oneOf:
          - $ref: "#/components/schemas/MiniContact"
          - type: "null"
        name:
          type: [string, "null"]
        user:
          oneOf:
          - $ref: "#/components/schemas/MiniUser"
          - type: "null"

    EmailMessageInfo:
      type: object
      properties:
        bcc_emails:
          type: [array, "null"]
          items:
            type: string
          description: BCC email addresses
        cc_emails:
          type: [array, "null"]
          items:
            type: string
          description: CC email addresses
        from_email:
          type: [string, "null"]
          description: Sender email address
        message_id:
          type: [string, "null"]
          description: RFC 5322 Message-ID header value
        to_emails:
          type: [array, "null"]
          items:
            type: string
          description: Recipient email addresses

    Message:
      type: object
      x-airbyte-entity-name: messages
      x-airbyte-ai-hints:
        summary: "Customer messages across Pylon channels (Slack, email, etc.)"
        when_to_use: "Looking for customer messages or conversation content"
        trigger_phrases: ["pylon message", "customer message"]
        freshness: live
        search_strategy: "Search by content or filter by account"
        example_questions:
          - "Show recent customer messages"
      properties:
        id:
          type: string
          description: The ID of the message
        author:
          oneOf:
          - $ref: "#/components/schemas/MessageAuthor"
          - type: "null"
        email_info:
          oneOf:
          - $ref: "#/components/schemas/EmailMessageInfo"
          - type: "null"
        file_urls:
          type: [array, "null"]
          items:
            type: string
          description: The URLs of the files in the message
