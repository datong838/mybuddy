openapi: 3.1.0

info:
  title: Pylon API Connector
  version: 0.1.10
  description: |
    Pylon is a customer support platform that helps B2B companies manage customer interactions
    across Slack, email, chat widgets, and other channels. This connector provides access to
    issues, accounts, contacts, teams, tags, users, custom fields, ticket forms, and user roles
    for customer support analytics and account intelligence insights.
  x-airbyte-connector-name: pylon
  x-airbyte-connector-definition-id: f2e53e88-3c6b-4e5a-b7c2-a1d9c5e8f4b6
  x-airbyte-replication-version: "0.0.12"
  x-airbyte-replication-compatibility: ">=0.0.12, <1.0.0"
  x-airbyte-context-store:
    entities:
      - entity: issues
        suggested: true
        x-airbyte-name: issues
        fields:
          - name: id
            type: string
            description: "Unique identifier for the issue"
          - name: title
            type:
              - "null"
              - "string"
            description: "Title of the issue"
          - name: state
            type:
              - "null"
              - "string"
            description: "Current state of the issue (e.g. new, in_progress, closed)"
          - name: source
            type:
              - "null"
              - "string"
            description: "Channel the issue originated from (e.g. email, slack)"
          - name: type
            type:
              - "null"
              - "string"
            description: "Type classification of the issue"
          - name: number
            type:
              - "null"
              - "integer"
            description: "Human-readable issue number within the workspace"
          - name: created_at
            type:
              - "null"
              - "string"
            description: "Timestamp when the issue was created, in ISO 8601 format"
          - name: latest_message_time
            type:
              - "null"
              - "string"
            description: "Timestamp of the most recent message on the issue, in ISO 8601 format"
          - name: resolution_time
            type:
              - "null"
              - "string"
            description: "Timestamp when the issue was resolved, in ISO 8601 format"
          - name: snoozed_until_time
            type:
              - "null"
              - "string"
            description: "Timestamp the issue is snoozed until, in ISO 8601 format"
          - name: customer_portal_visible
            type:
              - "null"
              - "boolean"
            description: "Whether the issue is visible in the customer portal"
      - entity: accounts
        suggested: true
        x-airbyte-name: accounts
        fields:
          - name: id
            type: string
            description: "Unique identifier for the account"
          - name: name
            type:
              - "null"
              - "string"
            description: "Name of the account (customer organization)"
          - name: domain
            type:
              - "null"
              - "string"
            description: "Primary domain associated with the account"
          - name: primary_domain
            type:
              - "null"
              - "string"
            description: "Canonical primary domain for the account"
          - name: type
            type:
              - "null"
              - "string"
            description: "Classification of the account (e.g. customer, prospect)"
          - name: is_disabled
            type:
              - "null"
              - "boolean"
            description: "Whether the account has been disabled"
          - name: created_at
            type:
              - "null"
              - "string"
            description: "Timestamp when the account was created, in ISO 8601 format"
          - name: latest_customer_activity_time
            type:
              - "null"
              - "string"
            description: "Timestamp of the most recent activity from this account, in ISO 8601 format"
      - entity: contacts
        suggested: true
        x-airbyte-name: contacts
        fields:
          - name: id
            type: string
            description: "Unique identifier for the contact"
          - name: name
            type:
              - "null"
              - "string"
            description: "Full name of the contact"
          - name: email
            type:
              - "null"
              - "string"
            description: "Primary email address of the contact"
          - name: primary_phone_number
            type:
              - "null"
              - "string"
            description: "Primary phone number of the contact"
          - name: portal_role
            type:
              - "null"
              - "string"
            description: "Role the contact has in the customer portal"
      - entity: teams
        suggested: true
        x-airbyte-name: teams
        fields:
          - name: id
            type: string
            description: "Unique identifier for the team"
          - name: name
            type:
              - "null"
              - "string"
            description: "Name of the team"
      - entity: tags
        suggested: true
        x-airbyte-name: tags
        fields:
          - name: id
            type: string
            description: "Unique identifier for the tag"
          - name: value
            type:
              - "null"
              - "string"
            description: "Display value of the tag"
          - name: object_type
            type:
              - "null"
              - "string"
            description: "Type of object this tag applies to (e.g. issue, account)"
      - entity: users
        suggested: true
        x-airbyte-name: users
        fields:
          - name: id
            type: string
            description: "Unique identifier for the user"
          - name: name
            type:
              - "null"
              - "string"
            description: "Full name of the user"
          - name: email
            type:
              - "null"
              - "string"
            description: "Primary email address of the user"
          - name: role_id
            type:
              - "null"
              - "string"
            description: "Identifier of the user's role"
          - name: status
            type:
              - "null"
              - "string"
            description: "Current status of the user (e.g. active, disabled)"
      - entity: custom_fields
        suggested: true
        x-airbyte-name: custom_fields
        fields:
          - name: id
            type: string
            description: "Unique identifier for the custom field"
          - name: label
            type:
              - "null"
              - "string"
            description: "Display label of the custom field"
          - name: slug
            type:
              - "null"
              - "string"
            description: "URL-safe identifier for the custom field"
          - name: type
            type:
              - "null"
              - "string"
            description: "Data type of the custom field (e.g. text, select)"
          - name: object_type
            type:
              - "null"
              - "string"
            description: "Type of object this custom field applies to (e.g. issue, account)"
          - name: is_read_only
            type:
              - "null"
              - "boolean"
            description: "Whether the custom field is read-only"
          - name: created_at
            type:
              - "null"
              - "string"
            description: "Timestamp when the custom field was created, in ISO 8601 format"
      - entity: ticket_forms
        suggested: true
        x-airbyte-name: ticket_forms
        fields:
          - name: id
            type: string
            description: "Unique identifier for the ticket form"
          - name: name
            type:
              - "null"
              - "string"
            description: "Display name of the ticket form"
          - name: slug
            type:
              - "null"
              - "string"
            description: "URL-safe identifier for the ticket form"
          - name: is_public
            type:
              - "null"
              - "boolean"
            description: "Whether the ticket form is publicly accessible"
      - entity: user_roles
        x-airbyte-name: user_roles
        fields:
          - name: id
            type: string
            description: "Unique identifier for the user role"
          - name: name
            type:
              - "null"
              - "string"
            description: "Display name of the user role"
          - name: slug
            type:
              - "null"
              - "string"
            description: "URL-safe identifier for the user role"
  x-airbyte-external-documentation-urls:
  - type: api_reference
    title: Pylon API Reference
    url: https://docs.usepylon.com/pylon-docs/developer/api/api-reference
  - type: authentication_guide
    title: Pylon API Authentication
    url: https://docs.usepylon.com/pylon-docs/developer/api
  x-airbyte-example-questions:
    direct:
    - "List all open issues in Pylon"
    - "Show me all accounts in Pylon"
    - "List all contacts in Pylon"
    - "What teams are configured in my Pylon workspace?"
    - "Show me all tags used in Pylon"
    - "List all users in my Pylon account"
    - "Show me the custom fields configured for issues"
    - "List all ticket forms in Pylon"
    - "What user roles are available in Pylon?"
    - "Show me details for a specific issue"
    - "Get details for a specific account"
    - "Show me details for a specific contact"
    - "Reply to the customer on an issue saying we are looking into it"
    - "Send a message to the customer on the billing issue"
    - "Assign an issue to a specific team member"
    - "Change the status of an issue to waiting_on_customer"
    - "Close an issue as resolved"
    - "Delete a test issue"
    search:
    - "What are the most common issue sources this month?"
    - "Show me issues assigned to a specific team"
    - "Which accounts have the most open issues?"
    - "Analyze issue resolution times over the last 30 days"
    - "List contacts associated with a specific account"
    unsupported:
    - "Delete an account"
    - "Schedule a meeting with a contact"

  x-airbyte-entity-relationships:
  - source_entity: messages
    target_entity: issues
    foreign_key: id
    target_key: id
    cardinality: many_to_one
servers:
- url: https://api.usepylon.com
  description: Pylon API server

security:
- bearerAuth: []

paths:
  "/issues":
    get:
      summary: List issues
      description: Get a list of issues within a time range
      operationId: listIssues
      x-airbyte-entity: issues
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        next_cursor: $.pagination.cursor
        has_next_page: $.pagination.has_next_page
      parameters:
      - name: start_time
        in: query
        description: The start time (RFC3339) of the time range to get issues for.
        required: true
        schema:
          type: string
          format: date-time
          default: "2024-01-01T00:00:00Z"
      - name: end_time
        in: query
        description: The end time (RFC3339) of the time range to get issues for.
        required: true
        schema:
          type: string
          format: date-time
          default: "2099-12-31T23:59:59Z"
      - name: cursor
        in: query
        description: Cursor for pagination
        required: false
        schema:
          type: string
      responses:
        "200":
          description: List of issues
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuesResponse"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

    post:
      summary: Create an issue
      description: Create a new issue
      operationId: createIssue
      x-airbyte-entity: issues
      x-airbyte-action: create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueCreateParams"
      responses:
        "200":
          description: Issue created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueResponse"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  "/issues/{id}":
    get:
      summary: Get an issue
      description: Get a single issue by ID
      operationId: getIssue
      x-airbyte-entity: issues
      x-airbyte-action: get
      x-airbyte-record-extractor: $.data
      parameters:
      - name: id
        in: path
        required: true
        description: The ID of the issue
        schema:
          type: string
      responses:
        "200":
          description: Issue object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueResponse"
        "404":
          description: Issue not found
        "401":
          description: Unauthorized

    patch:
      summary: Update an issue
      description: Update an existing issue by ID
      operationId: updateIssue
      x-airbyte-entity: issues
      x-airbyte-action: update
      parameters:
      - name: id
        in: path
        required: true
        description: The ID of the issue to update
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueUpdateParams"
      responses:
        "200":
          description: Issue updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueResponse"
        "400":
          description: Bad request
        "404":
          description: Issue not found
        "401":
          description: Unauthorized

  "/issues/{id}/reply":
    post:
      summary: Reply to an issue
      description: Sends a customer-facing reply on an issue, visible to the requester.
      operationId: replyToIssue
      x-airbyte-entity: issue_replies
      x-airbyte-action: create
      parameters:
      - name: id
        in: path
        required: true
        description: The ID of the issue to reply to
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueReplyCreateParams"
      responses:
        "200":
          description: Reply sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueReplyResponse"
        "400":
          description: Bad request
        "404":
          description: Issue not found
        "401":
          description: Unauthorized

  "/issues/{id}/assign":
    patch:
      summary: Assign an issue
      description: Assign an issue to a user or team, or remove the current assignment.
      operationId: assignIssue
      x-airbyte-entity: issue_assignments
      x-airbyte-action: update
      x-airbyte-path-override:
        path: "/issues/{id}"
      parameters:
      - name: id
        in: path
        required: true
        description: The ID of the issue to assign
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueAssignParams"
      responses:
        "200":
          description: Issue assigned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueResponse"
        "400":
          description: Bad request
        "404":
          description: Issue not found
        "401":
          description: Unauthorized

  "/issues/{id}/update-status":
    patch:
      summary: Update issue status
      description: Transition an issue to a new status (new, waiting_on_you, waiting_on_customer, on_hold, closed, or a custom status slug).
      operationId: updateIssueStatus
      x-airbyte-entity: issue_statuses
      x-airbyte-action: update
      x-airbyte-path-override:
        path: "/issues/{id}"
      parameters:
      - name: id
        in: path
        required: true
        description: The ID of the issue to update status for
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueStatusUpdateParams"
      responses:
        "200":
          description: Issue status updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueResponse"
        "400":
          description: Bad request
        "404":
          description: Issue not found
        "401":
          description: Unauthorized

  "/issues/{id}/delete":
    delete:
      summary: Delete an issue
      description: Permanently deletes an issue by ID. This action cannot be undone.
      operationId: deleteIssue
      x-airbyte-entity: issues
      x-airbyte-action: delete
      x-airbyte-path-override:
        path: "/issues/{id}"
      parameters:
      - name: id
        in: path
        required: true
        description: The ID of the issue to delete
        schema:
          type: string
      responses:
