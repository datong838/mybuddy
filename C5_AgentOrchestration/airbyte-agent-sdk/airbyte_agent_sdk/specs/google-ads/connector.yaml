components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: >-
        OAuth 2.0 authentication for Google Ads API. Requires a developer token
        in addition to OAuth credentials.
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/auth
          tokenUrl: https://www.googleapis.com/oauth2/v3/token
          refreshUrl: https://www.googleapis.com/oauth2/v3/token
          scopes:
            https://www.googleapis.com/auth/adwords: Full access to Google Ads data
      x-airbyte-token-refresh:
        auth_style: body
        body_format: form
      x-airbyte-auth-config:
        title: OAuth2 Authentication
        type: object
        required:
          - client_id
          - client_secret
          - refresh_token
          - developer_token
        properties:
          client_id:
            type: string
            title: Client ID
            description: OAuth2 client ID from Google Cloud Console
          client_secret:
            type: string
            title: Client Secret
            description: OAuth2 client secret from Google Cloud Console
          refresh_token:
            type: string
            title: Refresh Token
            description: OAuth2 refresh token
          developer_token:
            type: string
            title: Developer Token
            description: Google Ads API developer token
        auth_mapping:
          refresh_token: "${refresh_token}"
          client_id: "${client_id}"
          client_secret: "${client_secret}"
        additional_headers:
          developer-token: "{{ developer_token }}"
        replication_auth_key_mapping:
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          credentials.refresh_token: "refresh_token"
          credentials.developer_token: "developer_token"
        replication_auth_key_constants: {}

  schemas:
    AccessibleCustomer:
      type: object
      description: An accessible customer derived from a resource name via x-airbyte-record-transform
