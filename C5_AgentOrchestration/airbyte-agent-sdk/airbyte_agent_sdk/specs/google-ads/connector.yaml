servers:
  - url: https://googleads.googleapis.com
    description: Google Ads API server

security:
  - oauth2: []

paths:
  /v23/customers:listAccessibleCustomers:
    get:
      summary: List accessible customers
      description: >-
        Returns resource names of customers directly accessible by the user
        authenticating the call. No customer_id is required for this endpoint.
      operationId: listAccessibleCustomers
      x-airbyte-entity: accessible_customers
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.resourceNames
      x-airbyte-record-transform:
        customer_id: "{{ record.value | replace('customers/', '') }}"
        resource_name: "{{ record.value }}"
      x-airbyte-no-pagination: "Google Ads GET /v23/customers:listAccessibleCustomers returns the full list of customer resource names directly accessible to the authenticated user in a single response; the endpoint exposes no pagination cursor, offset, or next-page token."
      parameters: []
      responses:
        "200":
          description: List of accessible customer resource names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessibleCustomersList"
        "401":
          description: Unauthorized

  /v23/customers/{customer_id}/googleAds:search:
    post:
      summary: List accounts
      description: >-
        Retrieves customer account details using GAQL query.
      operationId: listAccounts
      x-airbyte-entity: accounts
      x-airbyte-action: list
      x-airbyte-record-extractor: $.results
      x-airbyte-meta-extractor:
        next_page_token: $.nextPageToken
      parameters:
        - name: customer_id
          in: path
          required: true
          description: Google Ads customer ID (10 digits, no dashes)
          schema:
            type: string
            pattern: "^[0-9]{10}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: Google Ads Query Language (GAQL) query
                  default: >-
                    SELECT
                      customer.auto_tagging_enabled,
                      customer.call_reporting_setting.call_conversion_action,
                      customer.call_reporting_setting.call_conversion_reporting_enabled,
                      customer.call_reporting_setting.call_reporting_enabled,
                      customer.conversion_tracking_setting.conversion_tracking_id,
                      customer.conversion_tracking_setting.cross_account_conversion_tracking_id,
                      customer.currency_code,
                      customer.descriptive_name,
                      customer.final_url_suffix,
                      customer.has_partners_badge,
                      customer.id,
                      customer.manager,
                      customer.optimization_score,
                      customer.optimization_score_weight,
                      customer.pay_per_conversion_eligibility_failure_reasons,
                      customer.remarketing_setting.google_global_site_tag,
                      customer.resource_name,
                      customer.test_account,
                      customer.time_zone,
                      customer.tracking_url_template
                    FROM customer
                pageToken:
                  type: string
                  description: Token for pagination
                pageSize:
                  type: integer
                  description: Number of results per page (max 10000)
      responses:
        "200":
          description: Account query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSearchResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /v23/customers/{customer_id}/googleAds:search?entity=campaigns:
    post:
      summary: List campaigns
      description: >-
        Retrieves campaign data using GAQL query.
      operationId: listCampaigns
      x-airbyte-entity: campaigns
      x-airbyte-action: list
      x-airbyte-path-override:
        path: /v23/customers/{customer_id}/googleAds:search
      x-airbyte-record-extractor: $.results
      x-airbyte-meta-extractor:
        next_page_token: $.nextPageToken
      parameters:
        - name: customer_id
          in: path
          required: true
          description: Google Ads customer ID (10 digits, no dashes)
          schema:
            type: string
            pattern: "^[0-9]{10}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: GAQL query for campaigns
                  default: >-
                    SELECT
                      campaign.id,
                      campaign.name,
                      campaign.status,
                      campaign.advertising_channel_type,
                      campaign.advertising_channel_sub_type,
                      campaign.bidding_strategy,
                      campaign.bidding_strategy_type,
                      campaign.campaign_budget,
                      campaign_budget.amount_micros,
                      campaign.start_date_time,
                      campaign.end_date_time,
                      campaign.serving_status,
                      campaign.resource_name,
                      campaign.labels,
                      campaign.network_settings.target_google_search,
                      campaign.network_settings.target_search_network,
                      campaign.network_settings.target_content_network,
                      campaign.network_settings.target_partner_search_network
                    FROM campaign
                pageToken:
                  type: string
                  description: Token for pagination
                pageSize:
                  type: integer
                  description: Number of results per page (max 10000)
      responses:
        "200":
          description: Campaign query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignSearchResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /v23/customers/{customer_id}/googleAds:search?entity=ad_groups:
    post:
      summary: List ad groups
      description: >-
        Retrieves ad group data using GAQL query.
      operationId: listAdGroups
      x-airbyte-entity: ad_groups
      x-airbyte-action: list
      x-airbyte-path-override:
        path: /v23/customers/{customer_id}/googleAds:search
      x-airbyte-record-extractor: $.results
      x-airbyte-meta-extractor:
        next_page_token: $.nextPageToken
      parameters:
        - name: customer_id
          in: path
          required: true
          description: Google Ads customer ID (10 digits, no dashes)
          schema:
            type: string
            pattern: "^[0-9]{10}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: GAQL query for ad groups
                  default: >-
                    SELECT
                      campaign.id,
                      ad_group.id,
                      ad_group.name,
                      ad_group.status,
                      ad_group.type,
                      ad_group.ad_rotation_mode,
                      ad_group.base_ad_group,
                      ad_group.campaign,
                      ad_group.cpc_bid_micros,
                      ad_group.cpm_bid_micros,
                      ad_group.cpv_bid_micros,
                      ad_group.effective_target_cpa_micros,
                      ad_group.effective_target_cpa_source,
                      ad_group.effective_target_roas,
                      ad_group.effective_target_roas_source,
                      ad_group.labels,
                      ad_group.resource_name,
                      ad_group.target_cpa_micros,
                      ad_group.target_roas,
                      ad_group.tracking_url_template
                    FROM ad_group
                pageToken:
                  type: string
                  description: Token for pagination
                pageSize:
                  type: integer
                  description: Number of results per page (max 10000)
      responses:
        "200":
          description: Ad group query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdGroupSearchResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /v23/customers/{customer_id}/googleAds:search?entity=ad_group_ads:
    post:
      summary: List ad group ads
      description: >-
        Retrieves ad group ad data using GAQL query.
      operationId: listAdGroupAds
      x-airbyte-entity: ad_group_ads
      x-airbyte-action: list
      x-airbyte-path-override:
        path: /v23/customers/{customer_id}/googleAds:search
      x-airbyte-record-extractor: $.results
      x-airbyte-meta-extractor:
        next_page_token: $.nextPageToken
      parameters:
        - name: customer_id
          in: path
          required: true
          description: Google Ads customer ID (10 digits, no dashes)
          schema:
            type: string
            pattern: "^[0-9]{10}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: GAQL query for ad group ads
                  default: >-
                    SELECT
                      ad_group.id,
                      ad_group_ad.ad.id,
                      ad_group_ad.ad.name,
                      ad_group_ad.ad.type,
                      ad_group_ad.status,
