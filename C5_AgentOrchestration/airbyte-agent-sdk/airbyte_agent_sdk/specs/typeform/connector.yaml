openapi: 3.1.0

info:
  title: Typeform API Connector
  version: 1.0.4
  description: >
    Connector for the Typeform API. Provides access to forms, form responses,
    webhooks, workspaces, images, and themes. Supports listing and retrieving
    typeform resources for survey and form management workflows.
  x-airbyte-connector-name: typeform
  x-airbyte-connector-definition-id: e7eff203-90bf-43e5-a240-19ea3056c474
  x-airbyte-replication-version: "1.4.8"
  x-airbyte-replication-compatibility: ">=1.4.8, <2.0.0"
  x-airbyte-external-documentation-urls:
  - type: api_reference
    title: Typeform API Documentation
    url: https://developer.typeform.com/
  - type: api_release_history
    title: Changelog
    url: https://www.typeform.com/developers/changelog/
  x-airbyte-example-questions:
    direct:
    - "List all my typeforms"
    - "Show me the responses for my latest form"
    - "What workspaces do I have?"
    - "List all themes in my account"
    - "Get the details of a specific form"
    search:
    - "Which forms received the most responses last month?"
    - "Find responses submitted in the last week"
    - "What forms were created this year?"
    - "Show me all forms in a specific workspace"
    unsupported:
    - "Create a new typeform"
    - "Delete a form response"
    - "Update form settings"
    - "Send a webhook notification"
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Typeform
    properties:
      start_date:
        type: string
        title: Start Date
        description: "UTC date and time in the format YYYY-MM-DDT00:00:00Z from which to start replicating response data."
        format: date-time
    required:
    - start_date
    replication_config_key_mapping:
      start_date: start_date
  x-airbyte-entity-relationships:
  - source_entity: responses
    target_entity: forms
    foreign_key: form_id
    target_key: id
    cardinality: many_to_one
  - source_entity: webhooks
    target_entity: forms
    foreign_key: form_id
    target_key: id
    cardinality: many_to_one
  x-airbyte-context-store:
    disable_compaction: true
    entities:
    - entity: forms
      x-airbyte-name: forms
      suggested: true
      fields:
      - name: _links
        type: ["null", "object"]
        description: Links to related resources
        properties:
          display:
            type: ["null", "string"]
      - name: created_at
        type: ["null", "string"]
        description: Date and time when the form was created
      - name: fields
        type: ["null", "array"]
        description: List of fields within the form
      - name: id
        type: ["null", "string"]
        description: Unique identifier of the form
      - name: last_updated_at
        type: ["null", "string"]
        description: Date and time when the form was last updated
      - name: logic
        type: ["null", "array"]
        description: Logic rules or conditions applied to the form fields
      - name: published_at
        type: ["null", "string"]
        description: Date and time when the form was published
      - name: settings
        type: ["null", "object"]
        description: Settings and configurations for the form
        properties:
          language:
            type: ["null", "string"]
          progress_bar:
            type: ["null", "string"]
          meta:
            type: ["null", "object"]
            properties:
              allow_indexing:
                type: ["null", "boolean"]
              title:
                type: ["null", "string"]
              description:
                type: ["null", "string"]
              image:
                type: ["null", "object"]
                properties:
                  href:
                    type: ["null", "string"]
          hide_navigation:
            type: ["null", "boolean"]
          is_public:
            type: ["null", "boolean"]
          is_trial:
            type: ["null", "boolean"]
          show_progress_bar:
            type: ["null", "boolean"]
          show_typeform_branding:
            type: ["null", "boolean"]
          are_uploads_public:
            type: ["null", "boolean"]
          show_time_to_complete:
            type: ["null", "boolean"]
          redirect_after_submit_url:
            type: ["null", "string"]
          google_analytics:
            type: ["null", "string"]
          facebook_pixel:
            type: ["null", "string"]
          google_tag_manager:
            type: ["null", "string"]
          capabilities:
            type: ["null", "object"]
            properties:
              e2e_encryption:
                type: ["null", "object"]
                properties:
                  enabled:
                    type: ["null", "boolean"]
                  modifiable:
                    type: ["null", "boolean"]
          notifications:
            type: ["null", "object"]
            properties:
              self:
                type: ["null", "object"]
                properties:
                  enabled:
                    type: ["null", "boolean"]
                  recipients:
                    type: ["null", "array"]
                  subject:
                    type: ["null", "string"]
                  message:
                    type: ["null", "string"]
                  reply_to:
                    type: ["null", "string"]
              respondent:
                type: ["null", "object"]
                properties:
                  enabled:
                    type: ["null", "boolean"]
                  recipients:
                    type: ["null", "array"]
                  subject:
                    type: ["null", "string"]
                  message:
                    type: ["null", "string"]
                  reply_to:
                    type: ["null", "string"]
          cui_settings:
            type: ["null", "object"]
            properties:
              avatar:
                type: ["null", "string"]
              is_typing_emulation_disabled:
                type: ["null", "boolean"]
              typing_emulation_speed:
                type: ["null", "string"]
      - name: thankyou_screens
        type: ["null", "array"]
        description: Thank you screen configurations
      - name: theme
        type: ["null", "object"]
        description: Theme settings for the form
        properties:
          href:
            type: ["null", "string"]
      - name: title
        type: ["null", "string"]
        description: Title of the form
      - name: type
        type: ["null", "string"]
        description: Type of the form
      - name: welcome_screens
        type: ["null", "array"]
        description: Welcome screen configurations
      - name: workspace
        type: ["null", "object"]
        description: Workspace details where the form belongs
        properties:
          href:
            type: ["null", "string"]
    - entity: responses
      x-airbyte-name: responses
      suggested: true
      fields:
      - name: answers
        type: ["null", "array"]
        description: Response data for each question in the form
      - name: calculated
        type: ["null", "object"]
        description: Calculated data related to the response
        properties:
          score:
            type: ["null", "integer"]
      - name: form_id
        type: ["null", "string"]
        description: ID of the form
      - name: hidden
        type: ["null", "object"]
        description: Hidden fields in the response
      - name: landed_at
        type: ["null", "string"]
        description: Timestamp when the respondent landed on the form
      - name: landing_id
        type: ["null", "string"]
        description: ID of the landing page
      - name: metadata
        type: ["null", "object"]
        description: Metadata related to the response
        properties:
          user_agent:
            type: ["null", "string"]
          platform:
            type: ["null", "string"]
          referer:
            type: ["null", "string"]
          network_id:
            type: ["null", "string"]
      - name: response_id
        type: ["null", "string"]
        description: ID of the response
      - name: response_type
        type: ["null", "string"]
        description: Type of the response
      - name: submitted_at
        type: ["null", "string"]
        description: Timestamp when the response was submitted
      - name: token
        type: ["null", "string"]
        description: Token associated with the response
      - name: variables
        type: ["null", "array"]
        description: Variables associated with the response
    - entity: webhooks
      x-airbyte-name: webhooks
      fields:
      - name: created_at
        type: ["null", "string"]
        description: Timestamp when the webhook was created
      - name: enabled
        type: ["null", "boolean"]
        description: Whether the webhook is currently enabled
      - name: form_id
        type: ["null", "string"]
        description: ID of the form associated with the webhook
      - name: id
        type: ["null", "string"]
        description: Unique identifier of the webhook
      - name: tag
        type: ["null", "string"]
        description: Tag to categorize or label the webhook
      - name: updated_at
        type: ["null", "string"]
        description: Timestamp when the webhook was last updated
      - name: url
        type: ["null", "string"]
        description: URL where webhook data is sent
      - name: verify_ssl
        type: ["null", "boolean"]
        description: Whether SSL verification is enforced
    - entity: workspaces
      x-airbyte-name: workspaces
      fields:
      - name: account_id
        type: ["null", "string"]
        description: Account ID associated with the workspace
      - name: default
        type: ["null", "boolean"]
        description: Whether this is the default workspace
      - name: forms
        type: ["null", "object"]
        description: Information about forms in the workspace
        properties:
          count:
            type: ["null", "number"]
          href:
            type: ["null", "string"]
      - name: id
        type: ["null", "string"]
        description: Unique identifier of the workspace
      - name: name
        type: ["null", "string"]
        description: Name of the workspace
      - name: self
        type: ["null", "object"]
        description: Self-referential link
        properties:
          href:
            type: ["null", "string"]
      - name: shared
        type: ["null", "boolean"]
        description: Whether this workspace is shared
    - entity: images
      x-airbyte-name: images
      fields:
      - name: avg_color
        type: ["null", "string"]
        description: Average color of the image
      - name: file_name
        type: ["null", "string"]
        description: Name of the image file
      - name: has_alpha
        type: ["null", "boolean"]
        description: Whether the image has an alpha channel
      - name: height
        type: ["null", "integer"]
        description: Height of the image in pixels
      - name: id
        type: ["null", "string"]
        description: Unique identifier of the image
      - name: media_type
        type: ["null", "string"]
        description: MIME type of the image
      - name: src
        type: ["null", "string"]
        description: URL to access the image
      - name: width
        type: ["null", "integer"]
        description: Width of the image in pixels
    - entity: themes
      x-airbyte-name: themes
      fields:
      - name: background
        type: ["null", "object"]
        description: Background settings for the theme
        properties:
          brightness:
            type: ["null", "number"]
          href:
            type: ["null", "string"]
          layout:
            type: ["null", "string"]
      - name: colors
        type: ["null", "object"]
        description: Color settings
        properties:
          answer:
            type: ["null", "string"]
          background:
            type: ["null", "string"]
          button:
            type: ["null", "string"]
          question:
            type: ["null", "string"]
      - name: created_at
        type: ["null", "string"]
        description: Timestamp when the theme was created
      - name: fields
        type: ["null", "object"]
        description: Field display settings
        properties:
          alignment:
            type: ["null", "string"]
          font_size:
            type: ["null", "string"]
      - name: font
        type: ["null", "string"]
        description: Font used in the theme
      - name: has_transparent_button
        type: ["null", "boolean"]
        description: Whether the theme has a transparent button
      - name: id
        type: ["null", "string"]
        description: Unique identifier of the theme
      - name: name
        type: ["null", "string"]
        description: Name of the theme
      - name: rounded_corners
        type: ["null", "string"]
        description: Rounded corners setting
      - name: screens
        type: ["null", "object"]
        description: Screen display settings
        properties:
          alignment:
            type: ["null", "string"]
          font_size:
            type: ["null", "string"]
      - name: updated_at
        type: ["null", "string"]
        description: Timestamp when the theme was last updated
      - name: visibility
        type: ["null", "string"]
        description: Visibility setting of the theme

servers:
- url: https://api.typeform.com
  description: Typeform API server

security:
- bearerAuth: []

paths:
  /forms:
    get:
      summary: List forms
      description: Returns a paginated list of forms in the account
      operationId: listForms
      x-airbyte-entity: forms
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.items
      x-airbyte-meta-extractor:
        total_items: $.total_items
        page_count: $.page_count
      parameters:
      - name: page
        in: query
        description: Page number to retrieve
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: page_size
        in: query
        description: Number of forms per page
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 10
      responses:
        "200":
          description: List of forms
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormsList"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /forms/{form_id}:
    get:
      summary: Get a form
      description: Retrieves a single form by its ID, including fields, settings, and logic
      operationId: getForm
      x-airbyte-entity: forms
      x-airbyte-action: get
      parameters:
      - name: form_id
        in: path
        required: true
        description: Unique ID of the form
        schema:
          type: string
      responses:
        "200":
          description: Form object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"
        "401":
          description: Unauthorized
        "404":
          description: Form not found

  /forms/{form_id}/responses:
    get:
      summary: List form responses
      description: Returns a paginated list of responses for a given form
      operationId: listResponses
      x-airbyte-entity: responses
      x-airbyte-action: list
      x-airbyte-record-extractor: $.items
      x-airbyte-meta-extractor:
        total_items: $.total_items
        page_count: $.page_count
      parameters:
      - name: form_id
        in: path
        required: true
        description: Unique ID of the form
        schema:
          type: string
      - name: page_size
        in: query
        description: Number of responses per page
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 25
      - name: since
        in: query
        description: "Limit responses to those submitted since the specified date/time (ISO 8601 format, e.g. 2021-03-01T00:00:00Z)"
        schema:
          type: string
      - name: until
        in: query
        description: "Limit responses to those submitted until the specified date/time (ISO 8601 format)"
        schema:
          type: string
      - name: after
        in: query
        description: Cursor token for pagination; returns responses after this token
        schema:
          type: string
      - name: before
        in: query
        description: Cursor token for pagination; returns responses before this token
        schema:
          type: string
      - name: sort
        in: query
        description: "Sort order for responses, e.g. submitted_at,asc"
        schema:
          type: string
      - name: completed
        in: query
        description: Filter by completed status (true or false)
        schema:
          type: boolean
      - name: query
        in: query
        description: Search query to filter responses
        schema:
          type: string
      responses:
        "200":
          description: List of responses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsesList"
        "401":
          description: Unauthorized
        "404":
          description: Form not found

  /forms/{form_id}/webhooks:
    get:
      summary: List webhooks
      description: Returns webhooks configured for a given form
      operationId: listWebhooks
      x-airbyte-entity: webhooks
      x-airbyte-action: list
      x-airbyte-no-pagination: "Typeform GET /forms/{form_id}/webhooks returns all webhooks configured on the form in a single response; the endpoint exposes no pagination cursor, offset, or page parameter."
      x-airbyte-record-extractor: $.items
      parameters:
      - name: form_id
        in: path
        required: true
        description: Unique ID of the form
        schema:
          type: string
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhooksList"
        "401":
          description: Unauthorized
        "404":
          description: Form not found

  /workspaces:
    get:
      summary: List workspaces
      description: Returns a paginated list of workspaces in the account
      operationId: listWorkspaces
      x-airbyte-entity: workspaces
      x-airbyte-action: list
      x-airbyte-record-extractor: $.items
      x-airbyte-meta-extractor:
        total_items: $.total_items
        page_count: $.page_count
      parameters:
      - name: page
        in: query
        description: Page number to retrieve
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: page_size
        in: query
        description: Number of workspaces per page
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 10
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacesList"
        "401":
          description: Unauthorized

  /images:
    get:
      summary: List images
      description: Returns a list of images in the account
      operationId: listImages
      x-airbyte-entity: images
      x-airbyte-action: list
      x-airbyte-no-pagination: "Typeform GET /images returns the full list of images uploaded to the account as a flat array in a single response; the endpoint exposes no pagination cursor, offset, or page parameter."
      parameters: []
      responses:
        "200":
          description: List of images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Image"
        "401":
          description: Unauthorized

  /themes:
    get:
      summary: List themes
      description: Returns a paginated list of themes in the account
      operationId: listThemes
      x-airbyte-entity: themes
      x-airbyte-action: list
      x-airbyte-record-extractor: $.items
      x-airbyte-meta-extractor:
        total_items: $.total_items
        page_count: $.page_count
      parameters:
      - name: page
        in: query
        description: Page number to retrieve
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: page_size
        in: query
        description: Number of themes per page
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 10
      responses:
        "200":
          description: List of themes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemesList"
        "401":
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Personal access token or OAuth2 access token
      x-airbyte-auth-config:
        title: Access Token Authentication
        type: object
        required:
        - access_token
        properties:
          access_token:
            type: string
            title: Access Token
            description: Personal access token from your Typeform account settings
        auth_mapping:
          token: "${access_token}"
        replication_auth_key_mapping:
          credentials.access_token: "access_token"
        replication_auth_key_constants:
          credentials.auth_type: "access_token"

  schemas:
    Form:
      type: object
      x-airbyte-entity-name: forms
      x-airbyte-stream-name: forms
      x-airbyte-ai-hints:
        summary: "Typeform forms (surveys, quizzes, questionnaires)"
        when_to_use: "Questions about available forms or form configuration"
        trigger_phrases: ["typeform", "survey", "questionnaire", "form"]
        freshness: live
        search_strategy: "Search by title"
        example_questions:
          - "What forms are in Typeform?"
      description: A Typeform form with its fields, settings, and logic
      properties:
        id:
          type: ["null", "string"]
          description: Unique identifier of the form
        type:
          type: ["null", "string"]
          description: Type of the form
        title:
          type: ["null", "string"]
          description: Title of the form
        created_at:
          type: ["null", "string"]
          format: date-time
          description: Date and time when the form was created
        last_updated_at:
          type: ["null", "string"]
          format: date-time
          description: Date and time when the form was last updated
        published_at:
          type: ["null", "string"]
          format: date-time
          description: Date and time when the form was published
        workspace:
          type: ["null", "object"]
          description: Workspace details where the form belongs
          properties:
            href:
              type: ["null", "string"]
              description: URL of the workspace
        theme:
          type: ["null", "object"]
          description: Theme settings for the form
          properties:
            href:
              type: ["null", "string"]
              description: URL of the theme
        settings:
          type: ["null", "object"]
          description: Settings and configurations for the form
          properties:
            language:
              type: ["null", "string"]
              description: Language of the form
            progress_bar:
              type: ["null", "string"]
              description: Progress bar settings
            meta:
              type: ["null", "object"]
              description: Meta information
              properties:
                allow_indexing:
                  type: ["null", "boolean"]
                title:
                  type: ["null", "string"]
                description:
                  type: ["null", "string"]
                image:
                  type: ["null", "object"]
                  properties:
                    href:
                      type: ["null", "string"]
            hide_navigation:
              type: ["null", "boolean"]
            is_public:
              type: ["null", "boolean"]
            is_trial:
              type: ["null", "boolean"]
            show_progress_bar:
              type: ["null", "boolean"]
            show_typeform_branding:
              type: ["null", "boolean"]
            are_uploads_public:
              type: ["null", "boolean"]
            show_time_to_complete:
              type: ["null", "boolean"]
            redirect_after_submit_url:
              type: ["null", "string"]
            google_analytics:
              type: ["null", "string"]
            facebook_pixel:
              type: ["null", "string"]
            google_tag_manager:
              type: ["null", "string"]
            capabilities:
              type: ["null", "object"]
              properties:
                e2e_encryption:
                  type: ["null", "object"]
                  properties:
                    enabled:
                      type: ["null", "boolean"]
                    modifiable:
                      type: ["null", "boolean"]
            notifications:
              type: ["null", "object"]
              properties:
                self:
                  type: ["null", "object"]
                  properties:
                    enabled:
                      type: ["null", "boolean"]
                    recipients:
                      type: ["null", "array"]
                      items:
                        type: ["null", "string"]
                    subject:
                      type: ["null", "string"]
                    message:
                      type: ["null", "string"]
                    reply_to:
                      type: ["null", "string"]
                respondent:
                  type: ["null", "object"]
                  properties:
                    enabled:
                      type: ["null", "boolean"]
                    recipients:
                      type: ["null", "array"]
                      items:
                        type: ["null", "string"]
                    subject:
                      type: ["null", "string"]
                    message:
                      type: ["null", "string"]
                    reply_to:
                      type: ["null", "string"]
            cui_settings:
              type: ["null", "object"]
              properties:
                avatar:
                  type: ["null", "string"]
                is_typing_emulation_disabled:
                  type: ["null", "boolean"]
                typing_emulation_speed:
                  type: ["null", "string"]
        welcome_screens:
          type: ["null", "array"]
          description: Welcome screen configurations
          items:
            type: ["null", "object"]
            properties:
              id:
                type: ["null", "string"]
              ref:
                type: ["null", "string"]
              title:
                type: ["null", "string"]
              properties:
                type: ["null", "object"]
                properties:
                  show_button:
                    type: ["null", "boolean"]
                  share_icons:
                    type: ["null", "boolean"]
                  button_mode:
                    type: ["null", "string"]
                  button_text:
                    type: ["null", "string"]
                  redirect_url:
                    type: ["null", "string"]
              attachment:
                type: ["null", "object"]
                properties:
                  type:
                    type: ["null", "string"]
                  placement:
                    type: ["null", "string"]
              layout:
                type: ["null", "object"]
                properties:
                  type:
                    type: ["null", "string"]
                  placement:
                    type: ["null", "string"]
                  attachment:
                    type: ["null", "object"]
                    properties:
                      type:
                        type: ["null", "string"]
                      href:
                        type: ["null", "string"]
                      scale:
                        type: ["null", "number"]
                  properties:
                    type: ["null", "object"]
                    properties:
                      brightness:
                        type: ["null", "number"]
                      description:
                        type: ["null", "string"]
                      focal_point:
                        type: ["null", "object"]
                        properties:
                          x:
                            type: ["null", "number"]
                          y:
                            type: ["null", "number"]
        thankyou_screens:
          type: ["null", "array"]
          description: Thank you screen configurations
          items:
            type: ["null", "object"]
