    # Association schemas
    AssociationResult:
      type: object
      x-airbyte-entity-name: associations
      x-airbyte-ai-hints:
        summary: "CRM record associations linking contacts, companies, deals, and tickets"
        when_to_use: "Linking or relating two CRM records, such as associating a contact with a company or a deal with a contact"
        trigger_phrases: ["associate", "link records", "connect contact to company", "relate deal to contact", "association"]
        freshness: live
        search_strategy: "Specify the from and to object types and record IDs"
        example_questions:
          - "Associate a contact with a deal"
          - "Link a company to a ticket"
      description: Result of creating an association between two CRM records
      properties:
        status:
          type: string
          description: Status of the association operation (e.g., COMPLETE)
        results:
          type: array
          description: List of created associations
          items:
            type: object
            properties:
              from:
                type: object
                description: The source record of the association
                properties:
                  id:
                    type: string
                    description: ID of the source record
              to:
                type: object
                description: The target record of the association
                properties:
                  id:
                    type: string
                    description: ID of the target record
              associationSpec:
                type: object
                description: Details about the association type
                properties:
                  associationCategory:
                    type: string
                    description: "Category of the association (HUBSPOT_DEFINED or USER_DEFINED)"
                    enum:
                      - HUBSPOT_DEFINED
                      - USER_DEFINED
                  associationTypeId:
                    type: integer
                    description: Numeric ID of the association type
            additionalProperties: true
        startedAt:
          type: string
          format: date-time
          description: Timestamp when the operation started
        completedAt:
          type: string
          format: date-time
          description: Timestamp when the operation completed
        requestedAt:
          type: [string, "null"]
          format: date-time
          description: Timestamp when the operation was requested

    AssociationLabeledParams:
      type: array
      description: |
        Array of association type specifications. Each item defines a labeled association type
        to apply between the two records. Multiple labels can be set in a single call.
      items:
        type: object
        required:
          - associationCategory
          - associationTypeId
        properties:
          associationCategory:
            type: string
            description: |
              Category of the association type. Use HUBSPOT_DEFINED for standard HubSpot association
              types (e.g., primary company, default contact-to-deal) or USER_DEFINED for custom
              association labels created in your HubSpot portal.
            enum:
              - HUBSPOT_DEFINED
              - USER_DEFINED
          associationTypeId:
            type: integer
            description: |
              Numeric identifier for the association type. Common IDs include:
              279 = Contact to Company (default), 280 = Company to Contact (default),
              4 = Contact to Deal (default), 3 = Deal to Contact (default),
              341 = Deal to Company (default), 342 = Company to Deal (default),
              1 = Contact to Primary Company, 2 = Company to Primary Contact,
              5 = Deal to Primary Company, 6 = Primary Company to Deal,
              15 = Contact to Ticket (default), 16 = Ticket to Contact (default),
              339 = Ticket to Company (default), 340 = Company to Ticket (default),
              26 = Ticket to Primary Company, 25 = Primary Company to Ticket.
              Use the association definitions API to discover additional type IDs.

    AssociationListResult:
      type: object
      x-airbyte-entity-name: associations
      description: Paginated list of associations for a CRM record
      properties:
        results:
          type: array
          description: List of associated objects with their association type details
          items:
            type: object
            properties:
              toObjectId:
                type: [string, integer]
                description: ID of the associated target record
              associationTypes:
                type: array
                description: List of association types linking the two records
                items:
                  type: object
                  properties:
                    category:
                      type: string
                      description: "Category of the association (HUBSPOT_DEFINED, USER_DEFINED, or INTEGRATOR_DEFINED)"
                      enum:
                        - HUBSPOT_DEFINED
                        - USER_DEFINED
                        - INTEGRATOR_DEFINED
                    typeId:
                      type: integer
                      description: Numeric identifier for the association type
                    label:
                      type: [string, "null"]
                      description: Human-readable label for the association type (e.g., "Primary Company")
            additionalProperties: true
        paging:
          type: object
          description: Pagination information for retrieving additional results
          properties:
            next:
              type: object
              description: Cursor for the next page of results
              properties:
                after:
                  type: string
                  description: Paging cursor token for retrieving the next page
                link:
                  type: string
                  description: URL for retrieving the next page of results
              context:
                type: object
                description: Additional error context
                additionalProperties: true
            additionalProperties: true

