        description: The name of a property whose values are unique for this object.
        schema:
          type: string
      - name: archived
        in: query
        description: Whether to return only results that have been archived.
        schema:
          type: boolean
      responses:
        "200":
          description: Meeting object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"
        "404":
          description: Meeting not found
        "401":
          description: Unauthorized
    delete:
      summary: Delete (archive) a meeting
      description: |
        Archive a meeting by ID. This is a soft delete — the meeting is moved to the
        recycle bin and can be restored for approximately 90 days. No public
        hard-delete endpoint exists.
      operationId: deleteMeeting
      x-airbyte-entity: meetings
      x-airbyte-action: delete
      parameters:
      - name: meetingId
        in: path
        required: true
        description: Meeting ID
        schema:
          type: string
      responses:
        "204":
          description: Meeting archived
        "404":
          description: Meeting not found
        "401":
          description: Unauthorized

  # Tasks Entity
  "/crm/v3/objects/tasks":
    post:
      summary: Create a task
      description: |
        Create a new task in HubSpot CRM. Tasks can be associated with contacts,
        companies, deals, or tickets by using the associations parameter.
        The hs_timestamp property sets when the task activity occurred.
      operationId: createTask
      x-airbyte-entity: tasks
      x-airbyte-action: create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreateParams"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
    get:
      summary: List tasks
      description: Returns a paginated list of tasks
      operationId: listTasks
      x-airbyte-entity: tasks
      x-airbyte-action: list
      x-airbyte-record-extractor: $.results
      x-airbyte-meta-extractor:
        next_cursor: $.paging.next.after
        next_link: $.paging.next.link
      parameters:
      - name: limit
        in: query
        description: The maximum number of results to display per page.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: after
        in: query
        description: The paging cursor token of the last successfully read resource will be returned as the paging.next.after JSON property of a paged response containing more results.
        schema:
          type: string
      - name: associations
        in: query
        description: A comma separated list of associated object types to include in the response. Valid values are contacts, companies, deals, tickets, and custom object type IDs or fully qualified names.
        schema:
          type: string
      - name: properties
        in: query
        description: A comma separated list of the properties to be returned in the response. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      - name: propertiesWithHistory
        in: query
        description: A comma separated list of the properties to be returned along with their history of previous values. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      - name: archived
        in: query
        description: Whether to return only results that have been archived.
        schema:
          type: boolean
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksList"
        "401":
          description: Unauthorized

  "/crm/v3/objects/tasks/{taskId}":
    patch:
      summary: Update a task
      description: Update an existing task's properties by ID.
      operationId: updateTask
      x-airbyte-entity: tasks
      x-airbyte-action: update
      parameters:
      - name: taskId
        in: path
        required: true
        description: Task ID
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdateParams"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "404":
          description: Task not found
    get:
      summary: Get a task
      description: Get a single task by ID
      operationId: getTask
      x-airbyte-entity: tasks
      x-airbyte-action: get
      parameters:
      - name: taskId
        in: path
        required: true
        description: Task ID
        schema:
          type: string
      - name: properties
        in: query
        description: A comma separated list of the properties to be returned in the response. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      - name: propertiesWithHistory
        in: query
        description: A comma separated list of the properties to be returned along with their history of previous values. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      - name: associations
        in: query
        description: A comma separated list of object types to retrieve associated IDs for. If any of the specified associations do not exist, they will be ignored.
        schema:
          type: string
      - name: idProperty
        in: query
        description: The name of a property whose values are unique for this object.
        schema:
          type: string
      - name: archived
        in: query
        description: Whether to return only results that have been archived.
        schema:
          type: boolean
      responses:
        "200":
          description: Task object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Task not found
        "401":
          description: Unauthorized
    delete:
      summary: Delete (archive) a task
      description: |
        Archive a task by ID. This is a soft delete — the task is moved to the
        recycle bin and can be restored for approximately 90 days. No public
        hard-delete endpoint exists.
      operationId: deleteTask
      x-airbyte-entity: tasks
      x-airbyte-action: delete
      parameters:
      - name: taskId
        in: path
        required: true
        description: Task ID
        schema:
          type: string
      responses:
        "204":
          description: Task archived
        "404":
          description: Task not found
        "401":
          description: Unauthorized

  # Schemas Entities (for discovering custom objects)
  "/crm-object-schemas/v3/schemas":
    get:
      summary: List custom object schemas
      description: Returns all custom object schemas to discover available custom objects
      operationId: listSchemas
      x-airbyte-entity: schemas
      x-airbyte-action: list
      x-airbyte-no-pagination: "HubSpot GET /crm-object-schemas/v3/schemas returns all custom object schemas defined on the portal in a single response; unlike the paged CRM object endpoints this discovery endpoint exposes no paging.next cursor or after token."
      x-airbyte-record-extractor: $.results
      parameters:
      - name: archived
        in: query
        description: Whether to return only results that have been archived.
        schema:
          type: boolean
      responses:
        "200":
          description: List of custom object schemas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemasList"
        "401":
          description: Unauthorized

  "/crm-object-schemas/v3/schemas/{objectType}":
    get:
      summary: Get a custom object schema
      description: Get the schema for a specific custom object type
      operationId: getSchema
      x-airbyte-entity: schemas
      x-airbyte-action: get
      parameters:
      - name: objectType
        in: path
        required: true
        description: Fully qualified name or object type ID of your schema.
        schema:
          type: string
      responses:
        "200":
          description: Custom object schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schema"
        "404":
          description: Schema not found
        "401":
          description: Unauthorized

  # Generic Objects Entities (for custom objects)
  "/crm/v3/objects/{objectType}":
    get:
      summary: List objects
      description: Read a page of objects. Control what is returned via the properties query param.
      operationId: listObjects
      x-airbyte-entity: objects
      x-airbyte-action: list
      x-airbyte-record-extractor: $.results
      x-airbyte-meta-extractor:
        next_cursor: $.paging.next.after
        next_link: $.paging.next.link
      parameters:
      - name: objectType
        in: path
        required: true
        description: Object type ID or fully qualified name (e.g., "cars" or "p12345_cars")
        schema:
          type: string
      - name: limit
        in: query
        description: The maximum number of results to display per page.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: after
        in: query
        description: The paging cursor token of the last successfully read resource will be returned as the `paging.next.after` JSON property of a paged response containing more results.
        schema:
          type: string
      - name: properties
        in: query
        description: A comma separated list of the properties to be returned in the response. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      - name: archived
        in: query
        description: Whether to return only results that have been archived.
        schema:
          type: boolean
          default: false
      - name: associations
        in: query
        description: A comma separated list of object types to retrieve associated IDs for. If any of the specified associations do not exist, they will be ignored.
        schema:
          type: string
      - name: propertiesWithHistory
        in: query
        description: A comma separated list of the properties to be returned along with their history of previous values. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      responses:
        "200":
          description: List of objects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectsList"
        "401":
          description: Unauthorized
        "404":
          description: Object type not found

  "/crm/v3/objects/{objectType}/{objectId}":
    get:
      summary: Get an object
      description: Read an Object identified by {objectId}. {objectId} refers to the internal object ID by default, or optionally any unique property value as specified by the idProperty query param. Control what is returned via the properties query param.
      operationId: getObject
      x-airbyte-entity: objects
      x-airbyte-action: get
      parameters:
      - name: objectType
        in: path
        required: true
        description: Object type ID or fully qualified name
        schema:
          type: string
      - name: objectId
        in: path
        required: true
        description: Object record ID
        schema:
          type: string
      - name: properties
        in: query
        description: A comma separated list of the properties to be returned in the response. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      - name: archived
        in: query
        description: Whether to return only results that have been archived.
        schema:
          type: boolean
      - name: associations
        in: query
        description: A comma separated list of object types to retrieve associated IDs for. If any of the specified associations do not exist, they will be ignored.
        schema:
          type: string
      - name: idProperty
        in: query
        description: The name of a property whose values are unique for this object.
        schema:
          type: string
      - name: propertiesWithHistory
        in: query
        description: A comma separated list of the properties to be returned along with their history of previous values. If any of the specified properties are not present on the requested object(s), they will be ignored.
        schema:
          type: string
      responses:
        "200":
          description: Object record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CRMObject"
        "404":
          description: Object not found
        "401":
          description: Unauthorized

  # Associations (v4 API)

  "/crm/v4/objects/{fromObjectType}/{fromObjectId}/associations/{toObjectType}":
    get:
      summary: List associations for a record
      description: |
        Retrieve all associations between a specific CRM record and a target object type using
        the v4 associations API. Returns up to 500 associations per call. Use the `after` cursor
        for pagination when there are more results. For example, retrieve all companies associated
        with a contact, or all deals associated with a company.
      operationId: listAssociations
      x-airbyte-entity: associations
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next_cursor: $.paging.next.after
        next_link: $.paging.next.link
      parameters:
      - name: fromObjectType
        in: path
        required: true
        description: "Object type of the source record (e.g., contacts, companies, deals, tickets, or a custom object type ID)"
        schema:
          type: string
      - name: fromObjectId
        in: path
        required: true
        description: "ID of the source record to retrieve associations for"
        schema:
          type: string
      - name: toObjectType
        in: path
        required: true
        description: "Object type of the target records to retrieve (e.g., contacts, companies, deals, tickets, or a custom object type ID)"
        schema:
          type: string
      - name: after
        in: query
        required: false
        description: "Paging cursor token from a previous response for retrieving subsequent pages of results"
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: "Maximum number of results to return per page (default 500, max 500)"
        schema:
          type: integer
          default: 500
      responses:
        "200":
          description: List of associations retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationListResult"
        "400":
          description: Invalid input - invalid object type or ID
        "401":
          description: Unauthorized
        "404":
          description: Record not found

  "/crm/v4/objects/{fromObjectType}/{fromObjectId}/associations/{toObjectType}/{toObjectId}":
    put:
      summary: Associate two records with a label
      description: |
        Create a labeled association between two CRM records using the v4 associations API.
        Labeled associations carry an association type ID and category that describe the relationship
        (e.g., "Primary Company", "Billing Contact"). This is idempotent — calling it again with the same
        IDs and label has no effect. Use the association type ID and category from the HubSpot association
        definitions for the relevant object pair. Common association type IDs include:
        - Contact to Company: 279 (HUBSPOT_DEFINED) for default, 1 (HUBSPOT_DEFINED) for Primary
        - Company to Contact: 280 (HUBSPOT_DEFINED) for default, 2 (HUBSPOT_DEFINED) for Primary
        - Contact to Deal: 4 (HUBSPOT_DEFINED) for default
        - Deal to Contact: 3 (HUBSPOT_DEFINED) for default
        - Deal to Company: 341 (HUBSPOT_DEFINED) for default, 5 (HUBSPOT_DEFINED) for Primary
        - Company to Deal: 342 (HUBSPOT_DEFINED) for default, 6 (HUBSPOT_DEFINED) for Primary
        - Contact to Ticket: 15 (HUBSPOT_DEFINED) for default
        - Ticket to Contact: 16 (HUBSPOT_DEFINED) for default
        - Ticket to Company: 339 (HUBSPOT_DEFINED) for default, 26 (HUBSPOT_DEFINED) for Primary
        - Company to Ticket: 340 (HUBSPOT_DEFINED) for default, 25 (HUBSPOT_DEFINED) for Primary
      operationId: associateLabeledRecords
      x-airbyte-entity: associations
      x-airbyte-action: create
      parameters:
      - name: fromObjectType
        in: path
        required: true
        description: "Object type of the source record (e.g., contacts, companies, deals, tickets, or a custom object type ID)"
        schema:
          type: string
      - name: fromObjectId
        in: path
        required: true
        description: "ID of the source record to associate from"
        schema:
          type: string
      - name: toObjectType
        in: path
        required: true
        description: "Object type of the target record (e.g., contacts, companies, deals, tickets, or a custom object type ID)"
        schema:
          type: string
      - name: toObjectId
        in: path
        required: true
        description: "ID of the target record to associate to"
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssociationLabeledParams"
      responses:
        "200":
          description: Labeled association created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociationResult"
        "400":
          description: Invalid input - invalid object types, IDs, or association label
        "401":
          description: Unauthorized
        "404":
          description: One or both records not found
    delete:
      summary: Delete all associations between two records
      description: |
        Delete all associations between two specific CRM records using the v4 associations API.
        This removes every association (both default and labeled) between the two specified records.
        This operation is irreversible — deleted associations must be recreated manually.
      operationId: deleteAssociations
      x-airbyte-entity: associations
      x-airbyte-action: delete
      parameters:
      - name: fromObjectType
        in: path
        required: true
        description: "Object type of the source record (e.g., contacts, companies, deals, tickets, or a custom object type ID)"
        schema:
          type: string
      - name: fromObjectId
        in: path
        required: true
        description: "ID of the source record"
        schema:
          type: string
      - name: toObjectType
        in: path
        required: true
        description: "Object type of the target record (e.g., contacts, companies, deals, tickets, or a custom object type ID)"
        schema:
          type: string
      - name: toObjectId
        in: path
        required: true
        description: "ID of the target record"
        schema:
          type: string
      responses:
        "204":
          description: Associations deleted successfully (no content returned)
        "401":
          description: Unauthorized
        "404":
          description: One or both records not found

components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: HubSpot OAuth 2.0 authentication with automatic token refresh
      flows:
        authorizationCode:
          authorizationUrl: https://app.hubspot.com/oauth/authorize
          tokenUrl: https://api.hubapi.com/oauth/v1/token
          refreshUrl: https://api.hubapi.com/oauth/v1/token
          scopes:
            oauth: OAuth access
            crm.schemas.contacts.read: Read contact schemas
            crm.objects.contacts.read: Read contacts
            crm.objects.contacts.write: Write contacts
            crm.objects.companies.read: Read companies
            crm.objects.companies.write: Write companies
            crm.schemas.companies.read: Read company schemas
            crm.objects.deals.read: Read deals
            crm.objects.deals.write: Write deals
            crm.schemas.deals.read: Read deal schemas
            crm.objects.custom.read: Read custom objects
            crm.schemas.custom.read: Read custom object schemas
            crm.lists.read: Read lists
            crm.objects.goals.read: Read goals
            crm.objects.owners.read: Read owners
            crm.objects.leads.read: Read leads
            crm.objects.users.read: Read users
            settings.users.read: Read user settings
            crm.objects.courses.read: Read courses
            crm.objects.projects.read: Read projects
            crm.objects.quotes.read: Read quotes
            tickets: Read and write tickets
            content: Read content
            automation: Read automation
            e-commerce: Read e-commerce
            forms: Read forms
            sales-email-read: Read sales emails
      x-airbyte-oauth-scopes:
        - scope: "oauth"
          mode: read
          entities:
            - contacts
            - companies
            - deals
            - tickets
            - schemas
            - objects
            - associations
            - notes
            - calls
            - emails
            - meetings
            - tasks
        - scope: "crm.objects.contacts.read"
          mode: read
          entities:
            - contacts
            - companies
            - deals
            - tickets
            - notes
            - calls
            - emails
            - meetings
            - tasks
        - scope: "crm.schemas.contacts.read"
          mode: read
          entities:
            - contacts
        - scope: "crm.objects.contacts.write"
          mode: write
          entities:
            - contacts
            - associations
            - notes
            - calls
            - emails
            - meetings
            - tasks
        - scope: "crm.objects.companies.write"
          mode: write
          entities:
            - companies
            - associations
        - scope: "crm.objects.deals.write"
          mode: write
          entities:
            - deals
            - associations
      x-airbyte-token-refresh:
        auth_style: body
        body_format: form
      x-airbyte-oauth-credentials:
        title: HubSpot OAuth App Credentials
        description: Provide your own HubSpot OAuth app credentials to override the default Airbyte-managed ones.
        properties:
          client_id:
            type: string
            title: Client ID
            description: Your HubSpot OAuth app's client ID
          client_secret:
            type: string
            title: Client Secret
            description: Your HubSpot OAuth app's client secret
        required:
        - client_id
        - client_secret
      x-airbyte-auth-config:
        title: "OAuth2"
        type: object
        required:
        - refresh_token
        properties:
          client_id:
            type: string
            title: "Client ID"
            description: "Your HubSpot OAuth2 Client ID"
          client_secret:
            type: string
            title: "Client Secret"
            description: "Your HubSpot OAuth2 Client Secret"
          refresh_token:
            type: string
            title: "Refresh Token"
            description: "Your HubSpot OAuth2 Refresh Token"
          access_token:
            type: string
            title: "Access Token"
            description: "Your HubSpot OAuth2 Access Token (optional if refresh_token is provided)"
        auth_mapping:
          client_id: "${client_id}"
          client_secret: "${client_secret}"
          refresh_token: "${refresh_token}"
          access_token: "${access_token}"
        replication_auth_key_mapping:
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          credentials.refresh_token: "refresh_token"
        replication_auth_key_constants:
          credentials.credentials_title: "OAuth Credentials"

    hubspotPrivateApp:
      type: http
      scheme: bearer
      description: HubSpot Private App access token authentication
      x-airbyte-auth-config:
        title: "Private App"
        type: object
        required:
        - private_app_token
        properties:
          private_app_token:
            type: string
            title: "Private App Token"
            description: "Access token from a HubSpot Private App"
        auth_mapping:
          token: "${private_app_token}"
        replication_auth_key_mapping:
          credentials.access_token: "private_app_token"
        replication_auth_key_constants:
          credentials.credentials_title: "Private App Credentials"

  schemas:
    # Contact schemas
    Contact:
      type: object
      x-airbyte-entity-name: contacts
      x-airbyte-stream-name: contacts
      x-airbyte-ai-hints:
        summary: "HubSpot contacts with email, name, and engagement history"
        when_to_use: "Looking up contact information, leads, or people in the CRM"
        trigger_phrases: ["hubspot contact", "lead", "customer contact", "who is", "contact info"]
        freshness: live
        search_strategy: "Search by email or name across properties for best results"
        example_questions:
          - "Find a contact in HubSpot"
          - "Show contact details for an email"
      description: HubSpot contact object
      properties:
        id:
          type: string
          description: Unique contact identifier
        properties:
          type: object
          description: Contact properties
          properties:
            createdate:
              type: [string, "null"]
            email:
              type: [string, "null"]
            firstname:
              type: [string, "null"]
            hs_object_id:
              type: [string, "null"]
            lastmodifieddate:
              type: [string, "null"]
            lastname:
              type: [string, "null"]
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        archived:
          type: boolean
          description: Whether the contact is archived
        archivedAt:
          type: [string, "null"]
          format: date-time
          description: Timestamp when the contact was archived
        propertiesWithHistory:
          type: [object, "null"]
          description: Properties with historical values
          additionalProperties: true
        associations:
          type: [object, "null"]
          description: Relationships with other CRM objects
          additionalProperties: true
        objectWriteTraceId:
          type: [string, "null"]
          description: Trace identifier for write operations
        url:
          type: [string, "null"]
          description: URL to view contact in HubSpot

    ContactsList:
      type: object
      description: Paginated list of contacts
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        paging:
          $ref: "#/components/schemas/Paging"
        total:
          type: integer
          description: Total number of results (search only)

    # Company schemas
    Company:
      type: object
      x-airbyte-entity-name: companies
      x-airbyte-stream-name: companies
      x-airbyte-ai-hints:
        summary: "Companies in HubSpot CRM with industry, size, and revenue data"
        when_to_use: "Looking up company information or account details"
        trigger_phrases: ["hubspot company", "account", "company details", "which company"]
        freshness: live
        search_strategy: "Search by name or domain"
        example_questions:
          - "Find a company in HubSpot"
          - "Show company details"
      description: HubSpot company object
      properties:
        id:
          type: string
          description: Unique company identifier
        properties:
          type: object
          description: Company properties
          properties:
            createdate:
              type: [string, "null"]
            domain:
              type: [string, "null"]
            hs_lastmodifieddate:
              type: [string, "null"]
            hs_object_id:
              type: [string, "null"]
            name:
              type: [string, "null"]
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
