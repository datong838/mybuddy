              description: Description or notes for the task (supports HTML)
            hs_task_subject:
              type: string
              description: Subject or title of the task
            hs_task_status:
              type: string
              description: "Status of the task (NOT_STARTED, IN_PROGRESS, WAITING, COMPLETED, DEFERRED)"
            hs_task_priority:
              type: string
              description: "Priority of the task (LOW, MEDIUM, HIGH)"
            hs_task_type:
              type: string
              description: "Type of the task (TODO, CALL, EMAIL)"
            hs_task_reminders:
              type: string
              description: Reminder timestamp for the task (epoch milliseconds)
            hs_timestamp:
              type: string
              description: Due date / timestamp for the task
            hubspot_owner_id:
              type: string
              description: ID of the HubSpot owner to assign to this task
          additionalProperties: true

    TasksList:
      type: object
      description: Paginated list of tasks
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        paging:
          $ref: "#/components/schemas/Paging"
        total:
          type: integer
          description: Total number of results (search only)

    # Shared pagination schema
    Paging:
      type: object
      description: Pagination information
      properties:
        next:
          type: object
          properties:
            after:
              type: string
              description: Cursor for next page
            link:
              type: string
              description: URL for next page
