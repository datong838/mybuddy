components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication via Login with Amazon (LWA) with automatic token refresh.
      flows:
        authorizationCode:
          authorizationUrl: https://sellercentral.amazon.com/apps/authorize/consent
          tokenUrl: https://api.amazon.com/auth/o2/token
          refreshUrl: https://api.amazon.com/auth/o2/token
          scopes: {}
      x-airbyte-token-refresh:
        auth_style: body
        body_format: form
      x-airbyte-auth-config:
        title: "Login with Amazon OAuth 2.0"
        type: object
        required:
          - lwa_app_id
          - lwa_client_secret
          - refresh_token
        properties:
          lwa_app_id:
            type: string
            title: "LWA Client ID"
            description: "Your Login with Amazon Client ID."
          lwa_client_secret:
            type: string
            title: "LWA Client Secret"
            description: "Your Login with Amazon Client Secret."
          refresh_token:
            type: string
            title: "Refresh Token"
            description: "The Refresh Token obtained via the OAuth authorization flow."
          access_token:
            type: string
            title: "Access Token"
            description: "Access token (optional if refresh_token is provided)."
        auth_mapping:
          client_id: "${lwa_app_id}"
          client_secret: "${lwa_client_secret}"
          refresh_token: "${refresh_token}"
          access_token: "${access_token}"
        additional_headers:
          x-amz-access-token: "{{ access_token }}"
        replication_auth_key_mapping:
          lwa_app_id: "lwa_app_id"
          lwa_client_secret: "lwa_client_secret"
          refresh_token: "refresh_token"
        replication_auth_key_constants:
          auth_type: "oauth2.0"

  schemas:
    Order:
      type: object
      x-airbyte-entity-name: orders
      x-airbyte-stream-name: Orders
      x-airbyte-ai-hints:
        summary: "Amazon seller orders with status, totals, shipping details, and marketplace info"
        when_to_use: "Questions about orders, sales volume, order status, shipping, or revenue"
        trigger_phrases: ["orders", "sales", "order status", "shipped", "revenue", "purchases"]
        freshness: live
        search_strategy: >-
          When searching for orders, use the list orders endpoint with date filters
          (CreatedAfter/CreatedBefore or LastUpdatedAfter/LastUpdatedBefore). Filter by
          OrderStatuses for specific states (Shipped, Unshipped, Canceled, etc.). The
          MarketplaceId field on each order indicates which Amazon marketplace it was placed on.
          To drill into order contents, use the order_items entity with the AmazonOrderId.
        example_questions:
          - "How many orders were placed this week?"
          - "Show me all shipped orders from last month"
          - "What is the total revenue from orders in the last 30 days?"
      description: Amazon order object
      required:
        - AmazonOrderId
      properties:
