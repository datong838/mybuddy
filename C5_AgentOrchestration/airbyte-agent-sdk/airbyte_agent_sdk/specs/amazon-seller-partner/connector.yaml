        summary: "Search the Amazon product catalog by keywords or product identifiers (ASIN, UPC, EAN, etc.)"
        when_to_use: "When the user asks about products, catalog items, product details, or wants to search by keyword or product identifier"
        trigger_phrases: ["search catalog", "find product", "look up ASIN", "product details", "catalog search", "find item"]
        freshness: live
        search_strategy: >-
          marketplaceIds is auto-injected from the configured region — do not ask the user for it.
          Use keywords for text-based product search, or identifiers with identifiersType for
          lookup by ASIN, UPC, EAN, ISBN, etc. You must provide either keywords or identifiers
          (not both). When using identifiers, identifiersType is required (e.g. ASIN, UPC).
          The includedData parameter controls what data is returned — default is "summaries"
          which includes brand, title, and classification. Other options: identifiers, images,
          productTypes, salesRanks, dimensions, relationships, vendorDetails.
        example_questions:
          - "Search for wireless headphones in the Amazon catalog"
          - "Look up product details for ASIN B08N5WRWNW"
          - "Find products by UPC 012345678901"
      parameters:
        - name: marketplaceIds
          in: query
          required: true
          description: >-
            A marketplace identifier. This is auto-injected from the configured seller region —
            do not ask the user for a marketplace ID. Each Amazon marketplace has a unique ID
            (e.g. ATVPDKIKX0DER for US, A1PA6795UKMFR9 for DE). The correct ID is resolved
            automatically from the region setting.
