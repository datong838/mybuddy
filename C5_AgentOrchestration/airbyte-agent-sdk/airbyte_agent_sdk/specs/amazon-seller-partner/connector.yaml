      x-airbyte-record-extractor: $.reports
      x-airbyte-meta-extractor:
        next_token: $.nextToken
      x-airbyte-ai-hints:
        summary: "List SP-API report metadata with optional filters for report type, status, marketplace, and creation date"
        when_to_use: "When the user asks about generated reports, report status, or wants to find reports by type or date"
        trigger_phrases: ["list reports", "report status", "my reports", "generated reports", "find report"]
        freshness: live
        search_strategy: >-
          marketplaceIds is auto-injected from the configured region — do not ask the user for it.
          Use createdSince and createdUntil to filter by report creation date range — both must be
          in ISO 8601 format (e.g. 2024-01-01T00:00:00Z). Use reportTypes to filter by specific
          report types (e.g. GET_FLAT_FILE_ALL_ORDERS_DATA_BY_ORDER_DATE_GENERAL). Use
          processingStatuses to filter by status: IN_QUEUE, IN_PROGRESS, DONE, CANCELLED, FATAL.
          This endpoint returns report metadata only — use the reportDocumentId from a DONE report
          to download the actual report content.
        example_questions:
          - "Show me all completed reports from the last week"
          - "List reports that are currently processing"
          - "Find order reports created this month"
      parameters:
