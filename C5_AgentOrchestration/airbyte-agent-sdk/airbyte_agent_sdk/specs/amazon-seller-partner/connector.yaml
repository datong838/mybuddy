      - "List all orders from the last 7 days"
      - "Show me shipped orders from January 2024"
      - "Show me order items for order 111-2222222-3333333"
      - "List financial event groups from the last 90 days"
      - "Show refund events from last month"
      - "Search the catalog for wireless headphones"
      - "Look up product details for ASIN B08N5WRWNW"
      - "List completed reports from this week"
    search:
      - "What are my top-selling products by order volume this month?"
      - "Show orders with status Shipped from the last 30 days"
      - "Find all refund financial events from last quarter"
      - "Which orders have the highest total value this week?"
      - "How many orders were canceled in the last 60 days?"
      - "What service fees were charged last month?"
    unsupported:
      - "Create a new order"
      - "Cancel an order"
      - "Submit a new report request"
      - "Update product listings"
      - "Change the marketplace region"

servers:
  - url: "https://sellingpartnerapi-{region}.amazon.com"
    description: Amazon SP-API regional endpoint (varies by seller marketplace)
    variables:
      region:
        default: na
        description: >-
          The seller's marketplace region. This determines both the API endpoint and the
          marketplace ID used for queries. Select the country code where you sell:

          North America (NA endpoint): US (Amazon.com), CA (Amazon.ca), MX (Amazon.com.mx), BR (Amazon.com.br)

          Europe (EU endpoint): DE (Amazon.de), FR (Amazon.fr), IT (Amazon.it), ES (Amazon.es),
          UK/GB (Amazon.co.uk), NL (Amazon.nl), SE (Amazon.se), PL (Amazon.pl),
          BE (Amazon.com.be), TR (Amazon.com.tr), EG (Amazon.eg), SA (Amazon.sa),
          AE (Amazon.ae), IN (Amazon.in), ZA (Amazon.co.za)

          Far East (FE endpoint): JP (Amazon.co.jp), AU (Amazon.com.au), SG (Amazon.sg)

          The region is automatically mapped to the correct API endpoint (na/eu/fe) and
          marketplace ID. You only need to specify your country code.
        enum:
          - US
          - CA
          - MX
          - BR
          - NA
          - EU
          - DE
          - FR
          - IT
          - ES
          - UK
          - GB
          - IN
          - AE
          - SA
          - PL
          - NL
          - SE
          - EG
          - TR
          - BE
          - ZA
          - JP
          - AU
          - SG
          - FE
    x-airbyte-replication-environment-mapping:
      region:
        source: region
        format: >-
          {{ 'na' if value|upper in ['US', 'CA', 'MX', 'BR', 'NA']
              else 'eu' if value|upper in ['EU', 'DE', 'FR', 'IT', 'ES', 'UK', 'GB', 'IN', 'AE', 'SA', 'PL', 'NL', 'SE', 'EG', 'TR', 'BE', 'ZA']
              else 'fe' if value|upper in ['JP', 'AU', 'SG', 'FE']
              else 'na' }}
    x-airbyte-replication-environment-constants:
      aws_environment: "PRODUCTION"
      account_type: "Seller"

security:
  - oauth2: []

paths:
  /orders/v0/orders:
    get:
      summary: List orders
      description: Returns a list of orders based on the specified parameters.
      operationId: listOrders
      x-airbyte-entity: orders
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.payload.Orders
      x-airbyte-meta-extractor:
        next_token: $.payload.NextToken
      x-airbyte-ai-hints:
        summary: "List Amazon seller orders with optional date range and status filters"
        when_to_use: "When the user asks about their Amazon orders, recent sales, order history, or wants to filter orders by date or status"
        trigger_phrases: ["list orders", "recent orders", "my orders", "order history", "sales this month", "shipped orders"]
        freshness: live
        search_strategy: >-
          MarketplaceIds is auto-injected from the configured region — do not ask the user for it.
          To filter orders by date, use CreatedAfter/CreatedBefore for order creation date range, or
          LastUpdatedAfter/LastUpdatedBefore for last-modified date range. You must provide either
          CreatedAfter or LastUpdatedAfter — the API requires at least one. All dates must be in
          ISO 8601 format (e.g. 2024-01-15T00:00:00Z). Use OrderStatuses to filter by status
          (e.g. Shipped, Unshipped, Canceled). When the user says "last 30 days", compute the date
          and pass it as CreatedAfter.
        example_questions:
          - "Show me all orders from the last 7 days"
          - "List shipped orders from January 2024"
          - "What orders were updated today?"
      parameters:
        - name: MarketplaceIds
          in: query
          required: true
          description: >-
            A list of MarketplaceId values. Used to select orders placed in the specified marketplaces.
            This is auto-injected from the configured seller region — do not ask the user for a
            marketplace ID. Each Amazon marketplace has a unique ID (e.g. ATVPDKIKX0DER for US,
            A1PA6795UKMFR9 for DE). The correct ID is resolved automatically from the region
            setting (US, CA, MX, BR, DE, FR, IT, ES, UK, IN, JP, AU, SG, etc.).
          schema:
            type: string
          x-airbyte-param-config-inject:
            source: region
            map:
              US: "ATVPDKIKX0DER"
              CA: "A2EUQ1WTGCTBG2"
              MX: "A1AM78C64UM0Y8"
              BR: "A2Q3Y263D00KWC"
              NA: "ATVPDKIKX0DER"
              DE: "A1PA6795UKMFR9"
              FR: "A13V1IB3VIYZZH"
              IT: "APJ6JRA9NG5V4"
              ES: "A1RKKUPIHCS9HS"
              UK: "A1F83G8C2ARO7P"
              GB: "A1F83G8C2ARO7P"
              IN: "A21TJRUUN4KGV"
              AE: "A2VIGQ35RCS4UG"
              SA: "A17E79C6D8DWNP"
              PL: "A1C3SOZRARQ6R3"
              NL: "A1805IZSGTT6HS"
              SE: "A2NODRKZP88ZB9"
              EG: "ARBP9OOSHTCHU"
              TR: "A33AVAJ2PDY3EV"
              BE: "AMEN7PMS3EDWL"
              EU: "A1PA6795UKMFR9"
              JP: "A1VC38T7YXB528"
              AU: "A39IBJ37TRP1C6"
              SG: "A19VAU5U5O7RUS"
              FE: "A1VC38T7YXB528"
              ZA: "AE08WJ6YKNBMC"
        - name: CreatedAfter
          in: query
          description: >-
            A date used for selecting orders created after the specified date. Must be in
            ISO 8601 date-time format (e.g. 2024-01-15T00:00:00Z). Required if LastUpdatedAfter
            is not specified — the API requires at least one of CreatedAfter or LastUpdatedAfter.
            Use this to scope orders by creation date. For example, to get orders from the last
            30 days, set this to a date 30 days ago.
          schema:
            type: string
            format: date-time
            default: "{{ (now_utc() - duration('P730D')).strftime('%Y-%m-%dT%H:%M:%SZ') }}"
        - name: CreatedBefore
          in: query
          description: >-
            A date used for selecting orders created before the specified date. Must be in
            ISO 8601 date-time format (e.g. 2024-02-15T23:59:59Z). Use together with
            CreatedAfter to define a creation date range. If omitted, defaults to now.
          schema:
            type: string
            format: date-time
        - name: LastUpdatedAfter
          in: query
          description: >-
            A date used for selecting orders that were last updated after the specified date.
            Must be in ISO 8601 date-time format (e.g. 2024-01-15T00:00:00Z). Required if
            CreatedAfter is not specified — the API requires at least one of these. Use this
            when you want orders that changed recently (e.g. status updates, shipment changes).
          schema:
            type: string
            format: date-time
        - name: LastUpdatedBefore
          in: query
          description: >-
            A date used for selecting orders that were last updated before the specified date.
            Must be in ISO 8601 date-time format (e.g. 2024-02-15T23:59:59Z). Use together
            with LastUpdatedAfter to define an update date range. If omitted, defaults to now.
          schema:
            type: string
            format: date-time
        - name: OrderStatuses
          in: query
          description: >-
            Filter by order status values. Comma-separated list of statuses:
            Pending, Unshipped, PartiallyShipped, Shipped, Canceled, Unfulfillable,
            InvoiceUnconfirmed, PendingAvailability. Example: "Shipped,Unshipped".
          schema:
            type: string
        - name: MaxResultsPerPage
          in: query
          description: Maximum number of results to return per page (1-100, default 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: NextToken
          in: query
          description: A string token returned in a previous response for pagination.
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersList"

  /orders/v0/orders/{orderId}:
    get:
      summary: Get an order
      description: Returns the order indicated by the specified order ID.
      operationId: getOrder
      x-airbyte-entity: orders
      x-airbyte-action: get
      x-airbyte-untested: true
      x-airbyte-record-extractor: $.payload
      x-airbyte-ai-hints:
        summary: "Get details for a specific Amazon order by order ID"
        when_to_use: "When the user asks about a specific order by its Amazon order ID"
        trigger_phrases: ["order details", "get order", "order info", "specific order", "look up order"]
        freshness: live
        search_strategy: >-
          Requires an Amazon order ID in 3-7-7 format (e.g. 111-2222222-3333333). If the user
          provides an order ID, use it directly. If they describe an order without an ID, first
          list orders to find the matching AmazonOrderId, then use this endpoint.
        example_questions:
          - "Get details for order 111-2222222-3333333"
          - "Show me the status of a specific order"
      parameters:
        - name: orderId
          in: path
          required: true
          description: >-
            An Amazon order identifier in 3-7-7 format (e.g. 111-2222222-3333333).
            This is the AmazonOrderId returned by the list orders endpoint.
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found

  /orders/v0/orders/{orderId}/orderItems:
    get:
      summary: List order items
      description: Returns detailed order item information for the order indicated by the specified order ID.
      operationId: listOrderItems
      x-airbyte-entity: order_items
      x-airbyte-action: list
      x-airbyte-untested: true
      x-airbyte-record-extractor: $.payload.OrderItems
      x-airbyte-meta-extractor:
        next_token: $.payload.NextToken
      x-airbyte-ai-hints:
        summary: "List individual items within a specific Amazon order"
        when_to_use: "When the user asks about products in an order, item details, prices, or quantities for a specific order"
        trigger_phrases: ["order items", "products in order", "what was ordered", "items shipped", "order contents"]
        freshness: live
        search_strategy: >-
          Requires an Amazon order ID (3-7-7 format). First list orders to find the AmazonOrderId,
          then use this endpoint to get the individual items. Each item includes ASIN, title,
          quantity, price, and shipping details. Use the orders entity to find orders by date
          range, then drill into items for a specific order.
        example_questions:
          - "What items were in order 111-2222222-3333333?"
          - "Show me the products and prices for my latest order"
      parameters:
        - name: orderId
          in: path
          required: true
          description: >-
            An Amazon order identifier in 3-7-7 format (e.g. 111-2222222-3333333).
            This is the AmazonOrderId returned by the list orders endpoint.
          schema:
            type: string
        - name: NextToken
          in: query
          description: A string token returned in a previous response for pagination.
          schema:
            type: string
      responses:
        "200":
          description: List of order items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItemsList"

  /finances/v0/financialEventGroups:
    get:
      summary: List financial event groups
      description: Returns financial event groups for a given date range.
      operationId: listFinancialEventGroups
      x-airbyte-entity: list_financial_event_groups
      x-airbyte-action: list
      x-airbyte-record-extractor: $.payload.FinancialEventGroupList
      x-airbyte-meta-extractor:
        next_token: $.payload.NextToken
      x-airbyte-ai-hints:
        summary: "List financial event groups (settlement periods) with optional date range filters"
        when_to_use: "When the user asks about financial settlements, payment groups, disbursements, or settlement periods"
        trigger_phrases: ["financial groups", "settlements", "payment periods", "disbursements", "fund transfers"]
        freshness: live
        search_strategy: >-
          Use FinancialEventGroupStartedAfter and FinancialEventGroupStartedBefore to scope
          results to a date range. Both dates must be in ISO 8601 format (e.g. 2024-01-01T00:00:00Z).
          If no dates are provided, the API returns all available groups. Each group represents a
          settlement period with an OriginalTotal, processing status, and fund transfer details.
          For recent settlements, set FinancialEventGroupStartedAfter to a date a few months back.
        example_questions:
          - "Show me financial settlement groups from last quarter"
          - "What disbursements have been processed this month?"
          - "List all open financial event groups"
      parameters:
        - name: FinancialEventGroupStartedAfter
          in: query
          description: >-
            Return groups that started after this date. Must be in ISO 8601 date-time format
            (e.g. 2024-01-01T00:00:00Z). Use this to scope results to a specific time period.
            For example, to see settlements from the last 90 days, set this to 90 days ago.
          schema:
            type: string
            format: date-time
            default: "{{ (now_utc() - duration('P730D')).strftime('%Y-%m-%dT%H:%M:%SZ') }}"
        - name: FinancialEventGroupStartedBefore
          in: query
          description: >-
            Return groups that started before this date. Must be in ISO 8601 date-time format
            (e.g. 2024-03-31T23:59:59Z). Use together with FinancialEventGroupStartedAfter
            to define a date range. If omitted, defaults to now.
          schema:
            type: string
            format: date-time
        - name: MaxResultsPerPage
          in: query
          description: Maximum number of results to return per page (1-100, default 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: NextToken
          in: query
          description: A string token returned in a previous response for pagination.
          schema:
            type: string
      responses:
        "200":
          description: List of financial event groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialEventGroupList"

  /finances/v0/financialEvents:
    get:
      summary: List financial events
      description: Returns financial events for a given date range.
      operationId: listFinancialEvents
      x-airbyte-entity: list_financial_events
      x-airbyte-action: list
      x-airbyte-record-extractor: $.payload.FinancialEvents
      x-airbyte-meta-extractor:
        next_token: $.payload.NextToken
      x-airbyte-ai-hints:
        summary: "List individual financial events (shipments, refunds, fees, etc.) with optional date range filters"
        when_to_use: "When the user asks about specific financial transactions, refunds, fees, shipment charges, or detailed financial activity"
        trigger_phrases: ["financial events", "refunds", "fees", "charges", "shipment events", "financial transactions"]
        freshness: live
        search_strategy: >-
          Use PostedAfter and PostedBefore to scope results to a date range. Both dates must be
          in ISO 8601 format (e.g. 2024-01-01T00:00:00Z). The response contains categorized
          event lists: ShipmentEventList, RefundEventList, ServiceFeeEventList, AdjustmentEventList,
          and many more. Each event type is a separate array. When the user asks about refunds,
          look at RefundEventList; for fees, look at ServiceFeeEventList; for chargebacks, look
          at ChargebackEventList. Always recommend scoping to a manageable date range (e.g. last
          30 days) to avoid excessive data.
        example_questions:
          - "Show me all refund events from the last 30 days"
          - "What service fees were charged this month?"
          - "List financial events including shipment charges for last week"
      parameters:
        - name: PostedAfter
          in: query
          description: >-
            Return events posted after this date. Must be in ISO 8601 date-time format
            (e.g. 2024-01-01T00:00:00Z). Recommended for scoping results to a manageable
            date range. For recent activity, set this to 30 days ago.
          schema:
            type: string
            format: date-time
            default: "{{ (now_utc() - duration('P730D')).strftime('%Y-%m-%dT%H:%M:%SZ') }}"
        - name: PostedBefore
          in: query
          description: >-
            Return events posted before this date. Must be in ISO 8601 date-time format
            (e.g. 2024-01-31T23:59:59Z). Use together with PostedAfter to define a date
            range. If omitted, defaults to now.
          schema:
            type: string
            format: date-time
        - name: MaxResultsPerPage
          in: query
          description: Maximum number of results to return per page (1-100, default 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: NextToken
          in: query
          description: A string token returned in a previous response for pagination.
          schema:
            type: string
      responses:
        "200":
          description: Financial events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialEventsResponse"

