openapi: 3.1.0

info:
  title: Amazon Seller Partner API Connector
  version: 1.0.5
  description: >
    Connector for the Amazon Selling Partner API (SP-API). Provides access to
    seller orders and order items, financial events and event groups, catalog
    item search and details, and report metadata. Supports OAuth 2.0
    authentication via Login with Amazon (LWA) with automatic token refresh.
  x-airbyte-connector-name: amazon-seller-partner
  x-airbyte-connector-definition-id: e55879a8-0ef8-4557-abcf-ab34c53ec460
  x-airbyte-replication-version: "5.7.10"
  x-airbyte-replication-compatibility: ">=5.7.10, <6.0.0"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: SP-API Documentation
      url: https://developer-docs.amazon.com/sp-api/
    - type: api_deprecations
      title: SP-API Deprecation Schedule
      url: https://developer-docs.amazon.com/sp-api/docs/sp-api-deprecations
    - type: api_release_history
      title: SP-API Release Notes
      url: https://developer-docs.amazon.com/sp-api/docs/sp-api-release-notes
  x-airbyte-skip-auth-methods:
    - customauthenticator
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Amazon Seller Partner.
    properties:
      replication_start_date:
        type: string
        title: Start Date
        description: >-
          UTC date and time in ISO 8601 format (e.g. 2024-01-01T00:00:00Z). Any data
          before this date will not be replicated. This sets the earliest date for
          order creation and financial event queries. For most sellers, a start date
          of 1-2 years ago is a good default. Must include the time component and Z
          timezone suffix.
        format: date-time
    required:
      - replication_start_date
    replication_config_key_mapping:
      replication_start_date: replication_start_date
    replication_config_constants:
      replication_start_date: "{{ day_delta(-180, '%Y-%m-%dT%H:%M:%SZ') }}"
  x-airbyte-entity-relationships:
    - source_entity: order_items
      target_entity: orders
      foreign_key: orderId
      target_key: AmazonOrderId
      cardinality: many_to_one
  x-airbyte-context-store:
    disable_compaction: true
    entities:
      - entity: orders
        suggested: true
        x-airbyte-name: Orders
        fields:
          - name: AmazonOrderId
            type: ["null", "string"]
            description: Unique identifier for the Amazon order
          - name: AutomatedShippingSettings
            type: ["null", "object"]
            description: Settings related to automated shipping processes
            properties:
              HasAutomatedShippingSettings:
                type: ["null", "boolean"]
          - name: BuyerInfo
            type: ["null", "object"]
            description: Information about the buyer
          - name: DefaultShipFromLocationAddress
            type: ["null", "object"]
            description: The default address from which orders are shipped
            properties:
              AddressLine1:
                type: ["null", "string"]
              City:
                type: ["null", "string"]
              CountryCode:
                type: ["null", "string"]
              Name:
                type: ["null", "string"]
              PostalCode:
                type: ["null", "string"]
              StateOrRegion:
                type: ["null", "string"]
          - name: EarliestDeliveryDate
            type: ["null", "string"]
            description: Earliest estimated delivery date of the order
          - name: EarliestShipDate
            type: ["null", "string"]
            description: Earliest shipment date for the order
          - name: FulfillmentChannel
            type: ["null", "string"]
            description: Channel through which the order is fulfilled
          - name: HasRegulatedItems
            type: ["null", "boolean"]
            description: Indicates if the order has regulated items
          - name: IsAccessPointOrder
            type: ["null", "boolean"]
            description: Indicates if the order is an Amazon Hub Counter order
          - name: IsBusinessOrder
            type: ["null", "boolean"]
            description: Indicates if the order is a business order
          - name: IsGlobalExpressEnabled
            type: ["null", "boolean"]
            description: Indicates if global express is enabled for the order
          - name: IsISPU
            type: ["null", "boolean"]
            description: Indicates if the order is for In-Store Pickup
          - name: IsPremiumOrder
            type: ["null", "boolean"]
            description: Indicates if the order is a premium order
          - name: IsPrime
            type: ["null", "boolean"]
            description: Indicates if the order is a Prime order
          - name: IsReplacementOrder
            type: ["null", "string"]
            description: Indicates if the order is a replacement order
          - name: IsSoldByAB
            type: ["null", "boolean"]
            description: Indicates if the order is sold by Amazon Business
          - name: LastUpdateDate
            type: ["null", "string"]
            description: Date and time when the order was last updated
          - name: LatestDeliveryDate
