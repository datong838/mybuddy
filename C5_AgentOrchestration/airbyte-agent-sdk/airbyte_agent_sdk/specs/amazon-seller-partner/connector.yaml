    Report:
      type: object
      x-airbyte-entity-name: reports
      x-airbyte-ai-hints:
        summary: "SP-API report metadata including report type, processing status, data date range, and document ID"
        when_to_use: "Questions about report status, available reports, report types, or finding report documents"
        trigger_phrases: ["reports", "report status", "report type", "report document", "download report"]
        freshness: live
        search_strategy: >-
          Reports have a processingStatus lifecycle: IN_QUEUE -> IN_PROGRESS -> DONE (or CANCELLED/FATAL).
          The dataStartTime and dataEndTime fields indicate what date range the report data covers.
          The createdTime is when the report was requested. When a report is DONE, the
          reportDocumentId can be used to download the actual report content. Use createdSince/
          createdUntil date filters (ISO 8601 format) to find reports by creation date.
        example_questions:
          - "What reports have completed processing recently?"
          - "Are there any failed reports?"
          - "Show me the latest order data report"
      description: Amazon SP-API report
      required:
        - reportId
      properties:
        reportId:
          type: string
          description: Unique identifier for the report
        reportType:
          type: string
          description: The type of report
        createdTime:
          type: string
          format: date-time
          description: When the report was created
        processingStatus:
          type: string
          description: Processing status of the report
          enum:
            - IN_QUEUE
            - IN_PROGRESS
            - DONE
            - CANCELLED
            - FATAL
        dataStartTime:
          type: string
          format: date-time
          description: Start of the report data date range
        dataEndTime:
          type: string
          format: date-time
          description: End of the report data date range
        reportScheduleId:
          type: string
          description: Schedule that created this report
        processingStartTime:
          type: string
          format: date-time
          description: When processing started
        processingEndTime:
          type: string
          format: date-time
          description: When processing ended
        reportDocumentId:
          type: string
          description: Document ID for downloading the report (available when DONE)
        marketplaceIds:
          type: array
          description: Marketplaces the report covers
          items:
            type: string

    ReportsList:
      type: object
      description: Paginated list of reports
      properties:
        reports:
          type: array
          items:
            $ref: "#/components/schemas/Report"
        nextToken:
          type: string
          description: Pagination token for next page
