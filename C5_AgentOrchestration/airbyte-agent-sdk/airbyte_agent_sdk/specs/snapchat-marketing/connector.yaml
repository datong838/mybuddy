servers:
- url: https://adsapi.snapchat.com/v1
  description: Snapchat Marketing API server

security:
- oauth2: []

paths:
  /me/organizations:
    get:
      summary: List organizations
      description: Returns the organizations the authenticated user belongs to
      operationId: listOrganizations
      x-airbyte-entity: organizations
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.organizations[*].organization
      x-airbyte-meta-extractor:
        next_link: $.paging.next_link
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  organizations:
                    type: array
                    items:
                      type: object
                      properties:
                        sub_request_status:
                          type: string
                        organization:
                          $ref: "#/components/schemas/Organization"
                  paging:
                    type: object
                    properties:
                      next_link:
                        type: string
        "401":
          description: Unauthorized

  /organizations/{id}:
    get:
      summary: Get an organization
      description: Get a single organization by ID
      operationId: getOrganization
      x-airbyte-entity: organizations
      x-airbyte-action: get
      x-airbyte-record-extractor: $.organizations[0].organization
      parameters:
      - name: id
        in: path
        required: true
        description: Organization ID
        schema:
          type: string
      responses:
        "200":
          description: Organization object
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  organizations:
                    type: array
                    items:
                      type: object
                      properties:
                        sub_request_status:
                          type: string
                        organization:
                          $ref: "#/components/schemas/Organization"
        "404":
          description: Organization not found
        "401":
          description: Unauthorized

  /organizations/{organization_id}/adaccounts:
    get:
      summary: List ad accounts
      description: Returns ad accounts belonging to an organization
      operationId: listAdAccounts
      x-airbyte-entity: adaccounts
      x-airbyte-action: list
      x-airbyte-record-extractor: $.adaccounts[*].adaccount
      x-airbyte-meta-extractor:
        next_link: $.paging.next_link
      parameters:
      - name: organization_id
        in: path
        required: true
        description: Organization ID
        schema:
          type: string
      responses:
        "200":
          description: List of ad accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  adaccounts:
                    type: array
                    items:
                      type: object
                      properties:
                        sub_request_status:
                          type: string
                        adaccount:
                          $ref: "#/components/schemas/AdAccount"
                  paging:
                    type: object
                    properties:
                      next_link:
                        type: string
        "401":
          description: Unauthorized

  /adaccounts/{id}:
    get:
      summary: Get an ad account
      description: Get a single ad account by ID
      operationId: getAdAccount
      x-airbyte-entity: adaccounts
      x-airbyte-action: get
      x-airbyte-record-extractor: $.adaccounts[0].adaccount
      parameters:
      - name: id
        in: path
        required: true
        description: Ad Account ID
        schema:
          type: string
      responses:
        "200":
          description: Ad account object
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  adaccounts:
                    type: array
                    items:
                      type: object
                      properties:
                        sub_request_status:
                          type: string
                        adaccount:
                          $ref: "#/components/schemas/AdAccount"
        "404":
          description: Ad account not found
        "401":
          description: Unauthorized

  /adaccounts/{ad_account_id}/campaigns:
    get:
      summary: List campaigns
      description: Returns campaigns belonging to an ad account
      operationId: listCampaigns
      x-airbyte-entity: campaigns
      x-airbyte-action: list
      x-airbyte-record-extractor: $.campaigns[*].campaign
      x-airbyte-meta-extractor:
        next_link: $.paging.next_link
      parameters:
      - name: ad_account_id
        in: path
        required: true
        description: Ad Account ID
        schema:
          type: string
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_status:
                    type: string
                  request_id:
                    type: string
                  campaigns:
                    type: array
