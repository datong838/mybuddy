  /adsquads/{id}:
    get:
      summary: Get an ad squad
      description: Get a single ad squad by ID
      operationId: getAdSquad
      x-airbyte-entity: adsquads
      x-airbyte-action: get
      x-airbyte-record-extractor: $.adsquads[0].adsquad
