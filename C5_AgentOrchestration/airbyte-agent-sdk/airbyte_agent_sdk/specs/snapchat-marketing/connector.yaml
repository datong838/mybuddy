openapi: 3.1.0

info:
  title: Snapchat Marketing API Connector
  version: 1.0.5
  description: >
    Connector for the Snapchat Marketing API (Ads API). Provides access to
    Snapchat advertising entities including organizations, ad accounts,
    campaigns, ad squads, ads, creatives, media, and audience segments.
    Supports OAuth2 authentication with automatic token refresh.
  x-airbyte-connector-name: snapchat-marketing
  x-airbyte-connector-definition-id: 200330b2-ea62-4d11-ac6d-cfe3e3f8ab2b
  x-airbyte-replication-version: "1.5.40"
  x-airbyte-replication-compatibility: ">=1.5.40, <2.0.0"
  x-airbyte-external-documentation-urls:
  - type: api_reference
    title: Snapchat Marketing API Documentation
    url: https://developers.snap.com/api/marketing-api/Ads-API/introduction
  x-airbyte-example-questions:
    direct:
    - "List all organizations I belong to"
    - "Show me all ad accounts for my organization"
    - "List all campaigns in my ad account"
    - "Show me the ad squads for my ad account"
    - "List all ads in my ad account"
    - "Show me the creatives for my ad account"
    - "List all media files in my ad account"
    - "Show me the audience segments in my ad account"
    search:
    - "Which campaigns are currently active?"
    - "What ad squads have the highest daily budget?"
    - "Show me ads that are pending review"
    - "Find campaigns created in the last month"
    unsupported:
    - "Create a new campaign"
    - "Update an ad's status"
    - "Delete a creative"
    - "Show me ad performance statistics"
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Snapchat Marketing.
    properties:
      start_date:
        type: string
        title: Start Date
        description: Date in YYYY-MM-DD format. Data before this date will not be replicated.
        format: date
    required:
    - start_date
    replication_config_key_mapping:
      start_date: start_date
  x-airbyte-entity-relationships:
  - source_entity: adaccounts
    target_entity: organizations
    foreign_key: organization_id
    target_key: id
    cardinality: many_to_one
  - source_entity: campaigns
    target_entity: adaccounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: adsquads
    target_entity: adaccounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: ads
    target_entity: adaccounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: creatives
    target_entity: adaccounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: media
    target_entity: adaccounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: segments
    target_entity: adaccounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
