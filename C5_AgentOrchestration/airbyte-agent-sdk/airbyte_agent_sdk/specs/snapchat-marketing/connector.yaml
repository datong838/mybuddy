components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication with Snapchat
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.snapchat.com/login/oauth2/authorize
          tokenUrl: https://accounts.snapchat.com/login/oauth2/access_token
          refreshUrl: https://accounts.snapchat.com/login/oauth2/access_token
          scopes:
            snapchat-marketing-api: Read and write access to Snapchat Marketing APIs
      x-airbyte-auth-config:
        type: object
        required:
        - client_id
        - client_secret
        - refresh_token
        properties:
          client_id:
            type: string
            title: Client ID
            description: The Client ID of your Snapchat developer application
          client_secret:
            type: string
            title: Client Secret
            description: The Client Secret of your Snapchat developer application
          refresh_token:
            type: string
            title: Refresh Token
            description: Refresh Token to renew the expired Access Token
        auth_mapping:
          client_id: "${client_id}"
          client_secret: "${client_secret}"
          refresh_token: "${refresh_token}"
        replication_auth_key_mapping:
          client_id: "client_id"
          client_secret: "client_secret"
          refresh_token: "refresh_token"

  schemas:
