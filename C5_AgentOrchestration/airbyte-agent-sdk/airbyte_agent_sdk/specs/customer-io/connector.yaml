      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Collection name, referenced in Liquid as collection_name.property
        data:
          type: array
          description: Inline collection data (array of objects). Provide either data or url, not both.
          items:
            type: object
        url:
          type: string
          description: URL to a CSV or JSON file containing collection data. Provide either data or url, not both.

    CollectionUpdateParams:
      type: object
      properties:
        name:
          type: string
          description: Rename the collection
        data:
          type: array
          description: Replace collection data entirely (array of objects). Provide either data or url, not both.
          items:
            type: object
        url:
          type: string
          description: Replace the URL source for collection data. Provide either data or url, not both.

    ReportingWebhookCreateParams:
      type: object
      required:
        - name
        - endpoint
        - events
      properties:
        name:
          type: string
          description: Webhook display name
        endpoint:
          type: string
          description: The URL to receive webhook notifications
        events:
          type: array
          description: >
            Event types to report (e.g. customer_subscribed, email_sent,
            email_opened, email_clicked, email_bounced, email_converted,
            email_unsubscribed, sms_sent, sms_delivered, push_sent)
          items:
            type: string
        disabled:
          type: boolean
          description: Whether the webhook should be disabled initially
        full_resolution:
          type: boolean
          description: Send all events instead of only unique events
        with_content:
          type: boolean
          description: Include the message body in sent events

    ReportingWebhookUpdateParams:
      type: object
      required:
        - name
        - endpoint
        - events
      properties:
        name:
          type: string
          description: Webhook display name
