  # ── Broadcast Trigger ──────────────────────────────────
  /v1/campaigns/{campaign_id}/triggers:
    post:
      summary: Trigger an API-triggered broadcast
      description: >
        Triggers an API-triggered broadcast campaign. The broadcast must
        be configured as API-triggered in the Customer.io UI. Cannot be
        triggered more than once every 10 seconds, with a maximum of 5
        queued broadcasts per campaign. Recipients must already exist in
        the workspace.
      operationId: triggerBroadcast
      x-airbyte-entity: broadcast_trigger
      x-airbyte-action: create
      x-airbyte-untested: true
      x-airbyte-ai-hints:
        summary: "Trigger an API-triggered broadcast campaign to send messages to a group of people"
        when_to_use: "When the user wants to trigger or fire a broadcast campaign via the API"
        trigger_phrases:
          - "trigger broadcast"
          - "fire broadcast"
          - "send broadcast"
      parameters:
        - name: campaign_id
          in: path
          required: true
          description: The broadcast campaign identifier (found in Triggering Details)
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastTriggerParams"
      responses:
        "200":
          description: Broadcast triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastTriggerResponse"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "429":
          description: Rate limited (max once per 10 seconds)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        App API Key authentication. Generate an App API key in your
        Customer.io workspace settings under API Credentials.
      x-airbyte-auth-config:
        title: App API Key Authentication
        type: object
        required:
          - app_api_key
        properties:
          app_api_key:
            type: string
            title: App API Key
            description: >
              Your Customer.io App API key. Generate one in your workspace
              settings at Settings > API Credentials > App API Key.
        auth_mapping:
          token: "${app_api_key}"
        replication_auth_key_mapping:
          app_api_key: app_api_key

  schemas:
    # ── Campaign ─────────────────────────────────────────
    Campaign:
      type: object
      x-airbyte-entity-name: campaigns
      x-airbyte-ai-hints:
        summary: "Marketing campaigns including event-triggered, segment-triggered, and date-triggered workflows"
        when_to_use: "Questions about campaign configuration, state, triggers, or campaign listing"
        trigger_phrases:
          - "list campaigns"
          - "campaign status"
          - "active campaigns"
          - "marketing automation"
          - "campaign details"
        freshness: live
        search_strategy: "Search by campaign name; filter by state (active/draft/stopped) or type"
        example_questions:
          - "What campaigns are currently active?"
          - "Show me all campaigns tagged 'onboarding'"
          - "Get the details of campaign 42"
      properties:
        id:
          type:
            - "null"
            - integer
          description: Unique campaign identifier
        name:
          type:
            - "null"
            - string
          description: Campaign name
        type:
          type:
            - "null"
            - string
          description: Campaign trigger type (e.g., segment, event, date, api)
        state:
          type:
            - "null"
            - string
          description: Campaign status (draft, active, stopped)
        active:
          type:
            - "null"
            - boolean
          description: Whether the campaign is active
        created:
          type:
            - "null"
            - integer
          description: Creation timestamp (Unix)
        updated:
          type:
            - "null"
            - integer
          description: Last update timestamp (Unix)
        first_started:
          type:
            - "null"
            - integer
          description: When the campaign was first started (Unix)
        deduplicate_id:
          type:
            - "null"
            - string
          description: Deduplication identifier (format id:timestamp)
        tags:
          type:
            - "null"
            - array
          description: Tags associated with the campaign
          items:
            type: string
        actions:
          type:
            - "null"
            - array
          description: Actions defined in this campaign
          items:
            type: object
        msg_templates:
          type:
            - "null"
            - array
          description: Message templates used in the campaign
          items:
            type: object
        trigger_segment_ids:
          type:
            - "null"
            - array
          description: Segment IDs that trigger this campaign
          items:
            type: integer
        filter_segment_ids:
          type:
            - "null"
            - array
          description: Segment IDs used for filtering
          items:
            type: integer
        frequency:
          type:
            - "null"
            - string
          description: How frequently a person can receive this campaign
        event_name:
          type:
            - "null"
            - string
          description: Event name that triggers the campaign
        date_attribute:
          type:
            - "null"
            - string
          description: Date attribute used for date-triggered campaigns
        start_hour:
          type:
            - "null"
            - integer
          description: Hour of the day to trigger (24h format)
        start_minutes:
          type:
            - "null"
            - integer
          description: Minute of the hour to trigger
        timezone:
          type:
            - "null"
            - string
          description: Timezone for trigger scheduling
        use_customer_timezone:
          type:
            - "null"
            - boolean
          description: Whether to use the customer's timezone
        created_by:
          type:
            - "null"
            - string
          description: Who created the campaign
        scheduled_start:
          type:
            - "null"
            - integer
          description: Scheduled start time (Unix)
        scheduled_start_should_backfill:
          type:
            - "null"
            - boolean
          description: Whether to backfill on scheduled start
        scheduled_stop:
          type:
            - "null"
            - integer
          description: Scheduled stop time (Unix)
        scheduled_stop_should_sunset:
          type:
            - "null"
            - boolean
          description: Whether to sunset on scheduled stop

    # ── Campaign Action ──────────────────────────────────
    CampaignAction:
      type: object
      x-airbyte-entity-name: campaign_actions
      x-airbyte-stream-name: campaigns_actions
      x-airbyte-ai-hints:
        summary: "Individual actions (emails, webhooks, push notifications) within a campaign workflow"
        when_to_use: "Questions about specific campaign steps, email content, or action configuration"
        trigger_phrases:
          - "campaign actions"
          - "email content"
          - "campaign steps"
          - "action details"
          - "workflow actions"
        freshness: live
        search_strategy: "Filter by campaign_id and action type"
        example_questions:
          - "What actions are in campaign 42?"
          - "Show me all email actions for a campaign"
          - "Get the subject line of action 5 in campaign 10"
      properties:
        id:
          type:
            - "null"
            - integer
            - string
          description: Unique action identifier
        name:
          type:
            - "null"
            - string
          description: Action name
        type:
          type:
            - "null"
            - string
          description: Action type (email, webhook, twilio, push, slack, in_app, whatsapp)
        campaign_id:
          type:
            - "null"
            - integer
          description: Parent campaign ID
        created:
          type:
            - "null"
            - integer
          description: Creation timestamp (Unix)
        updated:
          type:
            - "null"
            - integer
          description: Last update timestamp (Unix)
        deduplicate_id:
          type:
            - "null"
            - string
          description: Deduplication identifier
        body:
          type:
            - "null"
            - string
          description: Action body content (HTML for emails)
        layout:
          type:
            - "null"
            - string
          description: Layout template used
        from:
          type:
            - "null"
            - string
          description: From address
        from_id:
          type:
            - "null"
            - integer
          description: Sender identity ID
        subject:
          type:
            - "null"
            - string
          description: Email subject line
        preheader_text:
          type:
            - "null"
            - string
          description: Email preheader/preview text
        recipient:
          type:
            - "null"
            - string
          description: Recipient address
        reply_to:
          type:
            - "null"
            - string
          description: Reply-to address
        reply_to_id:
          type:
            - "null"
            - integer
          description: Reply-to sender identity ID
        bcc:
          type:
            - "null"
            - string
          description: BCC addresses
        fake_bcc:
          type:
            - "null"
            - boolean
          description: Whether to use fake BCC
        headers:
          type:
            - "null"
            - string
          description: Custom email headers as JSON
        sending_state:
          type:
            - "null"
            - string
          description: Sending behavior (automatic or draft)
        language:
          type:
            - "null"
            - string
          description: Language variant
        parent_action_id:
          type:
            - "null"
            - integer
          description: Parent action ID for language variants
        preprocessor:
          type:
            - "null"
            - string
          description: CSS preprocessor setting
        body_amp:
          type:
            - "null"
            - string
          description: AMP HTML body content
        broadcast_id:
          type:
            - "null"
            - integer
          description: Parent broadcast ID
        editor:
          type:
            - "null"
            - string
          description: Editor used to create the action
        url:
          type:
            - "null"
            - string
          description: Webhook URL (for webhook actions)
        body_plain:
          type:
