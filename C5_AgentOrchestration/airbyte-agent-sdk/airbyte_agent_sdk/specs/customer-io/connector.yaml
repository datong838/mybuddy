openapi: 3.1.0

info:
  title: Customer.io App API Connector
  version: 1.0.0
  description: >
    Connector for the Customer.io App API, providing read access to campaigns,
    newsletters, segments, messages, activities, sender identities, snippets,
    collections, reporting webhooks, exports, and transactional message
    templates. Customer.io is a messaging platform that lets you send automated
    emails, push notifications, SMS, and in-app messages based on customer
    behavior. This connector retrieves data from the App API (not the Track
    API) and requires a Bearer-type App API key generated in your Customer.io
    workspace settings.
  x-airbyte-connector-name: customer-io
  x-airbyte-connector-definition-id: 34f697bc-b989-4eda-b06f-d0f39b88825b
  x-airbyte-replication-version: "0.4.5"
  x-airbyte-replication-compatibility: ">=0.4.5, <1.0.0"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Customer.io App API Documentation
      url: https://customer.io/docs/api/app/
  x-airbyte-example-questions:
    direct:
      - "List all campaigns in Customer.io"
      - "Show me all newsletters"
      - "What segments are defined in my workspace?"
      - "Get the details of campaign 42"
      - "List all sender identities"
      - "Show me all reporting webhooks"
      - "What snippets do we have?"
      - "List all collections"
      - "Show recent activities"
      - "Create a snippet called 'footer' with content '<p>Thanks!</p>'"
      - "Update the snippet 'header' to say 'Welcome back!'"
      - "Create a new collection called 'products'"
      - "Create a reporting webhook for email events"
      - "Create a manual segment called 'VIP Customers'"
      - "Export all customers matching a segment"
      - "Send a transactional email to user@example.com"
      - "Send an SMS notification to +15551234567"
      - "Send a push notification to user 123"
      - "Trigger broadcast campaign 42"
      - "List all transactional message templates"
      - "Get the details of transactional message 5"
      - "Show the content variants of transactional template 3"
      - "Update the subject of transactional content 139 in template 3"
    search:
      - "Which campaigns are currently active?"
      - "Find newsletters sent in the last month"
      - "What are the most recent email deliveries?"
      - "Which exports have completed?"
    unsupported:
      - "Create a new campaign"
      - "Delete a segment"
      - "Delete a snippet"
      - "Delete a collection"
      - "Delete a reporting webhook"
      - "Delete a newsletter"
      - "Send a newsletter via API"
      - "Schedule a newsletter via API"
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Customer.io.
    properties:
      start_date:
        type: string
        title: Start Date
        description: UTC date and time in the format YYYY-MM-DDTHH:mm:ssZ from which to start replicating data.
        format: date-time
    required:
      - start_date
    replication_config_key_mapping:
      start_date: start_date
    replication_config_constants:
      start_date: "{{ day_delta(-180, '%Y-%m-%dT%H:%M:%SZ') }}"
  x-airbyte-context-store:
    entities:
      - entity: campaigns
        x-airbyte-name: campaigns
        suggested: true
        fields:
          - name: actions
            type: ["null", "array"]
            description: Actions defined in this campaign
          - name: active
            type: ["null", "boolean"]
            description: Whether the campaign is active
          - name: created
            type: ["null", "integer"]
            description: Creation timestamp (Unix)
          - name: created_by
            type: ["null", "string"]
            description: Who created the campaign
          - name: date_attribute
            type: ["null", "string"]
            description: Date attribute used for date-triggered campaigns
          - name: deduplicate_id
            type: ["null", "string"]
            description: Deduplication identifier
          - name: event_name
            type: ["null", "string"]
            description: Event name that triggers the campaign
          - name: first_started
            type: ["null", "integer"]
            description: When the campaign was first started (Unix)
          - name: frequency
            type: ["null", "string"]
            description: How frequently a person can receive this campaign
          - name: id
            type: ["null", "integer"]
            description: Unique campaign identifier
          - name: msg_templates
            type: ["null", "array"]
            description: Message templates used in the campaign
          - name: name
            type: ["null", "string"]
            description: Campaign name
          - name: start_hour
            type: ["null", "integer"]
            description: Hour of the day to trigger
          - name: start_minutes
            type: ["null", "integer"]
            description: Minute of the hour to trigger
          - name: state
            type: ["null", "string"]
            description: Campaign status (draft, active, stopped)
          - name: tags
            type: ["null", "array"]
            description: Tags associated with the campaign
          - name: timezone
            type: ["null", "string"]
            description: Timezone for trigger scheduling
          - name: trigger_segment_ids
            type: ["null", "array"]
            description: Segment IDs that trigger this campaign
          - name: type
            type: ["null", "string"]
            description: Campaign trigger type
          - name: updated
            type: ["null", "integer"]
            description: Last update timestamp (Unix)
          - name: use_customer_timezone
            type: ["null", "boolean"]
            description: Whether to use the customer's timezone
      - entity: campaign_actions
        x-airbyte-name: campaigns_actions
        suggested: true
        fields:
          - name: bcc
            type: ["null", "string"]
            description: BCC addresses
          - name: body
            type: ["null", "string"]
            description: Action body content (HTML for emails)
          - name: campaign_id
            type: ["null", "integer"]
            description: Parent campaign ID
          - name: created
            type: ["null", "integer"]
            description: Creation timestamp (Unix)
          - name: deduplicate_id
            type: ["null", "string"]
            description: Deduplication identifier
          - name: editor
            type: ["null", "string"]
            description: Editor used to create the action
          - name: fake_bcc
            type: ["null", "boolean"]
            description: Whether to use fake BCC
          - name: from
            type: ["null", "string"]
            description: From address
          - name: from_id
            type: ["null", "string"]
            description: Sender identity ID
          - name: headers
            type: ["null", "string"]
            description: Custom email headers as JSON
          - name: id
            type: ["null", "string"]
            description: Unique action identifier
          - name: language
            type: ["null", "string"]
            description: Language variant
          - name: layout
            type: ["null", "string"]
            description: Layout template used
          - name: name
            type: ["null", "string"]
            description: Action name
          - name: parent_action_id
            type: ["null", "integer"]
            description: Parent action ID for language variants
          - name: preheader_text
            type: ["null", "string"]
            description: Email preheader/preview text
          - name: preprocessor
            type: ["null", "string"]
            description: CSS preprocessor setting
          - name: recipient
            type: ["null", "string"]
            description: Recipient address
          - name: recipient_environment_id
            type: ["null", "integer"]
            description: Recipient environment ID
          - name: reply_to
            type: ["null", "string"]
            description: Reply-to address
          - name: reply_to_id
            type: ["null", "string"]
            description: Reply-to sender identity ID
          - name: request_method
            type: ["null", "string"]
            description: HTTP request method for webhook actions
          - name: sending_state
            type: ["null", "string"]
            description: Sending behavior (automatic or draft)
          - name: subject
            type: ["null", "string"]
            description: Email subject line
          - name: type
            type: ["null", "string"]
            description: Action type (email, webhook, twilio, push, slack, in_app, whatsapp)
          - name: updated
            type: ["null", "integer"]
            description: Last update timestamp (Unix)
          - name: url
            type: ["null", "string"]
            description: Webhook URL (for webhook actions)
      - entity: newsletters
        x-airbyte-name: newsletters
        suggested: true
        fields:
          - name: content_ids
            type: ["null", "array"]
            description: Content variant IDs for this newsletter
          - name: created
            type: ["null", "integer"]
            description: Creation timestamp (Unix)
          - name: deduplicate_id
            type: ["null", "string"]
            description: Deduplication identifier
          - name: id
            type: ["null", "integer"]
            description: Unique newsletter identifier
          - name: name
            type: ["null", "string"]
            description: Newsletter name
          - name: sent_at
            type: ["null", "integer"]
            description: When the newsletter was last sent (Unix)
          - name: tags
            type: ["null", "array"]
            description: Tags associated with the newsletter
          - name: type
            type: ["null", "string"]
            description: Channel type (email, webhook, twilio, push, in_app, inbox)
          - name: updated
            type: ["null", "integer"]
            description: Last update timestamp (Unix)
  x-airbyte-entity-relationships:
    - source_entity: campaign_actions
      target_entity: campaigns
      foreign_key: campaign_id
      target_key: id
      cardinality: many_to_one
      description: Campaign actions belong to a campaign
    - source_entity: transactional_message_contents
      target_entity: transactional_messages
      foreign_key: transactional_id
      target_key: id
      cardinality: many_to_one
      description: >
        Scoping-only relationship: transactional_id is a required path
        parameter for contents endpoints, not a field on emitted records.
        Declares how to resolve the parent transactional message for
        per-entity health checks.


servers:
  - url: https://api.customer.io
    description: Customer.io App API server (US region)

security:
  - bearerAuth: []

paths:
  # ── Campaigns ──────────────────────────────────────────
  /v1/campaigns:
    get:
      summary: List campaigns
      description: Returns a list of all campaigns in the workspace.
      operationId: listCampaigns
      x-airbyte-entity: campaigns
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.campaigns
      x-airbyte-no-pagination: "Returns all campaigns in a single response without pagination"
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaigns:
                    type: array
                    items:
                      $ref: "#/components/schemas/Campaign"
        "401":
          description: Unauthorized

  /v1/campaigns/{campaign_id}:
    get:
      summary: Get a campaign
      description: Returns a single campaign by ID.
      operationId: getCampaign
      x-airbyte-entity: campaigns
      x-airbyte-action: get
      x-airbyte-record-extractor: $.campaign
      parameters:
        - name: campaign_id
          in: path
          required: true
          description: The campaign identifier
          schema:
            type: integer
      responses:
        "200":
          description: Campaign object
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign:
                    $ref: "#/components/schemas/Campaign"
        "401":
          description: Unauthorized
        "404":
          description: Campaign not found

  # ── Campaign Actions ───────────────────────────────────
  /v1/campaigns/{campaign_id}/actions:
    get:
      summary: List campaign actions
      description: Returns a paginated list of actions for a campaign.
      operationId: listCampaignActions
      x-airbyte-entity: campaign_actions
      x-airbyte-action: list
      x-airbyte-record-extractor: $.actions
      x-airbyte-meta-extractor:
        next: $.next
      parameters:
        - name: campaign_id
          in: path
          required: true
          description: The campaign identifier
          schema:
            type: integer
        - name: start
          in: query
          required: false
          description: Pagination cursor for the next page
          schema:
            type: string
      responses:
        "200":
          description: List of campaign actions
          content:
            application/json:
              schema:
                type: object
                properties:
                  actions:
                    type: array
                    items:
                      $ref: "#/components/schemas/CampaignAction"
                  next:
                    type: string
                    description: Cursor for the next page
        "401":
          description: Unauthorized
        "404":
          description: Campaign not found

  /v1/campaigns/{campaign_id}/actions/{action_id}:
    get:
      summary: Get a campaign action
      description: Returns a single campaign action by ID.
      operationId: getCampaignAction
      x-airbyte-entity: campaign_actions
      x-airbyte-action: get
      x-airbyte-record-extractor: $.action
      parameters:
        - name: campaign_id
          in: path
          required: true
          description: The campaign identifier
          schema:
            type: integer
        - name: action_id
          in: path
          required: true
          description: The action identifier
          schema:
            type: integer
      responses:
        "200":
          description: Campaign action object
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    $ref: "#/components/schemas/CampaignAction"
        "401":
          description: Unauthorized
        "404":
          description: Action not found

  # ── Newsletters ────────────────────────────────────────
  /v1/newsletters:
    get:
      summary: List newsletters
      description: Returns a paginated list of newsletters.
      operationId: listNewsletters
      x-airbyte-entity: newsletters
      x-airbyte-action: list
      x-airbyte-record-extractor: $.newsletters
      x-airbyte-meta-extractor:
        next: $.next
      parameters:
        - name: start
          in: query
          required: false
          description: Pagination cursor for the next page
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of newsletters to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: sort
          in: query
          required: false
          description: Sort order
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        "200":
          description: List of newsletters
          content:
            application/json:
              schema:
                type: object
                properties:
                  newsletters:
                    type: array
                    items:
                      $ref: "#/components/schemas/Newsletter"
                  next:
                    type: string
                    description: Cursor for the next page
        "401":
          description: Unauthorized

  /v1/newsletters/{newsletter_id}:
    get:
      summary: Get a newsletter
      description: Returns a single newsletter by ID.
      operationId: getNewsletter
      x-airbyte-entity: newsletters
      x-airbyte-action: get
      x-airbyte-record-extractor: $.newsletter
      parameters:
        - name: newsletter_id
          in: path
          required: true
          description: The newsletter identifier
          schema:
            type: integer
      responses:
        "200":
          description: Newsletter object
          content:
            application/json:
              schema:
                type: object
                properties:
                  newsletter:
                    $ref: "#/components/schemas/Newsletter"
        "401":
          description: Unauthorized
        "404":
          description: Newsletter not found

  # ── Segments ───────────────────────────────────────────
  /v1/segments:
    get:
      summary: List segments
      description: Returns all segments in the workspace.
      operationId: listSegments
      x-airbyte-entity: segments
      x-airbyte-action: list
      x-airbyte-record-extractor: $.segments
      x-airbyte-no-pagination: "Returns all segments in a single response without pagination"
      responses:
        "200":
          description: List of segments
          content:
            application/json:
              schema:
                type: object
                properties:
                  segments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Segment"
        "401":
          description: Unauthorized
    post:
      summary: Create a manual segment
      description: Creates a new empty manual segment. People can be added to it separately.
      operationId: createSegment
      x-airbyte-entity: segments
      x-airbyte-action: create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentCreateParams"
      responses:
        "200":
          description: Segment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  segment:
                    $ref: "#/components/schemas/Segment"
        "401":
          description: Unauthorized

  /v1/segments/{segment_id}:
    get:
      summary: Get a segment
      description: Returns a single segment by ID.
      operationId: getSegment
      x-airbyte-entity: segments
      x-airbyte-action: get
      x-airbyte-record-extractor: $.segment
      parameters:
        - name: segment_id
          in: path
          required: true
          description: The segment identifier
          schema:
            type: integer
      responses:
        "200":
          description: Segment object
          content:
            application/json:
              schema:
                type: object
                properties:
                  segment:
                    $ref: "#/components/schemas/Segment"
        "401":
          description: Unauthorized
        "404":
          description: Segment not found

  # ── Messages ───────────────────────────────────────────
  /v1/messages:
    get:
      summary: List messages
      description: Returns a paginated list of message deliveries.
      operationId: listMessages
      x-airbyte-entity: messages
      x-airbyte-action: list
      x-airbyte-record-extractor: $.messages
      x-airbyte-meta-extractor:
        next: $.next
      parameters:
        - name: start
          in: query
          required: false
          description: Pagination cursor for the next page
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of messages to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: type
          in: query
          required: false
          description: Filter messages by channel type
          schema:
            type: string
            enum:
              - email
              - webhook
              - twilio
              - whatsapp
              - slack
              - push
              - in_app
        - name: metric
          in: query
          required: false
          description: Filter messages by delivery metric
          schema:
            type: string
            enum:
              - attempted
              - sent
              - delivered
              - opened
              - clicked
              - converted
              - bounced
              - spammed
              - unsubscribed
              - dropped
              - failed
              - undeliverable
        - name: campaign_id
          in: query
          required: false
          description: Filter by campaign ID
          schema:
            type: integer
        - name: newsletter_id
          in: query
          required: false
          description: Filter by newsletter ID
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  next:
                    type: string
                    description: Cursor for the next page
        "401":
          description: Unauthorized

  /v1/messages/{message_id}:
    get:
      summary: Get a message
      description: >
        Returns a single message delivery by ID. Untested because the
        test workspace has no message deliveries to retrieve.
      operationId: getMessage
      x-airbyte-entity: messages
      x-airbyte-action: get
      x-airbyte-untested: true
      x-airbyte-record-extractor: $.message
      parameters:
        - name: message_id
          in: path
          required: true
          description: The message delivery identifier
          schema:
            type: string
      responses:
        "200":
          description: Message object
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized
        "404":
          description: Message not found

  # ── Activities ─────────────────────────────────────────
  /v1/activities:
    get:
      summary: List activities
      description: Returns a paginated list of activities in the workspace.
      operationId: listActivities
      x-airbyte-entity: activities
      x-airbyte-action: list
      x-airbyte-record-extractor: $.activities
      x-airbyte-meta-extractor:
        next: $.next
      parameters:
        - name: start
          in: query
          required: false
          description: Pagination cursor for the next page
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of activities to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: type
          in: query
          required: false
          description: Filter by activity type
          schema:
            type: string
        - name: name
          in: query
          required: false
          description: Filter by event name
          schema:
            type: string
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: object
                properties:
                  activities:
                    type: array
                    items:
                      $ref: "#/components/schemas/Activity"
                  next:
                    type: string
                    description: Cursor for the next page
        "401":
          description: Unauthorized

  # ── Sender Identities ──────────────────────────────────
  /v1/sender_identities:
    get:
      summary: List sender identities
      description: Returns a paginated list of sender identities.
      operationId: listSenderIdentities
      x-airbyte-entity: sender_identities
      x-airbyte-action: list
      x-airbyte-record-extractor: $.sender_identities
      x-airbyte-meta-extractor:
        next: $.next
      parameters:
        - name: start
          in: query
          required: false
          description: Pagination cursor for the next page
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of sender identities to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          required: false
          description: Sort order
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        "200":
          description: List of sender identities
          content:
            application/json:
              schema:
                type: object
                properties:
                  sender_identities:
                    type: array
                    items:
                      $ref: "#/components/schemas/SenderIdentity"
                  next:
                    type: string
                    description: Cursor for the next page
        "401":
          description: Unauthorized

  /v1/sender_identities/{sender_id}:
    get:
      summary: Get a sender identity
      description: Returns a single sender identity by ID.
      operationId: getSenderIdentity
      x-airbyte-entity: sender_identities
      x-airbyte-action: get
      x-airbyte-record-extractor: $.sender_identity
      parameters:
        - name: sender_id
          in: path
          required: true
          description: The sender identity identifier
          schema:
            type: integer
      responses:
        "200":
          description: Sender identity object
          content:
            application/json:
              schema:
                type: object
                properties:
                  sender_identity:
                    $ref: "#/components/schemas/SenderIdentity"
        "401":
          description: Unauthorized
        "404":
          description: Sender identity not found

  # ── Snippets ───────────────────────────────────────────
  /v1/snippets:
    get:
      summary: List snippets
      description: Returns all snippets in the workspace.
      operationId: listSnippets
      x-airbyte-entity: snippets
      x-airbyte-action: list
      x-airbyte-record-extractor: $.snippets
      x-airbyte-no-pagination: "Returns all snippets in a single response without pagination"
      responses:
        "200":
          description: List of snippets
          content:
            application/json:
              schema:
                type: object
                properties:
                  snippets:
                    type: array
                    items:
                      $ref: "#/components/schemas/Snippet"
        "401":
          description: Unauthorized
    post:
      summary: Create a snippet
      description: Creates a new reusable content snippet. Returns 422 if a snippet with the same name already exists.
      operationId: createSnippet
      x-airbyte-entity: snippets
      x-airbyte-action: create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnippetCreateParams"
      responses:
        "200":
          description: Snippet created
          content:
            application/json:
              schema:
                type: object
                properties:
                  snippet:
                    $ref: "#/components/schemas/Snippet"
        "401":
          description: Unauthorized
        "422":
          description: Snippet with this name already exists
    put:
      summary: Update a snippet
      description: Updates an existing snippet by name, or creates it if it does not exist (upsert behavior).
      operationId: updateSnippet
      x-airbyte-entity: snippets
      x-airbyte-action: update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnippetUpdateParams"
      responses:
        "200":
          description: Snippet updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  snippet:
                    $ref: "#/components/schemas/Snippet"
        "401":
          description: Unauthorized

  # ── Collections ────────────────────────────────────────
  /v1/collections:
    get:
      summary: List collections
      description: Returns all collections in the workspace.
      operationId: listCollections
      x-airbyte-entity: collections
      x-airbyte-action: list
      x-airbyte-untested: true
      x-airbyte-record-extractor: $.collections
      x-airbyte-no-pagination: "Returns all collections in a single response without pagination"
      responses:
        "200":
          description: List of collections
          content:
            application/json:
              schema:
                type: object
                properties:
                  collections:
                    type: array
                    items:
                      $ref: "#/components/schemas/Collection"
        "401":
          description: Unauthorized
    post:
      summary: Create a collection
