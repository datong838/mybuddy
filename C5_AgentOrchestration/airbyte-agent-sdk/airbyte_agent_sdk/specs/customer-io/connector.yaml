          description: Event types to report
          items:
            type: string
        disabled:
          type: boolean
          description: Whether the webhook is disabled
        full_resolution:
          type: boolean
          description: Send all events instead of only unique events
        with_content:
          type: boolean
          description: Include the message body in sent events

