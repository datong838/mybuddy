      type: object
      required:
        - segment
      properties:
        segment:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Name of the manual segment
            description:
              type: string
              description: Optional description of the segment

    ExportCreateParams:
      type: object
      required:
        - filters
      properties:
        filters:
          type: object
          description: >
            Audience filter conditions to select which customers to export.
            Uses boolean logic with "and", "or", "not" arrays of conditions,
            "segment" objects with an "id" field, and "attribute" objects with
            "field", "operator", and "value" fields. Example:
            {"and": [{"segment": {"id": 3}}, {"attribute": {"field": "plan", "operator": "eq", "value": "premium"}}]}

