              value:
                type: string
                description: Header value

    # ── Transactional & Broadcast Schemas ────────────────

    TransactionalSendResponse:
      type: object
      properties:
        delivery_id:
          type:
            - "null"
            - string
          description: Unique delivery identifier for tracking the message
        queued_at:
          type:
            - "null"
            - integer
          description: Unix timestamp when the message was queued

    TransactionalEmailParams:
      type: object
      required:
        - to
        - identifiers
      properties:
        transactional_message_id:
          type:
            - integer
            - string
          description: Template ID (number) or trigger name (string). Required if not providing inline body/subject/from.
        to:
          type: string
          description: 'Recipient email address. Supports display name format: "Name <email>"'
        identifiers:
          type: object
          description: 'Recipient identity. One of: {"id": "..."}, {"email": "..."}, or {"cio_id": "..."}'
        message_data:
          type: object
          description: Key-value pairs available as {{trigger.<key>}} in templates
        from:
          type: string
          description: Sender address (must be verified domain). Overrides template if provided.
        subject:
          type: string
          description: Email subject line. Overrides template if provided.
        body:
          type: string
          description: HTML email body. Overrides template if provided.
        body_plain:
          type: string
          description: Plaintext email body
        reply_to:
          type: string
          description: Reply-to email address
        bcc:
          type: string
          description: BCC address(es), comma-separated. Max 15 total recipients.
        headers:
          type: object
          description: Custom email headers (ASCII only)
        preheader_text:
          type: string
          description: Email preview text
        attachments:
          type: object
          description: 'Map of filename to base64 content: {"file.pdf": "<base64>"}. Max 2MB total.'
        disable_message_retention:
          type: boolean
          description: Do not store message body (for sensitive data)
        send_to_unsubscribed:
          type: boolean
          description: Send even if person is unsubscribed
        tracked:
          type: boolean
          description: Enable open and click tracking
        queue_draft:
          type: boolean
          description: Queue as draft instead of sending immediately
        send_at:
          type: integer
          description: Unix timestamp for scheduled delivery (up to 90 days in the future)

    TransactionalSmsParams:
      type: object
      required:
        - transactional_message_id
        - to
        - identifiers
      properties:
        transactional_message_id:
          type:
            - integer
            - string
          description: Template ID (number) or trigger name (string). Always required for SMS.
        to:
          type: string
          description: Phone number in E.164 format (e.g. +15551234567)
        identifiers:
          type: object
          description: 'Recipient identity. One of: {"id": "..."}, {"email": "..."}, or {"cio_id": "..."}'
        message_data:
          type: object
          description: Key-value pairs available as {{trigger.<key>}} in templates
        from:
          type: string
          description: Override sender phone number (must be verified in Twilio)
        send_to_unsubscribed:
          type: boolean
          description: Send even if person is unsubscribed
        tracked:
          type: boolean
          description: Enable link tracking
        queue_draft:
          type: boolean
          description: Queue as draft instead of sending immediately
        disable_message_retention:
          type: boolean
          description: Do not store message content

    TransactionalPushParams:
      type: object
      required:
        - identifiers
      properties:
        transactional_message_id:
          type:
            - integer
            - string
          description: Template ID or trigger name. Required if not providing inline title/message.
        to:
          type: string
          description: 'Device target: "last_used" for most recent device, or a specific device token. Defaults to all devices.'
        identifiers:
          type: object
          description: 'Recipient identity. One of: {"id": "..."}, {"email": "..."}, or {"cio_id": "..."}'
        message_data:
          type: object
          description: Key-value pairs available as {{trigger.<key>}} in templates
        title:
          type: string
          description: Push notification title (overrides template)
        message:
          type: string
          description: Push notification body (overrides template)
        link:
          type: string
          description: Deep link URL
        image_url:
          type: string
          description: Image URL to display in the notification
        custom_data:
          type: object
          description: Custom key-value data included in the push payload
        custom_payload:
          type: object
          description: Platform-specific payload overrides (iOS/Android)
        sound:
          type: string
          description: Notification sound name
        send_to_unsubscribed:
          type: boolean
          description: Send even if person is unsubscribed
        queue_draft:
          type: boolean
          description: Queue as draft instead of sending immediately
        disable_message_retention:
          type: boolean
          description: Do not store message content
        send_at:
          type: integer
          description: Unix timestamp for scheduled delivery

    TransactionalInboxMessageParams:
      type: object
      required:
        - transactional_message_id
        - identifiers
      properties:
        transactional_message_id:
          type:
            - integer
            - string
          description: Template ID or trigger name. Must reference an Inbox-type transactional message.
        identifiers:
          type: object
          description: 'Recipient identity. One of: {"id": "..."}, {"email": "..."}, or {"cio_id": "..."}'
        message_data:
          type: object
          description: Key-value pairs available as {{trigger.<key>}} in the inbox message template

    BroadcastTriggerParams:
      type: object
      properties:
        data:
          type: object
          description: Global data available as {{trigger.<key>}} in broadcast messages
        recipients:
          type: object
          description: Filter object to define audience (overrides UI-defined recipients). Supports and/or/not/segment/attribute conditions.
        ids:
          type: array
          description: List of profile IDs to target (max 10,000)
          items:
            type: string
        emails:
          type: array
          description: List of email addresses to target (max 10,000)
          items:
            type: string
        per_user_data:
          type: array
          description: 'Per-recipient custom data: [{"id": "user1", "data": {...}}, ...]'
          items:
            type: object
        data_file_url:
          type: string
          description: URL to a JSON Lines file with per-user data
        id_ignore_missing:
          type: boolean
          description: Ignore IDs that do not match existing profiles (default false)
        email_ignore_missing:
          type: boolean
          description: Ignore emails that do not match existing profiles
        email_add_duplicates:
          type: boolean
          description: Send to all profiles sharing an email address

    BroadcastTriggerResponse:
      type: object
      properties:
        id:
          type:
            - "null"
            - integer
          description: Trigger ID for checking broadcast status
