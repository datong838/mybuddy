    # ============================================
    # Account Schemas
    # ============================================
    Account:
      type: object
      x-airbyte-entity-name: accounts
      x-airbyte-stream-name: Account
      x-airbyte-ai-hints:
        summary: "Salesforce accounts representing companies or organizations, including financial value fields"
        when_to_use: "Looking up company or organization details in Salesforce, including top or highest-value accounts"
        trigger_phrases: ["salesforce account", "company", "organization", "top account", "highest value account"]
        freshness: live
        search_strategy: "Search by name or filter by type or owner. For unqualified top/largest account requests, prefer ARR, annual recurring revenue, revenue, annual revenue, amount, or value fields. ARR is commonly custom in Salesforce; use the org-specific ARR or account value field when visible, otherwise use standard AnnualRevenue. Use NumberOfEmployees only when the user asks for employee count, headcount, company size, or largest employer."
        example_questions:
          - "Find an account in Salesforce"
          - "Show account details"
          - "Show my top accounts by annual revenue"
      description: Salesforce Account object - uses FIELDS(STANDARD) so all standard fields are returned
      additionalProperties: true
      properties:
        Id:
          type: string
          description: Unique identifier
        Name:
          type: string
          description: Account name
        attributes:
          type: object
          properties:
            type:
              type: string
            url:
              type: string

    AccountQueryResult:
      type: object
      description: SOQL query result for accounts
      properties:
        totalSize:
          type: integer
          description: Total number of records
        done:
          type: boolean
          description: Whether all records have been returned
        nextRecordsUrl:
          type: string
          description: URL to fetch next page of results
        records:
          type: array
          items:
            $ref: "#/components/schemas/Account"

