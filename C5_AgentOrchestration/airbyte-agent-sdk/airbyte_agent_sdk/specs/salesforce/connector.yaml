            description: Unique identifier for the opportunity stage record
          - name: ApiName
            type:
              - "null"
              - string
            description: API name of the stage used in code and integrations
          - name: CreatedById
            type:
              - "null"
              - string
            description: ID of the user who created this stage
          - name: CreatedDate
            type:
              - "null"
              - string
            description: Date and time when the stage was created
          - name: DefaultProbability
            type:
              - "null"
              - number
            description: Default probability percentage for opportunities at this stage
          - name: Description
            type:
              - "null"
              - string
            description: Description of the stage
          - name: ForecastCategory
            type:
              - "null"
              - string
            description: Forecast category for opportunities at this stage
          - name: ForecastCategoryName
            type:
              - "null"
              - string
            description: Display name of the forecast category
          - name: IsActive
            type:
              - "null"
              - boolean
            description: Whether the stage is currently active and can be used
          - name: IsClosed
            type:
              - "null"
              - boolean
            description: Whether opportunities at this stage are considered closed
          - name: IsWon
            type:
              - "null"
              - boolean
            description: Whether opportunities at this stage are considered won
          - name: LastModifiedById
            type:
              - "null"
              - string
            description: ID of the user who last modified this stage
          - name: LastModifiedDate
            type:
              - "null"
              - string
            description: Date and time when the stage was last modified
          - name: MasterLabel
            type:
              - "null"
              - string
            description: Display label for the stage
          - name: SortOrder
            type:
              - "null"
              - integer
            description: Order in which the stage appears in the sales process
          - name: SystemModstamp
            type:
              - "null"
              - string
            description: System timestamp when the record was last modified

servers:
  - url: "{instance_url}/services/data/v59.0"
    description: Salesforce REST API
    variables:
      instance_url:
        default: https://login.salesforce.com
        description: Your Salesforce instance URL (e.g., https://na1.salesforce.com)

security:
  - oauth2: []

paths:
  # ============================================
  # HEALTH CHECK Resource
  # ============================================
  /sobjects:
    get:
      summary: List available Salesforce objects
      description: |
        Returns a list of all available Salesforce objects (sObjects) in the organization.
        This endpoint is used for health checks to verify authentication and connectivity.
      operationId: listSObjects
      x-airbyte-entity: sobjects
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.sobjects
      x-airbyte-no-pagination: "Salesforce /sobjects returns the full list of SObject metadata available to the authenticated user in a single response; no pagination parameters are supported."
      tags:
        - Health Check
      responses:
        "200":
          description: List of available Salesforce objects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SObjectsResponse"
        "401":
          description: Unauthorized

  /sobjects/{sobjectType}:
    post:
      summary: Create an SObject record
      description: |
        Create a record for any Salesforce SObject by name. Works for standard
        objects (Account, Contact, ...) and custom objects (e.g. `MyObject__c`).
        Pass the SObject's API name in the `sobjectType` path parameter and the
        field values as a free-form JSON body.
      operationId: createSObject
      x-airbyte-entity: sobjects
      x-airbyte-action: create
      tags:
        - SObjects
      parameters:
        - name: sobjectType
          in: path
          required: true
          schema:
            type: string
          description: SObject API name (e.g., `Account`, `MyCustomObject__c`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Field name/value pairs for the new record.
      responses:
        "201":
          description: Record created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Id of the created record.
                  success:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: object
        "400":
          description: Bad request (missing required fields or schema mismatch)
        "401":
          description: Unauthorized

  /sobjects/{sobjectType}/{id}:
    get:
      summary: Get an SObject record by id
      description: |
        Fetch a single record from any SObject by id. Works for standard and
        custom objects.
      operationId: getSObjectById
      x-airbyte-entity: sobjects
      x-airbyte-action: get
      tags:
        - SObjects
      parameters:
        - name: sobjectType
          in: path
          required: true
          schema:
            type: string
          description: SObject API name.
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Salesforce record Id.
        - name: fields
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated field names to return. Omit for default fields.
      responses:
        "200":
          description: Record
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Record not found
        "401":
          description: Unauthorized
    patch:
      summary: Update an SObject record
      description: |
        Update fields on an existing record. Pass only the fields you want to
        change in the JSON body; Salesforce leaves the rest untouched.
      operationId: updateSObject
      x-airbyte-entity: sobjects
      x-airbyte-action: update
      tags:
        - SObjects
      parameters:
        - name: sobjectType
          in: path
          required: true
          schema:
            type: string
          description: SObject API name.
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Salesforce record Id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Field name/value pairs to update.
      responses:
        "204":
          description: Record updated
        "400":
          description: Bad request
        "404":
          description: Record not found
        "401":
          description: Unauthorized
    delete:
      summary: Delete an SObject record
      description: |
        Delete a record by id. Salesforce moves the record to the Recycle Bin
        (15-day retention) for most objects.
      operationId: deleteSObject
      x-airbyte-entity: sobjects
      x-airbyte-action: delete
      tags:
        - SObjects
      parameters:
        - name: sobjectType
          in: path
          required: true
          schema:
            type: string
          description: SObject API name.
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Salesforce record Id.
      responses:
        "204":
          description: Record deleted
        "404":
          description: Record not found
        "401":
          description: Unauthorized

  # ============================================
  # ACCOUNTS Resource
  # ============================================
  /query:accounts:
    get:
      summary: List accounts
      description: |
        Returns a list of accounts via SOQL query. Default returns up to 200 records.
        For pagination, check the response: if `done` is false, use `nextRecordsUrl` to fetch the next page.
        For "top", "largest", or "highest-value" account requests, rank by a financial account value field
        such as ARR, annual recurring revenue, revenue, annual revenue, amount, or value. ARR is often a
        Salesforce custom field, so prefer the customer's org-specific ARR or account value field when
        available. If no better org-specific field is visible, `AnnualRevenue` is the standard Account
        fallback. Do not use `NumberOfEmployees` unless the user asks for employee count, headcount,
        company size, or largest employer.
      operationId: listAccounts
      x-airbyte-entity: accounts
      x-airbyte-action: list
      x-airbyte-record-extractor: $.records
      x-airbyte-meta-extractor:
        done: $.done
        nextRecordsUrl: $.nextRecordsUrl
      x-airbyte-path-override:
        path: /query
      tags:
        - Accounts
      parameters:
        - name: q
          in: query
          required: true
          description: |
            SOQL query for accounts. Default returns up to 200 records.
            To change the limit, provide your own query with a LIMIT clause.

            Examples:
              SELECT FIELDS(STANDARD) FROM Account ORDER BY LastModifiedDate DESC LIMIT 50
              SELECT Id, Name, Owner.Name, Owner.Email FROM Account LIMIT 50
              SELECT Id, Name, Parent.Name, Owner.Name FROM Account WHERE Industry = 'Technology' LIMIT 50
              SELECT Id, Name, AnnualRevenue FROM Account ORDER BY AnnualRevenue DESC LIMIT 10
              SELECT Id, Name, NumberOfEmployees FROM Account ORDER BY NumberOfEmployees DESC LIMIT 10

            Use dot-path traversal (Owner.Name, Parent.Name) to resolve relationship
            fields inline instead of returning raw IDs.
          schema:
            type: string
            default: "SELECT FIELDS(STANDARD) FROM Account ORDER BY LastModifiedDate DESC LIMIT 200"
      responses:
        "200":
          description: Query results containing accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountQueryResult"
        "401":
          description: Unauthorized

  /sobjects/Account:
    post:
      summary: Create an account
      operationId: createAccount
      x-airbyte-entity: accounts
      x-airbyte-action: create
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountWriteInput"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SObjectCreateResponse"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /sobjects/Account/{id}:
    get:
      summary: Get an account
      description: |
        Get a single account by ID. Returns all accessible fields by default.
        Use the `fields` parameter to retrieve only specific fields for better performance.
      operationId: getAccount
      x-airbyte-entity: accounts
      x-airbyte-action: get
      tags:
        - Accounts
      parameters:
        - name: id
          in: path
          required: true
          description: Salesforce Account ID (18-character ID starting with '001')
          schema:
            type: string
        - name: fields
          in: query
          description: |
            Comma-separated list of fields to retrieve. If omitted, returns all accessible fields.
            Example: "Id,Name,Industry,AnnualRevenue,Website"
          schema:
            type: string
      responses:
        "200":
          description: Account object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Account not found
        "401":
          description: Unauthorized
    patch:
      summary: Update an account
      operationId: updateAccount
      x-airbyte-entity: accounts
      x-airbyte-action: update
      tags:
        - Accounts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountWriteInput"
      responses:
        "204":
          description: Account updated
        "404":
          description: Account not found
        "401":
          description: Unauthorized
    delete:
      summary: Delete an account
      operationId: deleteAccount
      x-airbyte-entity: accounts
      x-airbyte-action: delete
      tags:
        - Accounts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Account deleted
        "404":
          description: Account not found
        "401":
          description: Unauthorized

  /search:accounts:
    get:
      summary: Search accounts
      description: |
        Search for accounts using SOSL (Salesforce Object Search Language).
        SOSL is optimized for text-based searches across multiple fields and objects.
        Use SOQL (list action) for structured queries with specific field conditions.
      operationId: searchAccounts
      x-airbyte-entity: accounts
      x-airbyte-action: api_search
      x-airbyte-path-override:
        path: /search
      tags:
        - Accounts
      parameters:
        - name: q
          in: query
          required: true
          description: |
            SOSL search query. Format: FIND {searchTerm} IN scope RETURNING Object(fields) [LIMIT n]
            Examples:
            - "FIND {Acme} IN ALL FIELDS RETURNING Account(Id,Name)"
            - "FIND {tech*} IN NAME FIELDS RETURNING Account(Id,Name,Industry) LIMIT 50"
            - "FIND {\"exact phrase\"} RETURNING Account(Id,Name,Website)"
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"
        "401":
          description: Unauthorized

