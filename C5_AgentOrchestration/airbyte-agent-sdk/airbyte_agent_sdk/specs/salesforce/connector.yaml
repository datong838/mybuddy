          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SObjectCreateResponse"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /sobjects/Note/{id}:
    get:
      summary: Get a note
      description: |
        Get a single note by ID. Returns all accessible fields by default.
        Use the `fields` parameter to retrieve only specific fields for better performance.
      operationId: getNote
      x-airbyte-entity: notes
      x-airbyte-action: get
      tags:
        - Notes
      parameters:
        - name: id
          in: path
          required: true
          description: Salesforce Note ID (18-character ID starting with '002')
          schema:
            type: string
        - name: fields
          in: query
          description: |
            Comma-separated list of fields to retrieve. If omitted, returns all accessible fields.
            Example: "Id,Title,Body,ParentId,OwnerId"
          schema:
            type: string
      responses:
        "200":
          description: Note object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Note not found
        "401":
          description: Unauthorized
    patch:
      summary: Update a note
      operationId: updateNote
      x-airbyte-entity: notes
      x-airbyte-action: update
      tags:
        - Notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteWriteInput"
      responses:
        "204":
          description: Note updated
        "404":
          description: Note not found
        "401":
          description: Unauthorized
    delete:
      summary: Delete a note
      operationId: deleteNote
      x-airbyte-entity: notes
      x-airbyte-action: delete
      tags:
        - Notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Note deleted
        "404":
          description: Note not found
        "401":
          description: Unauthorized

  /search:notes:
    get:
      summary: Search notes
      description: |
        Search for notes using SOSL (Salesforce Object Search Language).
        SOSL is optimized for text-based searches across multiple fields.
      operationId: searchNotes
      x-airbyte-entity: notes
      x-airbyte-action: api_search
      x-airbyte-path-override:
        path: /search
      tags:
        - Notes
      parameters:
        - name: q
          in: query
          required: true
          description: |
            SOSL search query. Format: FIND {searchTerm} RETURNING Note(fields) [LIMIT n]
            Examples:
            - "FIND {important} IN ALL FIELDS RETURNING Note(Id,Title,ParentId)"
            - "FIND {action items} IN NAME FIELDS RETURNING Note(Id,Title,Body) LIMIT 50"
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"
        "401":
          description: Unauthorized

  # ============================================
  # CONTENT VERSIONS Resource (Salesforce Files)
  # ============================================
  /query:content_versions:
    get:
      summary: List content versions
      description: |
        Returns a list of content versions (file metadata) via SOQL query. Default returns up to 200 records.
        For pagination, check the response: if `done` is false, use `nextRecordsUrl` to fetch the next page.
        Note: ContentVersion does not support FIELDS(STANDARD), so specific fields must be listed.
      operationId: listContentVersions
      x-airbyte-entity: content_versions
      x-airbyte-action: list
      x-airbyte-record-extractor: $.records
      x-airbyte-meta-extractor:
        done: $.done
        nextRecordsUrl: $.nextRecordsUrl
      x-airbyte-path-override:
        path: /query
      tags:
        - Content Versions
      parameters:
        - name: q
          in: query
          required: true
          description: |
            SOQL query for content versions. Default returns up to 200 records.
            To change the limit, provide your own query with a LIMIT clause.
            Example: "SELECT Id, Title, FileExtension, ContentSize FROM ContentVersion WHERE IsLatest = true LIMIT 50"
          schema:
            type: string
            default: "SELECT Id, Title, FileExtension, ContentSize, ContentDocumentId, VersionNumber, IsLatest, CreatedDate, LastModifiedDate FROM ContentVersion ORDER BY LastModifiedDate DESC LIMIT 200"
      responses:
        "200":
          description: Query results containing content versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentVersionQueryResult"
        "401":
          description: Unauthorized

  /sobjects/ContentVersion/{id}:
    get:
      summary: Get a content version
      description: |
        Get a single content version's metadata by ID. Returns file metadata, not the file content.
        Use the download action to retrieve the actual file binary.
      operationId: getContentVersion
      x-airbyte-entity: content_versions
      x-airbyte-action: get
      tags:
        - Content Versions
      parameters:
        - name: id
          in: path
          required: true
          description: Salesforce ContentVersion ID (18-character ID starting with '068')
          schema:
            type: string
        - name: fields
          in: query
          description: |
            Comma-separated list of fields to retrieve. If omitted, returns all accessible fields.
            Example: "Id,Title,FileExtension,ContentSize,ContentDocumentId,IsLatest"
          schema:
            type: string
      responses:
        "200":
          description: ContentVersion object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentVersion"
        "404":
          description: ContentVersion not found
        "401":
          description: Unauthorized

  /sobjects/ContentVersion/{id}/VersionData:
    get:
      summary: Download content version file
      description: |
        Downloads the binary file content of a content version.
        First use the list or get action to retrieve the ContentVersion ID and file metadata (size, type, etc.),
        then use this action to download the actual file content.
        The response is the raw binary file data.
      operationId: downloadContentVersion
      x-airbyte-entity: content_versions
      x-airbyte-action: download
      tags:
        - Content Versions
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Salesforce ContentVersion ID (18-character ID starting with '068').
            Obtain this ID from the list or get action.
          schema:
            type: string
      responses:
        "200":
          description: Binary file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: ContentVersion not found
        "401":
          description: Unauthorized

  # ============================================
  # ATTACHMENTS Resource (Legacy)
  # ============================================
  /query:attachments:
    get:
      summary: List attachments
      description: |
        Returns a list of attachments (legacy) via SOQL query. Default returns up to 200 records.
        For pagination, check the response: if `done` is false, use `nextRecordsUrl` to fetch the next page.
        Note: Attachments are a legacy feature; consider using ContentVersion (Salesforce Files) for new implementations.
      operationId: listAttachments
      x-airbyte-entity: attachments
      x-airbyte-action: list
      x-airbyte-record-extractor: $.records
      x-airbyte-meta-extractor:
        done: $.done
        nextRecordsUrl: $.nextRecordsUrl
      x-airbyte-path-override:
        path: /query
      tags:
        - Attachments
      parameters:
        - name: q
          in: query
          required: true
          description: |
            SOQL query for attachments. Default returns up to 200 records.
            To change the limit, provide your own query with a LIMIT clause.
            Example: "SELECT Id, Name, ContentType, BodyLength, ParentId FROM Attachment WHERE ParentId = '001xx...' LIMIT 50"
          schema:
            type: string
            default: "SELECT Id, Name, ContentType, BodyLength, ParentId, CreatedDate, LastModifiedDate FROM Attachment ORDER BY LastModifiedDate DESC LIMIT 200"
      responses:
        "200":
          description: Query results containing attachments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentQueryResult"
        "401":
          description: Unauthorized

  /sobjects/Attachment/{id}:
    get:
      summary: Get an attachment
      description: |
        Get a single attachment's metadata by ID. Returns file metadata, not the file content.
        Use the download action to retrieve the actual file binary.
        Note: Attachments are a legacy feature; consider using ContentVersion for new implementations.
      operationId: getAttachment
      x-airbyte-entity: attachments
      x-airbyte-action: get
      tags:
        - Attachments
      parameters:
        - name: id
          in: path
          required: true
          description: Salesforce Attachment ID (18-character ID starting with '00P')
          schema:
            type: string
        - name: fields
          in: query
          description: |
            Comma-separated list of fields to retrieve. If omitted, returns all accessible fields.
            Example: "Id,Name,ContentType,BodyLength,ParentId"
          schema:
            type: string
      responses:
        "200":
          description: Attachment object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"
        "404":
          description: Attachment not found
        "401":
          description: Unauthorized

  /sobjects/Attachment/{id}/Body:
    get:
      summary: Download attachment file
      description: |
        Downloads the binary file content of an attachment (legacy).
        First use the list or get action to retrieve the Attachment ID and file metadata,
        then use this action to download the actual file content.
        Note: Attachments are a legacy feature; consider using ContentVersion for new implementations.
      operationId: downloadAttachment
      x-airbyte-entity: attachments
      x-airbyte-action: download
      tags:
        - Attachments
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Salesforce Attachment ID (18-character ID starting with '00P').
            Obtain this ID from the list or get action.
          schema:
            type: string
      responses:
        "200":
          description: Binary file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Attachment not found
        "401":
          description: Unauthorized

  # ============================================
  # REPORTS Resource (Analytics API)
  # ============================================
  /analytics/reports:
    get:
      summary: List reports
      description: |
        Returns a list of reports available in the Salesforce org.
        Each report includes metadata such as Id, Name, Format, Description, and URL.
        This uses the Analytics REST API, not SOQL.
      operationId: listReports
      x-airbyte-entity: reports
      x-airbyte-action: list
      x-airbyte-no-pagination: "Salesforce Analytics /analytics/reports returns the full list of report metadata in a single response; the Analytics Reports listing endpoint does not expose pagination parameters."
      tags:
        - Reports
      responses:
        "200":
          description: List of report metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
        "401":
          description: Unauthorized

  /analytics/reports/{id}:
    get:
      summary: Get report results
      description: |
        Executes a report synchronously and returns the report data results.
        Returns both metadata and the executed data including fact maps, aggregates, and detail rows.
        First use the list action to find available reports, then use this action to run a report and get its data.
        Note: Large reports may be truncated. For reports with more than 2,000 detail rows, consider using async report runs.
      operationId: getReport
      x-airbyte-entity: reports
      x-airbyte-action: get
      tags:
        - Reports
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Salesforce Report ID (18-character ID starting with '00O').
            Obtain this ID from the list action.
          schema:
            type: string
        - name: includeDetails
          in: query
          description: |
            Whether to include detail rows in the report results. Defaults to true.
            Set to false to get only summary/aggregate data.
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Executed report results with data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResults"
        "404":
          description: Report not found
        "401":
          description: Unauthorized

  # ============================================
  # USERS Resource
  # ============================================
  /query:users:
    get:
      summary: List users
      description: |
        Returns a list of users via SOQL query. Default returns up to 200 records.
        For pagination, check the response: if `done` is false, use `nextRecordsUrl` to fetch the next page.
      operationId: listUsers
      x-airbyte-entity: users
      x-airbyte-action: list
      x-airbyte-record-extractor: $.records
      x-airbyte-meta-extractor:
        done: $.done
        nextRecordsUrl: $.nextRecordsUrl
      x-airbyte-path-override:
        path: /query
      tags:
        - Users
      parameters:
        - name: q
          in: query
          required: true
          description: |
            SOQL query for users. Default returns up to 200 records.
            To change the limit, provide your own query with a LIMIT clause.

            Examples:
              SELECT FIELDS(STANDARD) FROM User WHERE IsActive = true ORDER BY LastModifiedDate DESC LIMIT 50
              SELECT Id, Name, Email, Manager.Name, Profile.Name FROM User WHERE IsActive = true LIMIT 50
              SELECT Id, Name, Email, Department, UserRole.Name FROM User LIMIT 50

            Use dot-path traversal (Manager.Name, Profile.Name, UserRole.Name) to resolve
            relationship fields inline instead of returning raw IDs.
          schema:
            type: string
            default: "SELECT FIELDS(STANDARD) FROM User WHERE IsActive = true ORDER BY LastModifiedDate DESC LIMIT 200"
      responses:
        "200":
          description: Query results containing users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserQueryResult"
        "401":
          description: Unauthorized

  /sobjects/User:
    post:
      summary: Create a user
      description: |
        Create a Salesforce User. Consumes a paid user-license seat. Requires the
        "Manage Internal Users" permission on the running OAuth identity.
      operationId: createUser
      x-airbyte-entity: users
      x-airbyte-action: create
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SObjectCreateResponse"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /sobjects/User/{id}:
    get:
      summary: Get a user
      description: |
        Get a single user by ID. Returns all accessible fields by default.
        Use the `fields` parameter to retrieve only specific fields for better performance.
      operationId: getUser
      x-airbyte-entity: users
      x-airbyte-action: get
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          description: Salesforce User ID (18-character ID starting with '005')
          schema:
            type: string
        - name: fields
          in: query
          description: |
            Comma-separated list of fields to retrieve. If omitted, returns all accessible fields.
            Example: "Id,Name,Email,Username,IsActive,ProfileId,UserRoleId"
          schema:
            type: string
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
        "401":
          description: Unauthorized
    patch:
      summary: Update a user
      description: |
        Update a Salesforce User. To deactivate a user (Salesforce does not allow
        delete), send `{ "IsActive": false }`.
      operationId: updateUser
      x-airbyte-entity: users
      x-airbyte-action: update
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserWriteInput"
      responses:
        "204":
          description: User updated
        "404":
          description: User not found
        "401":
          description: Unauthorized

  # ============================================
  # OPPORTUNITY STAGES Resource
  # ============================================
  /query:opportunity_stages:
    get:
      summary: List opportunity stages
      description: |
        Returns a list of opportunity stages via SOQL query. Default returns all stages.
        OpportunityStage defines the sales process stages that opportunities move through.
      operationId: listOpportunityStages
      x-airbyte-entity: opportunity_stages
      x-airbyte-action: list
      x-airbyte-record-extractor: $.records
      x-airbyte-meta-extractor:
        done: $.done
        nextRecordsUrl: $.nextRecordsUrl
      x-airbyte-path-override:
        path: /query
      tags:
        - Opportunity Stages
      parameters:
        - name: q
          in: query
          required: true
          description: |
            SOQL query for opportunity stages. Default returns all stages.

            Examples:
              SELECT FIELDS(STANDARD) FROM OpportunityStage ORDER BY SortOrder ASC
              SELECT Id, MasterLabel, ApiName, DefaultProbability, IsClosed, IsWon, IsActive, ForecastCategoryName FROM OpportunityStage WHERE IsActive = true ORDER BY SortOrder ASC
              SELECT Id, MasterLabel, DefaultProbability, CreatedBy.Name FROM OpportunityStage ORDER BY SortOrder ASC

            Use dot-path traversal (CreatedBy.Name, LastModifiedBy.Name) to resolve
            relationship fields inline instead of returning raw IDs.
          schema:
            type: string
            default: "SELECT FIELDS(STANDARD) FROM OpportunityStage ORDER BY SortOrder ASC"
      responses:
        "200":
          description: Query results containing opportunity stages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityStageQueryResult"
        "401":
          description: Unauthorized

  /sobjects/OpportunityStage/{id}:
    get:
      summary: Get an opportunity stage
      description: |
        Get a single opportunity stage by ID. Returns all accessible fields by default.
        Use the `fields` parameter to retrieve only specific fields for better performance.
      operationId: getOpportunityStage
      x-airbyte-entity: opportunity_stages
      x-airbyte-action: get
      tags:
        - Opportunity Stages
      parameters:
        - name: id
          in: path
          required: true
          description: Salesforce OpportunityStage ID
          schema:
            type: string
        - name: fields
          in: query
          description: |
            Comma-separated list of fields to retrieve. If omitted, returns all accessible fields.
            Example: "Id,MasterLabel,ApiName,DefaultProbability,IsClosed,IsWon,IsActive"
          schema:
            type: string
      responses:
        "200":
          description: OpportunityStage object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityStage"
        "404":
          description: OpportunityStage not found
        "401":
          description: Unauthorized

  # ============================================
  # GENERIC QUERY Resource
  # ============================================
  /query:
    get:
      summary: Execute SOQL query
      description: |
        Execute a custom SOQL query and return results. Use this for querying any Salesforce object.
        For pagination, check the response: if `done` is false, use `nextRecordsUrl` to fetch the next page.
      operationId: executeQuery
      x-airbyte-entity: query
      x-airbyte-action: list
      x-airbyte-record-extractor: $.records
      x-airbyte-meta-extractor:
        done: $.done
        nextRecordsUrl: $.nextRecordsUrl
      tags:
        - Query
      parameters:
        - name: q
          in: query
          required: true
          description: |
            SOQL query string. Include LIMIT clause to control the number of records returned.
            Examples:
            - "SELECT Id, Name FROM Account LIMIT 100"
            - "SELECT FIELDS(STANDARD) FROM Contact WHERE AccountId = '001xx...' LIMIT 50"
            - "SELECT Id, Subject, Status FROM Case WHERE CreatedDate = TODAY"
            - "SELECT Id, Name, Account.Name, Owner.Name FROM Opportunity LIMIT 50"

            Use dot-path traversal (e.g. Owner.Name, Account.Name) to resolve relationship
            fields inline instead of returning raw IDs.
          schema:
            type: string
            default: "SELECT Id FROM Organization LIMIT 1"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResult"
        "400":
          description: Invalid query
        "401":
          description: Unauthorized

components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: Salesforce OAuth 2.0 authentication via Connected App
      flows:
        authorizationCode:
          authorizationUrl: https://login.salesforce.com/services/oauth2/authorize
          tokenUrl: https://login.salesforce.com/services/oauth2/token
          refreshUrl: https://login.salesforce.com/services/oauth2/token
          scopes:
            api: Access and manage your data
            web: Allow access via the web
            refresh_token: Perform requests on your behalf at any time
            lightning: Access Lightning Experience
      x-airbyte-oauth-scopes:
        - scope: "api"
          mode: read_write
          entities:
            - sobjects
            - accounts
            - attachments
            - campaigns
            - cases
            - contacts
            - content_versions
            - events
            - leads
            - notes
            - opportunities
            - opportunity_stages
            - query
            - reports
            - tasks
            - users
        - scope: "web"
          mode: read_write
          entities:
            - sobjects
            - accounts
            - attachments
            - campaigns
            - cases
            - contacts
            - content_versions
            - events
            - leads
            - notes
            - opportunities
            - opportunity_stages
            - query
            - reports
            - tasks
            - users
        - scope: "refresh_token"
          mode: read_write
          entities:
            - sobjects
            - accounts
            - attachments
            - campaigns
            - cases
            - contacts
            - content_versions
            - events
            - leads
            - notes
            - opportunities
            - opportunity_stages
            - query
            - reports
            - tasks
            - users
        - scope: "lightning"
          mode: read_write
          entities:
            - sobjects
            - accounts
            - attachments
            - campaigns
            - cases
            - contacts
            - content_versions
            - events
            - leads
            - notes
            - opportunities
            - opportunity_stages
            - query
            - reports
            - tasks
            - users
      x-airbyte-token-refresh:
        auth_style: body
        body_format: form
      x-airbyte-token-extract:
        - instance_url
      x-airbyte-auth-config:
        title: "Salesforce OAuth 2.0"
        type: object
        required:
          - refresh_token
        properties:
          refresh_token:
            type: string
            title: "Refresh Token"
            description: "OAuth refresh token for automatic token renewal"
          client_id:
            type: string
            title: "Client ID"
            description: "Connected App Consumer Key"
          client_secret:
            type: string
            title: "Client Secret"
            description: "Connected App Consumer Secret"
        auth_mapping:
          refresh_token: "${refresh_token}"
          client_id: "${client_id}"
          client_secret: "${client_secret}"
        replication_auth_key_mapping:
          client_id: "client_id"
          client_secret: "client_secret"
          refresh_token: "refresh_token"

  schemas:
    # ============================================
    # Health Check Schemas
    # ============================================
    SObject:
      type: object
      x-airbyte-entity-name: sobjects
      x-airbyte-ai-hints:
        summary: "Salesforce object metadata describing available entity types"
        when_to_use: "Questions about available Salesforce objects or schema structure"
        trigger_phrases: ["salesforce object", "sobject", "schema", "object type"]
        freshness: static
        search_strategy: "Search by name"
        example_questions:
          - "What Salesforce objects are available?"
      description: Salesforce sObject metadata
      additionalProperties: true
      properties:
        name:
          type: string
          description: API name of the sObject
        label:
          type:
            - "null"
            - string
          description: User-friendly label for the sObject
        labelPlural:
          type:
            - "null"
            - string
          description: Plural label for the sObject
        keyPrefix:
          type:
            - "null"
            - string
          description: Three-character prefix for record IDs
        custom:
          type:
            - "null"
            - boolean
          description: Whether this is a custom object
        queryable:
          type:
            - "null"
            - boolean
          description: Whether the object can be queried
        searchable:
          type:
            - "null"
            - boolean
          description: Whether the object can be searched
        createable:
          type:
            - "null"
            - boolean
          description: Whether records can be created
        updateable:
          type:
            - "null"
            - boolean
          description: Whether records can be updated
        deletable:
          type:
            - "null"
            - boolean
          description: Whether records can be deleted
        urls:
          type:
            - "null"
            - object
          description: URLs for various operations on this object

    SObjectsResponse:
      type: object
      description: Response from the sobjects endpoint listing all available Salesforce objects
      properties:
        encoding:
          type:
            - "null"
            - string
          description: Character encoding used
        maxBatchSize:
          type:
            - "null"
            - integer
          description: Maximum batch size for operations
        sobjects:
          type: array
          description: List of available Salesforce objects
          items:
            $ref: "#/components/schemas/SObject"

    # ============================================
    # SObject Write Inputs
    # ============================================
    SObjectCreateResponse:
      type: object
      properties:
        id:
          type: string
          description: Id of the created record.
        success:
          type: boolean
        errors:
          type: array
          items:
            type: object

    AccountWriteInput:
      type: object
      additionalProperties: true
      required:
        - Name
      properties:
        Name:
          type: string
          description: Account name.
        AccountNumber:
          type: string
        Type:
          type: string
