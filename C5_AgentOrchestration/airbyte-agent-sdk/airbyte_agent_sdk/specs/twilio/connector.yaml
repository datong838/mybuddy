servers:
- url: https://api.twilio.com/2010-04-01
  description: Twilio REST API

security:
- basicAuth: []

paths:
  # ==================== ACCOUNTS ====================
  /Accounts.json:
    get:
      summary: List accounts
      description: Returns a list of accounts associated with the authenticated account
      operationId: listAccounts
      x-airbyte-entity: accounts
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.accounts
      x-airbyte-meta-extractor:
        next_page_uri: $.next_page_uri
        first_page_uri: $.first_page_uri
        page: $.page
        page_size: $.page_size
      parameters:
      - name: PageSize
        in: query
        description: Number of items to return per page
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 50
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsList"
        "401":
          description: Unauthorized

  "/Accounts/{sid}.json":
    get:
      summary: Get an account
      description: Get a single account by SID
      operationId: getAccount
      x-airbyte-entity: accounts
      x-airbyte-action: get
      parameters:
      - name: sid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      responses:
        "200":
          description: Account object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Account not found
        "401":
          description: Unauthorized

  # ==================== CALLS ====================
  "/Accounts/{AccountSid}/Calls.json":
    post:
      summary: Place an outbound call
      description: >
        Initiate an outbound phone call. Requires a recipient (To), a caller ID (From),
        and call instructions via a TwiML URL, TwiML content, or ApplicationSid.
        The call will be queued and placed at the account's CPS rate.
      operationId: createCall
      x-airbyte-entity: calls
      x-airbyte-action: create
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: The Account SID that will create the call
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CallCreateParams"
      responses:
        "201":
          description: Call created and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
        "400":
          description: Invalid request parameters
        "401":
          description: Unauthorized
    get:
      summary: List calls
      description: Returns a list of calls made to and from an account
      operationId: listCalls
      x-airbyte-entity: calls
      x-airbyte-action: list
      x-airbyte-record-extractor: $.calls
      x-airbyte-meta-extractor:
        next_page_uri: $.next_page_uri
        first_page_uri: $.first_page_uri
        page: $.page
        page_size: $.page_size
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      - name: PageSize
        in: query
        description: Number of items to return per page
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 50
      responses:
        "200":
          description: List of calls
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallsList"
        "401":
          description: Unauthorized

  "/Accounts/{AccountSid}/Calls/{sid}.json":
    get:
      summary: Get a call
      description: Get a single call by SID
      operationId: getCall
      x-airbyte-entity: calls
      x-airbyte-action: get
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      - name: sid
        in: path
        required: true
        description: Call SID
        schema:
          type: string
      responses:
        "200":
          description: Call object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
        "404":
          description: Call not found
        "401":
          description: Unauthorized

  # ==================== MESSAGES ====================
  "/Accounts/{AccountSid}/Messages.json":
    post:
      summary: Send a message (SMS/MMS/WhatsApp)
      description: >
        Send an outbound SMS, MMS, or WhatsApp message. Requires a recipient (To),
        a sender (From or MessagingServiceSid), and content (Body, MediaUrl, or ContentSid).
        Twilio uses application/x-www-form-urlencoded encoding for request bodies.
      operationId: createMessage
      x-airbyte-entity: messages
      x-airbyte-action: create
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: The Account SID that will create the message
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/MessageCreateParams"
      responses:
        "201":
          description: Message created and queued for delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid request parameters
        "401":
          description: Unauthorized
    get:
      summary: List messages
      description: Returns a list of messages associated with an account
      operationId: listMessages
      x-airbyte-entity: messages
      x-airbyte-action: list
      x-airbyte-record-extractor: $.messages
      x-airbyte-meta-extractor:
        next_page_uri: $.next_page_uri
        first_page_uri: $.first_page_uri
        page: $.page
        page_size: $.page_size
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      - name: PageSize
        in: query
        description: Number of items to return per page
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 50
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesList"
        "401":
          description: Unauthorized

  "/Accounts/{AccountSid}/Messages/{sid}.json":
    get:
      summary: Get a message
      description: Get a single message by SID
      operationId: getMessage
      x-airbyte-entity: messages
      x-airbyte-action: get
      parameters:
      - name: AccountSid
        in: path
        required: true
        description: Account SID
        schema:
          type: string
      - name: sid
        in: path
        required: true
        description: Message SID
        schema:
          type: string
      responses:
        "200":
          description: Message object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "404":
          description: Message not found
        "401":
          description: Unauthorized

  # ==================== INCOMING PHONE NUMBERS ====================
  "/Accounts/{AccountSid}/IncomingPhoneNumbers.json":
    post:
      summary: Provision a new phone number
      description: >
        Purchase and provision a new Twilio phone number. You must provide either a
        specific PhoneNumber in E.164 format or an AreaCode (US/Canada only).
        The number will be added to your account and can be configured for voice and SMS.
