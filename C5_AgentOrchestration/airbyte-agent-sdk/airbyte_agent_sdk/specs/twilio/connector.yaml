    # ==================== WRITE OPERATION REQUEST SCHEMAS ====================
    MessageCreateParams:
      type: object
      description: Parameters for sending a new SMS/MMS/WhatsApp message
      properties:
        To:
          type: string
          description: >
            The recipient's phone number in E.164 format (for SMS/MMS)
            or channel address (e.g. whatsapp:+15552229999)
        From:
          type: string
          description: >
            The sender's Twilio phone number in E.164 format, alphanumeric sender ID,
            short code, or channel address. Required if MessagingServiceSid is not provided.
        MessagingServiceSid:
          type: string
          description: >
            The SID of the Messaging Service to use. Required if From is not provided.
            Twilio will select an optimal sender from the Service's Sender Pool.
        Body:
          type: string
          description: >
            The text content of the message. Can be up to 1,600 characters.
            Required if MediaUrl and ContentSid are not provided.
        MediaUrl:
          type: array
          items:
            type: string
          description: >
            URL(s) of media to include in the message. Supports jpeg, jpg, gif, png.
            Up to 10 media URLs per message. Required if Body and ContentSid are not provided.
        StatusCallback:
          type: string
          description: URL to receive message status callback notifications
        ValidityPeriod:
          type: integer
          description: >
            Maximum seconds the message can remain in Twilio's outgoing queue.
            Range 1-36000, default 36000.

    CallCreateParams:
      type: object
      description: Parameters for placing an outbound call
      properties:
        To:
          type: string
          description: >
            The phone number, SIP address, or client identifier to call.
            Phone numbers must be in E.164 format.
        From:
          type: string
          description: >
            The phone number or client identifier to use as the caller ID.
            Must be a Twilio number or verified outgoing caller ID.
        Url:
          type: string
          description: >
            The absolute URL that returns TwiML instructions for the call.
            Required if Twiml and ApplicationSid are not provided.
        Twiml:
          type: string
          description: >
            TwiML instructions for the call, up to 4000 characters.
            Example: <Response><Say>Hello!</Say></Response>.
            Required if Url and ApplicationSid are not provided.
        ApplicationSid:
          type: string
          description: >
            The SID of the Application to handle the call.
            Required if Url and Twiml are not provided.
        Method:
          type: string
          enum: ["GET", "POST"]
          description: HTTP method for the Url parameter. Default is POST.
        StatusCallback:
          type: string
          description: URL to receive call status callback notifications
        StatusCallbackMethod:
          type: string
          enum: ["GET", "POST"]
          description: HTTP method for StatusCallback. Default is POST.
        Timeout:
          type: integer
          description: >
            Seconds to wait for an answer before giving up. Default 60, max 600.
        Record:
          type: boolean
          description: Whether to record the call. Default false.
        MachineDetection:
          type: string
          description: >
            Answering machine detection mode. Can be Enable or DetectMessageEnd.
        SendDigits:
          type: string
          description: >
            DTMF tones to send after connecting. Use w for half-second pause,
            W for one-second pause. Max 32 digits.

    IncomingPhoneNumberCreateParams:
      type: object
      description: Parameters for provisioning a new phone number
      properties:
        PhoneNumber:
          type: string
          description: >
            The phone number to purchase in E.164 format (e.g. +14155552344).
            Required if AreaCode is not provided.
        AreaCode:
          type: string
          description: >
            A three-digit US or Canada area code. Twilio will provision an available
            number in this area code. Required if PhoneNumber is not provided.
        FriendlyName:
          type: string
          description: A descriptive name for the phone number, up to 64 characters
        VoiceUrl:
          type: string
          description: URL to call when the phone number receives an incoming call
        VoiceMethod:
          type: string
          enum: ["GET", "POST"]
          description: HTTP method for VoiceUrl. Default POST.
        SmsUrl:
          type: string
          description: URL to call when the phone number receives an incoming SMS
        SmsMethod:
          type: string
          enum: ["GET", "POST"]
          description: HTTP method for SmsUrl. Default POST.
        StatusCallback:
          type: string
          description: URL to receive status callback notifications
        VoiceApplicationSid:
          type: string
          description: SID of the application to handle voice calls
        SmsApplicationSid:
          type: string
          description: SID of the application to handle SMS messages


