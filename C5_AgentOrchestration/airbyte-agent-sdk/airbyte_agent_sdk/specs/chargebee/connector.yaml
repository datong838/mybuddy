servers:
  - url: https://{site}.chargebee.com/api/v2
    description: Chargebee API server
    variables:
      site:
        default: your-site
        description: Your Chargebee site name (subdomain)
    x-airbyte-replication-environment-mapping:
      site: site

security:
  - basicAuth: []

paths:
  # ─── Customers ──────────────────────────────────────────
  "/customers":
    get:
      summary: List customers
      operationId: listCustomers
      x-airbyte-entity: customer
      x-airbyte-action: list
      x-airbyte-record-extractor: "$.list[*].customer"
      x-airbyte-meta-extractor:
        next_offset: "$.next_offset"
      parameters:
        - name: limit
          in: query
          description: Number of items to return (max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: offset
          in: query
          description: Cursor for pagination
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerList"
        "401":
          description: Unauthorized

  "/customers/{id}":
    get:
      summary: Retrieve a customer
      operationId: getCustomer
      x-airbyte-entity: customer
      x-airbyte-action: get
      x-airbyte-record-extractor: "$.customer"
      parameters:
        - name: id
          in: path
