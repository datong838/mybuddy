components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic authentication using your Chargebee API key as the username with an empty password.
      x-airbyte-auth-config:
        title: API Key Authentication
        type: object
        required:
          - api_key
        properties:
          api_key:
            type: string
            title: API Key
            description: Your Chargebee API key (used as the HTTP Basic username)
        auth_mapping:
          username: "${api_key}"
          password: ""
        replication_auth_key_mapping:
          site_api_key: "api_key"

  schemas:
    # ─── Customer ─────────────────────────────────────────
    Customer:
      type: object
      x-airbyte-entity-name: customer
      x-airbyte-stream-name: customer
      x-airbyte-ai-hints:
        summary: "Chargebee customers with billing details and subscription status"
        when_to_use: "Looking up customer billing info, subscriptions, or account status"
        trigger_phrases: ["chargebee customer", "billing customer", "subscriber", "who is paying"]
        freshness: live
        search_strategy: "Search by email, name, or customer ID"
        example_questions:
          - "Find a customer in Chargebee"
          - "Show customer billing details"
      description: Chargebee customer object
      required:
        - id
      properties:
        id:
          type: string
          description: Unique identifier for the customer
        first_name:
          type: string
          description: First name of the customer
        last_name:
          type: string
          description: Last name of the customer
        email:
          type: string
          description: Email address of the customer
        phone:
          type: string
          description: Phone number of the customer
        company:
          type: string
          description: Company name of the customer
        vat_number:
          type: string
          description: VAT/tax registration number
        auto_collection:
          type: string
          description: Automatic collection setting (on/off)
        offline_payment_method:
          type: string
          description: Preferred offline payment method
        net_term_days:
          type: integer
          description: Number of days for payment net terms
        vat_number_validated_time:
          type: integer
          description: Recent VAT number validation timestamp
        vat_number_status:
          type: string
          description: VAT validation status
        allow_direct_debit:
          type: boolean
          description: Whether the customer can pay via Direct Debit
        is_location_valid:
          type: boolean
          description: Whether the customer location is valid
        created_at:
          type: integer
          description: Timestamp when the customer was created
        created_from_ip:
          type: string
          description: IP address from which the customer was created
        taxability:
          type: string
          description: Taxability status of the customer
        entity_code:
          type: string
          description: Tax exemption category code
        exempt_number:
          type: string
          description: Tax exemption number
        resource_version:
          type: integer
          description: Version number of this resource
        updated_at:
