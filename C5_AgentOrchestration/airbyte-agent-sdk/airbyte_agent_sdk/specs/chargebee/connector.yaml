openapi: 3.1.0

info:
  title: Chargebee API Connector
  version: 1.0.2
  description: >
    Connector for the Chargebee billing and subscription management API.
    Supports reading subscriptions, customers, invoices, credit notes, coupons,
    transactions, events, orders, items, item prices, and payment sources.
    Chargebee is a recurring billing platform that helps SaaS and subscription
    businesses manage the full subscription lifecycle.
  x-airbyte-connector-name: chargebee
  x-airbyte-connector-definition-id: 686473f1-76d9-4994-9cc7-9b13da46147c
  x-airbyte-replication-version: "0.10.38"
  x-airbyte-replication-compatibility: ">=0.10.38, <1.0.0"
  x-airbyte-skip-suggested-streams:
    - plan
    - addon
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Chargebee.
    properties:
      start_date:
        type: string
        title: Start Date
        description: "UTC date and time in the format YYYY-MM-DDTHH:mm:ssZ. Data before this date is excluded."
        format: date-time
    required:
      - start_date
    replication_config_key_mapping:
      start_date: start_date
    replication_config_constants:
      start_date: "{{ day_delta(-180, '%Y-%m-%dT%H:%M:%SZ') }}"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Chargebee API Documentation
      url: https://apidocs.chargebee.com/docs/api
  x-airbyte-example-questions:
    direct:
      - "List all active subscriptions"
      - "Show me details for a specific customer"
      - "List recent invoices"
      - "Show me details for a specific subscription"
      - "List all coupons"
      - "List recent transactions"
      - "List recent events"
    search:
      - "Show me customers with the highest monthly recurring revenue"
      - "Which subscriptions are set to cancel in the next 30 days?"
      - "List all overdue invoices and their amounts"
      - "Analyze subscription churn trends over the past quarter"
      - "What are the most popular items by number of subscriptions?"
      - "Show me total revenue breakdown by currency"
      - "Identify customers with expiring payment sources"
      - "Compare subscription plan distribution across item prices"
      - "List all credit notes issued in the past month"
      - "What is the average subscription lifetime for each plan?"
    unsupported:
      - "Create a new subscription in Chargebee"
      - "Update a customer's billing address"
      - "Cancel a subscription"
      - "Apply a coupon to a subscription"
      - "Issue a refund for an invoice"
