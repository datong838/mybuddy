  /graphql:users:search:
    post:
      summary: Search GitHub users
      description: Search for GitHub users using search syntax
      operationId: Users_Search
      x-airbyte-entity: users
      x-airbyte-action: api_search
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.search.nodes
      x-airbyte-meta-extractor:
        has_next_page: $.data.search.pageInfo.hasNextPage
        end_cursor: $.data.search.pageInfo.endCursor
        total_count: $.data.search.userCount
      tags:
        - Users
      parameters:
        - name: query
          in: query
          required: true
          description: GitHub user search query using GitHub's search syntax
          schema:
            type: string
          examples:
            by_location:
              summary: Users in a location
              value: "location:san francisco"
            by_followers:
              summary: Users with many followers
              value: "followers:>1000"
            by_repos:
              summary: Users with many public repos
              value: "type:user repos:>50"
            by_language:
              summary: Users who code in a language
              value: "language:rust followers:>100"
            org_members:
              summary: Members of an organization
              value: "org:facebook type:user"
            hireable:
              summary: Users open to hiring
              value: 'location:"new york" is:hireable'
            recently_joined:
              summary: Users who joined recently
              value: "created:>=2025-01-01 followers:>10"
        - name: limit
          in: query
          required: false
          description: Number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: after
          in: query
          required: false
          description: Cursor for pagination
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: Optional array of field names to select
          schema:
            type: array
            items:
              type: string

      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: |
            query SearchUsers($searchQuery: String!, $first: Int!, $after: String) {
              search(query: $searchQuery, type: USER, first: $first, after: $after) {
                userCount
                pageInfo {
                  hasNextPage
                  endCursor
                }
                nodes {
                  ... on User {
                    {{ fields }}
                  }
                }
              }
            }
          variables:
            searchQuery: "{{ query }}"
            first: "{{ limit }}"
            after: "{{ after }}"
          default_fields: "id databaseId login name email bio company location websiteUrl twitterUsername url avatarUrl createdAt updatedAt isHireable followers { totalCount } following { totalCount } repositories { totalCount } starredRepositories { totalCount } organizations { totalCount }"

      responses:
        "200":
          description: User search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      search:
                        type: object
                        properties:
                          userCount:
                            type: integer
                          pageInfo:
                            type: object
                            properties:
                              hasNextPage:
                                type: boolean
                              endCursor:
                                type:
                                  - string
                                  - "null"
                          nodes:
                            type: array
                            items:
                              type: object

