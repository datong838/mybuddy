  # Pull Requests endpoints
  /graphql:pull_requests:list:
    post:
      summary: List pull requests for a repository
      description: Returns a list of pull requests for the specified repository using GraphQL
      operationId: PullRequests_List
      x-airbyte-entity: pull_requests
      x-airbyte-action: list
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.repository.pullRequests.nodes
      x-airbyte-meta-extractor:
        has_next_page: $.data.repository.pullRequests.pageInfo.hasNextPage
        end_cursor: $.data.repository.pullRequests.pageInfo.endCursor
      tags:
        - PullRequests
      parameters:
        - name: owner
          in: query
          required: true
          description: The account owner of the repository
          schema:
            type: string
        - name: repo
          in: query
          required: true
          description: The name of the repository
          schema:
            type: string
        - name: states
          in: query
          required: false
          description: Filter by pull request state
          schema:
            type: array
            items:
              type: string
              enum: [OPEN, CLOSED, MERGED]
        - name: per_page
          in: query
          required: false
          description: The number of results per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: after
          in: query
          required: false
          description: Cursor for pagination
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: Optional array of field names to select
          schema:
            type: array
            items:
              type: string

      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: |
            query ListPullRequests($owner: String!, $name: String!, $first: Int!, $after: String, $states: [PullRequestState!]) {
              repository(owner: $owner, name: $name) {
                pullRequests(first: $first, after: $after, states: $states, orderBy: {field: CREATED_AT, direction: DESC}) {
                  pageInfo {
                    hasNextPage
                    endCursor
                  }
                  nodes {
                    {{ fields }}
                  }
                }
              }
            }
          variables:
            owner: "{{ owner }}"
            name: "{{ repo }}"
            first: "{{ per_page }}"
            after: "{{ after }}"
            states: "{{ states }}"
          default_fields: "id databaseId number title body state isDraft createdAt updatedAt closedAt mergedAt author { login avatarUrl } baseRefName headRefName mergeable merged mergedBy { login } additions deletions changedFiles commits { totalCount } comments { totalCount } reviews { totalCount } reviewRequests { totalCount } assignees(first: 10) { nodes { login } } labels(first: 10) { nodes { name color } } url"

      responses:
        "200":
          description: List of pull requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      repository:
                        type: object
                        properties:
                          pullRequests:
                            type: object
                            properties:
                              pageInfo:
                                type: object
                                properties:
                                  hasNextPage:
                                    type: boolean
                                  endCursor:
                                    type:
                                      - string
                                      - "null"
                              nodes:
                                type: array
                                items:
                                  type: object
        "404":
          description: Repository not found

