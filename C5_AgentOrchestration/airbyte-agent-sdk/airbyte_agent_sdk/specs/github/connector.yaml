              summary: Open issues in a repository
              value: "repo:owner/name is:issue is:open"
            by_label:
              summary: Issues with a specific label
              value: "repo:owner/name is:issue label:bug"
            by_assignee:
              summary: Open issues assigned to a user
              value: "is:issue is:open assignee:username"
            updated_since:
              summary: Issues updated since a date
              value: "is:issue updated:>=2025-01-01"
            created_in_range:
              summary: Issues created in a date range
              value: "is:issue created:2025-01-01..2025-01-31"
            closed_since:
              summary: Issues closed since a date
              value: "is:issue is:closed closed:>=2025-01-01"
            org_with_filters:
              summary: Open bug issues in an organization
              value: "org:myorg is:issue is:open label:bug"
            by_author:
