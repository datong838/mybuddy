servers:
  - url: https://api.github.com
    description: GitHub API Server

security:
  - githubOAuth: []
  - githubPAT: []

components:
  securitySchemes:
    githubOAuth:
      type: oauth2
      description: GitHub OAuth 2.0 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://github.com/login/oauth/authorize
          tokenUrl: https://github.com/login/oauth/access_token
          scopes:
            repo: Full control of public and private repositories (read & write to code, issues, pull requests, releases, discussions)
            read:org: Read organization and team membership
            read:user: Read user profile data
            read:project: Read GitHub Projects (V2)
      x-airbyte-oauth-scopes:
        - scope: "repo"
          mode: read_write
          description: Full control of public and private repositories (read & write to code, issues, pull requests, releases, and repository discussions)
          entities:
            - branches
            - comments
            - commits
            - directory_content
            - discussions
            - file_content
            - issues
            - labels
            - milestones
            - org_repositories
            - pr_comments
            - pull_requests
            - releases
            - repositories
            - reviews
            - stargazers
            - tags
            - viewer_repositories
        - scope: "read:org"
          mode: read
          description: Read organization and team membership
          entities:
            - organizations
            - org_repositories
            - teams
            - users
        - scope: "read:user"
          mode: read
          description: Read the authenticated user's profile and other public user profiles
          entities:
            - users
            - viewer
        - scope: "read:project"
          mode: read
          description: Read GitHub Projects (V2)
          entities:
            - projects
            - project_items
      x-airbyte-auth-config:
        title: "OAuth 2"
        type: object
        required:
          - access_token
        properties:
          access_token:
            type: string
            title: "Access Token"
            description: "OAuth 2.0 access token"
        auth_mapping:
          access_token: "${access_token}"
        replication_auth_key_mapping:
          credentials.access_token: "access_token"
        replication_auth_key_constants:
          credentials.option_title: "OAuth Credentials"

    githubPAT:
      type: http
      scheme: bearer
      description: Personal Access Token (PAT) authentication
      x-airbyte-auth-config:
        title: "Personal Access Token"
        type: object
        required:
          - token
        properties:
          token:
            type: string
            title: "Personal Access Token"
            description: "GitHub personal access token (fine-grained or classic)"
        auth_mapping:
          token: "${token}"
        replication_auth_key_mapping:
          credentials.personal_access_token: "token"
        replication_auth_key_constants:
          credentials.option_title: "PAT Credentials"

  schemas:
