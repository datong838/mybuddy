openapi: 3.1.0
info:
  title: GitHub API Connector
  version: 0.1.19
  description: |
    GitHub is a platform for version control and collaborative software development
    using Git. This connector provides access to repositories, branches, commits, issues,
    pull requests, reviews, comments, releases, discussions, organizations, teams, and users for
    development workflow analysis and project management insights.
  x-airbyte-connector-name: github
  x-airbyte-connector-definition-id: ef69ef6e-aa7f-4af1-a01d-ef775033524e
  x-airbyte-replication-version: "2.1.33"
  x-airbyte-replication-compatibility: ">=2.1.33, <3.0.0"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: GitHub REST API Documentation
      url: https://docs.github.com/en/rest
    - type: api_release_history
      title: GitHub REST API Release History
      url: https://docs.github.com/en/rest/about-the-rest-api/api-versions
    - type: migration_guide
      title: GitHub REST API Migration Guide
      url: https://docs.github.com/en/rest/about-the-rest-api/breaking-changes
    - type: rate_limits
      title: GitHub REST API Rate Limits
      url: https://docs.github.com/en/rest/using-the-rest-api/rate-limits-for-the-rest-api
    - type: authentication_guide
      title: GitHub REST API Authentication Guide
      url: https://docs.github.com/en/rest/authentication/authenticating-to-the-rest-api
  x-airbyte-example-questions:
    direct:
      - "Show me all open issues in my repositories this month"
      - "List the top 5 repositories I've starred recently"
      - "Analyze the commit trends in my main project over the last quarter"
      - "Find all pull requests created in the past two weeks"
      - "Search for repositories related to machine learning in my organizations"
      - "Compare the number of contributors across my different team projects"
      - "Identify the most active branches in my main repository"
      - "Get details about the most recent releases in my organization"
      - "List all milestones for our current development sprint"
      - "Show me insights about pull request review patterns in our team"
      - "List all unanswered discussions in a repository"
      - "Show me recent discussions in the General category"
      - "Create a new issue titled 'Fix login bug' in my repository"
      - "Create an issue with labels 'bug' and 'urgent' in owner/repo"
      - "File a new bug report issue in our project repository"
      - "Create an issue and assign it to a team member"
      - "Open a new feature request issue in the repository"
      - "Close issue #42 in owner/repo as completed"
      - "Reopen issue #15 in our repository"
      - "Add the 'bug' and 'urgent' labels to issue #10"
      - "Assign user @johndoe to issue #25 in owner/repo"
      - "Update the title of issue #30 to 'New title'"
      - "Add a comment to issue #5 saying 'This has been fixed in the latest release'"
      - "Post a comment on pull request #100 with a status update"
      - "Create a pull request from feature-branch to main in owner/repo"
      - "Open a draft PR titled 'Add new feature' from my-branch to main"
    unsupported:
      - "Delete an old branch from the repository"
      - "Schedule a team review for this code"
      - "Merge a pull request"
      - "Delete an issue or comment"
  x-airbyte-skip-auth-methods:
    - oauth2
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from GitHub.
    properties:
      repositories:
        type: array
        title: GitHub Repositories
        description: "List of GitHub organizations/repositories, e.g. `airbytehq/airbyte` for single repository, `airbytehq/*` for all repositories from organization"
        items:
          type: string
      start_date:
        type: string
        title: Start Date
        description: UTC date and time in the format YYYY-MM-DDTHH:mm:ssZ from which to start replicating data.
        format: date-time
    required:
      - repositories
      - start_date
    replication_config_key_mapping:
      repositories: repositories
      start_date: start_date
    replication_config_constants:
      start_date: "{{ day_delta(-90, '%Y-%m-%dT%H:%M:%SZ') }}"
  x-airbyte-scoping:
    - param: owner
      config_key: repositories
      value_template: "{{ value.split('/')[0] if '/' in value and value.split('/')[0] else none }}"
    - param: repo
      config_key: repositories
      value_template: "{{ value.split('/')[1] if '/' in value and value.split('/')[1] and value.split('/')[1] != '*' else none }}"
    - param: username
      config_key: repositories
      value_template: "{{ value.split('/')[0] if '/' in value and value.split('/')[0] else none }}"
    - param: org
      config_key: repositories
      value_template: "{{ value.split('/')[0] if '/' in value and value.split('/')[0] else none }}"
  x-airbyte-entity-relationships:
    - source_entity: reviews
      target_entity: pull_requests
      foreign_key: number
      target_key: number
      cardinality: many_to_one
    - source_entity: comments
      target_entity: issues
      foreign_key: number
      target_key: number
      cardinality: many_to_one
    - source_entity: pr_comments
      target_entity: pull_requests
      foreign_key: number
      target_key: number
      cardinality: many_to_one
    - source_entity: project_items
      target_entity: projects
      foreign_key: project_number
      target_key: number
      cardinality: many_to_one
  x-airbyte-context-store:
    flush_batch_size_mb: 10
    disable_compaction: false
    entities:
      - entity: branches
        x-airbyte-name: branches
        fields:
          - name: name
            type: ["null", "string"]
            description: "Branch name (e.g. `main`, `feature/foo`)"
      - entity: comments
        suggested: true
        x-airbyte-name: comments
        fields:
          - name: id
            x-airbyte-name: node_id
            type: ["null", "string"]
            description: "GraphQL node ID of the comment"
          - name: databaseId
            x-airbyte-name: id
            type: ["null", "integer"]
            description: "REST API numeric identifier for the comment"
          - name: body
            type: ["null", "string"]
            description: "Markdown body of the comment"
          - name: createdAt
            x-airbyte-name: created_at
            type: ["null", "string"]
            description: "ISO 8601 timestamp when the comment was created"
          - name: updatedAt
            x-airbyte-name: updated_at
            type: ["null", "string"]
            description: "ISO 8601 timestamp when the comment was last updated"
          - name: url
            x-airbyte-name: html_url
            type: ["null", "string"]
            description: "Permalink to the comment on GitHub"
      - entity: commits
        x-airbyte-name: commits
        fields:
          - name: sha
            type: ["null", "string"]
            description: "Full Git commit SHA"
          - name: url
            x-airbyte-name: html_url
            type: ["null", "string"]
            description: "Permalink to the commit on GitHub"
          - name: createdAt
            x-airbyte-name: created_at
            type: ["null", "string"]
            description: "ISO 8601 timestamp of the commit"
      - entity: directory_content
        x-airbyte-name: null
        x-airbyte-skip-searchable-fields: "Directory listing endpoint returns tree entries for a specific path, not a record stream with a stable schema; no upstream source-github replication stream exists."
      - entity: discussions
        x-airbyte-name: null
        x-airbyte-skip-searchable-fields: "Upstream source-github replication does not include a discussions stream; only reachable via direct GraphQL calls (list, get, api_search)."
      - entity: file_content
        x-airbyte-name: null
        x-airbyte-skip-searchable-fields: "File payload retrieval endpoint returns a single blob (text or binary) for a specific path, not a record stream; no upstream source-github replication equivalent."
      - entity: issues
        suggested: true
        x-airbyte-name: issues
        fields:
          - name: id
            x-airbyte-name: node_id
            type: ["null", "string"]
            description: "GraphQL node ID of the issue"
          - name: databaseId
            x-airbyte-name: id
            type: ["null", "integer"]
