  # Issues create endpoint (REST API)
  /repos/{owner}/{repo}/issues:
    post:
      summary: Create an issue
      description: |
        Creates a new issue in the specified repository.
        Any user with pull access to a repository can create an issue.
        Labels and assignees are silently dropped if the authenticated user does not have push access.
      operationId: Issues_Create
      x-airbyte-entity: issues
      x-airbyte-action: create
      tags:
        - Issues
      parameters:
        - name: owner
          in: path
          required: true
          description: The account owner of the repository (username or organization)
          schema:
            type: string
        - name: repo
          in: path
          required: true
          description: The name of the repository
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueCreateParams"
      responses:
        "201":
          description: Issue created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueResponse"
        "400":
          description: Bad request
        "403":
          description: Forbidden
        "404":
          description: Repository not found
        "410":
          description: Issues are disabled for this repository
        "422":
