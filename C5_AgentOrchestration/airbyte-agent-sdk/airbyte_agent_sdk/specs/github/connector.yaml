  /graphql:pull_requests:search:
    post:
      summary: Search pull requests
      description: Search for pull requests using GitHub's search syntax
      operationId: PullRequests_Search
      x-airbyte-entity: pull_requests
      x-airbyte-action: api_search
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.search.nodes
      x-airbyte-meta-extractor:
        has_next_page: $.data.search.pageInfo.hasNextPage
        end_cursor: $.data.search.pageInfo.endCursor
        total_count: $.data.search.issueCount
      tags:
        - PullRequests
      parameters:
        - name: query
          in: query
          required: true
          description: GitHub pull request search query using GitHub's search syntax
          schema:
            type: string
          examples:
            open_in_repo:
              summary: Open PRs in a repository
              value: "repo:owner/name type:pr is:open"
            by_author:
              summary: PRs by a specific author
              value: "type:pr is:open author:username"
            merged_since:
              summary: PRs merged since a date
              value: "type:pr is:merged merged:>=2025-01-01"
            review_approved:
              summary: Open PRs with approved reviews
              value: "type:pr is:open review:approved"
            review_required:
              summary: Open PRs needing review
              value: "type:pr is:open review:required"
            draft_prs:
              summary: Draft PRs in a repository
              value: "repo:owner/name type:pr is:open draft:true"
            by_label:
              summary: PRs with a specific label
              value: "repo:owner/name type:pr label:bug"
            updated_since:
              summary: PRs updated since a date
              value: "type:pr updated:>=2025-01-01"
        - name: per_page
          in: query
          required: false
          description: The number of results per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: after
          in: query
          required: false
          description: Cursor for pagination
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: Optional array of field names to select
          schema:
            type: array
            items:
              type: string

      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: |
            query SearchPullRequests($searchQuery: String!, $first: Int!, $after: String) {
              search(query: $searchQuery, type: ISSUE, first: $first, after: $after) {
                issueCount
                pageInfo {
                  hasNextPage
                  endCursor
                }
                nodes {
                  ... on PullRequest {
                    {{ fields }}
                  }
                }
              }
            }
          variables:
            searchQuery: "{{ query }}"
            first: "{{ per_page }}"
            after: "{{ after }}"
          default_fields: "id databaseId number title body state isDraft createdAt updatedAt closedAt mergedAt author { login avatarUrl } baseRefName headRefName mergeable merged mergedBy { login } additions deletions changedFiles commits { totalCount } comments { totalCount } reviews { totalCount } reviewRequests { totalCount } assignees(first: 10) { nodes { login } } labels(first: 10) { nodes { name color } } url"

      responses:
        "200":
          description: Pull request search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      search:
                        type: object
                        properties:
                          issueCount:
                            type: integer
                          pageInfo:
                            type: object
                            properties:
                              hasNextPage:
                                type: boolean
                              endCursor:
