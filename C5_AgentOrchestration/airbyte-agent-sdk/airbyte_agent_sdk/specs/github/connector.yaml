        total_count: $.data.search.discussionCount
      tags:
        - Discussions
      parameters:
        - name: query
          in: query
          required: true
          description: GitHub discussion search query using GitHub's search syntax
          schema:
            type: string
          examples:
            in_repo:
              summary: Discussions in a repository
              value: "repo:owner/name type:discussions"
            answered:
              summary: Answered discussions
              value: "repo:owner/name type:discussions is:answered"
            unanswered:
              summary: Unanswered discussions
              value: "repo:owner/name type:discussions is:unanswered"
            by_category:
              summary: Discussions in a specific category
              value: "repo:owner/name type:discussions category:General"
            by_author:
              summary: Discussions by a specific user
              value: "repo:owner/name type:discussions author:username"
            recent:
              summary: Recent discussions
              value: "repo:owner/name type:discussions created:>=2025-01-01"
            open_discussions:
              summary: Open discussions
              value: "repo:owner/name type:discussions is:open"
        - name: per_page
          in: query
          required: false
          description: The number of results per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: after
          in: query
          required: false
          description: Cursor for pagination
          schema:
            type: string
        - name: fields
          in: query
          required: false
          description: Optional array of field names to select
          schema:
            type: array
            items:
              type: string

      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: |
            query SearchDiscussions($searchQuery: String!, $first: Int!, $after: String) {
              search(query: $searchQuery, type: DISCUSSION, first: $first, after: $after) {
                discussionCount
                pageInfo {
                  hasNextPage
                  endCursor
                }
                nodes {
                  ... on Discussion {
                    {{ fields }}
                  }
                }
              }
            }
          variables:
            searchQuery: "{{ query }}"
            first: "{{ per_page }}"
            after: "{{ after }}"
          default_fields: "id databaseId number title body createdAt updatedAt closedAt closed locked stateReason upvoteCount url isAnswered answerChosenAt author { login avatarUrl } category { id name slug emoji isAnswerable } answerChosenBy { login } answer { id body author { login } createdAt } labels(first: 10) { nodes { name color } } comments { totalCount }"

      responses:
        "200":
          description: Discussion search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      search:
                        type: object
                        properties:
                          discussionCount:
                            type: integer
                          pageInfo:
                            type: object
                            properties:
                              hasNextPage:
                                type: boolean
                              endCursor:
                                type:
                                  - string
                                  - "null"
                          nodes:
                            type: array
                            items:
                              type: object

  # File Content endpoints
  /graphql:file_content:get:
    post:
      summary: Get file content from a repository
      description: |
        Returns the text content of a file at a specific path and git ref (branch, tag, or commit SHA).
        Only works for text files. Binary files will have text as null and isBinary as true.
      operationId: FileContent_Get
      x-airbyte-entity: file_content
      x-airbyte-action: get
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.repository.object
      tags:
        - Files
      parameters:
        - name: owner
          in: query
          required: true
          description: The account owner of the repository
          schema:
            type: string
        - name: repo
          in: query
          required: true
          description: The name of the repository
          schema:
            type: string
        - name: path
          in: query
          required: true
          description: "The file path within the repository (e.g. 'README.md' or 'src/main.py')"
          schema:
            type: string
        - name: ref
          in: query
          required: false
          description: "The git ref to read from — branch name, tag, or commit SHA. Defaults to 'HEAD' (default branch)"
          schema:
            type: string
            default: HEAD
        - name: fields
          in: query
          required: false
          description: Optional array of field names to select
          schema:
            type: array
            items:
              type: string

      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: |
            query GetFileContent($owner: String!, $name: String!, $expression: String!) {
              repository(owner: $owner, name: $name) {
                object(expression: $expression) {
                  ... on Blob {
                    {{ fields }}
                  }
                }
              }
            }
          variables:
            owner: "{{ owner }}"
            name: "{{ repo }}"
            expression: "{{ ref }}:{{ path }}"
          default_fields: "text byteSize isBinary isTruncated oid abbreviatedOid"

      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      repository:
                        type: object
                        properties:
                          object:
                            type: object
        "404":
          description: Repository or file not found

  # Directory Content endpoints
  /graphql:directory_content:list:
    post:
      summary: List directory contents in a repository
      description: |
        Returns a list of files and subdirectories at a specific path in the repository.
        Each entry includes the name, type (blob for files, tree for directories), and object ID.
        Use this to explore repository structure before reading specific files.
      operationId: DirectoryContent_List
      x-airbyte-entity: directory_content
      x-airbyte-action: list
      x-airbyte-path-override:
        path: /graphql
      x-airbyte-record-extractor: $.data.repository.object.entries
      x-airbyte-no-pagination: "The GitHub GraphQL Tree.entries connection returns the full set of directory entries for the requested path in a single response and does not expose pagination arguments."
      tags:
        - Files
      parameters:
        - name: owner
          in: query
          required: true
          description: The account owner of the repository
          schema:
            type: string
        - name: repo
          in: query
          required: true
          description: The name of the repository
          schema:
            type: string
        - name: path
          in: query
          required: true
          description: "The directory path within the repository (e.g. 'src' or 'airbyte-integrations/connectors/source-stripe')"
          schema:
            type: string
            default: ""
        - name: ref
          in: query
          required: false
          description: "The git ref — branch name, tag, or commit SHA. Defaults to 'HEAD' (default branch)"
          schema:
            type: string
            default: HEAD
        - name: fields
          in: query
          required: false
          description: Optional array of field names to select
          schema:
            type: array
            items:
              type: string

      requestBody:
        required: true
        x-airbyte-body-type:
          type: graphql
          query: |
            query ListDirectoryContent($owner: String!, $name: String!, $expression: String!) {
              repository(owner: $owner, name: $name) {
                object(expression: $expression) {
                  ... on Tree {
                    entries {
                      {{ fields }}
                    }
                  }
                }
              }
            }
          variables:
            owner: "{{ owner }}"
            name: "{{ repo }}"
            expression: "{{ ref }}:{{ path }}"
          default_fields: "name type oid path"

      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      repository:
                        type: object
                        properties:
                          object:
                            type: object
                            properties:
                              entries:
                                type: array
                                items:
                                  type: object
        "404":
          description: Repository or path not found
