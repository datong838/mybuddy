components:
  securitySchemes:
    mondayOAuth:
      type: oauth2
      description: Monday.com OAuth 2.0 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://auth.monday.com/oauth2/authorize
          tokenUrl: https://auth.monday.com/oauth2/token
          refreshUrl: https://auth.monday.com/oauth2/token
          scopes:
            me:read: Read current user info
            boards:read: Read boards
            workspaces:read: Read workspaces
            users:read: Read users
            account:read: Read account info
            updates:read: Read updates
            assets:read: Read assets
            tags:read: Read tags
            teams:read: Read teams
      x-airbyte-oauth-scopes:
        - scope: "me:read"
          mode: read
          entities: ["users"]
          description: Read the current authenticated user's profile
        - scope: "boards:read"
          mode: read
          entities: ["boards", "items", "activity_logs"]
          description: Read boards, their items, and activity logs
        - scope: "workspaces:read"
          mode: read
          entities: ["workspaces"]
          description: Read workspaces
        - scope: "users:read"
          mode: read
          entities: ["users"]
          description: Read user accounts
        - scope: "account:read"
          mode: read
          entities: ["workspaces"]
          description: Read general account info including workspace account_product
        - scope: "assets:read"
          mode: read
          entities: ["updates", "items"]
          description: Read file assets attached to updates and items
        - scope: "updates:read"
          mode: read
          entities: ["updates"]
          description: Read updates and comments
        - scope: "tags:read"
          mode: read
          entities: ["tags"]
          description: Read tags
        - scope: "teams:read"
          mode: read
          entities: ["teams"]
          description: Read teams
      x-airbyte-auth-config:
        title: OAuth 2.0 Authentication
        type: object
        required:
          - access_token
          - client_id
          - client_secret
        properties:
          access_token:
            type: string
            title: Access Token
            description: Access token obtained via OAuth 2.0 flow
          client_id:
            type: string
            title: Client ID
            description: The Client ID of your Monday.com OAuth application
          client_secret:
            type: string
            title: Client Secret
            description: The Client Secret of your Monday.com OAuth application
        auth_mapping:
          access_token: "${access_token}"
          client_id: "${client_id}"
          client_secret: "${client_secret}"
        additional_headers:
          API-Version: "2026-07"
        replication_auth_key_mapping:
          credentials.access_token: "access_token"
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
        replication_auth_key_constants:
          credentials.auth_type: "oauth2.0"
          credentials.subdomain: ""

    mondayApiToken:
      type: http
      scheme: bearer
      description: Monday.com personal API token authentication
      x-airbyte-auth-config:
        title: API Token Authentication
        type: object
        required:
          - api_key
        properties:
          api_key:
            type: string
            title: API Token
            description: Your Monday.com personal API token
        auth_mapping:
          token: "${api_key}"
        additional_headers:
          API-Version: "2026-07"
        replication_auth_key_mapping:
          credentials.api_token: "api_key"
        replication_auth_key_constants:
          credentials.auth_type: "api_token"

