openapi: 3.1.0

info:
  title: Monday.com API Connector
  version: 2.0.0
  description: >
    Connector for the Monday.com platform API. Monday.com is a work operating system
    that enables teams to build workflows for project management, CRM, software development,
    and more. This connector provides read access to boards, items, users, teams, tags,
    updates, workspaces, and activity logs via the Monday.com GraphQL API (v2).
  x-airbyte-connector-name: monday
  x-airbyte-connector-definition-id: 80a54ea2-9959-4040-aac1-eee42423ec9b
  x-airbyte-replication-version: "2.5.11"
  x-airbyte-replication-compatibility: ">=2.5.11, <3.0.0"
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Monday.com.
    properties: {}
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Monday.com API Reference
      url: https://developer.monday.com/api-reference/docs
    - type: authentication_guide
      title: Monday.com Authentication
      url: https://developer.monday.com/api-reference/docs/authentication
    - type: rate_limits
      title: Monday.com Rate Limits
      url: https://developer.monday.com/api-reference/docs/rate-limits

  x-airbyte-example-questions:
    direct:
      - "List all users in the Monday.com account"
      - "Show me all boards"
      - "Get the details of board 18395979459"
      - "List all teams"
      - "Show me all tags"
      - "List recent updates"
    search:
      - "Which boards were updated in the last week?"
      - "Find all items assigned to a specific group"
      - "What are the most active boards by update count?"
      - "Show me all users who are admins"
      - "List items with their column values from a specific board"
    unsupported:
      - "Create a new board"
      - "Delete an item"
      - "Update a column value"
      - "Add a new user to the account"
      - "Create a webhook subscription"

  x-airbyte-entity-relationships:
  - source_entity: items
    target_entity: boards
    foreign_key: board_id
    target_key: id
    cardinality: many_to_one
  - source_entity: activity_logs
    target_entity: boards
    foreign_key: board_id
    target_key: id
    cardinality: many_to_one

  x-airbyte-context-store:
    disable_compaction: true
    entities:
      - entity: activity_logs
        x-airbyte-name: activity_logs
        fields:
          - name: board_id
            type: ["null", "integer"]
            description: Board ID the activity belongs to
          - name: created_at
            type: ["null", "string"]
            description: When the activity occurred
          - name: created_at_int
            type: ["null", "integer"]
            description: When the activity occurred (Unix timestamp)
          - name: data
            type: ["null", "string"]
            description: Event data (JSON string)
          - name: entity
            type: ["null", "string"]
            description: Entity type that was affected
          - name: event
            type: ["null", "string"]
            description: Event type
          - name: id
            type: ["null", "string"]
            description: Unique activity log identifier
          - name: pulse_id
            type: ["null", "integer"]
            description: Item (pulse) ID the activity belongs to
          - name: user_id
            type: ["null", "string"]
            description: ID of the user who performed the action
      - entity: boards
        x-airbyte-name: boards
        suggested: true
        fields:
          - name: board_kind
            type: ["null", "string"]
            description: Board kind (public, private, share)
          - name: columns
            type: ["null", "array"]
            description: Board columns
          - name: communication
            type: ["null", "string"]
            description: Board communication value
          - name: creator
            type: ["null", "object"]
            description: Board creator
            properties:
              id:
                type: ["null", "string"]
          - name: description
            type: ["null", "string"]
            description: Board description
          - name: groups
            type: ["null", "array"]
            description: Board groups
          - name: id
            type: ["null", "string"]
            description: Unique board identifier
          - name: name
            type: ["null", "string"]
            description: Board name
          - name: owners
            type: ["null", "array"]
            description: Board owners
          - name: permissions
            type: ["null", "string"]
            description: Board permissions
          - name: state
            type: ["null", "string"]
            description: Board state (active, archived, deleted)
          - name: subscribers
            type: ["null", "array"]
            description: Board subscribers
          - name: tags
            type: ["null", "array"]
            description: Board tags
          - name: top_group
            type: ["null", "object"]
            description: Top group on the board
            properties:
              id:
                type: ["null", "string"]
          - name: type
            type: ["null", "string"]
            description: Board type
          - name: updated_at
            type: ["null", "string"]
            description: When the board was last updated
          - name: updated_at_int
            type: ["null", "integer"]
            description: When the board was last updated (Unix timestamp)
          - name: updates
            type: ["null", "array"]
            description: Board updates
          - name: views
            type: ["null", "array"]
            description: Board views
          - name: workspace
            type: ["null", "object"]
            description: Workspace the board belongs to
            properties:
              id:
                type: ["null", "string"]
              name:
                type: ["null", "string"]
              kind:
                type: ["null", "string"]
              description:
                type: ["null", "string"]
      - entity: items
        x-airbyte-name: items
        suggested: true
        fields:
          - name: assets
            type: ["null", "array"]
            description: Files attached to the item
          - name: board
            type: ["null", "object"]
            description: Board the item belongs to
            properties:
              id:
                type: ["null", "string"]
              name:
                type: ["null", "string"]
          - name: column_values
            type: ["null", "array"]
            description: Item column values
          - name: created_at
            type: ["null", "string"]
            description: When the item was created
          - name: creator_id
            type: ["null", "string"]
            description: ID of the user who created the item
          - name: group
            type: ["null", "object"]
            description: Group the item belongs to
            properties:
              id:
                type: ["null", "string"]
          - name: id
            type: ["null", "string"]
            description: Unique item identifier
          - name: name
            type: ["null", "string"]
            description: Item name
          - name: parent_item
            type: ["null", "object"]
            description: Parent item (for subitems)
            properties:
              id:
                type: ["null", "string"]
          - name: state
            type: ["null", "string"]
            description: Item state (active, archived, deleted)
          - name: subscribers
            type: ["null", "array"]
            description: Item subscribers
          - name: updated_at
            type: ["null", "string"]
            description: When the item was last updated
          - name: updated_at_int
            type: ["null", "integer"]
            description: When the item was last updated (Unix timestamp)
          - name: updates
            type: ["null", "array"]
            description: Item updates
      - entity: tags
        x-airbyte-name: tags
        suggested: true
        fields:
          - name: color
            type: ["null", "string"]
            description: Tag color
          - name: id
            type: ["null", "string"]
            description: Unique tag identifier
          - name: name
            type: ["null", "string"]
            description: Tag name
      - entity: teams
        x-airbyte-name: teams
        suggested: true
        fields:
          - name: id
            type: ["null", "integer"]
            description: Unique team identifier
          - name: name
            type: ["null", "string"]
            description: Team name
          - name: picture_url
            type: ["null", "string"]
            description: Team picture URL
          - name: users
            type: ["null", "array"]
            description: Team members
      - entity: updates
        x-airbyte-name: updates
        suggested: true
        fields:
          - name: assets
            type: ["null", "array"]
            description: Files attached to this update
          - name: body
            type: ["null", "string"]
            description: Update body (HTML)
          - name: created_at
            type: ["null", "string"]
            description: When the update was created
          - name: creator_id
            type: ["null", "string"]
            description: ID of the user who created the update
          - name: id
            type: ["null", "string"]
            description: Unique update identifier
          - name: item_id
            type: ["null", "string"]
            description: ID of the item this update belongs to
          - name: replies
            type: ["null", "array"]
            description: Replies to this update
          - name: text_body
            type: ["null", "string"]
            description: Update body (plain text)
          - name: updated_at
            type: ["null", "string"]
            description: When the update was last modified
      - entity: users
        x-airbyte-name: users
        suggested: true
        # NOTE: This cache entity is validated against the upstream source-monday manifest
        # in airbytehq/airbyte, which still targets API 2026-01 and has not yet migrated
        # to the 2026-07 User shape. The new 2026-07 fields (became_active_at,
        # is_email_confirmed, kind, photo_url, status) are intentionally excluded here
        # until source-monday ships equivalent replication support; at that point they
        # should be added back so the semantic cache can populate them.
        fields:
          - name: birthday
            type: ["null", "string"]
            description: User's birthday
          - name: country_code
            type: ["null", "string"]
            description: User's country code
          - name: created_at
            type: ["null", "string"]
            description: When the user was created
          - name: email
            type: ["null", "string"]
            description: User's email address
          - name: id
            type: ["null", "string"]
            description: Unique user identifier
          - name: location
            type: ["null", "string"]
            description: User's location
          - name: mobile_phone
            type: ["null", "string"]
            description: User's mobile phone number
          - name: name
            type: ["null", "string"]
            description: User's display name
          - name: phone
            type: ["null", "string"]
            description: User's phone number
          - name: time_zone_identifier
            type: ["null", "string"]
            description: User's timezone identifier
          - name: title
            type: ["null", "string"]
            description: User's job title
          - name: url
            type: ["null", "string"]
            description: User's Monday.com profile URL
          - name: utc_hours_diff
            type: ["null", "number"]
            description: UTC hours difference for the user's timezone (Float under API 2026-07)
      - entity: workspaces
        x-airbyte-name: workspaces
        suggested: true
        fields:
          - name: account_product
            type: ["null", "object"]
            description: Account product info
            properties:
              id:
                type: ["null", "string"]
              kind:
                type: ["null", "string"]
          - name: created_at
            type: ["null", "string"]
            description: When the workspace was created
          - name: description
            type: ["null", "string"]
            description: Workspace description
          - name: id
            type: ["null", "string"]
            description: Unique workspace identifier
          - name: kind
            type: ["null", "string"]
            description: Workspace kind (open, closed)
          - name: name
            type: ["null", "string"]
            description: Workspace name
          - name: owners_subscribers
            type: ["null", "array"]
            description: Owner subscribers
          - name: settings
            type: ["null", "object"]
            description: Workspace settings
            properties:
              icon:
                type: ["null", "object"]
                properties:
                  color:
                    type: ["null", "string"]
                  image:
                    type: ["null", "string"]
          - name: state
            type: ["null", "string"]
            description: Workspace state
          - name: team_owners_subscribers
            type: ["null", "array"]
            description: Team owner subscribers
          - name: teams_subscribers
            type: ["null", "array"]
            description: Team subscribers
          - name: users_subscribers
            type: ["null", "array"]
            description: User subscribers

servers:
  - url: https://api.monday.com
    description: Monday.com API server

security:
  - mondayOAuth: []
  - mondayApiToken: []

paths:
  /graphql:users:list:
    post:
      summary: List users
      description: Returns all users in the Monday.com account
      operationId: listUsers
      x-airbyte-entity: users
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data.users
      x-airbyte-preferred-for-check: true
      x-airbyte-no-pagination: "Monday.com GraphQL users() field accepts page/limit variables but the response exposes no next-page cursor or total count; pagination termination is derived client-side from page-size exhaustion. limit is pinned at the API 2026-07 maximum (1000) per page."
      x-airbyte-path-override:
        path: /v2
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Number of users to return per page (API 2026-07 maximum is 1000)
          schema:
            type: integer
            default: 1000
      requestBody:
        x-airbyte-body-type:
          type: graphql
          query: |
            query($page: Int, $limit: Int) {
              users(page: $page, limit: $limit) {
                id
                name
                email
                birthday
                country_code
                created_at
                kind
                status
                is_email_confirmed
                became_active_at
                location
                mobile_phone
                phone
                photo_url {
                  original
                  small
                  thumb
                  thumb_small
                  tiny
                }
                time_zone_identifier
                title
                url
                utc_hours_diff
              }
            }
          variables:
            page: "{{ page }}"
            limit: "{{ limit }}"
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /graphql:users:get:
    post:
      summary: Get a user
      description: Returns a single user by ID
      operationId: getUser
      x-airbyte-entity: users
      x-airbyte-action: get
      x-airbyte-record-extractor: $.data.users[0]
      x-airbyte-path-override:
        path: /v2
      parameters:
        - name: id
          in: query
          required: true
          description: User ID
          schema:
            type: string
      requestBody:
        x-airbyte-body-type:
          type: graphql
          query: |
            query($ids: [ID!]) {
              users(ids: $ids) {
                id
                name
                email
                birthday
                country_code
                created_at
                kind
                status
                is_email_confirmed
                became_active_at
                location
                mobile_phone
                phone
                photo_url {
                  original
                  small
                  thumb
                  thumb_small
                  tiny
                }
                time_zone_identifier
                title
                url
                utc_hours_diff
              }
            }
          variables:
            ids: "{{ id }}"
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
        "404":
          description: User not found
        "401":
          description: Unauthorized

  /graphql:boards:list:
    post:
      summary: List boards
      description: Returns all boards in the Monday.com account
      operationId: listBoards
      x-airbyte-entity: boards
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data.boards
      x-airbyte-no-pagination: "Monday.com GraphQL boards() field accepts page/limit variables but the response exposes no next-page cursor or total count; pagination termination is derived client-side from page-size exhaustion."
      x-airbyte-path-override:
        path: /v2
      requestBody:
        x-airbyte-body-type:
          type: graphql
          query: |
            query($page: Int, $limit: Int) {
              boards(page: $page, limit: $limit) {
                id
                name
                board_kind
                type
                description
                permissions
                state
                updated_at
                columns {
                  archived
                  description
                  id
                  settings_str
                  title
                  type
                  width
                }
                groups {
                  archived
                  color
                  deleted
                  id
                  position
                  title
                }
                owners {
                  id
                }
                creator {
                  id
                }
                subscribers {
                  id
                }
                tags {
                  id
                }
                top_group {
                  id
                }
                views {
                  id
                  name
                  settings_str
                  type
                  view_specific_data_str
                }
                workspace {
                  id
                  name
                  kind
                  description
                }
              }
            }
          variables:
            page: "{{ page }}"
            limit: "{{ limit }}"
      responses:
        "200":
          description: List of boards
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      boards:
                        type: array
                        items:
                          $ref: "#/components/schemas/Board"
        "401":
          description: Unauthorized

  /graphql:boards:get:
    post:
      summary: Get a board
      description: Returns a single board by ID
      operationId: getBoard
      x-airbyte-entity: boards
      x-airbyte-action: get
      x-airbyte-record-extractor: $.data.boards[0]
      x-airbyte-path-override:
        path: /v2
      parameters:
        - name: id
          in: query
          required: true
          description: Board ID
          schema:
            type: string
      requestBody:
        x-airbyte-body-type:
          type: graphql
          query: |
            query($ids: [ID!]) {
              boards(ids: $ids) {
                id
                name
                board_kind
                type
                description
                permissions
                state
                updated_at
                columns {
                  archived
                  description
                  id
                  settings_str
                  title
                  type
                  width
                }
                groups {
                  archived
                  color
                  deleted
                  id
                  position
                  title
                }
                owners {
                  id
                }
                creator {
                  id
                }
                subscribers {
                  id
                }
                tags {
                  id
                }
                top_group {
                  id
                }
                views {
                  id
                  name
                  settings_str
                  type
                  view_specific_data_str
                }
                workspace {
                  id
                  name
                  kind
                  description
                }
              }
            }
          variables:
            ids: "{{ id }}"
      responses:
        "200":
          description: Board object
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      boards:
                        type: array
                        items:
                          $ref: "#/components/schemas/Board"
        "404":
          description: Board not found
        "401":
          description: Unauthorized

  /graphql:items:list:
    post:
      summary: List items
      description: Returns items from boards. Queries items through the boards endpoint using items_page for pagination.
      operationId: listItems
      x-airbyte-entity: items
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data.boards[*].items_page.items
      x-airbyte-no-pagination: "Monday.com GraphQL items_page connection returns a cursor, but this list endpoint queries the top-level items() field via boards; response contains no next-page metadata extractable to a fixed JSONPath."
      x-airbyte-path-override:
        path: /v2
      parameters:
        - name: board_id
          in: query
          required: true
          description: Board ID to fetch items from
          schema:
            type: string
      requestBody:
        x-airbyte-body-type:
          type: graphql
          query: |
            query($boardId: [ID!], $limit: Int) {
              boards(ids: $boardId) {
                items_page(limit: $limit) {
                  items {
                    id
                    name
                    created_at
                    creator_id
                    state
                    updated_at
                    board {
                      id
                      name
                    }
                    group {
                      id
                    }
                    parent_item {
                      id
                    }
                    column_values {
                      id
                      text
                      type
                      value
                    }
                    subscribers {
                      id
                    }
                  }
                }
              }
            }
          variables:
            boardId: "{{ board_id }}"
            limit: "{{ limit }}"
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      boards:
                        type: array
                        items:
                          type: object
                          properties:
                            items_page:
                              type: object
                              properties:
                                items:
                                  type: array
                                  items:
                                    $ref: "#/components/schemas/Item"
        "401":
          description: Unauthorized

  /graphql:items:get:
    post:
      summary: Get an item
      description: Returns a single item by ID
      operationId: getItem
      x-airbyte-entity: items
      x-airbyte-action: get
      x-airbyte-record-extractor: $.data.items[0]
      x-airbyte-path-override:
        path: /v2
      parameters:
        - name: id
          in: query
          required: true
          description: Item ID
          schema:
            type: string
      requestBody:
        x-airbyte-body-type:
          type: graphql
          query: |
            query($ids: [ID!]) {
              items(ids: $ids) {
                id
                name
                created_at
                creator_id
                state
                updated_at
                board {
                  id
                  name
                }
                group {
                  id
                }
                parent_item {
                  id
                }
                column_values {
                  id
                  text
                  type
                  value
                }
                subscribers {
                  id
                }
              }
            }
          variables:
            ids: "{{ id }}"
      responses:
        "200":
          description: Item object
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Item"
        "404":
          description: Item not found
        "401":
          description: Unauthorized

  /graphql:teams:list:
    post:
      summary: List teams
      description: Returns all teams in the Monday.com account
      operationId: listTeams
      x-airbyte-entity: teams
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data.teams
      x-airbyte-no-pagination: "Monday.com GraphQL teams() field returns the full collection in a single response; the API does not expose pagination on this endpoint."
      x-airbyte-path-override:
        path: /v2
      requestBody:
        x-airbyte-body-type:
          type: graphql
          query: |
            query {
              teams {
                id
                name
                picture_url
                users {
                  id
                }
              }
            }
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      teams:
                        type: array
                        items:
                          $ref: "#/components/schemas/Team"
        "401":
          description: Unauthorized

  /graphql:teams:get:
    post:
      summary: Get a team
      description: Returns a single team by ID
      operationId: getTeam
      x-airbyte-entity: teams
      x-airbyte-action: get
      x-airbyte-record-extractor: $.data.teams[0]
      x-airbyte-path-override:
        path: /v2
      parameters:
        - name: id
          in: query
          required: true
          description: Team ID
          schema:
            type: string
      requestBody:
        x-airbyte-body-type:
          type: graphql
          query: |
            query($ids: [ID!]) {
              teams(ids: $ids) {
                id
                name
                picture_url
                users {
                  id
                }
              }
            }
          variables:
            ids: "{{ id }}"
      responses:
        "200":
          description: Team object
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      teams:
                        type: array
                        items:
                          $ref: "#/components/schemas/Team"
        "404":
          description: Team not found
        "401":
          description: Unauthorized

  /graphql:tags:list:
    post:
      summary: List tags
      description: Returns all tags in the Monday.com account
      operationId: listTags
      x-airbyte-entity: tags
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data.tags
      x-airbyte-no-pagination: "Monday.com GraphQL tags() field returns the full collection in a single response; the API does not expose pagination on this endpoint."
      x-airbyte-path-override:
        path: /v2
      requestBody:
        x-airbyte-body-type:
          type: graphql
          query: |
            query {
              tags {
                id
                name
                color
              }
            }
      responses:
