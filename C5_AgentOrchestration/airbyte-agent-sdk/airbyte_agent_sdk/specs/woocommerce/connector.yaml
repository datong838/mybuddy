openapi: 3.1.0

info:
  title: WooCommerce API Connector
  version: 1.0.5
  description: |
    Connector for the WooCommerce REST API (v3). Provides read access to a WooCommerce store's
    customers, orders, products, coupons, product categories, tags, reviews, attributes,
    variations, order notes, refunds, payment gateways, shipping methods, shipping zones,
    tax rates, and tax classes. Requires a WooCommerce store URL and REST API consumer
    key / consumer secret for authentication.
  x-airbyte-connector-name: woocommerce
  x-airbyte-connector-definition-id: 2a2552ca-9f78-4c1c-9eb7-4d0dc66d72df
  x-airbyte-replication-version: "0.5.41"
  x-airbyte-replication-compatibility: ">=0.5.41, <1.0.0"
  x-airbyte-external-documentation-urls:
  - type: api_reference
    title: WooCommerce REST API Documentation
    url: https://woocommerce.github.io/woocommerce-rest-api-docs/
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from WooCommerce.
    properties:
      start_date:
        type: string
        title: Start Date
        description: UTC date in the format YYYY-MM-DD from which to start replicating data.
        format: date
    required:
    - start_date
    replication_config_key_mapping:
      start_date: start_date
    replication_config_constants:
      start_date: "{{ day_delta(-180, '%Y-%m-%d') }}"
  x-airbyte-example-questions:
    direct:
    - "List all customers in WooCommerce"
    - "Show me all orders"
    - "List all products"
    - "Show me all coupons"
    - "List all product categories"
    - "Show me the product reviews"
    - "List all shipping zones"
    - "Show me the tax rates"
    - "List all payment gateways"
    search:
    - "Find orders placed this month"
    - "What are the top-selling products?"
    - "Show me customers who have made purchases"
    - "Find all coupons expiring this year"
    - "What orders are still processing?"
    unsupported:
    - "Create a new product"
    - "Update an order status"
    - "Delete a customer"
    - "Apply a coupon to an order"
    - "Process a refund"
  x-airbyte-entity-relationships:
  - source_entity: product_variations
    target_entity: products
    foreign_key: product_id
    target_key: id
    cardinality: many_to_one
  - source_entity: order_notes
    target_entity: orders
    foreign_key: order_id
    target_key: id
    cardinality: many_to_one
  - source_entity: refunds
    target_entity: orders
    foreign_key: order_id
    target_key: id
    cardinality: many_to_one
