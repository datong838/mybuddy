          maximum: 100
          default: 10
      - name: search
        in: query
        description: Limit results to those matching a string
        schema:
          type: string
      - name: orderby
        in: query
        description: Sort collection by attribute
        schema:
          type: string
          enum: [id, include, name, registered_date]
          default: name
      - name: order
        in: query
        description: Order sort attribute ascending or descending
        schema:
          type: string
          enum: [asc, desc]
          default: asc
