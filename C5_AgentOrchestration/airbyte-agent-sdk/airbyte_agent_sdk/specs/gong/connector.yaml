# Gong API Connector
# OpenAPI 3.1 specification with Airbyte extensions

openapi: 3.1.0

info:
  title: Gong API Connector
  version: 0.1.24
  description: |
    Gong is a revenue intelligence platform that captures and analyzes customer interactions
    across calls, emails, and web conferences. This connector provides access to users,
    recorded calls with transcripts, activity statistics, scorecards, trackers, workspaces,
    coaching metrics, and library content for sales performance analysis and revenue insights.
  x-airbyte-connector-name: gong
  x-airbyte-connector-definition-id: 32382e40-3b49-4b99-9c5c-4076501914e7
  x-airbyte-replication-version: "1.2.7"
  x-airbyte-replication-compatibility: ">=1.2.7, <2.0.0"
  x-airbyte-example-questions:
    direct:
      - "List all users in my Gong account"
      - "Show me calls from last week"
      - "Get the transcript for a recent call"
      - "List all workspaces in Gong"
      - "Show me the scorecard configurations"
      - "What trackers are set up in my account?"
      - "Get coaching metrics for a manager"
    search:
      - "What are the activity stats for our sales team?"
      - "Find calls mentioning {keyword} this month"
      - "Show me calls for rep {user_id} in the last 30 days"
      - "Which calls had the longest duration last week?"
    unsupported:
      - "Create a new user in Gong"
      - "Delete a call recording"
      - "Update scorecard questions"
      - "Schedule a new meeting"
      - "Send feedback to a team member"
      - "Modify tracker keywords"
  x-airbyte-auth-tooltip:
    "OAuth2.0": |
      **Tech admin** role is required. An "Insufficient permissions" error on the Gong consent screen may surface when this permission is missing. See [Gong's documentation](https://help.gong.io/docs/create-an-app-for-gong#set-up-oauth-access) for details.
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Gong API Documentation
      url: https://gong.app.gong.io/settings/api/documentation
    - type: api_release_history
      title: Gong Technical Release Notes
      url: https://help.gong.io/docs/release-notes
  x-airbyte-context-store:
    disable_compaction: true
    entities:
      - entity: users
        x-airbyte-name: users
        suggested: true
        fields:
          - name: active
            type:
              - 'null'
              - boolean
            description: Indicates if the user is currently active or not
          - name: created
            type:
              - 'null'
              - string
            description: The timestamp denoting when the user account was created
          - name: emailAddress
            type:
              - 'null'
              - string
            description: The primary email address associated with the user
          - name: emailAliases
            type:
              - 'null'
              - array
            description: Additional email addresses that can be used to reach the user
          - name: extension
            type:
              - 'null'
              - string
            description: The phone extension number for the user
          - name: firstName
            type:
              - 'null'
              - string
            description: The first name of the user
          - name: id
            type:
              - 'null'
              - string
            description: Unique identifier for the user
          - name: lastName
            type:
              - 'null'
              - string
            description: The last name of the user
          - name: managerId
            type:
              - 'null'
              - string
            description: The ID of the user's manager
          - name: meetingConsentPageUrl
            type:
              - 'null'
              - string
            description: URL for the consent page related to meetings
          - name: personalMeetingUrls
            type:
              - 'null'
              - array
            description: URLs for personal meeting rooms assigned to the user
          - name: phoneNumber
            type:
              - 'null'
              - string
            description: The phone number associated with the user
          - name: settings
            type:
              - 'null'
              - object
            description: User-specific settings and configurations
          - name: spokenLanguages
            type:
              - 'null'
              - array
            description: Languages spoken by the user
          - name: title
            type:
              - 'null'
              - string
            description: The job title or position of the user
          - name: trustedEmailAddress
            type:
              - 'null'
              - string
            description: An email address that is considered trusted for the user
      - entity: calls
        x-airbyte-name: calls
        suggested: true
        fields:
          - name: calendarEventId
            type:
              - 'null'
              - string
            description: Unique identifier for the calendar event associated with the call.
          - name: clientUniqueId
            type:
              - 'null'
              - string
            description: Unique identifier for the client related to the call.
          - name: customData
            type:
              - 'null'
              - string
            description: Custom data associated with the call.
          - name: direction
            type:
              - 'null'
              - string
            description: Direction of the call (inbound/outbound).
          - name: duration
            type:
              - 'null'
              - integer
            description: Duration of the call in seconds.
          - name: id
            type:
              - 'null'
              - string
            description: Unique identifier for the call.
          - name: isPrivate
            type:
              - 'null'
              - boolean
            description: Indicates if the call is private or not.
          - name: language
            type:
              - 'null'
              - string
            description: Language used in the call.
          - name: media
            type:
              - 'null'
              - string
            description: Media type used for communication (voice, video, etc.).
          - name: meetingUrl
            type:
              - 'null'
              - string
            description: URL for accessing the meeting associated with the call.
          - name: primaryUserId
            type:
              - 'null'
              - string
            description: Unique identifier for the primary user involved in the call.
          - name: purpose
            type:
              - 'null'
              - string
            description: Purpose or topic of the call.
          - name: scheduled
            type:
              - 'null'
              - string
            description: Scheduled date and time of the call.
          - name: scope
            type:
              - 'null'
              - string
            description: Scope or extent of the call.
          - name: sdrDisposition
            type:
              - 'null'
              - string
            description: Disposition set by the sales development representative.
          - name: started
            type:
              - 'null'
              - string
            description: Start date and time of the call.
          - name: system
            type:
              - 'null'
              - string
            description: System information related to the call.
          - name: title
            type:
              - 'null'
              - string
            description: Title or headline of the call.
          - name: url
            type:
              - 'null'
              - string
            description: URL associated with the call.
          - name: workspaceId
            type:
              - 'null'
              - string
            description: Identifier for the workspace to which the call belongs.
      - entity: calls_extensive
        suggested: true
        x-airbyte-name: extensiveCalls
        fields:
          - name: id
            type:
              - 'null'
              - integer
            description: Unique identifier for the call (from metaData.id).
          - name: startdatetime
            type:
              - 'null'
              - string
            description: Datetime for extensive calls.
          - name: collaboration
            type:
              - 'null'
              - object
            description: Collaboration information added to the call
            properties:
              brief:
                type:
                  - 'null'
                  - string
          - name: content
            type:
              - 'null'
              - object
            description: Analysis of the interaction content.
            properties:
              brief:
                type:
                  - 'null'
                  - string
              highlights:
                type:
                  - 'null'
                  - array
              keyPoints:
                type:
                  - 'null'
                  - array
              outline:
                type:
                  - 'null'
                  - array
              pointsOfInterest:
                type:
                  - 'null'
                  - object
                properties:
                  actionItems:
                    type:
                      - 'null'
                      - array
              topics:
                type:
                  - 'null'
                  - array
              trackers:
                type:
                  - 'null'
                  - array
          - name: context
            type:
              - 'null'
              - object
            description: A list of the agenda of each part of the call.
            properties:
              objects:
                type:
                  - 'null'
                  - array
              system:
                type:
                  - 'null'
                  - string
          - name: interaction
            type:
              - 'null'
              - object
            description: Metrics collected around the interaction during the call.
            properties:
              interactionStats:
                type:
                  - 'null'
                  - array
              questions:
                type:
                  - 'null'
                  - object
                properties:
                  companyCount:
                    type:
                      - 'null'
                      - number
                  nonCompanyCount:
                    type:
                      - 'null'
                      - number
              speakers:
                type:
                  - 'null'
                  - array
              video:
                type:
                  - 'null'
                  - array
          - name: media
            type:
              - 'null'
              - object
            description: The media urls of the call.
            properties:
              audioUrl:
                type:
                  - 'null'
                  - string
              videoUrl:
                type:
                  - 'null'
                  - string
          - name: metaData
            type:
              - 'null'
              - object
            description: call's metadata.
            properties:
              calendarEventId:
                type:
                  - 'null'
                  - string
              clientUniqueId:
                type:
                  - 'null'
                  - string
              customData:
                type:
                  - 'null'
                  - string
              direction:
                type:
                  - 'null'
                  - string
              duration:
                type:
                  - 'null'
                  - integer
              id:
                type:
                  - 'null'
                  - string
              isPrivate:
                type:
                  - 'null'
                  - boolean
              language:
                type:
                  - 'null'
                  - string
              media:
                type:
                  - 'null'
                  - string
              meetingUrl:
                type:
                  - 'null'
                  - string
              primaryUserId:
                type:
                  - 'null'
                  - string
              purpose:
                type:
                  - 'null'
                  - string
              scheduled:
                type:
                  - 'null'
                  - string
              scope:
                type:
                  - 'null'
                  - string
              sdrDisposition:
                type:
                  - 'null'
                  - string
              started:
                type:
                  - 'null'
                  - string
              system:
                type:
                  - 'null'
                  - string
              title:
                type:
                  - 'null'
                  - string
              url:
                type:
                  - 'null'
                  - string
              workspaceId:
                type:
                  - 'null'
                  - string
          - name: parties
            type:
              - 'null'
              - array
            description: A list of the call's participants
      - entity: settings_scorecards
        x-airbyte-name: scorecards
        fields:
          - name: created
            type:
              - 'null'
              - string
            description: The timestamp when the scorecard was created
          - name: enabled
            type:
              - 'null'
              - boolean
            description: Indicates if the scorecard is enabled or disabled
          - name: questions
            type:
              - 'null'
              - array
            description: An array of questions related to the scorecard
          - name: scorecardId
            type:
              - 'null'
              - string
            description: The unique identifier of the scorecard
          - name: scorecardName
            type:
              - 'null'
              - string
            description: The name of the scorecard
          - name: updated
            type:
              - 'null'
              - string
            description: The timestamp when the scorecard was last updated
          - name: updaterUserId
            type:
              - 'null'
              - string
            description: The user ID of the person who last updated the scorecard
          - name: workspaceId
            type:
              - 'null'
              - string
            description: The unique identifier of the workspace associated with the scorecard
      - entity: stats_activity_scorecards
        x-airbyte-name: answeredScorecards
        fields:
          - name: answeredScorecardId
            type:
              - 'null'
              - string
            description: Unique identifier for the answered scorecard instance.
          - name: answers
            type:
              - 'null'
              - array
            description: Contains the answered questions in the scorecards
          - name: callId
            type:
              - 'null'
              - string
            description: Unique identifier for the call associated with the answered scorecard.
          - name: callStartTime
            type:
              - 'null'
              - string
            description: Timestamp indicating the start time of the call.
          - name: reviewTime
            type:
              - 'null'
              - string
            description: Timestamp indicating when the review of the answered scorecard was completed.
          - name: reviewedUserId
            type:
              - 'null'
              - string
            description: Unique identifier for the user whose performance was reviewed.
          - name: reviewerUserId
            type:
              - 'null'
              - string
            description: Unique identifier for the user who performed the review.
          - name: scorecardId
            type:
              - 'null'
              - string
            description: Unique identifier for the scorecard template used.
          - name: scorecardName
            type:
              - 'null'
              - string
            description: Name or title of the scorecard template used.
          - name: visibilityType
            type:
              - 'null'
              - string
            description: Type indicating the visibility permissions for the answered scorecard.
      - entity: call_transcripts
        x-airbyte-name: callTranscripts
        suggested: true
        fields:
          - name: callId
            type:
              - 'null'
              - string
            description: Unique identifier for the call.
          - name: started
            type:
              - 'null'
              - string
            description: Timestamp the call started. Filterable for narrowing transcript search by call time.
          - name: transcript
            type:
              - 'null'
              - array
            description: Gong transcript speaker turns.
            x-airbyte-semantic-search:
              content_type: json
              samples:
                - name: speaker_turn
                  windowed: true
                  sampling: { sample_type: element, unit_label: speaker_turn, sample_path: "[]", text_path: "sentences[].text", stitch: "\n" }
              windowing: { context_max_chars: 2048, context_boundary: whole_unit }
              embedding: { model: text-embedding-3-small }
              metadata:
                - { name: speakerId, path: "speakerId", type: string }
                - { name: topic, path: "topic", type: string }
                - { name: callId, path: "/callId", type: string }
                - { name: started, path: "/started", type: string }
        x-airbyte-enrichment:
          - target: calls_extensive
            match:
              - { local: "/callId", foreign: id }
              - { local: speakerId, foreign: "parties[].speakerId" }
            project:
              - { name: speakerName, from: "parties[].name" }
              - { name: speakerTitle, from: "parties[].title" }
              - { name: speakerAffiliation, from: "parties[].affiliation" }

  x-airbyte-entity-relationships:
    - source_entity: library_folders
      target_entity: workspaces
      foreign_key: workspaceId
      target_key: id
      cardinality: many_to_one
      description: Library folders belong to a workspace
    - source_entity: library_folder_content
      target_entity: library_folders
      foreign_key: folderId
      target_key: id
      cardinality: many_to_one
      description: Folder content belongs to a library folder
    - source_entity: coaching
      target_entity: workspaces
      foreign_key: workspace-id
      target_key: id
      cardinality: many_to_one
      description: Coaching metrics are scoped to a workspace
    - source_entity: coaching
      target_entity: users
      foreign_key: manager-id
      target_key: id
      cardinality: many_to_one
      description: Coaching metrics are retrieved for a specific manager

servers:
  - url: https://api.gong.io
    description: Gong API server

security:
  - oauth2: []
  - basicAuth: []

paths:
  "/v2/users":
    get:
      summary: List users
      description: Returns a list of all users in the Gong account
      operationId: listUsers
      x-airbyte-entity: users
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.users
      x-airbyte-meta-extractor:
        cursor: $.records.cursor
        total_records: $.records.totalRecords
        current_page_number: $.records.currentPageNumber
      parameters:
        - name: cursor
          in: query
          description: Cursor for pagination
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersResponse"
        "401":
          description: Unauthorized

  "/v2/users/{id}":
    get:
      summary: Get a user
      description: Get a single user by ID
      operationId: getUser
      x-airbyte-entity: users
      x-airbyte-action: get
      x-airbyte-record-extractor: $.user
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: User not found
        "401":
          description: Unauthorized

  "/v2/calls":
    get:
      summary: List calls
      description: Retrieve calls data by date range
      operationId: listCalls
      x-airbyte-entity: calls
      x-airbyte-action: list
      x-airbyte-record-extractor: $.calls
      x-airbyte-record-filter: "{{ not record.isPrivate }}"
      x-airbyte-meta-extractor:
        cursor: $.records.cursor
        total_records: $.records.totalRecords
        current_page_number: $.records.currentPageNumber
      parameters:
        - name: fromDateTime
          in: query
          description: Start date in ISO 8601 format
          required: false
          schema:
            type: string
            format: date-time
        - name: toDateTime
          in: query
          description: End date in ISO 8601 format
          required: false
          schema:
            type: string
            format: date-time
        - name: cursor
          in: query
          description: Cursor for pagination
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of calls
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallsResponse"
        "401":
          description: Unauthorized

  "/v2/calls/{id}":
    get:
      summary: Get a call
      description: Get specific call data by ID
      operationId: getCall
      x-airbyte-entity: calls
      x-airbyte-action: get
      x-airbyte-record-extractor: $.call
      parameters:
        - name: id
          in: path
          required: true
          description: Call ID
          schema:
            type: string
      responses:
        "200":
          description: Call object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallResponse"
        "404":
          description: Call not found
        "401":
          description: Unauthorized

  "/v2/calls/extensive":
    post:
      summary: List calls with extensive data
      description: Retrieve detailed call data including participants, interaction stats, and content
      operationId: listCallsExtensive
      x-airbyte-entity: calls_extensive
      x-airbyte-action: list
      x-airbyte-record-extractor: $.calls
      x-airbyte-record-filter: "{{ not record.metaData.isPrivate }}"
      x-airbyte-meta-extractor:
        cursor: $.records.cursor
        total_records: $.records.totalRecords
        current_page_number: $.records.currentPageNumber
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - filter
              properties:
                filter:
                  type: object
                  default: {}
                  properties:
                    fromDateTime:
                      type: string
                      format: date-time
                      description: Start date in ISO 8601 format. Recommended for scoping results to a manageable date range.
                    toDateTime:
                      type: string
                      format: date-time
                      description: End date in ISO 8601 format. Recommended for scoping results to a manageable date range.
                    callIds:
                      type: array
                      items:
                        type: string
                      description: List of specific call IDs to retrieve. Alternative to date range filtering.
                    workspaceId:
                      type: string
                      description: Filter by workspace ID
                contentSelector:
                  type: object
                  description: Select which content to include in the response
                  properties:
                    context:
                      type: string
                      description: Context level for the data
                      enum:
                        - Extended
                    contextTiming:
                      type: array
                      description: Context timing options
                      items:
                        type: string
                        enum:
                          - Now
                          - TimeOfCall
                    exposedFields:
                      type: object
                      description: Specify which fields to include in the response
                      properties:
                        collaboration:
                          type: object
                          properties:
                            publicComments:
                              type: boolean
                              description: Include public comments
                        content:
                          type: object
                          properties:
                            pointsOfInterest:
                              type: boolean
                              description: Include points of interest (deprecated, use highlights)
                            structure:
                              type: boolean
                              description: Include call structure
                            topics:
                              type: boolean
                              description: Include topics discussed
                            trackers:
                              type: boolean
                              description: Include trackers
                            trackerOccurrences:
                              type: boolean
                              description: Include tracker occurrences
                            brief:
                              type: boolean
                              description: Include call brief
                            outline:
                              type: boolean
                              description: Include call outline
                            highlights:
                              type: boolean
                              description: Include call highlights
                            callOutcome:
                              type: boolean
                              description: Include call outcome
                            keyPoints:
                              type: boolean
                              description: Include key points
                        interaction:
                          type: object
                          properties:
                            personInteractionStats:
                              type: boolean
                              description: Include person interaction statistics
                            questions:
                              type: boolean
                              description: Include questions asked
                            speakers:
                              type: boolean
                              description: Include speaker information
                            video:
                              type: boolean
                              description: Include video interaction data
                        media:
                          type: boolean
                          description: Include media URLs (audio/video)
                        parties:
                          type: boolean
                          description: Include participant information
                cursor:
                  type: string
                  description: Cursor for pagination
      responses:
        "200":
          description: Detailed call data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensiveCallsResponse"
        "401":
          description: Unauthorized

  "/v2/calls:audio/download":
    post:
      summary: Download call audio
      description: |
        ALWAYS configure the request with the exposedFields: {"media": true}. If you don't the call won't work.
        Downloads the audio media file for a call. Temporarily, the request body must be configured with:
        {"filter": {"callIds": [CALL_ID]}, "contentSelector": {"exposedFields": {"media": true}}}
      operationId: DownloadCallAudio
      x-airbyte-entity: call_audio
      x-airbyte-action: download
      x-airbyte-file-url: calls[0].media.audioUrl
      x-airbyte-path-override:
        path: /v2/calls/extensive
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  type: object
                  properties:
                    callIds:
                      type: array
                      items:
                        type: string
                      description: List containing the single call ID
                contentSelector:
                  type: object
                  properties:
                    exposedFields:
                      type: object
                      properties:
                        media:
                          type: boolean
                          description: Must be true to get media URLs
                          default: true
      responses:
        "200":
          description: Call metadata with audio URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensiveCallsResponse"
        "401":
          description: Unauthorized

  "/v2/calls:video/download":
    post:
      summary: Download call video
      description: |
        ALWAYS configure the request with the exposedFields: {"media": true}. If you don't the call won't work.
        Downloads the video media file for a call. Temporarily, the request body must be configured with:
        {"filter": {"callIds": [CALL_ID]}, "contentSelector": {"exposedFields": {"media": true}}}
      operationId: DownloadCallVideo
      x-airbyte-entity: call_video
      x-airbyte-action: download
      x-airbyte-file-url: calls[0].media.videoUrl
      x-airbyte-path-override:
        path: /v2/calls/extensive
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  type: object
                  properties:
                    callIds:
                      type: array
                      items:
                        type: string
                      description: List containing the single call ID
                contentSelector:
                  type: object
                  properties:
                    exposedFields:
                      type: object
                      properties:
                        media:
                          type: boolean
                          description: Must be true to get media URLs
                          default: true
      responses:
        "200":
          description: Call metadata with video URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensiveCallsResponse"
        "401":
          description: Unauthorized

  "/v2/workspaces":
    get:
      summary: List workspaces
      description: List all company workspaces
      operationId: listWorkspaces
      x-airbyte-entity: workspaces
      x-airbyte-action: list
      x-airbyte-record-extractor: $.workspaces
      x-airbyte-no-pagination: "Gong /v2/workspaces endpoint returns the full collection of company workspaces in a single response; the API does not expose pagination on this endpoint."
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacesResponse"
        "401":
          description: Unauthorized

  "/v2/calls/transcript":
