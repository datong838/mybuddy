components:
  securitySchemes:
    oauth2:
      type: oauth2
      x-airbyte-untested: true
      description: Gong OAuth 2.0 authentication (token refresh managed externally)
      flows:
        authorizationCode:
          authorizationUrl: https://app.gong.io/oauth2/authorize
          tokenUrl: https://app.gong.io/oauth2/generate-customer-token
          refreshUrl: https://app.gong.io/oauth2/generate-customer-token
          scopes:
            api:calls:read:basic: Read basic call data
            api:calls:read:extensive: Read extensive call data
            api:calls:read:transcript: Read call transcripts
            api:users:read: Read user data
            api:stats:scorecards: Read scorecards statistics
            api:stats:interaction: Read interaction statistics
            api:settings:scorecards:read: Read scorecard settings
            api:settings:trackers:read: Read tracker settings
            api:workspaces:read: Read workspace data
            api:library:read: Read library folders and content
            api:coaching:read: Read coaching metrics
      x-airbyte-oauth-scopes:
        - scope: "api:calls:read:basic"
          mode: read
          entities:
            - calls
        - scope: "api:calls:read:extensive"
          mode: read
          entities:
            - calls_extensive
            - call_audio
            - call_video
        - scope: "api:calls:read:transcript"
          mode: read
          entities:
            - call_transcripts
        - scope: "api:users:read"
          mode: read
          entities:
            - users
        - scope: "api:stats:scorecards"
          mode: read
          entities:
            - stats_activity_aggregate
            - stats_activity_day_by_day
            - stats_activity_scorecards
        - scope: "api:stats:interaction"
          mode: read
          entities:
            - stats_interaction
        - scope: "api:settings:scorecards:read"
          mode: read
          entities:
            - settings_scorecards
        - scope: "api:settings:trackers:read"
          mode: read
          entities:
            - settings_trackers
        - scope: "api:workspaces:read"
          mode: read
          entities:
            - workspaces
        - scope: "api:library:read"
          mode: read
          entities:
            - library_folders
            - library_folder_content
        - scope: "api:coaching:read"
          mode: read
          entities:
            - coaching
      x-airbyte-token-refresh:
        auth_style: basic
        body_format: form
      x-airbyte-auth-config:
        title: "OAuth 2.0 Authentication"
        type: object
        required:
          - refresh_token
          - access_token
        properties:
          access_token:
            type: string
            title: "Access Token"
            description: "Your Gong OAuth2 Access Token."
          refresh_token:
            type: string
            title: "Refresh Token"
            description: "Your Gong OAuth2 Refresh Token. Note: Gong uses single-use refresh tokens."
          client_id:
            type: string
            title: "Client ID"
            description: "Your Gong OAuth App Client ID."
          client_secret:
            type: string
            title: "Client Secret"
            description: "Your Gong OAuth App Client Secret."
        auth_mapping:
          access_token: "${access_token}"
          refresh_token: "${refresh_token}"
          client_id: "${client_id}"
          client_secret: "${client_secret}"
        replication_auth_key_mapping:
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          credentials.refresh_token: "refresh_token"
          credentials.access_token: "access_token"
        replication_auth_key_constants:
          credentials.auth_type: "OAuth2.0"

    basicAuth:
      type: http
      scheme: basic
      description: Basic authentication using Access Key as username and Access Key Secret as password
      x-airbyte-auth-config:
        title: "Access Key Authentication"
        type: object
        required:
          - access_key
          - access_key_secret
        properties:
          access_key:
            type: string
            title: "Access Key"
            description: "Your Gong API Access Key"
          access_key_secret:
            type: string
            title: "Access Key Secret"
            description: "Your Gong API Access Key Secret"
        auth_mapping:
          username: "${access_key}"
          password: "${access_key_secret}"
        replication_auth_key_mapping:
          credentials.access_key: "access_key"
          credentials.access_key_secret: "access_key_secret"
        replication_auth_key_constants:
          credentials.auth_type: "APIKey"

