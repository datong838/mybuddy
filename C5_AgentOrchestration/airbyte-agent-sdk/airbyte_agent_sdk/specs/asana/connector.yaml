  "/workspaces/{workspace_gid}/tasks/search":
    get:
      summary: Search tasks in a workspace
      description: |
        Returns tasks that match the specified search criteria. This endpoint requires a premium Asana account.

        IMPORTANT: At least one search filter parameter must be provided. Valid filter parameters include: text, completed, assignee.any, projects.any, sections.any, teams.any, followers.any, created_at.after, created_at.before, modified_at.after, modified_at.before, due_on.after, due_on.before, and resource_subtype. The sort_by and sort_ascending parameters are for ordering results and do not count as search filters.
      operationId: searchWorkspaceTasks
      x-airbyte-entity: workspace_task_search
      x-airbyte-action: list
      x-airbyte-record-extractor: "$.data"
      x-airbyte-meta-extractor:
        next_page: $.next_page
      parameters:
      - name: workspace_gid
        in: path
        required: true
        description: Workspace GID to search tasks in
        schema:
          type: string
      - name: limit
        in: query
        description: Number of items to return per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
      - name: offset
        in: query
        description: Pagination offset token
        schema:
          type: string
      - name: text
        in: query
        description: Search text to filter tasks
        schema:
          type: string
      - name: completed
        in: query
        description: Filter by completion status
        schema:
          type: boolean
      - name: assignee.any
        in: query
        description: Comma-separated list of assignee GIDs
        schema:
          type: string
      - name: projects.any
        in: query
        description: Comma-separated list of project GIDs
        schema:
          type: string
      - name: sections.any
        in: query
        description: Comma-separated list of section GIDs
        schema:
          type: string
      - name: teams.any
        in: query
        description: Comma-separated list of team GIDs
        schema:
          type: string
      - name: followers.any
        in: query
        description: Comma-separated list of follower GIDs
        schema:
          type: string
      - name: created_at.after
        in: query
        description: Filter tasks created after this date (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: created_at.before
        in: query
        description: Filter tasks created before this date (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: modified_at.after
        in: query
        description: Filter tasks modified after this date (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: modified_at.before
        in: query
        description: Filter tasks modified before this date (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: due_on.after
        in: query
        description: Filter tasks due after this date (ISO 8601 date format)
        schema:
          type: string
          format: date
      - name: due_on.before
        in: query
        description: Filter tasks due before this date (ISO 8601 date format)
        schema:
          type: string
          format: date
      - name: resource_subtype
        in: query
        description: Filter by task resource subtype (e.g., default_task, milestone)
        schema:
          type: string
      - name: sort_by
        in: query
        description: Field to sort by (e.g., created_at, modified_at, due_date)
        schema:
          type: string
      - name: sort_ascending
        in: query
        description: Sort order (true for ascending, false for descending)
        schema:
          type: boolean
      responses:
        "200":
          description: List of tasks matching search criteria
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksList"
        "401":
          description: Unauthorized
        "402":
          description: Payment required (premium feature)

