servers:
- url: https://app.asana.com/api/1.0
  description: Asana API server

security:
- oauth2: []
- personalAccessToken: []

paths:
  # Tasks endpoints
  "/tasks":
    get:
      summary: List tasks
      description: Returns a paginated list of tasks. Must include either a project OR a section OR a workspace AND assignee parameter.
      operationId: listTasks
      x-airbyte-entity: tasks
      x-airbyte-action: list
      x-airbyte-record-extractor: "$.data"
      x-airbyte-meta-extractor:
        next_page: $.next_page
      parameters:
      - name: limit
        in: query
        description: Number of items to return per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: offset
        in: query
        description: Pagination offset token
        schema:
          type: string
          example: "eyJ0eXAiOJiKV1iQLCJhbGciOiJIUzI1NiJ9"
      - name: project
        in: query
        description: The project to filter tasks on
        schema:
          type: string
          example: "987654321"
      - name: workspace
        in: query
        description: The workspace to filter tasks on
        schema:
          type: string
          example: "987654321"
      - name: section
        in: query
        description: The workspace to filter tasks on
        schema:
          type: string
          example: "987654321"
      - name: assignee
        in: query
        description: The assignee to filter tasks on
        schema:
          type: string
          example: "123456789"
      - name: completed_since
        in: query
        description: Only return tasks that have been completed since this time
        schema:
          type: string
          format: date-time
          example: "2023-01-01T00:00:00Z"
      - name: modified_since
        in: query
        description: Only return tasks that have been completed since this time
        schema:
          type: string
          format: date-time
          example: "2023-01-01T00:00:00Z"

      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksList"
        "401":
          description: Unauthorized

    post:
      summary: Create a task
      description: |
        Creates a new task. Every task is required to be created in a specific workspace,
        and this workspace cannot be changed once set. The workspace need not be set explicitly
        if you specify projects or a parent task instead.
      operationId: createTask
