components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication for Asana API
      flows:
        authorizationCode:
          authorizationUrl: https://app.asana.com/-/oauth_authorize
          tokenUrl: https://app.asana.com/-/oauth_token
          refreshUrl: https://app.asana.com/-/oauth_token
          scopes:
            tasks:read: Read access to tasks, subtasks, dependencies, dependents, and task search
            tasks:write: Write access to create and update tasks, add tasks to sections, add/remove tags, and create comments
            tasks:delete: Delete access to remove tasks
            projects:read: Read access to projects, project sections, and project task counts
            users:read: Read access to users, team members, and workspace users
            workspaces:read: Read access to workspaces
            teams:read: Read access to teams and workspace teams
            tags:read: Read access to tags, workspace tags, and tasks by tag
            tags:write: Write access to create and update tags
            attachments:read: Read access to attachments and attachment details
            stories:read: Read access to task comments and stories
            stories:write: Write access to create comments on tasks
      x-airbyte-oauth-scopes:
        - scope: default
          mode: read_write
          entities:
            - tasks
            - project_tasks
            - workspace_task_search
            - projects
            - task_projects
            - team_projects
            - workspace_projects
            - workspaces
            - users
            - workspace_users
            - team_users
            - teams
            - workspace_teams
            - user_teams
            - attachments
            - workspace_tags
            - tags
            - tag_tasks
            - project_sections
            - sections
            - section_tasks
            - task_subtasks
            - task_dependencies
            - task_dependents
            - task_stories
            - task_tags
            - workspace_memberships
      x-airbyte-token-refresh:
        auth_style: body
        body_format: form
      x-airbyte-oauth-credentials:
        title: Asana OAuth App Credentials
        description: Provide your own Asana OAuth app credentials to override the default Airbyte-managed ones.
        properties:
          client_id:
            type: string
            title: Client ID
            description: Your Asana OAuth app's client ID
          client_secret:
            type: string
            title: Client Secret
            description: Your Asana OAuth app's client secret
        required:
        - client_id
        - client_secret
      x-airbyte-auth-config:
        title: "OAuth 2"
        type: object
        required:
        - refresh_token
        properties:
          access_token:
            type: string
            title: "Access Token"
            description: "OAuth access token for API requests"
          refresh_token:
            type: string
            title: "Refresh Token"
            description: "OAuth refresh token for automatic token renewal"
          client_id:
            type: string
            title: "Client ID"
            description: "Connected App Client ID"
          client_secret:
            type: string
            title: "Client Secret"
            description: "Connected App Client Secret"
        auth_mapping:
          access_token: "${access_token}"
          refresh_token: "${refresh_token}"
          client_id: "${client_id}"
          client_secret: "${client_secret}"
        replication_auth_key_mapping:
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          credentials.refresh_token: "refresh_token"
        replication_auth_key_constants:
          credentials.option_title: "OAuth Credentials"

    personalAccessToken:
      type: http
      scheme: bearer
      description: Personal Access Token authentication for Asana API
      x-airbyte-auth-config:
        title: "Personal Access Token"
        type: object
        required:
        - token
        properties:
          token:
            type: string
            title: "Personal Access Token"
            description: "Your Asana Personal Access Token. Generate one at https://app.asana.com/0/my-apps"
        auth_mapping:
          token: "${token}"
        replication_auth_key_mapping:
          credentials.personal_access_token: "token"
        replication_auth_key_constants:
          credentials.option_title: "PAT Credentials"

  schemas:
    # Task schemas
    TaskCompact:
      type: object
      x-airbyte-entity-name: tasks
      x-airbyte-stream-name: tasks
      x-airbyte-ai-hints:
        summary: "Asana tasks with assignee, due date, status, and project context"
        when_to_use: "Questions about task assignments, deadlines, or work items"
        trigger_phrases: ["asana task", "assigned to", "due date", "task status", "work item"]
        freshness: live
        search_strategy: "Search by name or filter by assignee, project, or completion status"
        example_questions:
          - "What tasks are assigned to me in Asana?"
          - "Show overdue Asana tasks"
      description: Compact task object
      properties:
        gid:
          type: string
          description: Globally unique identifier
        resource_type:
          type: string
          description: Resource type (task)
        name:
          type: string
          description: Task name
        resource_subtype:
          type: string
          description: Task subtype
        created_by:
          type: object
          description: User who created the task
          properties:
            gid:
              type: string
            resource_type:
              type: string

    Task:
      type: object
      description: Full task object
      properties:
        gid:
          type: string
          actual_time_minutes:
            type: ["integer", "null"]
          assignee:
            type: object
            properties:
              gid:
                type: string
              name:
                type: string
              resource_type:
                type: string
          assignee_status:
            type: string
          assignee_section:
            type: object
            properties:
              gid:
                type: string
              name:
                type: string
              resource_type:
                type: string
          completed:
            type: boolean
          completed_at:
            type: ["string", "null"]
          created_at:
            type: string
          due_at:
