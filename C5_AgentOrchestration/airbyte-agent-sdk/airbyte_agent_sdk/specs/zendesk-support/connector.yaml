servers:
- url: https://{subdomain}.zendesk.com/api/v2
  description: Zendesk Support API Server
  variables:
    subdomain:
      default: your-subdomain
      description: Your Zendesk subdomain
  x-airbyte-replication-environment-mapping:
    subdomain: subdomain

security:
- zendeskOAuth: []
- zendeskAPIToken: []

components:
  securitySchemes:
    zendeskOAuth:
      type: oauth2
      description: Zendesk OAuth 2.0 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://{{subdomain}}.zendesk.com/oauth/authorizations/new
          tokenUrl: https://{{subdomain}}.zendesk.com/oauth/tokens
          refreshUrl: https://{{subdomain}}.zendesk.com/oauth/tokens
          scopes:
            read: Read access to all resources
            write: Write access to all resources
            read write: Read and write access to all resources
      x-airbyte-oauth-scopes:
      - scope: "read"
        mode: read
        description: Read access to all resources
        entities:
        - article_attachments
        - articles
        - attachments
        - automations
        - brands
        - group_memberships
        - groups
        - macros
        - organization_memberships
        - organizations
        - satisfaction_ratings
        - sla_policies
        - tags
        - deleted_tickets
        - ticket_audits
        - ticket_comments
        - ticket_fields
        - ticket_forms
        - ticket_metric_events
        - ticket_metrics
        - tickets
        - triggers
        - users
        - views
      - scope: "write"
        mode: write
        description: Write access to all resources
        entities:
        - article_attachments
        - articles
        - attachments
        - automations
        - brands
        - group_memberships
        - groups
        - macros
        - organization_memberships
        - organizations
        - satisfaction_ratings
        - sla_policies
        - tags
        - deleted_tickets
        - ticket_audits
        - ticket_bulk_updates
        - ticket_comments
        - ticket_fields
        - ticket_forms
        - ticket_metrics
        - tickets
        - triggers
        - users
        - views
      # WARNING: Why we are NOT using oauth2_refresh here
      # Zendesk's OAuth2 access tokens do not expire by default:
      #   "Zendesk does not set the access token expires_in value."
      #   "Refresh tokens aren't used. An access token doesn't expire but it can be revoked."
      # The standard Zendesk OAuth integration (authorizationCode flow) produces a
      # long-lived access_token. The legacy oauth2.0 auth mode in Airbyte's
      # source-zendesk-support spec — which uses a single access_token with
      # BearerAuthenticator — is the correct fit.
      # The oauth2_refresh mode exists for OAuth clients that explicitly opt into
      # token expiry (by setting expires_in at token-creation time). It is NOT
      # the default Zendesk behavior. When used, Airbyte's source manifest forces
      # expires_in: 172800 (48h) on every refresh and relies on rotating refresh
      # tokens — meaning each refresh invalidates the previous refresh_token, so
      # we would also need bullet-proof persistence of the rotated refresh_token
      # AND the new access_token back to the secret store. Any persistence gap
      # breaks the connection after 48h.
      # If we ever support a customer whose Zendesk OAuth client is configured with
      # custom expires_in, revisit and implement oauth2_refresh correctly (set
      # discriminator to "oauth2_refresh", map client_id/client_secret/refresh_token/
      # access_token in replication_auth_key_mapping, and verify rotated tokens
      # persist on each refresh).
      x-airbyte-auth-config:
        type: object
        title: OAuth 2.0
        description: Zendesk OAuth 2.0 authentication
        required: [access_token]
        properties:
          access_token:
            type: string
            title: Access Token
            description: OAuth 2.0 access token
          refresh_token:
            type: string
            title: Refresh Token
            description: OAuth 2.0 refresh token (optional)
        auth_mapping:
          access_token: "${access_token}"
          refresh_token: "${refresh_token}"
        replication_auth_key_mapping:
          credentials.access_token: "access_token"
        replication_auth_key_constants:
          credentials.credentials: "oauth2.0"

    zendeskAPIToken:
      type: http
      scheme: basic
      x-airbyte-untested: true
      description: |
        Zendesk API Token authentication.
        API tokens are managed in Admin Center at Apps and integrations > APIs > Zendesk API.
      x-airbyte-auth-config:
        type: object
        title: API Token
        description: Authenticate using email and API token
        required: [email, api_token]
        properties:
          email:
            type: string
            format: email
            title: Email Address
            description: Your Zendesk account email address
          api_token:
            type: string
            title: API Token
            description: Your Zendesk API token from Admin Center
        auth_mapping:
          username: "${email}/token"
          password: "${api_token}"
        replication_auth_key_mapping:
          credentials.email: "email"
          credentials.api_token: "api_token"
        replication_auth_key_constants:
          credentials.credentials: "api_token"

  schemas:
    # ==================== TICKETS ====================
    Ticket:
      type: object
      x-airbyte-entity-name: tickets
      x-airbyte-stream-name: tickets
      x-airbyte-ai-hints:
        summary: "Zendesk support tickets with status, priority, and assignee"
        when_to_use: "Questions about support tickets, customer issues, or ticket status"
        trigger_phrases: ["zendesk ticket", "support ticket", "customer issue", "help desk ticket"]
        freshness: live
        search_strategy: "Search by subject or filter by status, priority, assignee, or requester"
        example_questions:
          - "Show open Zendesk tickets"
          - "Find tickets assigned to me"
      description: Zendesk Support ticket object
      properties:
        id:
          type: integer
          description: Automatically assigned when the ticket is created
        url:
          type: string
          description: The API url of this ticket
        external_id:
          type:
          - string
          - "null"
          description: An id you can use to link Zendesk Support tickets to local records
        type:
          type:
          - string
          - "null"
          description: The type of this ticket (problem, incident, question, task)
        subject:
          type:
          - string
          - "null"
          description: The value of the subject field for this ticket
        raw_subject:
          type:
          - string
          - "null"
          description: The dynamic content placeholder or the subject value
        description:
          type: string
          description: Read-only first comment on the ticket
        priority:
          type:
          - string
          - "null"
          description: The urgency with which the ticket should be addressed (urgent, high, normal, low)
        status:
          type: string
          enum: [new, open, pending, hold, solved, closed]
          description: The state of the ticket
        recipient:
          type:
          - string
          - "null"
          description: The original recipient e-mail address of the ticket
        requester_id:
          type: integer
          description: The user who requested this ticket
        submitter_id:
          type: integer
          description: The user who submitted the ticket
        assignee_id:
          type:
          - integer
          - "null"
          description: The agent currently assigned to the ticket
        organization_id:
          type:
          - integer
          - "null"
          description: The organization of the requester
        group_id:
          type:
          - integer
          - "null"
          description: The group this ticket is assigned to
        collaborator_ids:
          type: array
          items:
            type: integer
          description: The ids of users currently CC'ed on the ticket
        follower_ids:
          type: array
          items:
            type: integer
          description: The ids of agents currently following the ticket
        email_cc_ids:
          type: array
          items:
            type: integer
          description: The ids of agents or end users currently CC'ed on the ticket
        forum_topic_id:
          type:
          - integer
          - "null"
          description: The topic in the Zendesk Web portal this ticket originated from
        problem_id:
          type:
          - integer
          - "null"
          description: For tickets of type incident, the ID of the problem the incident is linked to
        has_incidents:
          type: boolean
          description: Is true if a ticket is a problem type and has one or more incidents linked to it
        is_public:
          type: boolean
          description: Is true if any comments are public, false otherwise
        due_at:
          type:
          - string
          - "null"
          format: date-time
          description: If this is a ticket of type task it has a due date
        tags:
          type: array
          items:
            type: string
          description: The array of tags applied to this ticket
        custom_fields:
          type: array
          items:
            type: object
          description: Custom fields for the ticket
        satisfaction_rating:
          type: object
          description: The satisfaction rating of the ticket
        sharing_agreement_ids:
          type: array
          items:
            type: integer
          description: The ids of the sharing agreements used for this ticket
        custom_status_id:
          type: integer
          description: The custom ticket status id of the ticket
        fields:
          type: array
          items:
            type: object
          description: Ticket fields
        followup_ids:
          type: array
          items:
            type: integer
          description: The ids of the followups created from this ticket
        ticket_form_id:
          type: integer
          description: Enterprise only. The id of the ticket form to render for the ticket
        brand_id:
          type: integer
          description: Enterprise only. The id of the brand this ticket is associated with
        allow_channelback:
          type: boolean
          description: Is false if channelback is disabled, true otherwise
        allow_attachments:
          type: boolean
          description: Permission for agents to add attachments to a comment
        from_messaging_channel:
          type: boolean
          description: If true, the ticket's via type is a messaging channel
        generated_timestamp:
          type: integer
          description: A Unix timestamp for the ticket
        result_type:
          type:
          - string
          - "null"
          description: The type of the search result (e.g. ticket) when returned from search endpoints
        created_at:
          type: string
          format: date-time
          description: When this record was created
        updated_at:
          type: string
          format: date-time
          description: When this record was last updated
        via:
          type: object
          description: How the ticket was created
      required:
      - id

