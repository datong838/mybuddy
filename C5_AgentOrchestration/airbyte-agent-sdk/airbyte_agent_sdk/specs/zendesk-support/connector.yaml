      parameters:
      - name: page
        in: query
        description: Page number for pagination
        schema:
          type: integer
          minimum: 1
      - name: per_page
        in: query
        description: Number of results per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organization"
                  next_page:
                    type:
                    - string
                    - "null"
                    description: URL to the next page of results
                  previous_page:
                    type:
                    - string
                    - "null"
                    description: URL to the previous page of results
                  count:
                    type: integer
                    description: Total count of records

  /organizations/{organization_id}.json:
    get:
      summary: Get an organization
      description: Returns an organization by its ID
      operationId: GetOrganization
      x-airbyte-entity: organizations
      x-airbyte-action: get
      x-airbyte-record-extractor: $.organization
      tags:
      - Organizations
      parameters:
      - name: organization_id
        in: path
        required: true
        description: The ID of the organization
        schema:
          type: integer
      responses:
        "200":
          description: Organization object
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: "#/components/schemas/Organization"

  # ==================== GROUPS ====================
  /groups.json:
    get:
      summary: List all groups
      description: Returns a list of all groups in your account
      operationId: ListGroups
      x-airbyte-entity: groups
      x-airbyte-action: list
      x-airbyte-record-extractor: $.groups
      x-airbyte-meta-extractor:
        next_page: $.next_page
        previous_page: $.previous_page
        count: $.count
      tags:
      - Groups
      parameters:
      - name: page
        in: query
        description: Page number for pagination
        schema:
          type: integer
          minimum: 1
      - name: exclude_deleted
        in: query
        description: Exclude deleted groups
        schema:
          type: boolean
          default: false
      - name: per_page
        in: query
        description: Number of results per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: "#/components/schemas/Group"
                  next_page:
                    type:
                    - string
                    - "null"
                    description: URL to the next page of results
                  previous_page:
                    type:
                    - string
                    - "null"
                    description: URL to the previous page of results
                  count:
                    type: integer
                    description: Total count of records

  /groups/{group_id}.json:
    get:
      summary: Get a group
      description: Returns a group by its ID
      operationId: GetGroup
      x-airbyte-entity: groups
      x-airbyte-action: get
      x-airbyte-record-extractor: $.group
      tags:
      - Groups
      parameters:
      - name: group_id
        in: path
        required: true
        description: The ID of the group
        schema:
          type: integer
      responses:
        "200":
          description: Group object
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: "#/components/schemas/Group"

  # ==================== TICKET COMMENTS ====================
  /tickets/{ticket_id}/comments.json:
    get:
      summary: List ticket comments
      description: Returns a list of comments for a specific ticket
      operationId: ListTicketComments
      x-airbyte-entity: ticket_comments
      x-airbyte-action: list
      x-airbyte-record-extractor: $.comments
      x-airbyte-meta-extractor:
        next_page: $.next_page
        previous_page: $.previous_page
        count: $.count
      tags:
      - Ticket Comments
      parameters:
      - name: ticket_id
        in: path
        required: true
        description: The ID of the ticket
        schema:
          type: integer
      - name: page
        in: query
        description: Page number for pagination
        schema:
          type: integer
          minimum: 1
      - name: include_inline_images
        in: query
        description: Include inline images in the response
        schema:
          type: boolean
          default: false
      - name: sort_order
        in: query
        description: Sort order for comments (always sorted by created_at)
        schema:
          type: string
          enum: [asc, desc]
          default: asc
      - name: per_page
        in: query
        description: Number of results per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
      responses:
        "200":
          description: List of ticket comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      $ref: "#/components/schemas/TicketComment"
                  next_page:
                    type:
                    - string
                    - "null"
                    description: URL to the next page of results
                  previous_page:
                    type:
                    - string
                    - "null"
                    description: URL to the previous page of results
                  count:
                    type: integer
                    description: Total count of records


  # ==================== ATTACHMENTS ====================
  /attachments/{attachment_id}.json:
    get:
      summary: Get an attachment
      description: Returns an attachment by its ID
      operationId: GetAttachment
      x-airbyte-entity: attachments
      x-airbyte-action: get
      x-airbyte-record-extractor: $.attachment
      tags:
      - Attachments
      parameters:
      - name: attachment_id
        in: path
        required: true
        description: The ID of the attachment
        schema:
          type: integer
      responses:
        "200":
          description: Attachment object
          content:
            application/json:
              schema:
                type: object
                properties:
                  attachment:
                    $ref: "#/components/schemas/Attachment"

  /attachments/{attachment_id}:download:
    get:
      summary: Download attachment file
      description: Downloads the file content of a ticket attachment
      operationId: DownloadAttachment
      x-airbyte-entity: attachments
      x-airbyte-action: download
      x-airbyte-file-url: attachment.content_url
      x-airbyte-path-override:
        path: /attachments/{attachment_id}.json
      tags:
      - Attachments
      parameters:
      - name: attachment_id
        in: path
        required: true
        description: The ID of the attachment
        schema:
          type: integer
      responses:
        "200":
          description: Attachment file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # ==================== TICKET AUDITS ====================
  /ticket_audits.json:
    get:
      summary: List all ticket audits
      description: Returns a list of all ticket audits
      operationId: ListTicketAudits
      x-airbyte-entity: ticket_audits
      x-airbyte-action: list
      x-airbyte-record-extractor: $.audits
      x-airbyte-meta-extractor:
        next_page: $.next_page
        previous_page: $.previous_page
        count: $.count
      tags:
      - Ticket Audits
      parameters:
      - name: page
        in: query
        description: Page number for pagination
        schema:
          type: integer
          minimum: 1
      - name: per_page
        in: query
        description: Number of results per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
      responses:
        "200":
          description: List of ticket audits
          content:
            application/json:
              schema:
                type: object
                properties:
                  audits:
                    type: array
                    items:
                      $ref: "#/components/schemas/TicketAudit"
                  next_page:
                    type:
                    - string
                    - "null"
                    description: URL to the next page of results
                  previous_page:
                    type:
                    - string
                    - "null"
                    description: URL to the previous page of results
                  count:
                    type: integer
                    description: Total count of records

  /tickets/{ticket_id}/audits.json:
    get:
      summary: List audits for a ticket
      description: Returns a list of audits for a specific ticket
      operationId: ListAuditsForTicket
      x-airbyte-entity: ticket_audits
      x-airbyte-action: list
      x-airbyte-record-extractor: $.audits
      x-airbyte-meta-extractor:
        next_page: $.next_page
        previous_page: $.previous_page
        count: $.count
      tags:
      - Ticket Audits
      parameters:
      - name: ticket_id
        in: path
        required: true
        description: The ID of the ticket
        schema:
          type: integer
      - name: page
        in: query
        description: Page number for pagination
        schema:
          type: integer
          minimum: 1
      - name: per_page
        in: query
        description: Number of results per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
      responses:
        "200":
          description: List of audits for the ticket
          content:
            application/json:
              schema:
                type: object
                properties:
                  audits:
                    type: array
                    items:
                      $ref: "#/components/schemas/TicketAudit"
                  next_page:
