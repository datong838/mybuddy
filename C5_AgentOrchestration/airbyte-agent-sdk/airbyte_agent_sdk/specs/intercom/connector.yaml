  - bearerAuth: []

paths:
  # ============================================
  # CONTACTS ENTITY
  # ============================================
  "/contacts":
    post:
      summary: Create a contact
      description: Create a new contact (user or lead)
      operationId: Contact_Create
      x-airbyte-entity: contacts
      x-airbyte-action: create
      parameters:
        - name: Intercom-Version
          in: header
          description: API version
          required: false
          schema:
            type: string
            default: "2.11"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactCreateParams"
      responses:
        "200":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "401":
          description: Unauthorized
    get:
      summary: List contacts
      description: Returns a paginated list of contacts in the workspace
      operationId: listContacts
      x-airbyte-entity: contacts
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        next_page: $.pages.next.starting_after
      parameters:
        - name: per_page
          in: query
          description: Number of contacts to return per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 150
            default: 50
        - name: starting_after
          in: query
          description: Cursor for pagination - get contacts after this ID
          required: false
          schema:
            type: string
        - name: Intercom-Version
          in: header
          description: API version
          required: false
          schema:
            type: string
            default: "2.11"
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactsList"
        "401":
          description: Unauthorized

  "/contacts/{id}":
    get:
      summary: Get a contact
      description: Get a single contact by ID
      operationId: getContact
      x-airbyte-entity: contacts
      x-airbyte-action: get
      parameters:
        - name: id
          in: path
          required: true
          description: Contact ID
          schema:
            type: string
        - name: Intercom-Version
          in: header
          description: API version
          required: false
          schema:
            type: string
            default: "2.11"
      responses:
        "200":
          description: Contact object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Contact not found
        "401":
          description: Unauthorized
    put:
      summary: Update a contact
      description: Update an existing contact by ID
      operationId: Contact_Update
      x-airbyte-entity: contacts
      x-airbyte-action: update
      parameters:
        - name: id
          in: path
          required: true
          description: Contact ID
          schema:
            type: string
        - name: Intercom-Version
          in: header
          description: API version
          required: false
          schema:
            type: string
            default: "2.11"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdateParams"
      responses:
        "200":
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Contact not found
        "401":
          description: Unauthorized
    delete:
      summary: Delete a contact
      description: Permanently delete a contact by ID
      operationId: DeleteContact
      x-airbyte-entity: contacts
      x-airbyte-action: delete
      parameters:
        - name: id
