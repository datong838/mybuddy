components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Intercom API Access Token authentication
      x-airbyte-auth-config:
        title: "Access Token Authentication"
        type: object
        required:
          - access_token
        properties:
          access_token:
            type: string
            title: "Access Token"
            description: "Your Intercom API Access Token"
        auth_mapping:
          token: "${access_token}"
        replication_auth_key_mapping:
          access_token: "access_token"
      x-airbyte-oauth-scopes:
        - mode: read
          entities:
            - contacts
            - companies
            - conversations
            - conversation_parts
            - teams
            - tags
            - segments
        - mode: write
          entities:
            - contacts
            - companies
            - conversations
            - notes
            - internal_articles
            - tags
        - mode: delete
          entities:
            - contacts
            - companies
            - conversations
            - tags
            - internal_articles

  schemas:
    # ============================================
    # PAGINATION
    # ============================================
    Pages:
      type: object
      description: Pagination metadata
      properties:
        type:
          type: [string, "null"]
          description: Type of pagination
        page:
          type: [integer, "null"]
          description: Current page number
        per_page:
          type: [integer, "null"]
          description: Number of items per page
        total_pages:
          type: [integer, "null"]
          description: Total number of pages
        next:
          type: [object, "null"]
          description: Cursor for next page
          properties:
            page:
              type: [integer, "null"]
              description: Next page number
            starting_after:
              type: [string, "null"]
              description: Cursor for next page

