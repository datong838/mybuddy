      properties:
        type:
          type: [string, "null"]
          description: Type of object (contact)
        id:
          type: string
          description: Unique contact identifier
        workspace_id:
          type: [string, "null"]
          description: Workspace ID
        external_id:
          type: [string, "null"]
          description: External ID from your system
        role:
          type: [string, "null"]
          description: Role of the contact (user or lead)
        email:
