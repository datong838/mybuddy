components:
  securitySchemes:
    zendeskOAuth:
      type: oauth2
      x-airbyte-untested: true
      description: Zendesk OAuth 2.0 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://{{subdomain}}.zendesk.com/oauth/authorizations/new
          tokenUrl: https://{{subdomain}}.zendesk.com/oauth/tokens
          refreshUrl: https://{{subdomain}}.zendesk.com/oauth/tokens
          scopes:
            read: Read access to all resources
            write: Write access to all resources
            read write: Read and write access to all resources
      x-airbyte-oauth-scopes:
        - scope: "read"
          mode: read
          description: Read access to all resources
          entities:
            - account_overview
            - addresses
            - agents_activity
            - agents_overview
            - call_legs
            - calls
            - current_queue_activity
            - greeting_categories
            - greetings
            - ivr_menus
            - ivr_routes
            - ivrs
            - phone_numbers
        - scope: "write"
          mode: write
          description: Write access to IVR resources
          entities:
            - ivr_menus
            - ivr_routes
      x-airbyte-auth-config:
        type: object
        title: OAuth 2.0
        description: Zendesk OAuth 2.0 authentication
        required:
          - access_token
        properties:
          access_token:
            type: string
            title: Access Token
            description: OAuth 2.0 access token
          refresh_token:
            type: string
            title: Refresh Token
            description: OAuth 2.0 refresh token (optional)
          client_id:
            type: string
            title: Client ID
            description: OAuth client ID
          client_secret:
            type: string
            title: Client Secret
            description: OAuth client secret
        auth_mapping:
          access_token: "${access_token}"
          refresh_token: "${refresh_token}"
          client_id: "${client_id}"
          client_secret: "${client_secret}"
        replication_auth_key_mapping:
          credentials.access_token: "access_token"
          credentials.refresh_token: "refresh_token"
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
        replication_auth_key_constants:
          credentials.auth_type: "oauth2_refresh"

    zendeskAPIToken:
      type: http
      scheme: basic
      description: |
        Zendesk API Token authentication.
        API tokens are managed in Admin Center at Apps and integrations > APIs > Zendesk API.
      x-airbyte-auth-config:
        type: object
        title: API Token
        description: Authenticate using email and API token
        required:
          - email
          - api_token
        properties:
          email:
            type: string
            format: email
            title: Email Address
            description: Your Zendesk account email address
          api_token:
            type: string
            title: API Token
            description: Your Zendesk API token from Admin Center
        auth_mapping:
          username: "${email}/token"
          password: "${api_token}"
        replication_auth_key_mapping:
          credentials.email: "email"
          credentials.api_token: "api_token"
        replication_auth_key_constants:
          credentials.auth_type: "api_token"

