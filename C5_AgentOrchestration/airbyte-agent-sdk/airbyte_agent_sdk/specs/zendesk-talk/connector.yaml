  x-airbyte-example-questions:
    direct:
      - "List all phone numbers in our Zendesk Talk account"
      - "Show all addresses on file"
      - "List all IVR configurations"
      - "Show all greetings"
      - "List greeting categories"
      - "Show agent activity statistics"
      - "Show the account overview stats"
      - "Show current queue activity"
    search:
      - "Which phone numbers have SMS enabled?"
      - "Find agents who have missed the most calls today"
      - "What is the average call duration across all calls?"
      - "Which phone numbers are toll-free?"
    unsupported:
      - "Create a new phone number"
      - "Delete an IVR configuration"
      - "Update a greeting"
      - "Make an outbound call"

servers:
  - url: https://{subdomain}.zendesk.com/api/v2/channels/voice
    description: Zendesk Talk API Server
    variables:
      subdomain:
        default: your-subdomain
        description: Your Zendesk subdomain (the part before .zendesk.com in your Zendesk URL)
    x-airbyte-replication-environment-mapping:
      subdomain: subdomain

security:
  - zendeskOAuth: []
  - zendeskAPIToken: []

paths:
  /phone_numbers:
    get:
      summary: List phone numbers
      description: Returns a list of all phone numbers in the Zendesk Talk account
      operationId: listPhoneNumbers
      x-airbyte-entity: phone_numbers
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.phone_numbers
      x-airbyte-meta-extractor:
        next_page: $.next_page
      responses:
        "200":
          description: List of phone numbers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneNumbersList"

  /phone_numbers/{phone_number_id}:
    get:
      summary: Show phone number
      description: Retrieves a single phone number by ID
      operationId: getPhoneNumber
      x-airbyte-entity: phone_numbers
      x-airbyte-action: get
      x-airbyte-record-extractor: $.phone_number
      parameters:
        - name: phone_number_id
          in: path
          required: true
          description: ID of the phone number
          schema:
            type: integer
      responses:
        "200":
          description: Phone number object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneNumberWrapper"
        "404":
          description: Phone number not found

  /addresses:
    get:
      summary: List addresses
      description: Returns a list of all addresses in the Zendesk Talk account
      operationId: listAddresses
      x-airbyte-entity: addresses
      x-airbyte-action: list
      x-airbyte-record-extractor: $.addresses
      x-airbyte-meta-extractor:
        next_page: $.next_page
      responses:
        "200":
          description: List of addresses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressesList"

  /addresses/{address_id}:
    get:
      summary: Show address
      description: Retrieves a single address by ID
