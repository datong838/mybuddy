openapi: 3.1.0

info:
  title: Zendesk Talk API Connector
  version: 1.0.3
  description: |
    Connector for the Zendesk Talk (Voice) API. Provides access to phone numbers,
    addresses, greetings, IVR configurations, call data, and agent/account statistics
    for Zendesk Talk voice support channels.
  x-airbyte-connector-name: zendesk-talk
  x-airbyte-connector-definition-id: c8630570-086d-4a40-99ae-ea5b18673071
  x-airbyte-replication-version: "2.0.15"
  x-airbyte-replication-compatibility: ">=2.0.15, <3.0.0"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Zendesk Talk API Documentation
      url: https://developer.zendesk.com/api-reference/voice/talk-api/introduction/
  x-airbyte-skip-auth-methods:
    - bearer
    - customauthenticator
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Zendesk Talk.
    properties:
      start_date:
        type: string
        title: Start Date
        description: "UTC date and time in the format YYYY-MM-DDT00:00:00Z from which to start replicating data."
        format: date-time
    required:
      - start_date
    replication_config_key_mapping:
      start_date: start_date
    replication_config_constants:
      start_date: "{{ day_delta(-180, '%Y-%m-%dT%H:%M:%SZ') }}"
  x-airbyte-context-store:
    disable_compaction: true
    entities:
      - entity: addresses
        x-airbyte-name: addresses
        fields:
          - name: city
            type: ["null", "string"]
            description: City of the address
          - name: country_code
            type: ["null", "string"]
            description: ISO country code
          - name: id
