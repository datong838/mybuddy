components:
  securitySchemes:
    notionOAuth:
      type: oauth2
      description: Notion OAuth 2.0 authentication for public integrations
      flows:
        authorizationCode:
          authorizationUrl: https://api.notion.com/v1/oauth/authorize
          tokenUrl: https://api.notion.com/v1/oauth/token
          refreshUrl: https://api.notion.com/v1/oauth/token
          scopes: {}
      x-airbyte-token-refresh:
        auth_style: basic
        body_format: json
      x-airbyte-oauth-credentials:
        title: Notion OAuth App Credentials
        description: Provide your own Notion OAuth app credentials to override the default Airbyte-managed ones.
        properties:
          client_id:
            type: string
            title: Client ID
            description: Your Notion OAuth integration's client ID
          client_secret:
            type: string
            title: Client Secret
            description: Your Notion OAuth integration's client secret
        required:
          - client_id
          - client_secret
      x-airbyte-auth-config:
        title: "OAuth2.0"
        type: object
        required:
          - access_token
          - client_id
          - client_secret
        properties:
          client_id:
            type: string
            title: "Client ID"
            description: "Your Notion OAuth integration's client ID"
          client_secret:
            type: string
            title: "Client Secret"
            description: "Your Notion OAuth integration's client secret"
          access_token:
            type: string
            title: "Access Token"
            description: "OAuth access token obtained through the Notion authorization flow"
        auth_mapping:
          client_id: "${client_id}"
          client_secret: "${client_secret}"
          access_token: "${access_token}"
        replication_auth_key_mapping:
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          credentials.access_token: "access_token"
        replication_auth_key_constants:
          credentials.auth_type: "OAuth2.0"

    notionBearerToken:
      type: http
      scheme: bearer
      description: Notion internal integration token authentication
      x-airbyte-auth-config:
        title: "Access Token"
        type: object
        required:
          - token
        properties:
          token:
            type: string
            title: "Integration Token"
            description: "Notion internal integration token (starts with ntn_ or secret_)"
        auth_mapping:
          token: "${token}"
        replication_auth_key_mapping:
          credentials.token: "token"
        replication_auth_key_constants:
          credentials.auth_type: "token"

