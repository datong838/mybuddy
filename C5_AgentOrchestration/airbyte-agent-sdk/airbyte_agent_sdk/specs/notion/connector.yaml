    CommentCreateParams:
      type: object
      description: "Parameters for creating a comment. Provide either parent (with page_id or block_id) for a new comment, or discussion_id to reply to an existing thread. Exactly one of parent or discussion_id must be provided."
      required:
        - rich_text
      properties:
        parent:
          type: object
          description: "Parent of the comment. Provide exactly one of page_id or block_id. Mutually exclusive with discussion_id."
          oneOf:
            - type: object
              required: [page_id]
              properties:
                page_id:
                  type: string
                  description: ID of the page to comment on
            - type: object
              required: [block_id]
              properties:
                block_id:
                  type: string
                  description: ID of the block to comment on
        discussion_id:
          type: string
          description: ID of an existing discussion thread to reply to. Mutually exclusive with parent.
        rich_text:
          type: array
          description: Content of the comment as rich text
          items:
            type: object
            properties:
              type:
                type: string
                default: "text"
              text:
                type: object
                properties:
                  content:
                    type: string
                  link:
                    type: [object, "null"]
                    properties:
                      url:
                        type: string
              mention:
                type: object
                additionalProperties: true
              equation:
                type: object
                properties:
                  expression:
                    type: string
              annotations:
                type: object
                properties:
                  bold:
                    type: boolean
                  italic:
                    type: boolean
                  strikethrough:
                    type: boolean
                  underline:
                    type: boolean
                  code:
                    type: boolean
                  color:
                    type: string

    DataSourceUpdateParams:
      type: object
      description: "Parameters for updating a data source. All fields are optional."
      properties:
        title:
          type: array
          description: Updated title of the data source as rich text
          items:
            type: object
            properties:
              type:
                type: string
                default: "text"
              text:
                type: object
                properties:
                  content:
                    type: string
                  link:
                    type: [object, "null"]
                    properties:
                      url:
                        type: string
              mention:
                type: object
                additionalProperties: true
              equation:
                type: object
                properties:
                  expression:
                    type: string
              annotations:
                type: object
                properties:
                  bold:
                    type: boolean
                  italic:
                    type: boolean
                  strikethrough:
                    type: boolean
                  underline:
                    type: boolean
                  code:
                    type: boolean
                  color:
                    type: string
        description:
          type: array
          description: Updated description of the data source as rich text
          items:
            type: object
            properties:
              type:
                type: string
                default: "text"
              text:
                type: object
                properties:
                  content:
                    type: string
                  link:
                    type: [object, "null"]
                    properties:
                      url:
                        type: string
              mention:
                type: object
                additionalProperties: true
              equation:
                type: object
                properties:
                  expression:
                    type: string
              annotations:
                type: object
                properties:
                  bold:
                    type: boolean
                  italic:
                    type: boolean
                  strikethrough:
                    type: boolean
                  underline:
                    type: boolean
                  code:
                    type: boolean
                  color:
                    type: string
        properties:
          type: object
          description: "Data source property schema to update. Keys are property names or IDs. Set a property to null to remove it."
          additionalProperties: true
        icon:
          type: [object, "null"]
          description: "Icon. Supports emoji, external URL, file upload, custom emoji, and Notion native icons. Set to null to remove."
          properties:
            type:
              type: string
              description: "Icon type: emoji, external, file_upload, custom_emoji, or icon"
            emoji:
              type: string
              description: Emoji character (when type is emoji)
            external:
              type: object
              description: External URL icon (when type is external)
              properties:
                url:
                  type: string
            file_upload:
              type: object
              description: Uploaded file icon (when type is file_upload)
              properties:
                id:
                  type: string
            custom_emoji:
              type: object
              description: Custom emoji icon (when type is custom_emoji)
              properties:
                id:
                  type: string
            icon:
              type: object
              description: Notion native icon (when type is icon)
              properties:
                name:
                  type: string
                color:
                  type: string
        cover:
          type: [object, "null"]
          description: "Cover image. Supports external URL or file upload. Set to null to remove."
          properties:
            type:
              type: string
              description: "Cover type: external or file_upload"
            external:
              type: object
              description: External URL cover
              properties:
                url:
                  type: string
            file_upload:
              type: object
              description: Uploaded file cover
              properties:
                id:
                  type: string
        archived:
          type: boolean
          description: Set to true to archive the data source
        in_trash:
          type: boolean
          description: Set to true to move the data source to trash
