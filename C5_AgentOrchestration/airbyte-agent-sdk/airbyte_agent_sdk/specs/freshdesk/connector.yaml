            description: Field creation timestamp
          - name: updated_at
            type: ["string", "null"]
            description: Field last update timestamp

servers:
  - url: https://{subdomain}.freshdesk.com/api/v2
    description: Freshdesk API server
    variables:
      subdomain:
        default: your-subdomain
        description: Your Freshdesk subdomain (e.g., "acme" for acme.freshdesk.com)
    x-airbyte-replication-environment-mapping:
      domain:
        source: subdomain
        format: "{value}.freshdesk.com"

security:
  - basicAuth: []

paths:
  /tickets:
    get:
      summary: List all tickets
      description: Returns a paginated list of tickets. By default returns tickets created in the past 30 days. Use updated_since to get older tickets.
      operationId: listTickets
      x-airbyte-entity: tickets
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: "@link.next"
      parameters:
        - name: per_page
          in: query
          description: Number of items per page (max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: page
          in: query
          description: Page number (starts at 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: updated_since
          in: query
          description: Return tickets updated since this timestamp (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: order_by
          in: query
          description: Sort field
          schema:
            type: string
            enum: [created_at, due_by, updated_at, status]
            default: updated_at
        - name: order_type
          in: query
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
        "401":
          description: Unauthorized

  /tickets/{id}:
    get:
      summary: View a ticket
      description: Get a single ticket by ID
      operationId: getTicket
      x-airbyte-entity: tickets
      x-airbyte-action: get
      parameters:
        - name: id
          in: path
          required: true
          description: Ticket ID
          schema:
            type: integer
      responses:
        "200":
          description: Ticket object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "404":
          description: Ticket not found
        "401":
          description: Unauthorized

  /contacts:
    get:
      summary: List all contacts
      description: Returns a paginated list of contacts
      operationId: listContacts
      x-airbyte-entity: contacts
      x-airbyte-action: list
      x-airbyte-meta-extractor:
