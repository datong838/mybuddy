            description: Mobile number
          - name: active
            type: ["boolean", "null"]
            description: Whether the contact has been verified
          - name: address
            type: ["string", "null"]
            description: Address of the contact
          - name: company_id
            type: ["integer", "null"]
            description: ID of the primary company
          - name: custom_fields
            type: ["object", "null"]
            description: Custom fields associated with the contact
          - name: description
