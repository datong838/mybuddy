      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
        "401":
          description: Unauthorized

  /contacts/{id}:
    get:
      summary: View a contact
      description: Get a single contact by ID
