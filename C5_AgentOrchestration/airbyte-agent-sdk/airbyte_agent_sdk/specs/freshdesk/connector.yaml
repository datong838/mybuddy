            description: Group creation timestamp
          - name: updated_at
            type: ["null", "string"]
            description: Group last update timestamp
      - entity: contacts
        x-airbyte-name: contacts
        suggested: true
        fields:
          - name: id
            type: ["integer", "null"]
            description: Unique contact ID
          - name: name
            type: ["string", "null"]
