components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >
        Freshdesk uses HTTP Basic authentication. Use your Freshdesk API key as the
        username and any dummy value (e.g., "X") as the password.
      x-airbyte-auth-config:
        title: API Key Authentication
        type: object
        required:
          - api_key
        properties:
          api_key:
            type: string
            title: API Key
            description: Your Freshdesk API key (found in Profile Settings)
        auth_mapping:
          username: "${api_key}"
          password: "X"
        replication_auth_key_mapping:
          api_key: "api_key"

  schemas:
