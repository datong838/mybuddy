  /rest/api/3/issue/{issueIdOrKey}/transitions:
    get:
      summary: Get available transitions for an issue
      description: Returns the available transitions for an issue. Transitions define the workflow steps an issue can move through (e.g., To Do -> In Progress -> Done). Use this to discover valid transition IDs before performing a transition.
      operationId: getIssueTransitions
      x-airbyte-entity: issue_transitions
      x-airbyte-action: list
      x-airbyte-record-extractor: $.transitions
      x-airbyte-no-pagination: "Jira Cloud /issue/{issueIdOrKey}/transitions returns the full set of available workflow transitions for a single issue in one response; the endpoint does not expose pagination parameters and the response envelope has no next-page cursor or total count."
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          description: The issue ID or key (e.g., "PROJ-123" or "10000")
          schema:
            type: string
        - name: expand
          in: query
          description: Comma-separated list of parameters to expand (transitions.fields)
          schema:
            type: string
        - name: transitionId
          in: query
          description: Filter by transition ID to get details for a specific transition
          schema:
            type: string
        - name: skipRemoteOnlyCondition
          in: query
          description: Whether to skip conditions that rely on remote data
          schema:
            type: boolean
            default: false
        - name: includeUnavailableTransitions
          in: query
          description: Whether to include transitions that are unavailable
          schema:
            type: boolean
            default: false
        - name: sortByOpsBarAndStatus
          in: query
          description: Whether to sort transitions by OpsBar and status
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: List of available transitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueTransitionsList"
        "401":
          description: Unauthorized
        "404":
          description: Issue not found
    post:
      summary: Transition an issue to a new status
      description: |
        Performs a status transition on an issue (e.g., To Do -> In Progress -> Done).
        This is the primary way to change an issue's workflow status in Jira.

        To use this endpoint:
        1. First, GET the available transitions for the issue to find valid transition IDs
        2. Then POST with the desired transition ID

        You can optionally include field updates and comments as part of the transition.
      operationId: transitionIssue
      x-airbyte-entity: issue_transitions
      x-airbyte-action: create
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          description: The issue ID or key (e.g., "PROJ-123" or "10000")
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueTransitionParams"
      responses:
        "204":
          description: Transition performed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "400":
          description: Bad request - invalid transition ID or missing required fields
        "401":
          description: Unauthorized
        "404":
          description: Issue not found
        "409":
          description: Conflict - transition cannot be performed in current state

