servers:
  - url: https://{subdomain}.atlassian.net
    description: Jira Cloud API server
    variables:
      subdomain:
        description: Your Jira Cloud subdomain
        default: "{subdomain}"
    x-airbyte-replication-environment-mapping:
      domain:
        source: subdomain
        format: "{value}.atlassian.net"

security:
  - jiraOAuth: []
  - basicAuth: []

paths:
  /rest/api/3/search/jql:
    get:
      summary: Search issues using JQL
      description: |
        Retrieve issues based on JQL query with pagination support.

        IMPORTANT: This endpoint requires a bounded JQL query. A bounded query must include a search restriction that limits the scope of the search. Examples of valid restrictions include: project (e.g., "project = MYPROJECT"), assignee (e.g., "assignee = currentUser()"), reporter, issue key, sprint, or date-based filters combined with a project restriction. An unbounded query like "order by key desc" will be rejected with a 400 error. Example bounded query: "project = MYPROJECT AND updated >= -7d ORDER BY created DESC".
      operationId: searchIssues
      x-airbyte-entity: issues
      x-airbyte-action: api_search
      x-airbyte-record-extractor: $.issues
      x-airbyte-meta-extractor:
        nextPageToken: $.nextPageToken
        isLast: $.isLast
        total: $.total
      parameters:
        - name: jql
          in: query
          description: JQL query string to filter issues
          schema:
            type: string
        - name: nextPageToken
          in: query
          description: The token for a page to fetch that is not the first page. The first page has a nextPageToken of null. Use the `nextPageToken` to fetch the next page of issues. The `nextPageToken` field is not included in the response for the last page, indicating there is no next page.
          schema:
            type: string
        - name: maxResults
          in: query
          description: The maximum number of items to return per page. To manage page size, API may return fewer items per page where a large number of fields or properties are requested. The greatest number of items returned per page is achieved when requesting `id` or `key` only. It returns max 5000 issues.
          schema:
            type: integer
        - name: fields
          in: query
          description: A comma-separated list of fields to return for each issue. By default, all navigable fields are returned. To get a list of all fields, use the Get fields operation.
          schema:
            type: string
        - name: expand
          in: query
          description: A comma-separated list of parameters to expand. This parameter accepts multiple values, including `renderedFields`, `names`, `schema`, `transitions`, `operations`, `editmeta`, `changelog`, and `versionedRepresentations`.
          schema:
            type: string
          example: names,changelog
        - name: properties
          in: query
          description: A comma-separated list of issue property keys. To get a list of all issue property keys, use the Get issue operation. A maximum of 5 properties can be requested.
          schema:
            type: string
        - name: fieldsByKeys
          in: query
          description: Whether the fields parameter contains field keys (true) or field IDs (false). Default is false.
          schema:
            type: boolean
        - name: failFast
          in: query
          description: Fail the request early if all field data cannot be retrieved. Default is false.
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated list of issues matching JQL query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuesList"
        "401":
          description: Unauthorized
        "400":
          description: Bad request

  /rest/api/3/issue:
    post:
      summary: Create an issue
      description: Creates an issue or a sub-task from a JSON representation
      operationId: createIssue
      x-airbyte-entity: issues
      x-airbyte-action: create
      parameters:
        - name: updateHistory
          in: query
          description: Whether the action taken is added to the user's Recent history
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueCreateParams"
      responses:
        "201":
          description: Issue created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueCreateResponse"
        "400":
          description: Bad request - Invalid input
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - User does not have permission to create issues

  /rest/api/3/issue/{issueIdOrKey}:
    get:
      summary: Get issue by ID or key
      description: Retrieve a single issue by its ID or key
      operationId: getIssue
      x-airbyte-entity: issues
      x-airbyte-action: get
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          description: The issue ID or key (e.g., "PROJ-123" or "10000")
          schema:
            type: string
        - name: fields
          in: query
          description: A comma-separated list of fields to return for the issue. By default, all navigable and Jira default fields are returned. Use it to retrieve a subset of fields.
          schema:
            type: string
        - name: expand
          in: query
          description: A comma-separated list of parameters to expand. This parameter accepts multiple values, including `renderedFields`, `names`, `schema`, `transitions`, `operations`, `editmeta`, `changelog`, and `versionedRepresentations`.
          schema:
            type: string
        - name: properties
          in: query
          description: A comma-separated list of issue property keys. To get a list of all issue property keys, use the Get issue operation. A maximum of 5 properties can be requested.
          schema:
            type: string
        - name: fieldsByKeys
          in: query
          description: Whether the fields parameter contains field keys (true) or field IDs (false). Default is false.
          schema:
            type: boolean
        - name: updateHistory
          in: query
          description: Whether the action taken is added to the user's Recent history. Default is false.
          schema:
            type: boolean
        - name: failFast
          in: query
          description: Fail the request early if all field data cannot be retrieved. Default is false.
          schema:
            type: boolean
      responses:
        "200":
          description: Single issue object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "401":
          description: Unauthorized
        "404":
          description: Issue not found
    put:
      summary: Update an issue
      description: Edits an issue. Issue properties may be updated as part of the edit. Only fields included in the request body are updated.
      operationId: updateIssue
      x-airbyte-entity: issues
      x-airbyte-action: update
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          description: The issue ID or key (e.g., "PROJ-123" or "10000")
          schema:
            type: string
        - name: notifyUsers
          in: query
          description: Whether a notification email about the issue update is sent to all watchers. Default is true.
          schema:
            type: boolean
            default: true
        - name: overrideScreenSecurity
          in: query
          description: Whether screen security is overridden to enable hidden fields to be edited.
          schema:
            type: boolean
            default: false
        - name: overrideEditableFlag
          in: query
          description: Whether the issue's edit metadata is overridden.
          schema:
            type: boolean
            default: false
        - name: returnIssue
          in: query
          description: Whether the updated issue is returned.
          schema:
            type: boolean
            default: false
        - name: expand
          in: query
          description: Expand options when returning the updated issue.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueUpdateParams"
      responses:
        "200":
          description: Issue updated successfully (when returnIssue=true)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "204":
          description: Issue updated successfully (when returnIssue=false)
        "400":
          description: Bad request - Invalid input
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - User does not have permission to edit the issue
        "404":
          description: Issue not found
    delete:
      summary: Delete an issue
      description: Deletes an issue. An issue cannot be deleted if it has one or more subtasks unless deleteSubtasks is true.
      operationId: deleteIssue
      x-airbyte-entity: issues
      x-airbyte-action: delete
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          description: The issue ID or key (e.g., "PROJ-123" or "10000")
          schema:
            type: string
        - name: deleteSubtasks
          in: query
          description: Whether to delete the issue's subtasks. Default is false.
          schema:
            type: boolean
            default: false
      responses:
        "204":
          description: Issue deleted successfully
        "400":
          description: Bad request - Issue has subtasks and deleteSubtasks is false
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - User does not have permission to delete the issue
        "404":
          description: Issue not found

  /rest/api/3/project/search:
    get:
      summary: Search for projects
      description: Search and filter projects with advanced query parameters
      operationId: searchProjects
      x-airbyte-entity: projects
      x-airbyte-action: api_search
      x-airbyte-record-extractor: $.values
      x-airbyte-meta-extractor:
        nextPage: $.nextPage
        total: $.total
      parameters:
        - name: startAt
          in: query
          description: The index of the first item to return in a page of results (page offset)
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
        - name: maxResults
          in: query
          description: The maximum number of items to return per page (max 100)
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - name: orderBy
          in: query
          description: Order the results by a field (prefix with + for ascending, - for descending)
          schema:
            type: string
            default: key
            enum:
              - category
              - -category
              - +category
              - key
              - -key
              - +key
              - name
              - -name
              - +name
              - owner
              - -owner
              - +owner
              - issueCount
              - -issueCount
              - +issueCount
              - lastIssueUpdatedDate
              - -lastIssueUpdatedDate
              - +lastIssueUpdatedDate
              - archivedDate
              - +archivedDate
              - -archivedDate
              - deletedDate
              - +deletedDate
              - -deletedDate
        - name: id
          in: query
          description: Filter by project IDs (up to 50)
          schema:
            type: array
            items:
              type: integer
              format: int64
            uniqueItems: true
        - name: keys
          in: query
