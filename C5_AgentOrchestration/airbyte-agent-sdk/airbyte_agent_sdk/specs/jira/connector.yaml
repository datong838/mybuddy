components:
  securitySchemes:
    jiraOAuth:
      type: oauth2
      x-airbyte-untested: true
      description: Jira Cloud OAuth 2.0 (3LO) authentication for accessing Jira APIs on behalf of a user
      flows:
        authorizationCode:
          authorizationUrl: https://auth.atlassian.com/authorize
          tokenUrl: https://auth.atlassian.com/oauth/token
          refreshUrl: https://auth.atlassian.com/oauth/token
          scopes:
            read:jira-work: Read project and issue data including comments, worklogs, and transitions
            read:jql:jira: Search for issues using JQL
            read:group:jira: Read group information
            read:project-role:jira: Read project role information
            read:issue-details:jira: Read issue details including comments and worklogs
            read:status:jira: Read status information
            read:jira-user: Read user information
            read:user:jira: Read user details
            read:avatar:jira: Read avatar images
            read:webhook:jira: Read webhook information
            read:project-category:jira: Read project category information
            read:screenable-field:jira: Read screenable field information
            read:screen-field:jira: Read screen field information
            offline_access: Obtain refresh tokens for long-lived access
            read:board-scope:jira-software: Read board scope configuration
            read:project:jira: Read project information
            read:sprint:jira-software: Read sprint information
            read:application-role:jira: Read application role information
            read:field-configuration:jira: Read field configuration information
            read:notification-scheme:jira: Read notification scheme information
            read:issue-security-scheme:jira: Read issue security scheme information
            read:issue-security-level:jira: Read issue security level information
            read:issue-type-scheme:jira: Read issue type scheme information
            read:issue-type-screen-scheme:jira: Read issue type screen scheme information
            read:permission-scheme:jira: Read permission scheme information
            read:screen:jira: Read screen information
            read:screen-scheme:jira: Read screen scheme information
            read:screen-tab:jira: Read screen tab information
            read:workflow:jira: Read workflow information
            read:workflow-scheme:jira: Read workflow scheme information
            read:project.email:jira: Read project email configuration
            read:custom-field-contextual-configuration:jira: Read custom field contextual configuration
            manage:jira-configuration: Manage Jira configuration
      x-airbyte-oauth-scopes:
        - scope: "offline_access"
          mode: read_write
          entities:
            - issue_comments
            - issue_fields
            - issue_links
            - issue_transitions
            - issue_worklogs
            - issues
            - issues_assignee
            - projects
            - users
        - scope: "read:issue-details:jira"
          mode: read
          entities:
            - issues
        - scope: "read:avatar:jira"
          mode: read
          entities:
            - issues
            - projects
            - issue_comments
            - users
            - issue_fields
            - issue_worklogs
        - scope: "read:field-configuration:jira"
          mode: read
          entities:
            - issues
            - issue_fields
        - scope: "read:jira-work"
          mode: read
          entities:
            - issues
            - projects
            - issue_comments
            - issue_fields
