    IssueAssigneeParams:
      type: object
      description: Parameters for assigning an issue to a user
      properties:
        accountId:
          type: string
          nullable: true
          description: The account ID of the user to assign the issue to. Use null to unassign the issue. Use "-1" to set to automatic (project default assignee).
    EmptyResponse:
      type: object
      description: Empty response object (returned for 204 No Content responses)
      additionalProperties: true


    # Write Operation Schemas
    IssueCreateParams:
      type: object
      description: Parameters for creating a new issue
      required:
        - fields
      properties:
        fields:
          type: object
          description: The issue fields to set
          required:
            - project
            - issuetype
            - summary
          properties:
            project:
              type: object
              description: The project to create the issue in
              properties:
                id:
                  type: string
                  description: Project ID
                key:
                  type: string
                  description: Project key (e.g., 'PROJ')
            issuetype:
              type: object
              description: The type of issue (e.g., Bug, Task, Story)
              properties:
                id:
                  type: string
                  description: Issue type ID
                name:
                  type: string
                  description: Issue type name (e.g., 'Bug', 'Task', 'Story')
            summary:
              type: string
              description: A brief summary of the issue (title)
            description:
              type: object
              description: Issue description in Atlassian Document Format (ADF)
              properties:
                type:
                  type: string
                  default: doc
                  description: Document type (always 'doc')
                version:
                  type: integer
                  default: 1
                  description: ADF version
                content:
                  type: array
                  description: Array of content blocks
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: Block type (e.g., 'paragraph')
                      content:
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              description: Content type (e.g., 'text')
                            text:
                              type: string
                              description: Text content
            priority:
              type: object
              description: Issue priority
              properties:
                id:
                  type: string
                  description: Priority ID
                name:
                  type: string
                  description: Priority name (e.g., 'Highest', 'High', 'Medium', 'Low', 'Lowest')
            assignee:
              type: object
              description: The user to assign the issue to
              properties:
                accountId:
                  type: string
                  description: The account ID of the user
            labels:
              type: array
              description: Labels to add to the issue
              items:
                type: string
            parent:
              type: object
              description: Parent issue for subtasks
              properties:
                key:
                  type: string
                  description: Parent issue key
        update:
          type: object
          description: Additional update operations to perform
          additionalProperties: true

    IssueCreateResponse:
      type: object
      description: Response from creating an issue
      properties:
        id:
          type: string
          description: The ID of the created issue
        key:
          type: string
          description: The key of the created issue (e.g., "PROJ-123")
        self:
          type: string
          format: uri
          description: URL of the created issue

    IssueUpdateParams:
      type: object
      description: Parameters for updating an issue. Only fields included are updated.
      properties:
        fields:
          type: object
          description: The issue fields to update
          properties:
            summary:
              type: string
              description: A brief summary of the issue (title)
            description:
              type: object
              description: Issue description in Atlassian Document Format (ADF)
              properties:
                type:
                  type: string
                  default: doc
                  description: Document type (always 'doc')
                version:
                  type: integer
                  default: 1
                  description: ADF version
                content:
                  type: array
                  description: Array of content blocks
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: Block type (e.g., 'paragraph')
                      content:
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              description: Content type (e.g., 'text')
                            text:
                              type: string
                              description: Text content
            priority:
              type: object
              description: Issue priority
              properties:
                id:
                  type: string
                  description: Priority ID
                name:
                  type: string
                  description: Priority name (e.g., 'Highest', 'High', 'Medium', 'Low', 'Lowest')
            assignee:
              type: object
              description: The user to assign the issue to
              properties:
                accountId:
                  type: string
                  description: The account ID of the user (use null to unassign)
            labels:
              type: array
              description: Labels for the issue
              items:
                type: string
        update:
          type: object
          description: Additional update operations to perform
          additionalProperties: true
        transition:
          type: object
          description: Transition the issue to a new status
          properties:
            id:
              type: string
              description: The ID of the transition to perform

    CommentCreateParams:
      type: object
      description: Parameters for creating a comment on an issue
      required:
        - body
      properties:
        body:
          type: object
          description: Comment content in Atlassian Document Format (ADF)
          required:
            - type
            - version
            - content
          properties:
            type:
              type: string
              default: doc
              description: Document type (always 'doc')
            version:
              type: integer
              default: 1
              description: ADF version
            content:
              type: array
              description: Array of content blocks
              items:
                type: object
                properties:
                  type:
                    type: string
                    description: Block type (e.g., 'paragraph')
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          description: Content type (e.g., 'text')
                        text:
                          type: string
                          description: Text content
        visibility:
          type: object
          description: Restrict comment visibility to a group or role
          properties:
            type:
              type: string
              enum:
                - group
                - role
              description: The type of visibility restriction
            value:
              type: string
              description: The name of the group or role
            identifier:
              type: string
              description: The ID of the group or role
        properties:
          type: array
          description: Custom properties for the comment
          items:
            type: object
            additionalProperties: true

    CommentUpdateParams:
      type: object
      description: Parameters for updating a comment. Only fields included are updated.
      required:
        - body
      properties:
        body:
          type: object
          description: Updated comment content in Atlassian Document Format (ADF)
          required:
            - type
            - version
            - content
          properties:
            type:
              type: string
              default: doc
              description: Document type (always 'doc')
            version:
              type: integer
              default: 1
              description: ADF version
            content:
              type: array
              description: Array of content blocks
              items:
                type: object
                properties:
                  type:
                    type: string
                    description: Block type (e.g., 'paragraph')
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          description: Content type (e.g., 'text')
                        text:
                          type: string
                          description: Text content
        visibility:
          type: object
          description: Restrict comment visibility to a group or role
          properties:
            type:
              type: string
              enum:
                - group
                - role
              description: The type of visibility restriction
            value:
              type: string
              description: The name of the group or role
            identifier:
              type: string
              description: The ID of the group or role

    # Issue Transition Schemas
    IssueTransition:
      type: object
      description: A workflow transition that can be performed on an issue
      properties:
        id:
          type: string
          description: The ID of the transition (use this when performing a transition)
        name:
          type: string
          description: The name of the transition (e.g., "In Progress", "Done")
        to:
          type: object
          description: The target status after performing this transition
          properties:
            self:
              type: string
              format: uri
            description:
              type: string
            iconUrl:
              type: string
              format: uri
            name:
              type: string
              description: The name of the target status
            id:
              type: string
            statusCategory:
              type: object
              properties:
                self:
                  type: string
                  format: uri
                id:
                  type: integer
                key:
                  type: string
                colorName:
                  type: string
                name:
                  type: string
        hasScreen:
          type: boolean
          description: Whether the transition has a screen associated with it
        isGlobal:
          type: boolean
          description: Whether this is a global transition
        isInitial:
          type: boolean
          description: Whether this is the initial transition
        isConditional:
          type: boolean
          description: Whether the transition has conditions
        isLooped:
          type: boolean
          description: Whether the transition loops back to the current status

    IssueTransitionsList:
      type: object
      description: List of available transitions for an issue
      properties:
        expand:
          type:
            - string
            - "null"
          description: Expand options applied to the response
        transitions:
          type: array
          items:
            $ref: "#/components/schemas/IssueTransition"
          description: Array of available transitions

    IssueTransitionParams:
      type: object
      description: Parameters for transitioning an issue to a new status
      required:
        - transition
      properties:
        transition:
          type: object
          description: The transition to perform
          required:
            - id
          properties:
            id:
              type: string
              description: The ID of the transition to perform. Get available transition IDs from the GET transitions endpoint.
        fields:
          type: object
          description: Fields to set during the transition (if required by the transition screen)
          additionalProperties: true
        update:
          type: object
          description: Additional update operations to perform during the transition
          additionalProperties: true
        historyMetadata:
          type: object
          description: Metadata about the transition for the issue history
          additionalProperties: true

    # Worklog Create Schema
    WorklogCreateParams:
      type: object
      description: Parameters for adding a worklog entry to an issue. Either timeSpentSeconds or timeSpent must be provided.
      properties:
        timeSpentSeconds:
          type: integer
          description: Time spent in seconds (e.g., 3600 for 1 hour). Provide this or timeSpent.
        timeSpent:
          type: string
          description: Human-readable time spent (e.g., 3h 30m, 1d 2h). Provide this or timeSpentSeconds.
        started:
          type: string
          format: date-time
          description: The datetime when the work was started (ISO 8601 format, e.g., "2024-01-15T09:00:00.000+0000"). Defaults to current time.
        comment:
          type: object
          description: A comment about the work done in Atlassian Document Format (ADF)
          properties:
            type:
              type: string
              default: doc
              description: Document type (always 'doc')
            version:
              type: integer
              default: 1
              description: ADF version
            content:
              type: array
              description: Array of content blocks
              items:
                type: object
                properties:
                  type:
                    type: string
                    description: Block type (e.g., 'paragraph')
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          description: Content type (e.g., 'text')
                        text:
                          type: string
                          description: Text content
        visibility:
          type: object
          description: Restrict worklog visibility to a group or role
          properties:
            type:
              type: string
              enum:
                - group
                - role
              description: The type of visibility restriction
            value:
              type: string
              description: The name of the group or role
            identifier:
              type: string
              description: The ID of the group or role

    # Issue Link Schemas
    IssueLinkCreateParams:
      type: object
      description: Parameters for creating a link between two issues
      required:
        - type
        - inwardIssue
        - outwardIssue
      properties:
        type:
          type: object
          description: The type of link (e.g., Blocks, Duplicate, Relates)
          properties:
            name:
              type: string
              description: The name of the link type (e.g., Blocks, Duplicate, Relates, Cloners)
            id:
              type: string
              description: The ID of the link type
            inward:
              type: string
              description: The inward description (e.g., is blocked by)
            outward:
              type: string
              description: The outward description (e.g., blocks)
        inwardIssue:
          type: object
          description: The inward issue (the issue that is affected by the link)
          required:
            - key
          properties:
            key:
              type: string
              description: The issue key (e.g., PROJ-123)
            id:
              type: string
              description: The issue ID
        outwardIssue:
          type: object
          description: The outward issue (the issue that causes the link)
          required:
            - key
          properties:
            key:
              type: string
              description: The issue key (e.g., PROJ-456)
            id:
              type: string
              description: The issue ID
        comment:
          type: object
          description: A comment about the link in Atlassian Document Format (ADF)
          properties:
            body:
              type: object
              properties:
                type:
                  type: string
                  default: doc
                version:
                  type: integer
                  default: 1
                content:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      content:
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                            text:
                              type: string
