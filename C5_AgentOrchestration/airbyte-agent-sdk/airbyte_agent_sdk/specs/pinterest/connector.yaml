servers:
- url: https://api.pinterest.com/v5
  description: Pinterest API v5 server

security:
- oauth2: []

paths:
  /ad_accounts:
    get:
      summary: List ad accounts
      description: Get a list of the ad accounts that the authenticated user has access to.
      operationId: listAdAccounts
      x-airbyte-entity: ad_accounts
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.items
      x-airbyte-meta-extractor:
        cursor: $.bookmark
      parameters:
      - name: page_size
        in: query
        description: Maximum number of items to include in a single page of the response.
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 250
          default: 25
      - name: bookmark
        in: query
        description: Cursor value for paginating through results.
        required: false
        schema:
          type: string
      - name: include_shared_accounts
        in: query
        description: Include shared ad accounts.
        required: false
        schema:
          type: boolean
          default: true
      responses:
        "200":
          description: List of ad accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdAccountsList"

  /ad_accounts/{ad_account_id}:
    get:
      summary: Get ad account
      description: Get an ad account by ID.
      operationId: getAdAccount
      x-airbyte-entity: ad_accounts
      x-airbyte-action: get
      x-airbyte-record-extractor: $
      parameters:
      - name: ad_account_id
        in: path
        required: true
        description: Unique identifier of the ad account.
        schema:
          type: string
      responses:
        "200":
          description: Ad account object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdAccount"

  /boards:
    get:
      summary: List boards
      description: Get a list of the boards owned by the authenticated user.
      operationId: listBoards
      x-airbyte-entity: boards
      x-airbyte-action: list
      x-airbyte-record-extractor: $.items
      x-airbyte-meta-extractor:
        cursor: $.bookmark
      parameters:
      - name: page_size
        in: query
        description: Maximum number of items to include in a single page of the response.
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 250
          default: 25
      - name: bookmark
        in: query
        description: Cursor value for paginating through results.
        required: false
        schema:
          type: string
      - name: privacy
        in: query
        description: Filter by board privacy setting.
        required: false
        schema:
          type: string
          enum:
          - PUBLIC
          - PROTECTED
          - SECRET
      responses:
        "200":
          description: List of boards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardsList"

  /boards/{board_id}:
    get:
      summary: Get board
      description: Get a board by ID.
      operationId: getBoard
      x-airbyte-entity: boards
      x-airbyte-action: get
      x-airbyte-record-extractor: $
      parameters:
      - name: board_id
        in: path
        required: true
        description: Unique identifier of the board.
        schema:
          type: string
      responses:
        "200":
          description: Board object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"

  /ad_accounts/{ad_account_id}/campaigns:
    get:
      summary: List campaigns
      description: Get a list of campaigns in the specified ad account.
      operationId: listCampaigns
      x-airbyte-entity: campaigns
      x-airbyte-action: list
      x-airbyte-record-extractor: $.items
      x-airbyte-meta-extractor:
        cursor: $.bookmark
      parameters:
      - name: ad_account_id
        in: path
        required: true
        description: Unique identifier of the ad account.
        schema:
          type: string
      - name: page_size
        in: query
        description: Maximum number of items to include in a single page of the response.
        required: false
        schema:
          type: integer
          minimum: 1
