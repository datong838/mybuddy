components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication for Pinterest API
      flows:
        authorizationCode:
          authorizationUrl: https://www.pinterest.com/oauth/
          tokenUrl: https://api.pinterest.com/v5/oauth/token
          refreshUrl: https://api.pinterest.com/v5/oauth/token
          scopes:
            ads:read: Read access to advertising data
            boards:read: Read access to boards
            catalogs:read: Read access to catalogs
            user_accounts:read: Read access to user account info
      x-airbyte-token-refresh:
        auth_style: basic
        body_format: form
      x-airbyte-auth-config:
        title: OAuth 2.0 Authentication
        type: object
        required:
        - refresh_token
        - client_id
        - client_secret
        properties:
          refresh_token:
            type: string
            title: Refresh Token
            description: Pinterest OAuth2 refresh token.
          client_id:
            type: string
            title: Client ID
            description: Pinterest OAuth2 client ID.
          client_secret:
            type: string
            title: Client Secret
            description: Pinterest OAuth2 client secret.
        auth_mapping:
          refresh_token: "${refresh_token}"
          client_id: "${client_id}"
          client_secret: "${client_secret}"
        replication_auth_key_mapping:
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          credentials.refresh_token: "refresh_token"
        replication_auth_key_constants:
          credentials.auth_method: "oauth2.0"

  schemas:
    AdAccount:
      type: object
      x-airbyte-entity-name: ad_accounts
      x-airbyte-stream-name: ad_accounts
      x-airbyte-ai-hints:
        summary: "Pinterest ad accounts with billing and permissions"
        when_to_use: "Questions about Pinterest ad account details"
        trigger_phrases: ["pinterest ad account", "ad account"]
        freshness: live
        search_strategy: "List accessible accounts"
        example_questions:
          - "What Pinterest ad accounts do I have?"
      description: Pinterest ad account object
      required:
      - id
      properties:
        id:
          type: ["null", "string"]
          description: Unique identifier for the ad account
        name:
          type: ["null", "string"]
          description: Name of the ad account
        owner:
          type: ["null", "object"]
          description: Owner details of the ad account
          properties:
            id:
              type: ["null", "string"]
              description: Unique identifier of the owner
            username:
              type: ["null", "string"]
              description: Username of the owner
        country:
          type: ["null", "string"]
          description: Country associated with the ad account
        currency:
          type: ["null", "string"]
          description: Currency used for billing
        created_time:
          type: ["null", "integer"]
          description: Timestamp when the ad account was created (Unix seconds)
        updated_time:
          type: ["null", "integer"]
          description: Timestamp when the ad account was last updated (Unix seconds)
        permissions:
          type: ["null", "array"]
          description: Permissions assigned to the ad account
          items:
            type: ["null", "string"]

    AdAccountsList:
      type: object
      description: Paginated list of ad accounts
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdAccount"
        bookmark:
          type: ["null", "string"]
          description: Cursor for next page of results

    Board:
      type: object
      x-airbyte-entity-name: boards
      x-airbyte-stream-name: boards
      x-airbyte-ai-hints:
        summary: "Pinterest boards organizing pins by topic or theme"
        when_to_use: "Questions about boards or content organization"
        trigger_phrases: ["pinterest board", "pin board"]
        freshness: live
        search_strategy: "Search by name"
        example_questions:
          - "What boards do I have on Pinterest?"
      description: Pinterest board object
      required:
      - id
      properties:
        id:
          type: ["null", "string"]
          description: Unique identifier for the board
        name:
          type: ["null", "string"]
          description: Board name
        description:
          type: ["null", "string"]
          description: Board description
        owner:
          type: ["null", "object"]
          description: Board owner details
          properties:
            username:
              type: ["null", "string"]
              description: Username of the board owner
        is_ads_only:
          type: ["null", "boolean"]
          description: Whether the board is exclusively for ads
        privacy:
          type: ["null", "string"]
          description: Board privacy setting (PUBLIC, SECRET)
        follower_count:
          type: ["null", "integer"]
          description: Number of followers
        collaborator_count:
          type: ["null", "integer"]
          description: Number of collaborators
        pin_count:
          type: ["null", "integer"]
          description: Number of pins on the board
        media:
          type: ["null", "object"]
          description: Media content for the board
          properties:
            image_cover_url:
              type: ["null", "string"]
              description: Cover image URL
            pin_thumbnail_urls:
              type: ["null", "array"]
              description: Thumbnail URLs of pins
              items:
                type: string
        created_at:
          type: ["null", "string"]
          format: date-time
          description: Timestamp when the board was created
        board_pins_modified_at:
          type: ["null", "string"]
          format: date-time
          description: Timestamp when pins on the board were last modified

    BoardsList:
      type: object
      description: Paginated list of boards
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Board"
        bookmark:
          type: ["null", "string"]
          description: Cursor for next page of results

    Campaign:
      type: object
      x-airbyte-entity-name: campaigns
      x-airbyte-stream-name: campaigns
      x-airbyte-ai-hints:
        summary: "Pinterest ad campaigns with budget and targeting"
        when_to_use: "Questions about ad campaigns or campaign performance"
        trigger_phrases: ["pinterest campaign", "ad campaign"]
        freshness: live
        search_strategy: "Search by name or filter by status"
        example_questions:
          - "Show active Pinterest campaigns"
      description: Pinterest campaign object
      required:
      - id
      properties:
        id:
          type: ["null", "string"]
          description: Campaign ID
        ad_account_id:
          type: ["null", "string"]
          description: Ad account ID
        name:
          type: ["null", "string"]
          description: Campaign name
        status:
          type: ["null", "string"]
          description: Entity status (ACTIVE, PAUSED, ARCHIVED, DRAFT, DELETED_DRAFT)
        lifetime_spend_cap:
          type: ["null", "integer"]
          description: Maximum lifetime spend in microcurrency
        daily_spend_cap:
          type: ["null", "integer"]
          description: Maximum daily spend in microcurrency
        order_line_id:
          type: ["null", "string"]
          description: Order line ID on invoice
        tracking_urls:
          type: ["null", "object"]
          description: Third-party tracking URLs
          properties:
            impression:
              type: ["null", "array"]
              description: Impression tracking URLs
              items:
                type: string
            click:
              type: ["null", "array"]
              description: Click tracking URLs
              items:
                type: string
            engagement:
              type: ["null", "array"]
              description: Engagement tracking URLs
              items:
                type: string
            buyable_button:
              type: ["null", "array"]
              description: Buyable button tracking URLs
              items:
                type: string
            audience_verification:
              type: ["null", "array"]
              description: Audience verification tracking URLs
              items:
                type: string
        objective_type:
          type: ["null", "string"]
          description: Campaign objective type
        created_time:
          type: ["null", "integer"]
          description: Creation timestamp (Unix seconds)
        updated_time:
          type: ["null", "integer"]
          description: Last update timestamp (Unix seconds)
        type:
          type: ["null", "string"]
          description: Always 'campaign'
        start_time:
          type: ["null", "integer"]
          description: Start timestamp (Unix seconds)
        end_time:
          type: ["null", "integer"]
          description: End timestamp (Unix seconds)
        summary_status:
          type: ["null", "string"]
          description: Summary status (RUNNING, PAUSED, NOT_STARTED, COMPLETED, ADVERTISER_DISABLED, ARCHIVED, DRAFT, DELETED_DRAFT)
        is_campaign_budget_optimization:
          type: ["null", "boolean"]
          description: Whether campaign budget optimization is enabled
        is_flexible_daily_budgets:
          type: ["null", "boolean"]
          description: Whether flexible daily budgets are enabled
        is_performance_plus:
          type: ["null", "boolean"]
          description: Whether this is a Performance+ campaign
        is_top_of_search:
          type: ["null", "boolean"]
          description: Whether top of search placement is enabled
        is_automated_campaign:
          type: ["null", "boolean"]
          description: Whether this is an automated campaign
        bid_options:
          type: ["null", "object"]
          description: Campaign bid options

    CampaignsList:
      type: object
      description: Paginated list of campaigns
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Campaign"
        bookmark:
          type: ["null", "string"]
          description: Cursor for next page of results

    AdGroup:
      type: object
      x-airbyte-entity-name: ad_groups
      x-airbyte-stream-name: ad_groups
      x-airbyte-ai-hints:
        summary: "Ad groups within Pinterest campaigns with targeting settings"
        when_to_use: "Questions about ad group configuration or targeting"
        trigger_phrases: ["pinterest ad group", "ad group targeting"]
        freshness: live
        search_strategy: "Filter by campaign"
        example_questions:
          - "What ad groups are in this campaign?"
      description: Pinterest ad group object
      required:
      - id
      properties:
        id:
          type: ["null", "string"]
          description: Ad group ID
        ad_account_id:
          type: ["null", "string"]
          description: Ad account ID
        campaign_id:
          type: ["null", "string"]
          description: Parent campaign ID
        name:
          type: ["null", "string"]
          description: Ad group name
        status:
          type: ["null", "string"]
          description: Entity status
        budget_in_micro_currency:
          type: ["null", "number"]
          description: Budget in microcurrency
        bid_in_micro_currency:
          type: ["null", "number"]
          description: Bid in microcurrency
        budget_type:
          type: ["null", "string"]
          description: Budget type (DAILY, LIFETIME, CBO_ADGROUP)
        start_time:
          type: ["null", "number"]
          description: Start time (Unix seconds)
        end_time:
          type: ["null", "number"]
          description: End time (Unix seconds)
        targeting_spec:
          type: ["null", "object"]
          description: Targeting specifications
        lifetime_frequency_cap:
          type: ["null", "number"]
          description: Maximum impressions per user in 30 days
        tracking_urls:
          type: ["null", "object"]
          description: Third-party tracking URLs
          properties:
            impression:
              type: ["null", "array"]
              description: Impression tracking URLs
              items:
                type: string
            click:
              type: ["null", "array"]
              description: Click tracking URLs
              items:
                type: string
            engagement:
              type: ["null", "array"]
              description: Engagement tracking URLs
              items:
                type: string
            buyable_button:
              type: ["null", "array"]
              description: Buyable button tracking URLs
              items:
                type: string
            audience_verification:
              type: ["null", "array"]
              description: Audience verification tracking URLs
              items:
                type: string
        auto_targeting_enabled:
          type: ["null", "boolean"]
          description: Whether auto targeting is enabled
        placement_group:
          type: ["null", "string"]
          description: Placement group (ALL, SEARCH, BROWSE, OTHER)
        pacing_delivery_type:
          type: ["null", "string"]
          description: Pacing delivery type (STANDARD, ACCELERATED)
        conversion_learning_mode_type:
          type: ["null", "string"]
          description: oCPM learn mode type (NOT_ACTIVE, ACTIVE)
        summary_status:
          type: ["null", "string"]
          description: Summary status
        feed_profile_id:
          type: ["null", "string"]
          description: Feed profile ID
        billable_event:
          type: ["null", "string"]
          description: Billable event type
        type:
          type: ["null", "string"]
          description: Always 'adgroup'
        created_time:
          type: ["null", "number"]
          description: Creation timestamp (Unix seconds)
        updated_time:
          type: ["null", "number"]
          description: Last update timestamp (Unix seconds)
        bid_strategy_type:
