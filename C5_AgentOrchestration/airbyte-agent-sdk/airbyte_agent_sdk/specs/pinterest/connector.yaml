openapi: 3.1.0

info:
  title: Pinterest API Connector
  version: 0.1.5
  description: >
    Connector for the Pinterest API v5, enabling access to Pinterest advertising
    and content management data. Supports reading ad accounts, boards, campaigns,
    ad groups, ads, board sections, board pins, catalogs, catalog feeds,
    catalog product groups, audiences, conversion tags, customer lists, and keywords.
  x-airbyte-connector-name: pinterest
  x-airbyte-connector-definition-id: 5cb7e5fe-38c2-11ec-8d3d-0242ac130003
  x-airbyte-replication-version: "2.2.4"
  x-airbyte-replication-compatibility: ">=2.2.4, <3.0.0"
  x-airbyte-external-documentation-urls:
  - type: api_reference
    title: Pinterest API v5 Reference
    url: https://developers.pinterest.com/docs/api/v5/
  - type: api_release_history
    title: Pinterest API Changelog
    url: https://developers.pinterest.com/docs/changelog/
  x-airbyte-skip-suggested-streams:
  - campaign_analytics
  - ad_account_analytics
  - ad_analytics
  - user_account_analytics
  - ad_group_analytics
  x-airbyte-example-questions:
    direct:
    - "List all my Pinterest ad accounts"
    - "List all my Pinterest boards"
    - "Show me all campaigns in my ad account"
    - "List all ads in my ad account"
    - "Show me all ad groups in my ad account"
    - "List all audiences for my ad account"
    - "Show me my catalog feeds"
    search:
    - "Which campaigns are currently active?"
    - "What are the top boards by pin count?"
    - "Show me ads that have been rejected"
    - "Find campaigns with the highest daily spend cap"
    unsupported:
    - "Create a new Pinterest board"
    - "Update a campaign budget"
    - "Delete an ad group"
    - "Post a new pin"
    - "Show me campaign analytics or performance metrics"
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Pinterest.
    properties:
      start_date:
        type: string
        title: Start Date
        description: A date in the format YYYY-MM-DD. If not set, defaults to 89 days ago.
    replication_config_key_mapping:
      start_date: start_date
  x-airbyte-entity-relationships:
  - source_entity: campaigns
    target_entity: ad_accounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: ad_groups
    target_entity: ad_accounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: ads
    target_entity: ad_accounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: board_sections
    target_entity: boards
    foreign_key: board_id
    target_key: id
    cardinality: many_to_one
  - source_entity: board_pins
    target_entity: boards
    foreign_key: board_id
    target_key: id
    cardinality: many_to_one
  - source_entity: audiences
    target_entity: ad_accounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: conversion_tags
    target_entity: ad_accounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: customer_lists
    target_entity: ad_accounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: keywords
    target_entity: ad_accounts
    foreign_key: ad_account_id
    target_key: id
    cardinality: many_to_one
  - source_entity: keywords
    target_entity: ad_groups
    foreign_key: ad_group_id
    target_key: id
    cardinality: many_to_one
