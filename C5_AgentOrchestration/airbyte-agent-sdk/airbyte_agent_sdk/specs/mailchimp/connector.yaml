openapi: 3.1.0
info:
  title: Mailchimp Marketing API Connector
  version: 1.0.11
  description: |
    Mailchimp is an email marketing platform that enables businesses to create, send, and analyze
    email campaigns, manage subscriber lists, and automate marketing workflows. This connector
    provides read access to campaigns, lists, reports, email activity, automations, and more
    for marketing analytics and audience management.
  x-airbyte-connector-name: mailchimp
  x-airbyte-connector-definition-id: b03a9f3e-22a5-11eb-adc1-0242ac120002
  x-airbyte-replication-version: "2.1.29"
  x-airbyte-replication-compatibility: ">=2.1.29, <3.0.0"
  x-airbyte-external-documentation-urls:
  - title: Mailchimp Marketing API Reference
    type: api_reference
    url: "https://mailchimp.com/developer/marketing/api/"
  - title: Mailchimp API Fundamentals
    type: authentication_guide
    url: "https://mailchimp.com/developer/marketing/docs/fundamentals/"
  - title: Mailchimp API Release Notes
    type: api_release_history
    url: "https://mailchimp.com/developer/release-notes/"
  x-airbyte-example-questions:
    direct:
    - "List all subscribers in my main mailing list"
    - "List all automation workflows in my account"
    - "Show me all segments for my primary audience"
    - "List all interest categories for my primary audience"
    - "Show me email activity for a recent campaign"
    - "Show me the performance report for a recent campaign"
    search:
    - "Show me all my email campaigns from the last month"
    - "What are the open rates for my recent campaigns?"
    - "Who unsubscribed from list {list_id} this week?"
    - "What tags are applied to my subscribers?"
    - "How many subscribers do I have in each list?"
    - "What are my top performing campaigns by click rate?"
    unsupported:
    - "Create a new email campaign"
    - "Add a subscriber to my list"
    - "Delete a campaign"
    - "Update subscriber information"
    - "Send a campaign now"
    - "Create a new automation workflow"
  x-airbyte-config-normalization:
    rules:
    - target: data_center
      source: credentials.apikey
      when_missing: false
      transform:
        type: suffix
        delimiter: "-"
  x-airbyte-skip-auth-methods:
  - bearer    # Airbyte implements OAuth using bearer

  x-airbyte-entity-relationships:
  - source_entity: list_members
    target_entity: lists
    foreign_key: list_id
    target_key: id
    cardinality: many_to_one
  - source_entity: email_activity
    target_entity: campaigns
    foreign_key: campaign_id
    target_key: id
    cardinality: many_to_one
  - source_entity: tags
    target_entity: lists
    foreign_key: list_id
    target_key: id
    cardinality: many_to_one
  - source_entity: interest_categories
    target_entity: lists
    foreign_key: list_id
    target_key: id
    cardinality: many_to_one
  - source_entity: interests
    target_entity: lists
    foreign_key: list_id
    target_key: id
    cardinality: many_to_one
  - source_entity: interests
    target_entity: interest_categories
    foreign_key: interest_category_id
    target_key: id
    cardinality: many_to_one
  - source_entity: segments
    target_entity: lists
    foreign_key: list_id
    target_key: id
    cardinality: many_to_one
  - source_entity: segment_members
    target_entity: lists
    foreign_key: list_id
    target_key: id
    cardinality: many_to_one
  - source_entity: segment_members
    target_entity: segments
    foreign_key: segment_id
    target_key: id
    cardinality: many_to_one
  - source_entity: unsubscribes
    target_entity: campaigns
    foreign_key: campaign_id
    target_key: id
    cardinality: many_to_one
