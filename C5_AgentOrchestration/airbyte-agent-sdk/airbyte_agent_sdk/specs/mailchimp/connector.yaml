servers:
- url: https://{data_center}.api.mailchimp.com/3.0
  description: Mailchimp Marketing API Server
  variables:
    data_center:
      default: us1
      description: The data center for your Mailchimp account (e.g., us1, us2, us6)
  x-airbyte-replication-environment-mapping:
    data_center: data_center

security:
- basicAuth: []

paths:
  # Campaigns
  /campaigns:
    get:
      summary: List campaigns
      description: Get all campaigns in an account
      operationId: Campaigns_List
      x-airbyte-entity: campaigns
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.campaigns
      x-airbyte-meta-extractor:
        links: $._links
      tags:
      - Campaigns
      parameters:
      - name: count
        in: query
        description: The number of records to return. Default is 10. Maximum is 1000.
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 10
      - name: offset
        in: query
        description: Used for pagination, this is the number of records from a collection to skip.
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: type
        in: query
        description: The campaign type
        schema:
          type: string
          enum: [regular, plaintext, absplit, rss, variate]
      - name: status
        in: query
        description: The status of the campaign
        schema:
          type: string
          enum: [save, paused, schedule, sending, sent]
      - name: before_send_time
        in: query
        description: Restrict the response to campaigns sent before the set time
        schema:
          type: string
          format: date-time
      - name: since_send_time
        in: query
        description: Restrict the response to campaigns sent after the set time
        schema:
          type: string
          format: date-time
      - name: before_create_time
        in: query
        description: Restrict the response to campaigns created before the set time
        schema:
          type: string
          format: date-time
      - name: since_create_time
        in: query
        description: Restrict the response to campaigns created after the set time
        schema:
          type: string
          format: date-time
      - name: list_id
        in: query
        description: The unique id for the list
        schema:
          type: string
      - name: folder_id
        in: query
        description: The unique folder id
        schema:
          type: string
      - name: sort_field
        in: query
        description: Returns files sorted by the specified field
        schema:
          type: string
          enum: [create_time, send_time]
      - name: sort_dir
        in: query
        description: Determines the order direction for sorted results
        schema:
          type: string
          enum: [ASC, DESC]
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignsList"

  /campaigns/{campaign_id}:
    get:
      summary: Get campaign info
      description: Get information about a specific campaign
      operationId: Campaigns_Get
      x-airbyte-entity: campaigns
      x-airbyte-action: get
      tags:
      - Campaigns
      parameters:
      - name: campaign_id
        in: path
        required: true
        description: The unique id for the campaign
        schema:
          type: string
      responses:
        "200":
          description: Campaign object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  # Lists (Audiences)
  /lists:
    get:
      summary: List audiences
      description: Get information about all lists in the account
      operationId: Lists_List
      x-airbyte-entity: lists
      x-airbyte-action: list
      x-airbyte-record-extractor: $.lists
      x-airbyte-meta-extractor:
        links: $._links
      tags:
      - Lists
      parameters:
      - name: count
        in: query
        description: The number of records to return
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 10
      - name: offset
        in: query
        description: Used for pagination
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: before_date_created
        in: query
        description: Restrict response to lists created before the set date
        schema:
          type: string
          format: date-time
      - name: since_date_created
        in: query
        description: Restrict response to lists created after the set date
        schema:
          type: string
          format: date-time
      - name: before_campaign_last_sent
        in: query
        description: Restrict results to lists created before the last campaign send date
        schema:
          type: string
          format: date-time
      - name: since_campaign_last_sent
        in: query
        description: Restrict results to lists created after the last campaign send date
        schema:
          type: string
          format: date-time
      - name: email
        in: query
        description: Restrict results to lists that include a specific subscriber's email address
        schema:
          type: string
      - name: sort_field
        in: query
        description: Returns files sorted by the specified field
        schema:
          type: string
          enum: [date_created]
      - name: sort_dir
        in: query
        description: Determines the order direction for sorted results
        schema:
          type: string
          enum: [ASC, DESC]
      responses:
        "200":
          description: List of audiences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListsList"

  /lists/{list_id}:
    get:
      summary: Get list info
      description: Get information about a specific list in your Mailchimp account
      operationId: Lists_Get
      x-airbyte-entity: lists
      x-airbyte-action: get
      tags:
      - Lists
      parameters:
      - name: list_id
        in: path
        required: true
        description: The unique ID for the list
        schema:
          type: string
      responses:
        "200":
          description: List object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List"

  # List Members
  /lists/{list_id}/members:
    get:
      summary: List members
      description: Get information about members in a specific Mailchimp list
      operationId: ListMembers_List
      x-airbyte-entity: list_members
      x-airbyte-action: list
      x-airbyte-record-extractor: $.members
      x-airbyte-meta-extractor:
        links: $._links
      tags:
      - List Members
      parameters:
      - name: list_id
        in: path
        required: true
        description: The unique ID for the list
        schema:
          type: string
      - name: count
        in: query
        description: The number of records to return
        schema:
          type: integer
          minimum: 1
          maximum: 1000
