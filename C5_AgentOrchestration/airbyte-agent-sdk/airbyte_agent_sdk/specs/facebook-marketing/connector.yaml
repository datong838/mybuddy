openapi: 3.1.0
info:
  title: Facebook Marketing API Connector
  version: 1.2.0
  description: 'Facebook Marketing API connector for managing ad campaigns, ad sets, ads, creatives,

    and accessing performance insights, pixel configuration, and event quality data.

    This connector provides read access to Facebook Ads Manager data for analytics

    and reporting purposes.

    '
  x-airbyte-connector-name: facebook-marketing
  x-airbyte-connector-definition-id: e7778cfc-e97c-4458-9ecb-b4f2bba8946c
  x-airbyte-replication-version: "6.0.1"
  x-airbyte-replication-compatibility: ">=6.0.1, <7.0.0"
  x-airbyte-external-documentation-urls:
  - title: Facebook Marketing API Reference
    type: api_reference
    url: https://developers.facebook.com/docs/marketing-api/
  - title: Facebook Marketing API Authentication
    type: authentication_guide
    url: https://developers.facebook.com/docs/marketing-api/overview/authorization
  - title: Facebook Graph API Changelog
    type: changelog
    url: https://developers.facebook.com/docs/graph-api/changelog
  x-airbyte-example-questions:
    direct:
    - "List all active campaigns in my ad account"
    - "What ads are currently running in a recent campaign?"
    - "List all ad creatives in my account"
    - "What is the status of my campaigns?"
    - "List all custom conversion events in my account"
    - "Show me all ad images in my account"
    - "What videos are available in my ad account?"
    - "Create a new campaign called 'Summer Sale 2026' with traffic objective"
    - "Pause my most recent campaign"
    - "Create a new ad set with a $50 daily budget in my latest campaign"
    - "Update the daily budget of my top performing ad set to $100"
    - "Rename my most recent ad set to 'Holiday Promo'"
    - "Create a new ad in my latest ad set"
    - "Pause all ads in my most recent ad set"
    - "List all pixels in my ad account"
    - "Show me the event stats for my pixel"
    - "What events is my Facebook pixel tracking?"
    - "Search the Ad Library for political ads in the US"
    - "Find ads about climate change in the Ad Library"
    - "Show me Ad Library ads from a specific Facebook page"
    search:
    - "Show me the ad sets with the highest daily budget"
    - "Show me the performance insights for the last 7 days"
    - "Which campaigns have the most spend this month?"
    - "Show me ads with the highest click-through rate"
    unsupported:
    - "Delete this ad creative"
    - "Delete this campaign"
    - "Delete this ad set"
    - "Delete this ad"
  x-airbyte-skip-suggested-streams:
  - ads_insights_age_and_gender
  - ads_insights_action_type
  - ads_insights_country
  - ads_insights_platform_and_device
  - ads_insights_region
  - ads_insights_comscore_market
  - activities
  x-airbyte-skip-auth-methods:
  - oauth2
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Facebook Marketing.
    properties:
      account_ids:
        type: array
        title: Ad Account ID(s)
        description: The Facebook Ad account ID(s) to pull data from. The Ad account ID number is in the account dropdown menu or in your browser's address bar of your Meta Ads Manager.
        items:
          type: string
    required:
    - account_ids
    replication_config_key_mapping:
      account_ids: account_ids
  x-airbyte-entity-relationships:
  - source_entity: campaigns
    target_entity: ad_accounts
    foreign_key: account_id
    target_key: account_id
    cardinality: many_to_one
  - source_entity: ad_sets
    target_entity: ad_accounts
    foreign_key: account_id
    target_key: account_id
    cardinality: many_to_one
  - source_entity: ads
    target_entity: ad_accounts
    foreign_key: account_id
    target_key: account_id
    cardinality: many_to_one
  - source_entity: ad_creatives
    target_entity: ad_accounts
    foreign_key: account_id
    target_key: account_id
    cardinality: many_to_one
  - source_entity: ads_insights
    target_entity: ad_accounts
    foreign_key: account_id
    target_key: account_id
    cardinality: many_to_one
  - source_entity: custom_conversions
    target_entity: ad_accounts
    foreign_key: account_id
    target_key: account_id
    cardinality: many_to_one
  - source_entity: images
    target_entity: ad_accounts
    foreign_key: account_id
    target_key: account_id
    cardinality: many_to_one
  - source_entity: videos
    target_entity: ad_accounts
    foreign_key: account_id
    target_key: account_id
    cardinality: many_to_one
  - source_entity: pixels
    target_entity: ad_accounts
    foreign_key: account_id
    target_key: account_id
    cardinality: many_to_one
  - source_entity: pixel_stats
    target_entity: pixels
    foreign_key: pixel_id
    target_key: id
    cardinality: many_to_one
