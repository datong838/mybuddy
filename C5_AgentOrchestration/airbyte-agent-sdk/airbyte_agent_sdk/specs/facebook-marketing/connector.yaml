servers:
- url: https://graph.facebook.com/v25.0
  description: Facebook Graph API v25.0
security:
- facebookOAuth: []
paths:
  /me:
    get:
      summary: Get current user
      description: Returns information about the current user associated with the access token
      operationId: getCurrentUser
      x-airbyte-entity: current_user
      x-airbyte-action: get
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $
      tags:
      - Users
      parameters:
      - name: fields
        in: query
        description: Comma-separated list of fields to return
        schema:
          type: string
          default: id,name
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          description: Unauthorized
  /me/adaccounts:
    get:
      summary: List ad accounts
      description: Returns a list of ad accounts associated with the current user
      operationId: listAdAccounts
      x-airbyte-entity: ad_accounts
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        after: $.paging.cursors.after
      tags:
      - Ad Accounts
      parameters:
      - name: fields
        in: query
        description: Comma-separated list of fields to return
        schema:
          type: string
          default: id,account_id,name,account_status,age,amount_spent,balance,business,business_name,created_time,currency,disable_reason,spend_cap,timezone_id,timezone_name
      - name: limit
        in: query
        description: Maximum number of results to return
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: after
        in: query
        description: Cursor for pagination
        schema:
          type: string
      responses:
        '200':
          description: List of ad accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdAccountsList'
        '401':
          description: Unauthorized
  /act_{account_id}/campaigns:
    get:
      summary: List campaigns
      description: Returns a list of campaigns for the specified ad account
      operationId: listCampaigns
      x-airbyte-entity: campaigns
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        after: $.paging.cursors.after
      tags:
      - Campaigns
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Facebook Ad Account ID (without act_ prefix)
        schema:
          type: string
      - name: fields
        in: query
        description: Comma-separated list of fields to return
        schema:
          type: string
          default: id,name,account_id,adlabels,bid_strategy,boosted_object_id,budget_rebalance_flag,budget_remaining,buying_type,daily_budget,created_time,configured_status,effective_status,issues_info,lifetime_budget,objective,smart_promotion_type,source_campaign_id,special_ad_category,special_ad_category_country,spend_cap,start_time,status,stop_time,updated_time
      - name: limit
        in: query
        description: Maximum number of results to return
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: after
        in: query
        description: Cursor for pagination
        schema:
          type: string
      responses:
        '200':
          description: List of campaigns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignsList'
        '401':
          description: Unauthorized
    post:
      summary: Create a campaign
      description: Creates a new ad campaign in the specified ad account
      operationId: Campaign_Create
      x-airbyte-entity: campaigns
      x-airbyte-action: create
      tags:
      - Campaigns
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Facebook Ad Account ID (without act_ prefix)
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CampaignCreateParams'
      responses:
        '200':
          description: Campaign created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignCreateResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
  /act_{account_id}/adsets:
    get:
      summary: List ad sets
      description: Returns a list of ad sets for the specified ad account
      operationId: listAdSets
      x-airbyte-entity: ad_sets
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        after: $.paging.cursors.after
      tags:
      - Ad Sets
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Facebook Ad Account ID (without act_ prefix)
        schema:
          type: string
      - name: fields
        in: query
        description: Comma-separated list of fields to return
        schema:
          type: string
          default: id,name,account_id,adlabels,bid_amount,bid_info,bid_strategy,bid_constraints,budget_remaining,campaign_id,created_time,daily_budget,effective_status,end_time,learning_stage_info,lifetime_budget,promoted_object,start_time,targeting,updated_time
      - name: limit
        in: query
        description: Maximum number of results to return
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: after
        in: query
        description: Cursor for pagination
        schema:
          type: string
      responses:
        '200':
          description: List of ad sets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdSetsList'
        '401':
          description: Unauthorized
    post:
      summary: Create an ad set
      description: Creates a new ad set in the specified ad account
      operationId: AdSet_Create
      x-airbyte-entity: ad_sets
      x-airbyte-action: create
      tags:
      - Ad Sets
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Facebook Ad Account ID (without act_ prefix)
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdSetCreateParams'
      responses:
        '200':
          description: Ad set created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdSetCreateResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
  /act_{account_id}/ads:
    get:
      summary: List ads
      description: Returns a list of ads for the specified ad account
      operationId: listAds
      x-airbyte-entity: ads
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        after: $.paging.cursors.after
      tags:
      - Ads
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Facebook Ad Account ID (without act_ prefix)
        schema:
          type: string
      - name: fields
        in: query
        description: Comma-separated list of fields to return
        schema:
          type: string
          default: id,name,account_id,adset_id,campaign_id,adlabels,bid_amount,bid_info,bid_type,configured_status,conversion_specs,created_time,creative,effective_status,last_updated_by_app_id,recommendations,source_ad_id,status,tracking_specs,updated_time
      - name: limit
        in: query
        description: Maximum number of results to return
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: after
        in: query
        description: Cursor for pagination
        schema:
          type: string
      responses:
        '200':
          description: List of ads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdsList'
        '401':
          description: Unauthorized
    post:
      summary: Create an ad
      description: Creates a new ad in the specified ad account. Note - requires a Facebook Page to be connected to the ad account.
      operationId: Ad_Create
      x-airbyte-entity: ads
      x-airbyte-action: create
      # Untested: Creating ads requires a Facebook Page to be connected to the ad account.
      # The test account does not have a Facebook Page, so this operation cannot be tested.
      x-airbyte-untested: true
      tags:
      - Ads
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Facebook Ad Account ID (without act_ prefix)
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdCreateParams'
      responses:
        '200':
          description: Ad created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdCreateResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
  /act_{account_id}/adcreatives:
    get:
      summary: List ad creatives
      description: Returns a list of ad creatives for the specified ad account
      operationId: listAdCreatives
      x-airbyte-entity: ad_creatives
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        after: $.paging.cursors.after
      tags:
      - Ad Creatives
      parameters:
      - name: account_id
        in: path
        required: true
        description: The Facebook Ad Account ID (without act_ prefix)
        schema:
          type: string
      - name: fields
        in: query
        description: Comma-separated list of fields to return
        schema:
          type: string
          default: id,name,account_id,actor_id,body,call_to_action_type,effective_object_story_id,image_hash,image_url,link_url,object_story_id,object_story_spec,object_type,status,thumbnail_url,title,url_tags
      - name: limit
        in: query
        description: Maximum number of results to return
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: after
        in: query
        description: Cursor for pagination
        schema:
          type: string
      responses:
        '200':
          description: List of ad creatives
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdCreativesList'
        '401':
