components:
  securitySchemes:
    facebookOAuth:
      type: oauth2
      description: Facebook Marketing API OAuth 2.0 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://www.facebook.com/dialog/oauth
          tokenUrl: https://graph.facebook.com/v25.0/oauth/access_token
          scopes:
            ads_management: Manage ads and campaigns
            ads_read: Read ads data
      x-airbyte-auth-config:
        title: "OAuth 2.0 Authentication"
        type: object
        required:
        - access_token
        properties:
          access_token:
            type: string
            title: "Access Token"
            description: "Facebook OAuth2 Access Token"
          client_id:
            type: string
            title: "Client ID"
            description: "Facebook App Client ID"
          client_secret:
            type: string
            title: "Client Secret"
            description: "Facebook App Client Secret"
        auth_mapping:
          access_token: "${access_token}"
          client_id: "${client_id}"
          client_secret: "${client_secret}"
        replication_auth_key_mapping:
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          credentials.access_token: "access_token"
        replication_auth_key_constants:
          credentials.auth_type: "Client"
    facebookServiceAuth:
      type: http
      scheme: bearer
      # Untested: No test credentials available for Service Account authentication.
      # All cassettes use facebookOAuth (client credentials) authentication.
      x-airbyte-untested: true
      description: Facebook Marketing API Service Account authentication using a long-lived access token
      x-airbyte-auth-config:
        title: "Service Account Key Authentication"
        type: object
        required:
        - account_key
        properties:
          account_key:
            type: string
            title: "Account Key"
            description: "Facebook long-lived access token for Service Account authentication"
        auth_mapping:
          token: "${account_key}"
        replication_auth_key_mapping:
          credentials.access_token: "account_key"
        replication_auth_key_constants:
          credentials.auth_type: "Service"
  schemas:
    CurrentUser:
      type: object
      x-airbyte-entity-name: current_user
      x-airbyte-ai-hints:
        summary: "The authenticated Facebook user profile"
        when_to_use: "Looking up the current user's Facebook account details"
        trigger_phrases: ["facebook user", "my facebook account", "who am I"]
        freshness: live
        search_strategy: "Retrieve the authenticated user profile"
        example_questions:
          - "Who is the current Facebook user?"
      description: Current Facebook user associated with the access token
      required:
      - id
      properties:
        id:
          type: string
          description: User ID
        name:
          type:
          - string
          - 'null'
          description: User name
    Campaign:
      type: object
      x-airbyte-entity-name: campaigns
      x-airbyte-stream-name: campaigns
      x-airbyte-ai-hints:
        summary: "Facebook ad campaigns with objective, status, and budget"
        when_to_use: "Questions about ad campaigns, budgets, or campaign performance"
        trigger_phrases: ["facebook campaign", "ad campaign", "campaign budget", "campaign status"]
        freshness: live
        search_strategy: "Search by name or filter by status"
        example_questions:
          - "List active Facebook campaigns"
          - "What is the budget for a campaign?"
      description: Facebook Ad Campaign
      required:
      - id
      properties:
        id:
          type: string
          description: Campaign ID
        name:
          type:
          - string
          - 'null'
          description: Campaign name
        account_id:
          type:
          - string
          - 'null'
          description: Ad account ID
        adlabels:
