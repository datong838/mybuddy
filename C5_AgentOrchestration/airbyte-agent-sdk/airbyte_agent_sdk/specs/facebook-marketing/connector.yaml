  /ads_archive:
    get:
      summary: Search Ad Library
      description: Search the Facebook Ad Library for ads about social issues, elections or politics, and ads delivered to the UK or EU. Returns archived ads matching the specified search criteria including ad creative content, delivery dates, spend ranges, and demographic reach data.
      operationId: listAdLibrary
      x-airbyte-entity: ad_library
      x-airbyte-action: list
      # Untested: The Ad Library API requires identity verification and the Ad Library API
      # product enabled on the Facebook app, which the test credentials do not have.
      x-airbyte-untested: true
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        after: $.paging.cursors.after
      tags:
      - Ad Library
      parameters:
      - name: ad_reached_countries
        in: query
        required: true
        description: Search by ISO country code to return ads that reached specific countries. Use ALL to search all countries.
        schema:
          type: string
          default: ALL
      - name: search_terms
        in: query
        description: The terms to search for. Blank space is treated as logical AND. Limit of 100 characters.
        schema:
          type: string
      - name: search_page_ids
        in: query
        description: Search for ads by specific Facebook Page IDs (comma-separated, up to 10)
        schema:
          type: string
      - name: ad_type
        in: query
        description: Filter by ad type category
        schema:
          type: string
          enum:
          - ALL
          - EMPLOYMENT_ADS
          - FINANCIAL_PRODUCTS_AND_SERVICES_ADS
          - HOUSING_ADS
          - POLITICAL_AND_ISSUE_ADS
          default: ALL
      - name: ad_active_status
        in: query
        description: Filter by ad active status
        schema:
          type: string
          enum:
          - ACTIVE
          - ALL
          - INACTIVE
          default: ACTIVE
      - name: ad_delivery_date_min
        in: query
        description: Search for ads delivered after this date (inclusive, YYYY-MM-DD)
        schema:
          type: string
      - name: ad_delivery_date_max
        in: query
        description: Search for ads delivered before this date (inclusive, YYYY-MM-DD)
        schema:
          type: string
      - name: bylines
        in: query
        description: Filter by paid-for-by disclaimer byline (JSON array of strings). Available only for POLITICAL_AND_ISSUE_ADS.
        schema:
          type: string
      - name: languages
        in: query
        description: Filter by language codes (ISO 639-1 JSON array, e.g. "['en','es']")
        schema:
          type: string
      - name: media_type
        in: query
        description: Filter by media type in the ad
        schema:
          type: string
          enum:
          - ALL
          - IMAGE
          - MEME
          - VIDEO
          - NONE
      - name: publisher_platforms
        in: query
        description: Filter by Meta platform where the ad appeared (JSON array)
        schema:
          type: string
      - name: search_type
        in: query
        description: Type of search to use for search_terms
        schema:
          type: string
          enum:
          - KEYWORD_UNORDERED
          - KEYWORD_EXACT_PHRASE
          default: KEYWORD_UNORDERED
      - name: unmask_removed_content
        in: query
        description: Whether to reveal content removed for violating standards
        schema:
          type: boolean
          default: false
      - name: fields
        in: query
        description: Comma-separated list of fields to return
        schema:
          type: string
          default: id,ad_creation_time,ad_creative_bodies,ad_creative_link_captions,ad_creative_link_descriptions,ad_creative_link_titles,ad_delivery_start_time,ad_delivery_stop_time,ad_snapshot_url,bylines,currency,languages,page_id,page_name,publisher_platforms,spend,impressions,demographic_distribution,delivery_by_region,estimated_audience_size
