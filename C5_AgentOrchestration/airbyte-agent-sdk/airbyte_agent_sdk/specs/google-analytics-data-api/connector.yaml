openapi: 3.1.0

info:
  title: Google Analytics Data API Connector
  version: 1.0.5
  description: |
    Google Analytics 4 (GA4) Data API connector for accessing website and app analytics data.
    This connector provides access to pre-configured analytics reports including website overview,
    active users, traffic sources, page performance, device breakdowns, and geographic locations.
    Reports are retrieved via the GA4 Data API v1beta using configurable date ranges and
    property IDs. Requires OAuth2 authentication with Google Analytics read-only scope.
  x-airbyte-connector-name: google-analytics-data-api
  x-airbyte-connector-definition-id: 3cc2eafd-84aa-4dca-93af-322d9dfeec1a
  x-airbyte-replication-version: "2.9.41"
  x-airbyte-replication-compatibility: ">=2.9.41, <3.0.0"
  x-airbyte-example-questions:
    direct:
      - "Show me the website overview report"
      - "List daily active users"
      - "Show weekly active user trends"
      - "Get the four-weekly active users report"
      - "List traffic sources"
      - "Show me page performance metrics"
      - "Get device breakdown data"
      - "List user locations"
    search:
      - "What are the top traffic sources by sessions?"
      - "Which pages have the highest bounce rate?"
      - "What devices do most users browse from?"
      - "Which countries send the most traffic?"
      - "How has daily active users changed over the last month?"
    unsupported:
      - "Create a new GA4 property"
      - "Delete analytics data"
      - "Modify tracking configurations"
      - "Run a custom report with arbitrary dimensions"
      - "Access real-time analytics data"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Google Analytics Data API Reference
      url: https://developers.google.com/analytics/devguides/reporting/data/v1/rest
    - type: api_release_history
      title: Data API Changelog
      url: https://developers.google.com/analytics/devguides/reporting/data/v1/changelog
  x-airbyte-skip-suggested-streams:
    - sessions
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Google Analytics.
    properties:
      property_ids:
        type: array
        title: Property IDs
        description: A list of GA4 Property IDs to replicate data from.
    required:
      - property_ids
    replication_config_key_mapping:
      property_ids: property_ids
  x-airbyte-scoping:
    - param: property_id
      config_key: property_ids
  x-airbyte-context-store:
    disable_compaction: false
    entities:
      - entity: website_overview
        x-airbyte-name: website_overview
        suggested: true
        fields:
          - name: averageSessionDuration
            type: ["null", "number"]
            description: Average duration of sessions in seconds
          - name: bounceRate
            type: ["null", "number"]
            description: Percentage of sessions that were single-page with no interaction
          - name: date
            type: ["null", "string"]
            description: Date of the report row in YYYYMMDD format
          - name: endDate
            type: ["null", "string"]
            description: End date of the reporting period
          - name: newUsers
            type: ["null", "integer"]
            description: Number of first-time users
          - name: property_id
            type: ["string"]
            description: GA4 property ID
          - name: screenPageViews
            type: ["null", "integer"]
            description: Total number of screen or page views
          - name: screenPageViewsPerSession
            type: ["null", "number"]
            description: Average page views per session
          - name: sessions
            type: ["null", "integer"]
            description: Total number of sessions
          - name: sessionsPerUser
            type: ["null", "number"]
            description: Average number of sessions per user
          - name: startDate
            type: ["null", "string"]
            description: Start date of the reporting period
          - name: totalUsers
            type: ["null", "integer"]
            description: Total number of unique users
      - entity: daily_active_users
        x-airbyte-name: daily_active_users
        suggested: true
        fields:
          - name: active1DayUsers
            type: ["null", "integer"]
            description: Number of distinct users active in the last 1 day
          - name: date
            type: ["null", "string"]
            description: Date of the report row in YYYYMMDD format
          - name: endDate
            type: ["null", "string"]
            description: End date of the reporting period
          - name: property_id
            type: ["string"]
            description: GA4 property ID
          - name: startDate
            type: ["null", "string"]
            description: Start date of the reporting period
      - entity: weekly_active_users
        x-airbyte-name: weekly_active_users
        fields:
          - name: active7DayUsers
            type: ["null", "integer"]
            description: Number of distinct users active in the last 7 days
          - name: date
            type: ["null", "string"]
            description: Date of the report row in YYYYMMDD format
          - name: endDate
            type: ["null", "string"]
            description: End date of the reporting period
          - name: property_id
