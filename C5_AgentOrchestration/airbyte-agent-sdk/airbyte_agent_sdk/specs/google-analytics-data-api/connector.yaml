servers:
  - url: https://analyticsdata.googleapis.com/v1beta
    description: Google Analytics Data API v1beta

security:
  - oauth2: []

paths:
  "/properties/{property_id}:runReport:website_overview":
    post:
      summary: List website overview report
      description: Returns website overview metrics including total users, new users, sessions, bounce rate, page views, and average session duration by date.
      operationId: listWebsiteOverview
      x-airbyte-entity: website_overview
      x-airbyte-action: list
      x-airbyte-path-override:
        path: "/properties/{property_id}:runReport"
      x-airbyte-record-extractor: $.rows
      x-airbyte-no-pagination: "runReport returns a bounded aggregation scoped to the request body (dateRanges + dimensions + metrics); GA4 Data API responses only surface rowCount, not a next-page cursor."
      x-airbyte-meta-extractor:
        row_count: $.rowCount
      parameters:
        - name: property_id
          in: path
          required: true
          description: GA4 property ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebsiteOverviewRequest"
      responses:
        "200":
          description: Website overview report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunReportResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - insufficient permissions

  "/properties/{property_id}:runReport:daily_active_users":
    post:
      summary: List daily active users
      description: Returns daily active user counts (1-day active users) by date.
      operationId: listDailyActiveUsers
      x-airbyte-entity: daily_active_users
      x-airbyte-action: list
      x-airbyte-path-override:
        path: "/properties/{property_id}:runReport"
      x-airbyte-record-extractor: $.rows
      x-airbyte-no-pagination: "runReport returns a bounded aggregation scoped to the request body (dateRanges + dimensions + metrics); GA4 Data API responses only surface rowCount, not a next-page cursor."
      x-airbyte-meta-extractor:
        row_count: $.rowCount
      parameters:
        - name: property_id
          in: path
          required: true
          description: GA4 property ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyActiveUsersRequest"
      responses:
        "200":
          description: Daily active users report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunReportResponse"
        "401":
          description: Unauthorized

  "/properties/{property_id}:runReport:weekly_active_users":
    post:
      summary: List weekly active users
      description: Returns weekly active user counts (7-day active users) by date.
      operationId: listWeeklyActiveUsers
      x-airbyte-entity: weekly_active_users
      x-airbyte-action: list
      x-airbyte-path-override:
        path: "/properties/{property_id}:runReport"
      x-airbyte-record-extractor: $.rows
      x-airbyte-no-pagination: "runReport returns a bounded aggregation scoped to the request body (dateRanges + dimensions + metrics); GA4 Data API responses only surface rowCount, not a next-page cursor."
      x-airbyte-meta-extractor:
        row_count: $.rowCount
      parameters:
        - name: property_id
          in: path
          required: true
          description: GA4 property ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeeklyActiveUsersRequest"
      responses:
        "200":
          description: Weekly active users report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunReportResponse"
        "401":
          description: Unauthorized

  "/properties/{property_id}:runReport:four_weekly_active_users":
    post:
      summary: List four-weekly active users
      description: Returns 28-day active user counts by date.
      operationId: listFourWeeklyActiveUsers
      x-airbyte-entity: four_weekly_active_users
      x-airbyte-action: list
      x-airbyte-path-override:
        path: "/properties/{property_id}:runReport"
      x-airbyte-record-extractor: $.rows
      x-airbyte-no-pagination: "runReport returns a bounded aggregation scoped to the request body (dateRanges + dimensions + metrics); GA4 Data API responses only surface rowCount, not a next-page cursor."
      x-airbyte-meta-extractor:
        row_count: $.rowCount
      parameters:
        - name: property_id
          in: path
          required: true
          description: GA4 property ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FourWeeklyActiveUsersRequest"
      responses:
        "200":
          description: Four-weekly active users report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunReportResponse"
        "401":
          description: Unauthorized

  "/properties/{property_id}:runReport:traffic_sources":
    post:
      summary: List traffic sources
      description: Returns traffic source metrics broken down by session source, session medium, and date, including users, sessions, bounce rate, and page views.
      operationId: listTrafficSources
      x-airbyte-entity: traffic_sources
      x-airbyte-action: list
      x-airbyte-path-override:
        path: "/properties/{property_id}:runReport"
      x-airbyte-record-extractor: $.rows
      x-airbyte-no-pagination: "runReport returns a bounded aggregation scoped to the request body (dateRanges + dimensions + metrics); GA4 Data API responses only surface rowCount, not a next-page cursor."
      x-airbyte-meta-extractor:
        row_count: $.rowCount
      parameters:
        - name: property_id
          in: path
          required: true
          description: GA4 property ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrafficSourcesRequest"
      responses:
        "200":
          description: Traffic sources report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunReportResponse"
        "401":
          description: Unauthorized

  "/properties/{property_id}:runReport:pages":
    post:
      summary: List page metrics
      description: Returns page-level metrics including page views and bounce rate, broken down by host name, page path, and date.
      operationId: listPages
      x-airbyte-entity: pages
      x-airbyte-action: list
      x-airbyte-path-override:
        path: "/properties/{property_id}:runReport"
      x-airbyte-record-extractor: $.rows
      x-airbyte-no-pagination: "runReport returns a bounded aggregation scoped to the request body (dateRanges + dimensions + metrics); GA4 Data API responses only surface rowCount, not a next-page cursor."
      x-airbyte-meta-extractor:
        row_count: $.rowCount
