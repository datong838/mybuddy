      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationsRequest"
      responses:
        "200":
          description: Locations report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunReportResponse"
        "401":
          description: Unauthorized

components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication for Google Analytics
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          refreshUrl: https://oauth2.googleapis.com/token
          scopes:
            https://www.googleapis.com/auth/analytics.readonly: Read-only access to Google Analytics data
      x-airbyte-auth-config:
        title: OAuth 2.0 Authentication
        type: object
        required:
          - client_id
          - client_secret
          - refresh_token
        properties:
          client_id:
            type: string
            title: Client ID
            description: OAuth 2.0 Client ID from Google Cloud Console
          client_secret:
            type: string
            title: Client Secret
            description: OAuth 2.0 Client Secret from Google Cloud Console
          refresh_token:
            type: string
            title: Refresh Token
            description: OAuth 2.0 Refresh Token for obtaining new access tokens
        auth_mapping:
          client_id: "${client_id}"
          client_secret: "${client_secret}"
          refresh_token: "${refresh_token}"
        replication_auth_key_mapping:
          credentials.client_id: "client_id"
          credentials.client_secret: "client_secret"
          credentials.refresh_token: "refresh_token"
        replication_auth_key_constants:
          credentials.auth_type: "Client"

  schemas:
    DimensionValue:
      type: object
      properties:
        value:
          type: string
          description: The dimension value

    MetricValue:
      type: object
      properties:
        value:
          type: string
          description: The metric value

    Row:
      type: object
      properties:
        dimensionValues:
          type: array
          items:
            $ref: "#/components/schemas/DimensionValue"
          description: Dimension values for this row
        metricValues:
          type: array
          items:
            $ref: "#/components/schemas/MetricValue"
          description: Metric values for this row

    DimensionHeader:
      type: object
      properties:
        name:
          type: string
          description: The dimension name

    MetricHeader:
      type: object
      properties:
        name:
          type: string
          description: The metric name
        type:
          type: string
          description: The metric data type

    RunReportResponse:
      type: object
      description: Response from the runReport endpoint
      properties:
        dimensionHeaders:
          type: array
          items:
            $ref: "#/components/schemas/DimensionHeader"
          description: Column headers for dimensions
        metricHeaders:
          type: array
          items:
            $ref: "#/components/schemas/MetricHeader"
          description: Column headers for metrics
        rows:
          type: array
          items:
            $ref: "#/components/schemas/Row"
          description: Report data rows
        rowCount:
          type: integer
          description: Total number of rows in the query result
        metadata:
          type: object
          properties:
            currencyCode:
              type: string
              description: The currency code used in this report
            timeZone:
              type: string
              description: The property's current timezone
        propertyQuota:
          type: object
          description: Quota status for this Analytics property
          properties:
            tokensPerDay:
              type: object
              properties:
                consumed:
                  type: integer
                remaining:
                  type: integer
            tokensPerHour:
              type: object
              properties:
                consumed:
                  type: integer
                remaining:
                  type: integer
            concurrentRequests:
              type: object
              properties:
                consumed:
                  type: integer
                remaining:
                  type: integer
            serverErrorsPerProjectPerHour:
              type: object
              properties:
                consumed:
                  type: integer
                remaining:
                  type: integer
            potentiallyThresholdedRequestsPerHour:
              type: object
              properties:
                consumed:
                  type: integer
                remaining:
                  type: integer
            tokensPerProjectPerHour:
              type: object
              properties:
                consumed:
                  type: integer
                remaining:
                  type: integer
        kind:
          type: string
          description: Resource type identifier

    WebsiteOverviewRecord:
      type: object
      x-airbyte-entity-name: website_overview
      x-airbyte-stream-name: website_overview
      description: A flattened website overview report row with date, users, sessions, bounce rate, and page view metrics.

    DailyActiveUsersRecord:
      type: object
      x-airbyte-entity-name: daily_active_users
      x-airbyte-stream-name: daily_active_users
      description: A flattened daily active users report row with 1-day active user counts by date.

    WeeklyActiveUsersRecord:
      type: object
      x-airbyte-entity-name: weekly_active_users
      x-airbyte-stream-name: weekly_active_users
      description: A flattened weekly active users report row with 7-day active user counts by date.

    FourWeeklyActiveUsersRecord:
      type: object
      x-airbyte-entity-name: four_weekly_active_users
      x-airbyte-stream-name: four_weekly_active_users
      description: A flattened four-weekly active users report row with 28-day active user counts by date.

    TrafficSourcesRecord:
      type: object
      x-airbyte-entity-name: traffic_sources
      x-airbyte-stream-name: traffic_sources
      description: A flattened traffic sources report row with session source, medium, and engagement metrics by date.

    PagesRecord:
