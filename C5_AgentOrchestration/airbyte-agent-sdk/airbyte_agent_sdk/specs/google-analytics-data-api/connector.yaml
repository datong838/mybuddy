      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PagesRequest"
      responses:
        "200":
          description: Pages report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunReportResponse"
        "401":
          description: Unauthorized

  "/properties/{property_id}:runReport:devices":
    post:
      summary: List device metrics
      description: Returns device-related metrics broken down by device category, operating system, browser, and date, including users, sessions, and page views.
      operationId: listDevices
      x-airbyte-entity: devices
      x-airbyte-action: list
      x-airbyte-path-override:
        path: "/properties/{property_id}:runReport"
      x-airbyte-record-extractor: $.rows
      x-airbyte-no-pagination: "runReport returns a bounded aggregation scoped to the request body (dateRanges + dimensions + metrics); GA4 Data API responses only surface rowCount, not a next-page cursor."
      x-airbyte-meta-extractor:
        row_count: $.rowCount
      parameters:
        - name: property_id
          in: path
          required: true
          description: GA4 property ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevicesRequest"
      responses:
        "200":
          description: Devices report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunReportResponse"
        "401":
          description: Unauthorized

  "/properties/{property_id}:runReport:locations":
    post:
      summary: List location metrics
      description: Returns geographic metrics broken down by region, country, city, and date, including users, sessions, bounce rate, and page views.
      operationId: listLocations
      x-airbyte-entity: locations
      x-airbyte-action: list
      x-airbyte-path-override:
        path: "/properties/{property_id}:runReport"
      x-airbyte-record-extractor: $.rows
      x-airbyte-no-pagination: "runReport returns a bounded aggregation scoped to the request body (dateRanges + dimensions + metrics); GA4 Data API responses only surface rowCount, not a next-page cursor."
      x-airbyte-meta-extractor:
