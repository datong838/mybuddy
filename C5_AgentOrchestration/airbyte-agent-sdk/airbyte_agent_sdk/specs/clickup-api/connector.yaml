openapi: 3.1.0

info:
  title: ClickUp API Connector
  version: 0.1.5
  description: |
    ClickUp is a productivity platform that provides project management, task tracking, docs, goals,
    and time tracking for teams. This connector provides access to workspaces, spaces, folders, lists,
    tasks (including workspace-wide search), comments, goals, views, time tracking, members, and docs.
  x-airbyte-connector-name: clickup-api
  x-airbyte-connector-definition-id: 311a7a27-3fb5-4f7e-8265-5e4afe258b66
  x-airbyte-replication-version: "0.3.51"
  x-airbyte-replication-compatibility: ">=0.3.51, <1.0.0"
  x-airbyte-context-store:
    entities:
      - entity: user
        suggested: true
        x-airbyte-name: user
        fields:
          - name: id
            type:
              - "null"
              - "integer"
            description: "Unique identifier for the user"
          - name: username
            type:
              - "null"
              - "string"
            description: "Display name of the user"
      - entity: teams
        suggested: true
        x-airbyte-name: team
        fields:
          - name: id
            type:
              - "null"
              - "string"
            description: "Unique identifier for the team (workspace)"
          - name: name
            type:
              - "null"
              - "string"
            description: "Name of the team"
      - entity: spaces
        suggested: true
        x-airbyte-name: space
        fields:
          - name: id
            type:
              - "null"
              - "string"
            description: "Unique identifier for the space"
          - name: name
            type:
              - "null"
              - "string"
            description: "Name of the space"
          - name: private
            type:
              - "null"
              - "boolean"
            description: "Whether the space is private"
      - entity: folders
        suggested: true
        x-airbyte-name: folder
        fields:
          - name: id
            type:
              - "null"
              - "string"
            description: "Unique identifier for the folder"
          - name: name
            type:
              - "null"
              - "string"
            description: "Name of the folder"
          - name: hidden
            type:
              - "null"
              - "boolean"
            description: "Whether the folder is hidden from the sidebar"
          - name: task_count
            type:
              - "null"
              - "string"
            description: "Number of tasks contained in the folder"
      - entity: lists
        suggested: true
        x-airbyte-name: list
        fields:
          - name: id
            type:
              - "null"
              - "string"
            description: "Unique identifier for the list"
          - name: name
            type:
              - "null"
              - "string"
            description: "Name of the list"
          - name: archived
            type:
              - "null"
              - "boolean"
            description: "Whether the list has been archived"
          - name: due_date
            type:
              - "null"
              - "string"
            description: "Due date for the list, in ClickUp timestamp format"
          - name: start_date
            type:
              - "null"
              - "string"
            description: "Start date for the list, in ClickUp timestamp format"
          - name: priority
            type:
              - "null"
              - "string"
            description: "Priority assigned to the list"
          - name: task_count
            type:
              - "null"
              - "integer"
            description: "Number of tasks contained in the list"
      - entity: tasks
        suggested: true
        x-airbyte-name: task
        fields:
          - name: id
            type:
              - "null"
              - "string"
            description: "Unique identifier for the task"
          - name: name
            type:
              - "null"
              - "string"
            description: "Name of the task"
          - name: date_created
            type:
              - "null"
              - "string"
            description: "Creation timestamp of the task, in ClickUp timestamp format"
          - name: date_updated
            type:
              - "null"
              - "string"
            description: "Last update timestamp of the task, in ClickUp timestamp format"
          - name: date_closed
            type:
              - "null"
              - "string"
            description: "Timestamp when the task was closed, in ClickUp timestamp format"
          - name: due_date
            type:
              - "null"
              - "string"
            description: "Due date for the task, in ClickUp timestamp format"
          - name: start_date
            type:
              - "null"
              - "string"
            description: "Start date for the task, in ClickUp timestamp format"
          - name: parent
            type:
              - "null"
              - "string"
            description: "ID of the parent task, if this task is a subtask"
          - name: url
            type:
              - "null"
              - "string"
            description: "Permalink URL to view the task in ClickUp"
      - entity: comments
        suggested: true
        x-airbyte-name: list_comments
        fields:
          - name: id
            type: string
            description: "Unique identifier for the comment"
          - name: comment_text
            type:
              - "null"
              - "string"
            description: "Plain-text content of the comment"
          - name: date
            type:
              - "null"
              - "string"
            description: "Timestamp when the comment was posted, in ClickUp timestamp format"
          - name: reply_count
            type:
              - "null"
              - "number"
            description: "Number of replies on the comment"
      - entity: goals
        suggested: true
        x-airbyte-name: team_goals
        fields:
          - name: id
            type: string
            description: "Unique identifier for the goal"
          - name: name
            type:
              - "null"
              - "string"
            description: "Name of the goal"
          - name: description
            type:
              - "null"
              - "string"
            description: "Description of the goal"
          - name: archived
            type:
              - "null"
              - "boolean"
            description: "Whether the goal has been archived"
          - name: pinned
            type:
              - "null"
              - "boolean"
            description: "Whether the goal is pinned to the top of the list"
          - name: private
            type:
              - "null"
              - "boolean"
            description: "Whether the goal is private to its owners"
          - name: date_created
            type:
              - "null"
              - "string"
            description: "Creation timestamp of the goal, in ClickUp timestamp format"
          - name: due_date
            type:
              - "null"
              - "string"
            description: "Due date for the goal, in ClickUp timestamp format"
          - name: percent_completed
            type:
              - "null"
              - "number"
            description: "Completion percentage of the goal, between 0 and 100"
          - name: team_id
            type:
              - "null"
              - "string"
            description: "Identifier of the team that owns the goal"
      - entity: time_tracking
        suggested: true
        x-airbyte-name: time_tracking
        fields:
          - name: time
            type:
              - "number"
              - "null"
            description: "Total tracked time in milliseconds"
          - name: user
            type:
              - "object"
              - "null"
            description: "User who tracked the time"
  x-airbyte-external-documentation-urls:
  - type: api_reference
    title: ClickUp API v2 Reference
    url: https://developer.clickup.com/reference
  - type: authentication_guide
    title: ClickUp API Authentication
    url: https://developer.clickup.com/docs/authentication
  x-airbyte-example-questions:
    direct:
    - "List all workspaces I have access to"
    - "Show me the spaces in my workspace"
    - "List the folders in a space"
    - "Show me the lists in a folder"
    - "Get the tasks in a list"
    - "Get details for a specific task"
    - "Search for tasks containing 'bug' across my workspace"
    - "Find all urgent priority tasks in my workspace"
    - "Show me tasks assigned to a specific user"
    - "List comments on a task"
    - "Get threaded replies on a comment"
    - "Create a comment on a task"
    - "Update a comment to mark it resolved"
    - "List all goals in my workspace"
    - "Get details for a specific goal"
    - "Show me all workspace-level views"
    - "Get tasks matching a saved view"
    - "List time entries for my workspace this week"
    - "Get details for a specific time entry"
    - "Show me the members assigned to a task"
    - "List all docs in my workspace"
    - "Get details for a specific doc"
    search:
    - "What tasks are overdue in my workspace?"
    - "Which tasks were updated in the last 24 hours?"
    - "Show me all high-priority tasks across all projects"
    - "How much time has been tracked this week?"
    - "What are the most commented tasks?"
    unsupported:
    - "Delete a task"
    - "Delete a comment"
    - "Delete a goal"

  x-airbyte-entity-relationships:
  - source_entity: spaces
    target_entity: teams
    foreign_key: team_id
    target_key: id
    cardinality: many_to_one
  - source_entity: folders
    target_entity: spaces
    foreign_key: space_id
    target_key: id
    cardinality: many_to_one
  - source_entity: lists
    target_entity: folders
    foreign_key: folder_id
    target_key: id
    cardinality: many_to_one
  - source_entity: tasks
    target_entity: lists
    foreign_key: list_id
    target_key: id
    cardinality: many_to_one
  - source_entity: comments
    target_entity: tasks
    foreign_key: task_id
    target_key: id
    cardinality: many_to_one
  - source_entity: goals
    target_entity: teams
    foreign_key: team_id
    target_key: id
    cardinality: many_to_one
  - source_entity: views
    target_entity: teams
    foreign_key: team_id
    target_key: id
    cardinality: many_to_one
  - source_entity: view_tasks
    target_entity: views
    foreign_key: view_id
    target_key: id
    cardinality: many_to_one
    parent_record_filter:
      type: [list, board, calendar, gantt]
  - source_entity: time_tracking
    target_entity: teams
    foreign_key: team_id
    target_key: id
    cardinality: many_to_one
  - source_entity: members
    target_entity: tasks
    foreign_key: task_id
    target_key: id
    cardinality: many_to_one
  - source_entity: docs
    target_entity: teams
    foreign_key: workspace_id
    target_key: id
    cardinality: many_to_one
servers:
- url: https://api.clickup.com
  description: ClickUp API server

security:
- apiKeyAuth: []

paths:
  # ── User ──
  "/api/v2/user":
    get:
      summary: Get authorized user
      description: View the details of the authenticated user's ClickUp account
      operationId: getAuthorizedUser
      x-airbyte-entity: user
      x-airbyte-action: get
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.user
      responses:
        "200":
          description: Authorized user details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Unauthorized

  # ── Teams (Workspaces) ──
  "/api/v2/team":
    get:
      summary: List authorized workspaces
      description: Get the workspaces (teams) available to the authenticated user
      operationId: listTeams
      x-airbyte-entity: teams
      x-airbyte-action: list
      x-airbyte-no-pagination: "ClickUp GET /api/v2/team returns all workspaces accessible to the authenticated user in a single response; no pagination cursor or offset is exposed."
      x-airbyte-record-extractor: $.teams
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamsListResponse"
        "401":
          description: Unauthorized

  # ── Spaces ──
  "/api/v2/team/{team_id}/space":
    get:
      summary: List spaces
      description: Get the spaces available in a workspace
      operationId: listSpaces
      x-airbyte-entity: spaces
      x-airbyte-action: list
      x-airbyte-no-pagination: "ClickUp GET /api/v2/team/{team_id}/space returns all spaces in the workspace in a single response; no pagination cursor or offset is exposed."
      x-airbyte-record-extractor: $.spaces
      parameters:
      - name: team_id
        in: path
        required: true
        description: The ID of the workspace
        schema:
          type: string
      responses:
        "200":
          description: List of spaces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpacesListResponse"
        "401":
          description: Unauthorized

  "/api/v2/space/{space_id}":
    get:
      summary: Get a space
      description: Get a single space by ID
      operationId: getSpace
      x-airbyte-entity: spaces
      x-airbyte-action: get
      parameters:
      - name: space_id
        in: path
        required: true
        description: The ID of the space
        schema:
          type: string
      responses:
        "200":
          description: Space details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Space"
        "401":
          description: Unauthorized
        "404":
          description: Space not found

  # ── Folders ──
  "/api/v2/space/{space_id}/folder":
    get:
      summary: List folders
      description: Get the folders in a space
      operationId: listFolders
      x-airbyte-entity: folders
      x-airbyte-action: list
      x-airbyte-no-pagination: "ClickUp GET /api/v2/space/{space_id}/folder returns all folders in the space in a single response; no pagination cursor or offset is exposed."
      x-airbyte-record-extractor: $.folders
      parameters:
      - name: space_id
        in: path
        required: true
        description: The ID of the space
        schema:
          type: string
      responses:
        "200":
          description: List of folders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoldersListResponse"
        "401":
          description: Unauthorized

  "/api/v2/folder/{folder_id}":
    get:
      summary: Get a folder
      description: Get a single folder by ID
      operationId: getFolder
      x-airbyte-entity: folders
      x-airbyte-action: get
      parameters:
      - name: folder_id
        in: path
        required: true
        description: The ID of the folder
        schema:
          type: string
      responses:
        "200":
          description: Folder details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"
        "401":
          description: Unauthorized
        "404":
          description: Folder not found

  # ── Lists ──
  "/api/v2/folder/{folder_id}/list":
    get:
      summary: List lists in a folder
      description: Get the lists in a folder
      operationId: listLists
      x-airbyte-entity: lists
      x-airbyte-action: list
      x-airbyte-no-pagination: "ClickUp GET /api/v2/folder/{folder_id}/list returns all lists in the folder in a single response; no pagination cursor or offset is exposed."
      x-airbyte-record-extractor: $.lists
      parameters:
      - name: folder_id
        in: path
        required: true
        description: The ID of the folder
        schema:
          type: string
      responses:
        "200":
          description: List of lists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListsListResponse"
        "401":
          description: Unauthorized

  "/api/v2/list/{list_id}":
    get:
      summary: Get a list
      description: Get a single list by ID
      operationId: getList
      x-airbyte-entity: lists
      x-airbyte-action: get
      parameters:
      - name: list_id
        in: path
        required: true
        description: The ID of the list
        schema:
          type: string
      responses:
        "200":
          description: List details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List"
        "401":
          description: Unauthorized
        "404":
          description: List not found

  # ── Tasks ──
  "/api/v2/list/{list_id}/task":
    get:
      summary: List tasks
      description: Get the tasks in a list
      operationId: listTasks
      x-airbyte-entity: tasks
      x-airbyte-action: list
      x-airbyte-record-extractor: $.tasks
      x-airbyte-meta-extractor:
        last_page: $.last_page
      parameters:
      - name: list_id
        in: path
        required: true
        description: The ID of the list
        schema:
          type: string
      - name: page
        in: query
        description: Page number (0-indexed)
        schema:
          type: integer
          default: 0
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksListResponse"
        "401":
          description: Unauthorized

  "/api/v2/task/{task_id}":
    get:
      summary: Get a task
      description: Get a single task by ID
      operationId: getTask
      x-airbyte-entity: tasks
      x-airbyte-action: get
      parameters:
      - name: task_id
        in: path
        required: true
        description: The ID of the task
        schema:
          type: string
      - name: custom_task_ids
        in: query
        description: Set to true to use a custom task ID
        schema:
          type: boolean
      - name: include_subtasks
        in: query
        description: Include subtasks
        schema:
          type: boolean
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          description: Unauthorized
        "404":
          description: Task not found

  # ── Tasks: api_search (Workspace-Wide Filtered Tasks) ──
  "/api/v2/team/{team_id}/task":
    get:
      summary: Search tasks across workspace
      description: |
        View the tasks that meet specific criteria from a workspace. Supports free-text search
        and structured filters including status, assignee, tags, priority, and date ranges.
        Responses are limited to 100 tasks per page.
      operationId: searchTasks
      x-airbyte-entity: tasks
      x-airbyte-action: api_search
      x-airbyte-record-extractor: $.tasks
      x-airbyte-meta-extractor:
        last_page: $.last_page
      parameters:
      - name: team_id
        in: path
        required: true
        description: The workspace ID to search within
        schema:
          type: string
      - name: search
        in: query
        description: Free-text search across task name, description, and custom field text
        schema:
          type: string
      - name: statuses[]
        in: query
        description: Filter by status names (e.g. "in progress", "done")
        schema:
          type: array
          items:
            type: string
      - name: assignees[]
        in: query
        description: Filter by user IDs
        schema:
          type: array
          items:
            type: string
      - name: tags[]
        in: query
        description: Filter by tag names
        schema:
          type: array
          items:
            type: string
      - name: priority
        in: query
        description: "Filter by priority: 1=Urgent, 2=High, 3=Normal, 4=Low"
        schema:
          type: integer
      - name: due_date_gt
        in: query
        description: Due date after (Unix ms)
        schema:
          type: integer
      - name: due_date_lt
        in: query
        description: Due date before (Unix ms)
        schema:
          type: integer
      - name: date_created_gt
        in: query
        description: Created after (Unix ms)
        schema:
          type: integer
      - name: date_created_lt
        in: query
        description: Created before (Unix ms)
        schema:
          type: integer
      - name: date_updated_gt
        in: query
        description: Updated after (Unix ms)
        schema:
          type: integer
      - name: date_updated_lt
        in: query
        description: Updated before (Unix ms)
        schema:
          type: integer
      - name: custom_fields
        in: query
        description: |
          JSON array of custom field filters. Each object: {"field_id": "<UUID>", "operator": "<OP>", "value": "<DATA>"}.
          Operators: = (contains), == (exact), <, <=, >, >=, !=, !==, IS NULL, IS NOT NULL, RANGE, ANY, ALL, NOT ANY, NOT ALL
        schema:
          type: array
          items:
            type: object
      - name: include_closed
        in: query
        description: Include closed tasks (excluded by default)
        schema:
          type: boolean
      - name: page
        in: query
        description: Page number (0-indexed), results capped at 100/page
        schema:
          type: integer
          default: 0
      responses:
        "200":
          description: Filtered tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksListResponse"
        "401":
          description: Unauthorized

  # ── Comments ──
  "/api/v2/task/{task_id}/comment":
    get:
      summary: List task comments
      description: Get the comments on a task
      operationId: listTaskComments
      x-airbyte-entity: comments
      x-airbyte-action: list
      x-airbyte-no-pagination: "ClickUp GET /api/v2/task/{task_id}/comment returns all comments on the task in a single response; cursor-based pagination is only available on alternate start/start_id query params not modelled here."
      x-airbyte-record-extractor: $.comments
      parameters:
      - name: task_id
        in: path
        required: true
        description: The ID of the task
        schema:
          type: string
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsListResponse"
        "401":
          description: Unauthorized

    post:
      summary: Create a task comment
      description: Create a comment on a task
      operationId: createTaskComment
      x-airbyte-entity: comments
      x-airbyte-action: create
      parameters:
      - name: task_id
        in: path
        required: true
        description: The ID of the task
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateParams"
      responses:
        "200":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentCreateResponse"
        "401":
          description: Unauthorized

  "/api/v2/comment/{comment_id}/reply":
    get:
      summary: Get threaded replies
      description: Get threaded replies on a comment
      operationId: getThreadedComments
      x-airbyte-entity: comments
      x-airbyte-action: get
      x-airbyte-record-extractor: $.comments
      parameters:
      - name: comment_id
        in: path
        required: true
        description: The ID of the comment
        schema:
          type: string
      responses:
        "200":
          description: Threaded replies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsListResponse"
        "401":
          description: Unauthorized

  "/api/v2/comment/{comment_id}":
    put:
      summary: Update a comment
      description: Update an existing comment
      operationId: updateComment
      x-airbyte-entity: comments
      x-airbyte-action: update
      parameters:
      - name: comment_id
        in: path
        required: true
        description: The ID of the comment
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentUpdateParams"
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentUpdateResponse"
        "401":
          description: Unauthorized

  # ── Goals ──
  "/api/v2/team/{team_id}/goal":
    get:
      summary: List goals
      description: Get the goals in a workspace
      operationId: listGoals
      x-airbyte-entity: goals
      x-airbyte-action: list
      x-airbyte-no-pagination: "ClickUp GET /api/v2/team/{team_id}/goal returns all goals in the workspace in a single response; no pagination cursor or offset is exposed."
      x-airbyte-record-extractor: $.goals
      parameters:
      - name: team_id
        in: path
        required: true
        description: The ID of the workspace
        schema:
          type: string
      responses:
        "200":
          description: List of goals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalsListResponse"
        "401":
          description: Unauthorized

  "/api/v2/goal/{goal_id}":
    get:
      summary: Get a goal
      description: Get a single goal by ID
      operationId: getGoal
      x-airbyte-entity: goals
      x-airbyte-action: get
      x-airbyte-untested: true
      x-airbyte-record-extractor: $.goal
      parameters:
      - name: goal_id
        in: path
        required: true
        description: The ID of the goal
        schema:
          type: string
      responses:
        "200":
          description: Goal details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalResponse"
        "401":
          description: Unauthorized
        "404":
          description: Goal not found

  # ── Views ──
  "/api/v2/team/{team_id}/view":
    get:
      summary: List workspace views
      description: Get the workspace-level (Everything level) views
      operationId: listWorkspaceViews
      x-airbyte-entity: views
      x-airbyte-action: list
