openapi: 3.1.0
info:
  title: GitLab API Connector
  version: 1.0.4
  description: 'Connector for the GitLab REST API (v4). Provides access to projects, issues, merge requests, commits, pipelines, groups, branches, releases, tags, members, milestones, and users. Supports both Personal Access Token and OAuth2 authentication.

    '
  x-airbyte-connector-name: gitlab
  x-airbyte-connector-definition-id: 5e6175e5-68e1-4c17-bff9-56103bbb0d80
  x-airbyte-replication-version: "4.4.31"
  x-airbyte-replication-compatibility: ">=4.4.31, <5.0.0"
  x-airbyte-external-documentation-urls:
  - type: api_reference
    title: GitLab REST API Documentation
    url: https://docs.gitlab.com/ee/api/rest/
  x-airbyte-example-questions:
    direct:
    - List all projects I have access to
    - Get the details of a specific project
    - List all open issues in a project
    - Show merge requests for a project
    - List all groups I belong to
    - Show recent commits in a project
    - List pipelines for a project
    - Show all branches in a project
    search:
    - Find issues updated in the last week
    - What are the most active projects?
    - Show merge requests that are still open
    - List projects with the most commits
    unsupported:
    - Create a new project
    - Delete an issue
    - Merge a merge request
    - Trigger a pipeline
  x-airbyte-entity-relationships:
  - source_entity: issues
    target_entity: projects
    foreign_key: project_id
    target_key: id
    cardinality: many_to_one
  - source_entity: merge_requests
    target_entity: projects
    foreign_key: project_id
    target_key: id
    cardinality: many_to_one
  - source_entity: commits
    target_entity: projects
    foreign_key: project_id
    target_key: id
    cardinality: many_to_one
  - source_entity: branches
    target_entity: projects
    foreign_key: project_id
    target_key: id
    cardinality: many_to_one
  - source_entity: pipelines
    target_entity: projects
    foreign_key: project_id
    target_key: id
    cardinality: many_to_one
  - source_entity: group_members
    target_entity: groups
    foreign_key: group_id
    target_key: id
    cardinality: many_to_one
  - source_entity: project_members
    target_entity: projects
    foreign_key: project_id
    target_key: id
    cardinality: many_to_one
  - source_entity: releases
    target_entity: projects
    foreign_key: project_id
    target_key: id
    cardinality: many_to_one
  - source_entity: tags
    target_entity: projects
    foreign_key: project_id
    target_key: id
    cardinality: many_to_one
  - source_entity: group_milestones
    target_entity: groups
    foreign_key: group_id
    target_key: id
    cardinality: many_to_one
  - source_entity: project_milestones
