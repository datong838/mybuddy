components:
  securitySchemes:
    gitlabPAT:
      type: http
      scheme: bearer
      description: Personal Access Token authentication
      x-airbyte-auth-config:
        title: Personal Access Token
        type: object
        required:
        - access_token
        properties:
          access_token:
            type: string
            title: Private Token
            description: Log into your GitLab account and generate a personal access token.
        auth_mapping:
          token: ${access_token}
        replication_auth_key_mapping:
          credentials.access_token: access_token
        replication_auth_key_constants:
          credentials.auth_type: access_token
    gitlabOAuth:
      type: oauth2
      description: OAuth 2.0 authentication
      x-airbyte-untested: true
      flows:
        authorizationCode:
          authorizationUrl: https://gitlab.com/oauth/authorize
          tokenUrl: https://gitlab.com/oauth/token
          refreshUrl: https://gitlab.com/oauth/token
          scopes:
            read_user: Read user info
            read_api: Read API access
            read_repository: Read repository
      x-airbyte-auth-config:
        title: OAuth2.0
        type: object
        required:
        - client_id
        - client_secret
        - refresh_token
        - access_token
        properties:
          client_id:
            type: string
            title: Client ID
            description: The API ID of the GitLab developer application.
          client_secret:
            type: string
            title: Client Secret
            description: The API Secret of the GitLab developer application.
          access_token:
            type: string
            title: Access Token
            description: Access Token for making authenticated requests.
          refresh_token:
            type: string
            title: Refresh Token
            description: The key to refresh the expired access token.
        auth_mapping:
          access_token: ${access_token}
          refresh_token: ${refresh_token}
          client_id: ${client_id}
          client_secret: ${client_secret}
        replication_auth_key_mapping:
          credentials.client_id: client_id
          credentials.client_secret: client_secret
          credentials.refresh_token: refresh_token
          credentials.access_token: access_token
        replication_auth_key_constants:
          credentials.auth_type: oauth2.0
          credentials.token_expiry_date: ''
  schemas:
    Project:
      type: object
      x-airbyte-entity-name: projects
      x-airbyte-stream-name: projects
      x-airbyte-ai-hints:
        summary: "GitLab projects (repositories) with settings and metadata"
        when_to_use: "Questions about GitLab repositories, project settings, or visibility"
        trigger_phrases: ["gitlab project", "repository", "gitlab repo"]
        freshness: live
        search_strategy: "Search by name or path"
        example_questions:
          - "List GitLab projects"
          - "Find a specific repository"
      description: GitLab project
      additionalProperties: true
      required:
      - id
      properties:
        id:
          type: integer
          description: Project ID
        name:
          type: string
          description: Project name
        name_with_namespace:
          type: string
          description: Project name with namespace
        path:
          type: string
          description: Project path
        path_with_namespace:
          type: string
          description: Full path with namespace
        description:
          type:
          - 'null'
          - string
          description: Project description
        default_branch:
          type:
          - 'null'
          - string
          description: Default branch name
        visibility:
          type: string
          description: Project visibility level
        web_url:
          type: string
          description: Web URL of the project
        ssh_url_to_repo:
          type: string
          description: SSH URL
        http_url_to_repo:
          type: string
          description: HTTP URL for cloning
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        last_activity_at:
          type: string
          format: date-time
          description: Last activity timestamp
        namespace:
          type: object
          description: Namespace of the project
        archived:
          type: boolean
          description: Whether the project is archived
        forks_count:
          type: integer
          description: Number of forks
        star_count:
          type: integer
          description: Number of stars
        open_issues_count:
          type: integer
          description: Number of open issues
        topics:
          type: array
          items:
            type: string
          description: Project topics
        avatar_url:
          type:
          - 'null'
          - string
          description: Avatar URL
        updated_at:
          type:
          - 'null'
          - string
