paths:
  /projects:
    get:
      summary: List projects
      description: Get a list of all visible projects across GitLab for the authenticated user.
      operationId: listProjects
      x-airbyte-entity: projects
      x-airbyte-action: list
      x-airbyte-preferred-for-check: true
      x-airbyte-meta-extractor:
        next: "@link.next"
      parameters:
      - name: page
        in: query
        description: Page number (1-indexed)
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: per_page
        in: query
        description: Number of items per page (max 100)
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: membership
        in: query
        description: Limit by projects that the current user is a member of
        schema:
          type: boolean
      - name: owned
        in: query
        description: Limit by projects explicitly owned by the current user
        schema:
          type: boolean
      - name: search
        in: query
        description: Return list of projects matching the search criteria
        schema:
          type: string
      - name: order_by
        in: query
        description: Return projects ordered by field
        schema:
          type: string
          enum:
          - id
          - name
          - path
          - created_at
          - updated_at
          - last_activity_at
          - similarity
          - star_count
      - name: sort
        in: query
        description: Return projects sorted in asc or desc order
        schema:
          type: string
          enum:
          - asc
          - desc
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '401':
          description: Unauthorized
  /projects/{id}:
    get:
      summary: Get a project
      description: Get a specific project by ID.
      operationId: getProject
      x-airbyte-entity: projects
      x-airbyte-action: get
      parameters:
      - name: id
        in: path
        required: true
        description: The ID or URL-encoded path of the project
        schema:
          type: string
      - name: statistics
        in: query
        description: Include project statistics
        schema:
          type: boolean
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found
        '401':
          description: Unauthorized
  /projects/{project_id}/issues:
    get:
      summary: List project issues
      description: Get a list of a project's issues.
      operationId: listIssues
      x-airbyte-entity: issues
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: "@link.next"
      parameters:
      - name: project_id
        in: path
        required: true
        description: The ID or URL-encoded path of the project
        schema:
          type: string
      - name: page
        in: query
        description: Page number
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: per_page
        in: query
        description: Number of items per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: state
        in: query
        description: Filter issues by state
        schema:
          type: string
          enum:
          - opened
          - closed
          - all
      - name: scope
        in: query
        description: Filter issues by scope
        schema:
          type: string
          enum:
          - created_by_me
          - assigned_to_me
          - all
      - name: order_by
        in: query
        description: Return issues ordered by field
        schema:
          type: string
          enum:
          - created_at
          - updated_at
          - priority
          - due_date
          - relative_position
          - label_priority
          - milestone_due
          - popularity
          - weight
      - name: sort
        in: query
        description: Return issues sorted in asc or desc order
        schema:
          type: string
          enum:
          - asc
          - desc
      - name: created_after
        in: query
        description: Return issues created on or after the given time (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: created_before
        in: query
        description: Return issues created on or before the given time (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: updated_after
        in: query
        description: Return issues updated on or after the given time (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: updated_before
        in: query
        description: Return issues updated on or before the given time (ISO 8601 format)
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: List of issues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Issue'
        '401':
          description: Unauthorized
  /projects/{project_id}/issues/{issue_iid}:
    get:
      summary: Get an issue
      description: Get a single project issue.
      operationId: getIssue
      x-airbyte-entity: issues
      x-airbyte-action: get
      parameters:
      - name: project_id
        in: path
        required: true
        description: The ID or URL-encoded path of the project
