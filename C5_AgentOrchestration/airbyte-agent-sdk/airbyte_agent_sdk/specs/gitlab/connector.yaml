          - locked
          - merged
          - all
      - name: scope
        in: query
        description: Filter merge requests by scope
        schema:
          type: string
          enum:
          - created_by_me
          - assigned_to_me
          - all
      - name: order_by
        in: query
        description: Return merge requests ordered by field
        schema:
          type: string
          enum:
          - created_at
          - title
          - updated_at
      - name: sort
        in: query
        description: Return merge requests sorted in asc or desc order
        schema:
          type: string
          enum:
          - asc
          - desc
      - name: created_after
        in: query
        description: Return merge requests created on or after the given time (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: created_before
        in: query
        description: Return merge requests created on or before the given time (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: updated_after
        in: query
        description: Return merge requests updated on or after the given time (ISO 8601 format)
        schema:
          type: string
          format: date-time
      - name: updated_before
        in: query
        description: Return merge requests updated on or before the given time (ISO 8601 format)
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: List of merge requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MergeRequest'
        '401':
          description: Unauthorized
  /projects/{project_id}/merge_requests/{merge_request_iid}:
    get:
      summary: Get a merge request
      description: Get information about a single merge request.
      operationId: getMergeRequest
      x-airbyte-entity: merge_requests
      x-airbyte-action: get
      parameters:
