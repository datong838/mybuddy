components:
  securitySchemes:
    klaviyoApiKey:
      type: apiKey
      in: header
      name: Authorization
      description: Klaviyo API Key authentication
      x-airbyte-auth-config:
        type: object
        required:
          - api_key
        properties:
          api_key:
            type: string
            title: "API Key"
            description: "Your Klaviyo private API key"
        auth_mapping:
          api_key: "Klaviyo-API-Key ${api_key}"
        replication_auth_key_mapping:
          api_key: "api_key"

  schemas:
    Profile:
      type: object
      x-airbyte-entity-name: profiles
      x-airbyte-stream-name: profiles
      x-airbyte-ai-hints:
        summary: "Klaviyo customer profiles with email, properties, and engagement data"
        when_to_use: "Looking up customer profiles or subscriber information"
        trigger_phrases: ["klaviyo profile", "subscriber", "customer profile", "email subscriber"]
        freshness: live
        search_strategy: "Search by email or name"
        example_questions:
          - "Find a subscriber in Klaviyo"
          - "Show profile details for an email"
      description: A Klaviyo profile representing a contact
      required:
        - id
      properties:
        id:
          type: string
          description: Unique profile identifier
        type:
          type: [string, "null"]
          description: Object type (always "profile")
        attributes:
          type: [object, "null"]
          description: Profile attributes
          properties:
            email:
              type: [string, "null"]
              description: Email address
            phone_number:
              type: [string, "null"]
              description: Phone number
            external_id:
              type: [string, "null"]
              description: External identifier
            first_name:
              type: [string, "null"]
              description: First name
            last_name:
              type: [string, "null"]
              description: Last name
            organization:
              type: [string, "null"]
              description: Organization name
            title:
              type: [string, "null"]
              description: Job title
            image:
              type: [string, "null"]
              description: Profile image URL
            created:
              type: [string, "null"]
              format: date-time
              description: Creation timestamp
            updated:
              type: [string, "null"]
              format: date-time
              description: Last update timestamp
            location:
              type: [object, "null"]
              description: Location information
              properties:
                address1:
                  type: [string, "null"]
                address2:
                  type: [string, "null"]
                city:
                  type: [string, "null"]
                country:
                  type: [string, "null"]
                region:
                  type: [string, "null"]
                zip:
                  type: [string, "null"]
                timezone:
                  type: [string, "null"]
                latitude:
                  type: [number, "null"]
                longitude:
                  type: [number, "null"]
            properties:
