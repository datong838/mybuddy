servers:
  - url: https://a.klaviyo.com/api
    description: Klaviyo API Server

security:
  - klaviyoApiKey: []

paths:
  /profiles:
    get:
      summary: List profiles
      description: Returns a paginated list of profiles (contacts) in your Klaviyo account
      operationId: listProfiles
      x-airbyte-entity: profiles
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        next: $.links.next
      parameters:
        - name: revision
          in: header
          required: true
          description: API revision date
          schema:
            type: string
            default: "2024-10-15"
        - name: page[size]
          in: query
          description: Number of results per page (max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: page[cursor]
          in: query
          description: Cursor for pagination
          schema:
            type: string
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilesList"
        "401":
          description: Unauthorized

  /profiles/{id}:
    get:
      summary: Get a profile
      description: Get a single profile by ID
      operationId: getProfile
      x-airbyte-entity: profiles
      x-airbyte-action: get
      x-airbyte-record-extractor: $.data
      parameters:
        - name: revision
          in: header
          required: true
          description: API revision date
          schema:
            type: string
            default: "2024-10-15"
        - name: id
          in: path
          required: true
          description: Profile ID
          schema:
            type: string
      responses:
        "200":
          description: Profile object
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Profile"
        "404":
          description: Profile not found
        "401":
          description: Unauthorized

  /lists:
    get:
      summary: List all lists
      description: Returns a paginated list of all lists in your Klaviyo account
      operationId: listLists
      x-airbyte-entity: lists
      x-airbyte-action: list
      x-airbyte-record-extractor: $.data
      x-airbyte-meta-extractor:
        next: $.links.next
      parameters:
        - name: revision
          in: header
          required: true
          description: API revision date
          schema:
            type: string
            default: "2024-10-15"
        - name: page[size]
          in: query
          description: Number of results per page (max 10)
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 10
        - name: page[cursor]
          in: query
          description: Cursor for pagination
          schema:
            type: string
      responses:
        "200":
          description: List of lists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListsList"
        "401":
          description: Unauthorized

  /lists/{id}:
    get:
      summary: Get a list
