openapi: 3.1.0

info:
  title: SendGrid API Connector
  version: 1.0.3
  description: >
    Connector for the Twilio SendGrid v3 API. Provides read access to marketing
    campaigns, contacts, lists, segments, single sends, transactional templates,
    and suppression management (bounces, blocks, spam reports, invalid emails,
    global suppressions, suppression groups, and suppression group members).
  x-airbyte-connector-name: sendgrid
  x-airbyte-connector-definition-id: fbb5fbe2-16ad-4cf4-af7d-ff9d9c316c87
  x-airbyte-replication-version: "1.3.35"
  x-airbyte-replication-compatibility: ">=1.3.35, <2.0.0"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: SendGrid v3 API Reference
      url: https://docs.sendgrid.com/api-reference
  x-airbyte-example-questions:
    direct:
      - "List all marketing contacts"
      - "Get the details of a specific contact"
      - "Show me all marketing lists"
      - "List all transactional templates"
      - "Show all single sends"
      - "List all bounced emails"
      - "Show all blocked email addresses"
      - "List all spam reports"
      - "Show all suppression groups"
    search:
      - "How many contacts are in each marketing list?"
      - "Which single sends were scheduled in the last month?"
      - "What are the most common bounce reasons?"
      - "Show me contacts created in the last 7 days"
    unsupported:
      - "Send an email"
      - "Create a new contact"
      - "Delete a bounce record"
      - "Update a marketing list"
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from SendGrid.
    properties:
      start_date:
        type: string
        title: Start Date
        description: >-
          UTC date and time in the format 2017-01-25T00:00:00Z. Any data before
          this date will not be replicated.
        format: date-time
    required:
      - start_date
    replication_config_key_mapping:
      start_date: start_date
    replication_config_constants:
      start_date: "{{ day_delta(-180, '%Y-%m-%dT%H:%M:%SZ') }}"

  x-airbyte-context-store:
    disable_compaction: true
    entities:
      - entity: bounces
        x-airbyte-name: bounces
        fields:
          - name: created
            type: ["null", "integer"]
            description: Unix timestamp when the bounce occurred
          - name: email
            type: ["null", "string"]
            description: The email address that bounced
          - name: reason
            type: ["null", "string"]
            description: The reason for the bounce
          - name: status
            type: ["null", "string"]
            description: The enhanced status code for the bounce
      - entity: blocks
        x-airbyte-name: blocks
        fields:
          - name: created
            type: ["null", "integer"]
            description: Unix timestamp when the block occurred
          - name: email
            type: ["null", "string"]
            description: The blocked email address
          - name: reason
            type: ["null", "string"]
            description: The reason for the block
          - name: status
            type: ["null", "string"]
            description: The status code for the block
      - entity: campaigns
        x-airbyte-name: campaigns
        suggested: true
        fields:
          - name: channels
            type: ["null", "array"]
            description: Channels for this campaign
          - name: created_at
            type: ["null", "string"]
            description: When the campaign was created
          - name: id
            type: ["null", "string"]
            description: Unique campaign identifier
          - name: is_abtest
            type: ["null", "boolean"]
            description: Whether this campaign is an A/B test
          - name: name
            type: ["null", "string"]
            description: Campaign name
          - name: status
            type: ["null", "string"]
            description: Campaign status
          - name: updated_at
            type: ["null", "string"]
            description: When the campaign was last updated
      - entity: contacts
        x-airbyte-name: contacts
        suggested: true
        fields:
          - name: address_line_1
            type: ["null", "string"]
            description: Address line 1
          - name: address_line_2
            type: ["null", "string"]
            description: Address line 2
          - name: alternate_emails
            type: ["null", "array"]
            description: Alternate email addresses
          - name: city
            type: ["null", "string"]
            description: City
          - name: contact_id
            type: ["null", "string"]
            description: Unique contact identifier used by Airbyte
          - name: country
            type: ["null", "string"]
            description: Country
          - name: created_at
            type: ["null", "string"]
            description: When the contact was created
          - name: custom_fields
            type: ["null", "object"]
            description: Custom field values
          - name: email
            type: ["null", "string"]
            description: Contact email address
          - name: facebook
            type: ["null", "string"]
            description: Facebook ID
          - name: first_name
            type: ["null", "string"]
            description: Contact first name
          - name: last_name
            type: ["null", "string"]
            description: Contact last name
          - name: line
            type: ["null", "string"]
            description: LINE ID
          - name: list_ids
            type: ["null", "array"]
            description: IDs of lists the contact belongs to
          - name: phone_number
            type: ["null", "string"]
            description: Phone number
          - name: postal_code
            type: ["null", "string"]
            description: Postal code
          - name: state_province_region
            type: ["null", "string"]
            description: State, province, or region
          - name: unique_name
            type: ["null", "string"]
            description: Unique name for the contact
          - name: updated_at
            type: ["null", "string"]
            description: When the contact was last updated
          - name: whatsapp
            type: ["null", "string"]
            description: WhatsApp number
      - entity: global_suppressions
        x-airbyte-name: global_suppressions
        fields:
          - name: created
            type: ["null", "integer"]
            description: Unix timestamp when the global suppression was created
          - name: email
            type: ["null", "string"]
            description: The globally suppressed email address
      - entity: invalid_emails
        x-airbyte-name: invalid_emails
        fields:
          - name: created
            type: ["null", "integer"]
            description: Unix timestamp when the invalid email was recorded
          - name: email
            type: ["null", "string"]
            description: The invalid email address
          - name: reason
            type: ["null", "string"]
            description: The reason the email is invalid
      - entity: lists
        x-airbyte-name: lists
        suggested: true
        fields:
          - name: _metadata
            type: ["null", "object"]
            description: Metadata about the list resource
            properties:
              self:
                type: ["null", "string"]
          - name: contact_count
            type: ["null", "integer"]
            description: Number of contacts in the list
          - name: id
            type: ["null", "string"]
            description: Unique list identifier
          - name: name
            type: ["null", "string"]
            description: Name of the list
      - entity: segments
        x-airbyte-name: segments
        suggested: true
        fields:
          - name: contacts_count
            type: ["null", "integer"]
            description: Number of contacts in the segment
          - name: created_at
            type: ["null", "string"]
            description: When the segment was created
          - name: id
            type: ["null", "string"]
            description: Unique segment identifier
          - name: name
            type: ["null", "string"]
            description: Segment name
          - name: next_sample_update
            type: ["null", "string"]
            description: When the next sample update will occur
          - name: parent_list_ids
            type: ["null", "array"]
            description: IDs of parent lists
          - name: query_version
            type: ["null", "string"]
            description: Query version used
          - name: sample_updated_at
            type: ["null", "string"]
            description: When the sample was last updated
          - name: status
            type: ["null", "object"]
            description: Segment status details
            properties:
              query_validation:
                type: ["null", "string"]
          - name: updated_at
            type: ["null", "string"]
            description: When the segment was last updated
      - entity: singlesend_stats
        x-airbyte-name: singlesend_stats
        suggested: true
        fields:
          - name: ab_phase
            type: ["null", "string"]
            description: The A/B test phase
          - name: ab_variation
            type: ["null", "string"]
            description: The A/B test variation
          - name: aggregation
            type: ["null", "string"]
            description: The aggregation type
          - name: id
            type: ["null", "string"]
            description: The single send ID
          - name: stats
            type: ["null", "object"]
            description: Email statistics for the single send
            properties:
              bounce_drops:
                type: ["null", "integer"]
              bounces:
                type: ["null", "integer"]
              clicks:
                type: ["null", "integer"]
              delivered:
                type: ["null", "integer"]
              invalid_emails:
                type: ["null", "integer"]
              opens:
                type: ["null", "integer"]
              requests:
                type: ["null", "integer"]
              spam_report_drops:
                type: ["null", "integer"]
              spam_reports:
                type: ["null", "integer"]
              unique_clicks:
                type: ["null", "integer"]
              unique_opens:
                type: ["null", "integer"]
              unsubscribes:
                type: ["null", "integer"]
      - entity: singlesends
        x-airbyte-name: singlesends
        suggested: true
        fields:
          - name: categories
            type: ["null", "array"]
            description: Categories associated with this single send
          - name: created_at
            type: ["null", "string"]
            description: When the single send was created
          - name: id
            type: ["null", "string"]
            description: Unique single send identifier
          - name: is_abtest
            type: ["null", "boolean"]
            description: Whether this is an A/B test
          - name: name
            type: ["null", "string"]
            description: Single send name
          - name: send_at
            type: ["null", "string"]
            description: Scheduled send time
          - name: status
            type: ["null", "string"]
            description: "Current status: draft, scheduled, or triggered"
          - name: updated_at
            type: ["null", "string"]
            description: When the single send was last updated
      - entity: suppression_group_members
        x-airbyte-name: suppression_group_members
        fields:
          - name: created_at
            type: ["null", "integer"]
            description: Unix timestamp when the suppression was created
          - name: email
            type: ["null", "string"]
            description: The suppressed email address
          - name: group_id
            type: ["null", "integer"]
            description: ID of the suppression group
          - name: group_name
            type: ["null", "string"]
            description: Name of the suppression group
      - entity: suppression_groups
        x-airbyte-name: suppression_groups
        fields:
          - name: description
            type: ["null", "string"]
            description: Description of the suppression group
          - name: id
            type: ["null", "integer"]
            description: Unique suppression group identifier
          - name: is_default
            type: ["null", "boolean"]
            description: Whether this is the default suppression group
          - name: name
            type: ["null", "string"]
            description: Suppression group name
          - name: unsubscribes
            type: ["null", "integer"]
            description: Number of unsubscribes in this group
      - entity: templates
        x-airbyte-name: templates
        suggested: true
        fields:
          - name: generation
            type: ["null", "string"]
            description: Template generation (legacy or dynamic)
          - name: id
            type: ["null", "string"]
            description: Unique template identifier
          - name: name
            type: ["null", "string"]
            description: Template name
          - name: updated_at
            type: ["null", "string"]
            description: When the template was last updated
          - name: versions
            type: ["null", "array"]
            description: Template versions

servers:
  - url: https://api.sendgrid.com
    description: SendGrid API server

security:
  - bearerAuth: []

paths:
  # ── Contacts ──────────────────────────────────────────────────────────
  /v3/marketing/contacts:
    get:
      summary: List contacts
      description: Returns a sample of contacts. Use the export endpoint for full lists.
      operationId: listContacts
      x-airbyte-entity: contacts
      x-airbyte-action: list
      x-airbyte-record-extractor: $.result
      x-airbyte-meta-extractor:
        next: $._metadata.next
        contact_count: $.contact_count
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactsList"

  /v3/marketing/contacts/{id}:
    get:
      summary: Get a contact by ID
      description: Returns the full details and all fields for the specified contact.
      operationId: getContact
      x-airbyte-entity: contacts
      x-airbyte-action: get
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the contact
          schema:
            type: string
      responses:
        "200":
          description: Contact object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Contact not found

  # ── Lists ─────────────────────────────────────────────────────────────
  /v3/marketing/lists:
    get:
      summary: List all marketing lists
      description: Returns all marketing contact lists.
      operationId: listLists
      x-airbyte-entity: lists
      x-airbyte-action: list
      x-airbyte-record-extractor: $.result
      x-airbyte-meta-extractor:
        next: $._metadata.next
      parameters:
        - name: page_size
          in: query
          description: Maximum number of lists to return
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: List of marketing lists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListsList"

  /v3/marketing/lists/{id}:
    get:
      summary: Get a list by ID
      description: Returns a specific marketing list by ID.
      operationId: getList
      x-airbyte-entity: lists
      x-airbyte-action: get
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the list
          schema:
            type: string
      responses:
        "200":
          description: List object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List"
        "404":
          description: List not found

  # ── Segments ──────────────────────────────────────────────────────────
  /v3/marketing/segments/2.0:
    get:
      summary: List all segments
      description: Returns all segments (v2).
      operationId: listSegments
      x-airbyte-entity: segments
      x-airbyte-action: list
      x-airbyte-no-pagination: "The SendGrid /v3/marketing/segments/2.0 endpoint returns the full list of segments in a single response; the API does not expose pagination parameters."
      x-airbyte-record-extractor: $.results
      responses:
        "200":
          description: List of segments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentsList"

  /v3/marketing/segments/2.0/{segment_id}:
    get:
      summary: Get a segment by ID
      description: Returns a specific segment by ID.
      operationId: getSegment
      x-airbyte-entity: segments
      x-airbyte-action: get
      parameters:
        - name: segment_id
          in: path
          required: true
          description: The ID of the segment
          schema:
            type: string
      responses:
        "200":
          description: Segment object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
        "404":
          description: Segment not found

  # ── Campaigns ─────────────────────────────────────────────────────────
  /v3/marketing/campaigns:
    get:
      summary: List all campaigns
      description: Returns all marketing campaigns.
      operationId: listCampaigns
      x-airbyte-entity: campaigns
      x-airbyte-action: list
      x-airbyte-record-extractor: $.result
      x-airbyte-meta-extractor:
        next: $._metadata.next
      parameters:
        - name: page_size
          in: query
          description: Maximum number of campaigns to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignsList"

  # ── Single Sends ──────────────────────────────────────────────────────
  /v3/marketing/singlesends:
    get:
      summary: List all single sends
      description: Returns all single sends.
      operationId: listSingleSends
      x-airbyte-entity: singlesends
      x-airbyte-action: list
      x-airbyte-record-extractor: $.result
      x-airbyte-meta-extractor:
        next: $._metadata.next
      parameters:
        - name: page_size
          in: query
          description: Maximum number of single sends to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: List of single sends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleSendsList"

  /v3/marketing/singlesends/{id}:
    get:
      summary: Get a single send by ID
      description: Returns details about one single send.
      operationId: getSingleSend
      x-airbyte-entity: singlesends
      x-airbyte-action: get
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the single send
          schema:
            type: string
      responses:
        "200":
          description: Single send object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleSend"
        "404":
          description: Single send not found

  # ── Templates ─────────────────────────────────────────────────────────
  /v3/templates:
    get:
      summary: List all transactional templates
      description: Returns paged transactional templates (legacy and dynamic).
      operationId: listTemplates
      x-airbyte-entity: templates
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: $._metadata.next
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $.templates
      parameters:
        - name: generations
          in: query
          description: Template generations to return
          schema:
            type: string
            default: legacy,dynamic
        - name: page_size
          in: query
          description: Number of templates per page
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplatesList"

  /v3/templates/{template_id}:
    get:
      summary: Get a transactional template by ID
      description: Returns a single transactional template.
      operationId: getTemplate
      x-airbyte-entity: templates
      x-airbyte-action: get
      parameters:
        - name: template_id
          in: path
          required: true
          description: The ID of the template
          schema:
            type: string
      responses:
        "200":
          description: Template object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Template not found

  # ── Single Send Stats ───────────────────────────────────────────────
  /v3/marketing/stats/singlesends:
    get:
      summary: List all single send stats
      description: Returns stats for all single sends.
      operationId: listSingleSendStats
      x-airbyte-entity: singlesend_stats
      x-airbyte-action: list
      x-airbyte-record-extractor: $.results
      x-airbyte-meta-extractor:
        next: $._metadata.next
      parameters:
        - name: page_size
          in: query
          description: Maximum number of stats to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 50
      responses:
        "200":
          description: List of single send stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleSendStatsList"

  # ── Bounces ───────────────────────────────────────────────────────────
  /v3/suppression/bounces:
    get:
      summary: List all bounces
      description: Returns all bounced email records.
      operationId: listBounces
      x-airbyte-entity: bounces
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: "@link.next"
      parameters:
        - name: limit
          in: query
          description: Number of records to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 500
        - name: offset
          in: query
          description: Number of records to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of bounced emails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bounce"

  # ── Blocks ────────────────────────────────────────────────────────────
  /v3/suppression/blocks:
    get:
      summary: List all blocks
      description: Returns all blocked email records.
      operationId: listBlocks
      x-airbyte-entity: blocks
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: "@link.next"
      parameters:
        - name: limit
          in: query
          description: Number of records to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 500
        - name: offset
          in: query
          description: Number of records to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of blocked emails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Block"

  # ── Spam Reports ──────────────────────────────────────────────────────
  /v3/suppression/spam_reports:
    get:
      summary: List all spam reports
      description: Returns all spam report records.
      operationId: listSpamReports
      x-airbyte-entity: spam_reports
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: "@link.next"
      parameters:
        - name: limit
          in: query
          description: Number of records to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 500
        - name: offset
          in: query
          description: Number of records to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of spam reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpamReport"

  # ── Invalid Emails ────────────────────────────────────────────────────
  /v3/suppression/invalid_emails:
    get:
      summary: List all invalid emails
      description: Returns all invalid email records.
      operationId: listInvalidEmails
      x-airbyte-entity: invalid_emails
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: "@link.next"
      parameters:
        - name: limit
          in: query
          description: Number of records to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 500
        - name: offset
          in: query
          description: Number of records to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of invalid emails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvalidEmail"

  # ── Global Suppressions ───────────────────────────────────────────────
  /v3/suppression/unsubscribes:
    get:
      summary: List all global suppressions
      description: Returns all globally unsubscribed email addresses.
      operationId: listGlobalSuppressions
      x-airbyte-entity: global_suppressions
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: "@link.next"
      parameters:
        - name: limit
          in: query
          description: Number of records to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 500
        - name: offset
          in: query
          description: Number of records to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of global suppressions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GlobalSuppression"

  # ── Suppression Groups ────────────────────────────────────────────────
  /v3/asm/groups:
    get:
      summary: List all suppression groups
      description: Returns all suppression (unsubscribe) groups.
      operationId: listSuppressionGroups
      x-airbyte-entity: suppression_groups
      x-airbyte-action: list
      x-airbyte-no-pagination: "The SendGrid /v3/asm/groups endpoint returns the full list of suppression groups in a single response; the API does not expose pagination parameters."
      responses:
        "200":
          description: List of suppression groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SuppressionGroup"

  /v3/asm/groups/{group_id}:
    get:
      summary: Get a suppression group by ID
      description: Returns information about a single suppression group.
      operationId: getSuppressionGroup
      x-airbyte-entity: suppression_groups
      x-airbyte-action: get
      parameters:
        - name: group_id
          in: path
          required: true
          description: The ID of the suppression group
          schema:
            type: integer
      responses:
        "200":
          description: Suppression group object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuppressionGroup"
        "404":
          description: Suppression group not found

  # ── Suppression Group Members ─────────────────────────────────────────
  /v3/asm/suppressions:
    get:
      summary: List all suppression group members
      description: Returns all suppressions across all groups.
      operationId: listSuppressionGroupMembers
      x-airbyte-entity: suppression_group_members
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: "@link.next"
      parameters:
        - name: limit
          in: query
          description: Number of records to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 500
        - name: offset
          in: query
          description: Number of records to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of suppression group members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SuppressionGroupMember"

