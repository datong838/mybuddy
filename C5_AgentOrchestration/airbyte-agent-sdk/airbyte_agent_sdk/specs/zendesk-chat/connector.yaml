            type: integer
            description: Trigger ID
          - name: name
            type:
              - "null"
              - string
            description: Trigger name
          - name: enabled
            type:
              - "null"
              - boolean
            description: Whether trigger is enabled

servers:
  - url: https://{subdomain}.zendesk.com/api/v2/chat
    description: Zendesk Chat API Server
    variables:
      subdomain:
        default: your-subdomain
        description: Your Zendesk subdomain (the part before .zendesk.com in your Zendesk URL)
    x-airbyte-replication-environment-mapping:
      subdomain: subdomain

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Zendesk Chat OAuth 2.0 Bearer Token authentication.

        To obtain an access token:
        1. Go to Zendesk Admin Center
        2. Navigate to Apps and integrations > APIs > Zendesk API
        3. Create an OAuth client or use an existing one
        4. Generate an access token with chat:read scope

      x-airbyte-auth-config:
        type: object
        title: OAuth 2.0 Access Token
        description: Authenticate using an OAuth 2.0 access token from Zendesk
        required:
          - access_token
        properties:
          access_token:
            type: string
            title: Access Token
            description: Your Zendesk Chat OAuth 2.0 access token
        auth_mapping:
          token: "${access_token}"
        replication_auth_key_mapping:
          credentials.access_token: "access_token"
        replication_auth_key_constants:
          credentials.credentials: "access_token"

