        suggested: true
        fields:
          - name: id
            type: integer
            description: Unique agent identifier
          - name: email
            type:
              - "null"
              - string
            description: Agent email address
          - name: display_name
            type:
              - "null"
              - string
            description: Agent display name
          - name: first_name
            type:
              - "null"
              - string
            description: Agent first name
          - name: last_name
            type:
              - "null"
              - string
            description: Agent last name
          - name: enabled
            type:
              - "null"
              - boolean
            description: Whether agent is enabled
          - name: role_id
            type:
              - "null"
              - integer
            description: Agent role ID
          - name: departments
            type:
              - "null"
              - array
            description: Department IDs agent belongs to
          - name: create_date
            type:
              - "null"
              - string
            description: When agent was created

      - entity: chats
        x-airbyte-name: chats
        suggested: true
        fields:
          - name: id
            type: string
            description: Unique chat identifier
          - name: timestamp
            type:
              - "null"
              - string
            description: Chat start timestamp
          - name: update_timestamp
            type:
              - "null"
              - string
            description: Last update timestamp
          - name: department_id
            type:
              - "null"
              - integer
            description: Department ID
          - name: department_name
            type:
              - "null"
              - string
            description: Department name
          - name: duration
            type:
              - "null"
              - integer
            description: Chat duration in seconds
          - name: rating
            type:
              - "null"
              - string
            description: Satisfaction rating
          - name: missed
            type:
              - "null"
              - boolean
            description: Whether chat was missed
          - name: agent_ids
            type:
              - "null"
              - array
            description: IDs of agents in chat

      - entity: departments
        x-airbyte-name: departments
        suggested: true
        fields:
          - name: id
            type: integer
            description: Department ID
          - name: name
            type:
              - "null"
              - string
            description: Department name
          - name: enabled
            type:
              - "null"
              - boolean
            description: Whether department is enabled
          - name: members
            type:
