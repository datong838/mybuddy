        actions:
          type:
            - array
            - "null"
          items:
            type: object
        departments:
          type:
            - array
            - "null"
          items:
            type: integer
        definition:
          type:
            - object
            - "null"
          description: Trigger definition with conditions, events, and actions
      required:
        - id

paths:
  # ==================== ACCOUNTS ====================
  /account:
    get:
      summary: Get account information
      description: Returns the account information for the authenticated user
      operationId: GetAccount
      x-airbyte-entity: accounts
      x-airbyte-action: get
      x-airbyte-record-extractor: $
      tags:
        - Accounts
      responses:
        "200":
          description: Account information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  # ==================== AGENTS ====================
  /agents:
    get:
      summary: List all agents
      operationId: ListAgents
      x-airbyte-entity: agents
      x-airbyte-action: list
      x-airbyte-no-pagination: "The Zendesk Chat /agents endpoint returns the full set of configured agents in a single response; the API does not expose pagination parameters for this resource."
      x-airbyte-preferred-for-check: true
      x-airbyte-record-extractor: $
      tags:
        - Agents
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 100
        - name: since_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  /agents/{agent_id}:
    get:
      summary: Get an agent
      operationId: GetAgent
      x-airbyte-entity: agents
      x-airbyte-action: get
      x-airbyte-record-extractor: $
      tags:
        - Agents
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  # ==================== AGENT TIMELINE ====================
  /incremental/agent_timeline:
    get:
      summary: List agent timeline (incremental export)
      operationId: ListAgentTimeline
      x-airbyte-entity: agent_timeline
      x-airbyte-action: list
      x-airbyte-record-extractor: $.agent_timeline
      x-airbyte-meta-extractor:
        next_page: $.next_page
        count: $.count
      tags:
        - Agent Timeline
      parameters:
        - name: start_time
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 1000
            maximum: 1000
        - name: fields
          in: query
          schema:
            type: string
            default: "agent_timeline(*)"
      responses:
        "200":
          description: List of agent timeline entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_timeline:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentTimeline"
                  next_page:
                    type:
                      - string
                      - "null"
                  count:
                    type: integer
                  end_time:
                    type:
                      - integer
                      - "null"

  # ==================== BANS ====================
  /bans:
    get:
      summary: List all bans
      operationId: ListBans
      x-airbyte-entity: bans
      x-airbyte-action: list
      x-airbyte-no-pagination: "The Zendesk Chat /bans endpoint returns the full set of visitor/IP bans in a single response; the API does not expose pagination parameters for this resource."
      x-airbyte-record-extractor: $[*][*]
      tags:
        - Bans
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 100
        - name: since_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of bans (grouped by type)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ip_address:
                    type: array
                    items:
                      $ref: "#/components/schemas/Ban"
                  visitor:
                    type: array
                    items:
                      $ref: "#/components/schemas/Ban"

  /bans/{ban_id}:
    get:
      summary: Get a ban
      operationId: GetBan
      x-airbyte-entity: bans
      x-airbyte-action: get
      x-airbyte-record-extractor: $
      tags:
        - Bans
      parameters:
        - name: ban_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ban details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ban"

  # ==================== CHATS ====================
  /incremental/chats:
    get:
      summary: List chats (incremental export)
      operationId: ListChats
      x-airbyte-entity: chats
      x-airbyte-action: list
      x-airbyte-record-extractor: $.chats
      x-airbyte-meta-extractor:
        next_page: $.next_page
        count: $.count
      tags:
        - Chats
      parameters:
        - name: start_time
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 1000
            maximum: 1000
        - name: fields
          in: query
          schema:
            type: string
            default: "chats(*)"
      responses:
        "200":
          description: List of chats
          content:
            application/json:
              schema:
                type: object
                properties:
                  chats:
                    type: array
                    items:
                      $ref: "#/components/schemas/Chat"
                  next_page:
                    type:
                      - string
                      - "null"
                  count:
                    type: integer
                  end_id:
                    type:
                      - string
                      - "null"
                  end_time:
                    type:
                      - integer
                      - "null"

  /chats/{chat_id}:
    get:
