      - entity: shortcuts
        x-airbyte-name: shortcuts
        fields:
          - name: id
            type: integer
            description: Shortcut ID
          - name: name
            type:
              - "null"
              - string
            description: Shortcut name/trigger
          - name: message
            type:
              - "null"
