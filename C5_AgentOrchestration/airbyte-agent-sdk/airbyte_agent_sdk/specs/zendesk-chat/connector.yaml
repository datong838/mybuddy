openapi: 3.1.0
info:
  title: Zendesk Chat API Connector
  version: 0.1.10
  description: |
    Zendesk Chat enables real-time customer support through live chat. This connector
    provides access to chat transcripts, agents, departments, shortcuts, triggers,
    and other chat configuration data for analytics and support insights.

    ## Supported Entities
    - **accounts**: Account information and billing details
    - **agents**: Chat agents with roles and department assignments
    - **agent_timeline**: Agent activity timeline (incremental export)
    - **bans**: Banned visitors (IP and visitor-based)
    - **chats**: Chat transcripts with full conversation history (incremental export)
    - **departments**: Chat departments for routing
    - **goals**: Conversion goals for tracking
    - **roles**: Agent role definitions
    - **routing_settings**: Account-level routing configuration
    - **shortcuts**: Canned responses for agents
    - **skills**: Agent skills for skill-based routing
    - **triggers**: Automated chat triggers

    ## Rate Limits
    Zendesk Chat API uses the `Retry-After` header for rate limit backoff.
    The connector handles this automatically.

  x-airbyte-connector-name: zendesk-chat
  x-airbyte-connector-definition-id: 40d24d0f-b8f9-4fe0-9e6c-b06c0f3f45e4
  x-airbyte-replication-version: "1.3.15"
  x-airbyte-replication-compatibility: ">=1.3.15, <2.0.0"

  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: Zendesk Chat API Documentation
      url: https://developer.zendesk.com/api-reference/live-chat/chat-api/introduction/
    - type: authentication_guide
      title: Zendesk Chat Authentication
      url: https://developer.zendesk.com/api-reference/live-chat/chat-api/oauth/
    - type: api_reference
      title: Agents API Reference
      url: https://developer.zendesk.com/rest_api/docs/chat/agents
    - type: api_reference
      title: Chats Incremental Export API
      url: https://developer.zendesk.com/api-reference/live-chat/chat-api/incremental_export/

  x-airbyte-example-questions:
    direct:
      - "List all banned visitors"
      - "List all departments with their settings"
    search:
      - "Show me all chats from last week"
      - "List all agents in the support department"
      - "What are the most used chat shortcuts?"
      - "Show chat volume by department"
      - "What triggers are currently active?"
      - "Show agent activity timeline for today"
    unsupported:
      - "Start a new chat session"
      - "Send a message to a visitor"
      - "Create a new agent"
      - "Update department settings"
      - "Delete a shortcut"

  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Zendesk Chat.
    properties:
      start_date:
        type: string
        title: Start Date
        description: The date from which to start replicating data, in the format YYYY-MM-DDT00:00:00Z.
        format: date-time
    required:
      - start_date
    replication_config_key_mapping:
      start_date: start_date
    replication_config_constants:
      start_date: "{{ day_delta(-180, '%Y-%m-%dT%H:%M:%SZ') }}"

