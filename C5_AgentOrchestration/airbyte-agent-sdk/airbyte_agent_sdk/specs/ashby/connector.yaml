components:
  securitySchemes:
    ashbyBasicAuth:
      type: http
      scheme: basic
      description: HTTP Basic authentication using API key
      x-airbyte-auth-config:
        title: API Key Authentication
        type: object
        required:
        - api_key
        properties:
          api_key:
            type: string
            title: API Key
            description: Your Ashby API key
        auth_mapping:
          username: ${api_key}
          password: ''
        replication_auth_key_mapping:
          api_key: api_key
  schemas:
    Candidate:
      type: object
      x-airbyte-entity-name: candidates
      x-airbyte-stream-name: candidates
      x-airbyte-ai-hints:
        summary: "Job candidates in the Ashby ATS with application history"
        when_to_use: "Looking up candidate information or hiring pipeline status"
        trigger_phrases: ["ashby candidate", "applicant", "hiring candidate", "who applied"]
        freshness: live
        search_strategy: "Search by name or email"
        example_questions:
          - "Find candidate details in Ashby"
          - "List recent candidates"
      description: Candidate object
      required:
      - id
      properties:
        id:
          type: string
          description: Unique candidate identifier
        createdAt:
          type:
          - string
          - 'null'
          description: Creation timestamp
        updatedAt:
          type:
          - string
          - 'null'
          description: Last update timestamp
        name:
          type:
          - string
          - 'null'
          description: Full name of the candidate
        emailAddresses:
          type:
          - array
          - 'null'
          description: List of email addresses
          items:
            type: object
            properties:
              value:
                type:
                - string
                - 'null'
              type:
                type:
                - string
                - 'null'
              isPrimary:
                type:
                - boolean
                - 'null'
        phoneNumbers:
          type:
          - array
          - 'null'
          description: List of phone numbers
          items:
            type: object
            properties:
              value:
                type:
                - string
                - 'null'
              type:
                type:
                - string
                - 'null'
              isPrimary:
                type:
                - boolean
                - 'null'
        socialLinks:
          type:
          - array
          - 'null'
          description: Social media links
          items:
            type: object
            properties:
              type:
                type:
                - string
                - 'null'
              url:
                type:
                - string
                - 'null'
        tags:
          type:
          - array
          - 'null'
          description: Tags associated with the candidate
          items:
            type: object
            properties:
              id:
                type:
                - string
                - 'null'
              title:
                type:
                - string
                - 'null'
              isArchived:
                type:
