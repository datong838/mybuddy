openapi: 3.1.0
info:
  title: Ashby API Connector
  version: 0.1.4
  description: |
    Ashby is a modern applicant tracking system (ATS) and recruiting platform that helps companies manage their hiring process. This connector provides access to candidates, applications, jobs, departments, locations, users, job postings, sources, archive reasons, candidate tags, custom fields, and feedback form definitions for talent acquisition analytics and hiring insights.
  x-airbyte-connector-name: ashby
  x-airbyte-connector-definition-id: 4e8c9fa0-3634-499b-b948-11581b5c3efa
  x-airbyte-platform-availability:
    state: experimental
    reason: Requires additional QA testing
  x-airbyte-replication-version: "0.3.7"
  x-airbyte-replication-compatibility: ">=0.3.7, <1.0.0"
  x-airbyte-external-documentation-urls:
  - type: api_reference
    title: Ashby API Reference documentation
    url: https://developers.ashbyhq.com/reference
  x-airbyte-skip-suggested-streams:
    - interview_schedules
  x-airbyte-example-questions:
    direct:
    - List all open jobs
    - Show me all candidates
    - List recent applications
    - List all departments
    - Show me all job postings
    - List all users in the organization
    search:
    - Show me candidates who applied last month
    - What are the top sources for job applications?
    - Compare the number of applications across different departments
    - Find candidates with multiple applications
    - Summarize the candidate pipeline for our latest job posting
    - Find the most active departments in recruiting this month
    unsupported:
    - Create a new job posting
    - Schedule an interview for a candidate
    - Update a candidates application status
    - Delete a candidate profile
    - Send an offer letter to a candidate
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from Ashby.
    properties:
      start_date:
        type: string
        title: Start Date
        description: The date from which to start replicating data, in the format YYYY-MM-DDT00:00:00Z.
        format: date-time
    required:
      - start_date
    replication_config_key_mapping:
      start_date: start_date
    replication_config_constants:
      start_date: "{{ day_delta(-180, '%Y-%m-%dT%H:%M:%SZ') }}"
  x-airbyte-context-store:
    disable_compaction: false
    entities:
      - entity: applications
        suggested: true
        x-airbyte-name: applications
        fields:
          - name: id
            type:
              - "null"
              - "string"
            description: "Unique identifier for the application"
          - name: status
            type:
              - "null"
              - "string"
            description: "Current application status (e.g. active, archived, hired)"
          - name: archiveReason
            type:
              - "null"
              - "string"
            description: "Reason the application was archived, if applicable"
          - name: createdAt
            type:
              - "null"
              - "string"
            description: "Timestamp when the application was created, in ISO 8601 format"
          - name: updatedAt
            type:
              - "null"
              - "string"
            description: "Timestamp when the application was last updated, in ISO 8601 format"
      - entity: candidates
        suggested: true
        x-airbyte-name: candidates
        fields:
          - name: id
            type:
              - "null"
              - "string"
            description: "Unique identifier for the candidate"
          - name: name
            type:
              - "null"
              - "string"
            description: "Full name of the candidate"
          - name: company
            type:
              - "null"
              - "string"
            description: "Candidate's current company"
          - name: position
            type:
              - "null"
              - "string"
            description: "Candidate's current position or title"
          - name: school
            type:
              - "null"
              - "string"
            description: "School associated with the candidate's education"
      - entity: job_postings
        suggested: true
        x-airbyte-name: job_postings
        fields:
          - name: id
            type:
              - "null"
              - "string"
            description: "Unique identifier for the job posting"
          - name: title
            type:
              - "null"
              - "string"
            description: "Title of the job posting"
          - name: isListed
            type:
              - "null"
              - "boolean"
            description: "Whether the job posting is currently published/listed"
          - name: jobId
            type:
              - "null"
              - "string"
            description: "Identifier of the job this posting belongs to"
          - name: locationName
            type:
              - "null"
              - "string"
            description: "Name of the location associated with the posting"
      - entity: jobs
        suggested: true
        x-airbyte-name: jobs
        fields:
          - name: id
            type:
              - "null"
              - "string"
            description: "Unique identifier for the job"
          - name: title
            type:
              - "null"
              - "string"
            description: "Title of the job"
          - name: status
            type:
              - "null"
              - "string"
            description: "Current status of the job (e.g. open, closed, draft)"
          - name: departmentId
            type:
              - "null"
              - "string"
            description: "Identifier of the department the job belongs to"
          - name: locationId
            type:
              - "null"
              - "string"
            description: "Identifier of the primary location of the job"
      - entity: users
        suggested: true
        x-airbyte-name: users
        fields:
          - name: id
            type:
              - "null"
              - "string"
            description: "Unique identifier for the user"
          - name: firstName
            type:
              - "null"
              - "string"
            description: "First name of the user"
          - name: lastName
            type:
              - "null"
              - "string"
            description: "Last name of the user"
          - name: email
            type:
              - "null"
              - "string"
            description: "Primary email address of the user"
