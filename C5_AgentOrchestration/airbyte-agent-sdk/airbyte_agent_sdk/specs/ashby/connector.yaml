      x-airbyte-record-extractor: $.results
      x-airbyte-meta-extractor:
        cursor: $.nextCursor
        has_more: $.moreDataAvailable
      responses:
        '200':
          description: List of candidates
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Candidate'
                  moreDataAvailable:
                    type: boolean
                  nextCursor:
                    type:
                    - string
                    - 'null'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cursor:
                  type: string
                  description: Pagination cursor for next page
                limit:
                  type: integer
                  description: Maximum number of records to return per page
