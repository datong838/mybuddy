        createdTime:
          type: [string, "null"]
          format: date-time
          description: The time at which the comment was created
        modifiedTime:
          type: [string, "null"]
          format: date-time
          description: The last time the comment or any of its replies was modified
        author:
          oneOf:
            - $ref: "#/components/schemas/User"
            - type: "null"
