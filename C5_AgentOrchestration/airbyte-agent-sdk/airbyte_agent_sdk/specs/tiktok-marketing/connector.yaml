servers:
  - url: https://business-api.tiktok.com/open_api/v1.3
    description: TikTok Marketing Business API v1.3

components:
  securitySchemes:
    # TikTok Business API uses OAuth 2.0 for the authorization flow, but the
    # resulting access token is long-lived and does not use refresh tokens or
    # the standard Authorization: Bearer header. The token is injected via the
    # Access-Token header, so it effectively behaves like an API key.
    oauth:
      type: apiKey
      in: header
      name: Access-Token
      description: >-
        TikTok Business API OAuth access token. Obtained via OAuth 2.0
        authorization flow but used as a long-lived API key in the
        Access-Token header.
      x-airbyte-auth-config:
        title: OAuth Access Token
        type: object
        required:
          - access_token
        properties:
          access_token:
            type: string
            title: Access Token
            description: Your TikTok Marketing API access token
        auth_mapping:
          api_key: "${access_token}"
        replication_auth_key_mapping:
          credentials.access_token: access_token
        replication_auth_key_constants:
          credentials.auth_type: oauth2.0
          credentials.app_id: "**"
          credentials.secret: "**"

  schemas:
    Advertiser:
      type: object
      x-airbyte-entity-name: advertisers
      x-airbyte-stream-name: advertisers
      x-airbyte-ai-hints:
        summary: "TikTok advertiser accounts with status and settings"
        when_to_use: "Questions about TikTok ad account details"
        trigger_phrases: ["tiktok advertiser", "tiktok ad account"]
        freshness: live
        search_strategy: "List accessible accounts"
        example_questions:
          - "What TikTok ad accounts do I have?"
      description: TikTok advertiser account
      properties:
        advertiser_id:
          type: string
          description: Unique identifier for the advertiser
        name:
          type: string
          description: The name of the advertiser or company
        address:
          type: ["null", "string"]
          description: The physical address of the advertiser
        company:
          type: ["null", "string"]
          description: The name of the company associated with the advertiser
        contacter:
          type: ["null", "string"]
          description: The contact person for the advertiser
        country:
          type: ["null", "string"]
          description: The country where the advertiser is located
        currency:
          type: ["null", "string"]
          description: The currency used for transactions in the account
        description:
          type: ["null", "string"]
          description: A brief description of the advertiser or company
        email:
          type: ["null", "string"]
          description: The email address associated with the advertiser
        industry:
          type: ["null", "string"]
          description: The industry or sector the advertiser operates in
        language:
          type: ["null", "string"]
          description: The preferred language of communication for the advertiser
        license_no:
