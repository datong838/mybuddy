openapi: 3.1.0

info:
  title: TikTok Marketing API Connector
  version: 1.1.6
  description: >-
    Connector for the TikTok Marketing API (Business API v1.3). Provides access to
    advertiser accounts, campaigns, ad groups, ads, audiences, creative assets
    (images and videos), Spark Ads, product catalogs, and daily performance reports
    at the advertiser, campaign, ad group, and ad levels. Requires an Access Token
    from the TikTok for Business platform. All list operations require an
    advertiser_id parameter to scope results to a specific advertiser account.
  x-airbyte-connector-name: tiktok-marketing
  x-airbyte-connector-definition-id: 4bfac00d-ce15-44ff-95b9-9e3c3e8fbd35
  x-airbyte-replication-version: "5.1.1"
  x-airbyte-replication-compatibility: ">=5.1.1, <6.0.0"
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: TikTok Business API Documentation
      url: https://business-api.tiktok.com/portal/docs?id=1740302848670722
  x-airbyte-skip-suggested-streams: []
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from TikTok Marketing.
    properties:
      start_date:
        type: string
        title: Replication Start Date
        description: >-
          The start date in YYYY-MM-DD format. Any data before this date will not
          be replicated. If not set, defaults to 2016-09-01.
        format: date
    required:
      - start_date
    replication_config_key_mapping:
      start_date: start_date
  x-airbyte-scoping:
    - param: advertiser_id
      config_key: advertiser_id
    - param: advertiser_ids
      config_key: advertiser_id
