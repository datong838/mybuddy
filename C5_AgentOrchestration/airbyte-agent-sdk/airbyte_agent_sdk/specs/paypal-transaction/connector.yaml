openapi: 3.1.0

info:
  title: PayPal Transaction API Connector
  version: 1.0.3
  description: >
    Connector for the PayPal Transaction Search API. Provides access to
    transaction history, account balances, payments, disputes, catalog
    products, and invoices for a PayPal account. Uses OAuth2 client
    credentials for authentication.
  x-airbyte-connector-name: paypal-transaction
  x-airbyte-connector-definition-id: d913b0f2-cc51-4e55-a44c-8ba1697b9239
  x-airbyte-replication-version: "2.6.37"
  x-airbyte-replication-compatibility: ">=2.6.37, <3.0.0"
  x-airbyte-platform-availability:
    state: experimental
    reason: Requires additional QA testing
  x-airbyte-external-documentation-urls:
    - type: api_reference
      title: PayPal Transaction Search API Documentation
      url: https://developer.paypal.com/docs/api/transaction-search/v1/
  x-airbyte-context-store:
    disable_compaction: true
    entities:
      - entity: transactions
        x-airbyte-name: transactions
        suggested: true
        fields:
          - name: auction_info
            type: ["null", "object"]
            description: Information related to an auction
            properties:
              auction_buyer_id:
                type: ["null", "string"]
              auction_closing_date:
                type: ["null", "string"]
              auction_item_site:
                type: ["null", "string"]
              auction_site:
                type: ["null", "string"]
          - name: cart_info
            type: ["null", "object"]
            description: Details of items in the cart
            properties:
              item_details:
                type: ["null", "array"]
          - name: incentive_info
            type: ["null", "object"]
            description: Details of any incentives applied
            properties:
              incentive_details:
                type: ["null", "array"]
          - name: payer_info
            type: ["null", "object"]
            description: Information about the payer
            properties:
              account_id:
                type: ["null", "string"]
              address_status:
                type: ["null", "string"]
              country_code:
                type: ["null", "string"]
              email_address:
                type: ["null", "string"]
              payer_name:
                type: ["null", "object"]
                properties:
                  alternate_full_name:
                    type: ["null", "string"]
                  given_name:
                    type: ["null", "string"]
                  surname:
                    type: ["null", "string"]
              payer_status:
                type: ["null", "string"]
          - name: shipping_info
            type: ["null", "object"]
            description: Shipping information
            properties:
              address:
                type: ["null", "object"]
                properties:
                  city:
                    type: ["null", "string"]
                  country_code:
                    type: ["null", "string"]
                  line1:
                    type: ["null", "string"]
                  line2:
                    type: ["null", "string"]
                  postal_code:
                    type: ["null", "string"]
              name:
                type: ["null", "string"]
          - name: store_info
            type: ["null", "object"]
            description: Information about the store
            properties:
              store_id:
                type: ["null", "string"]
              terminal_id:
                type: ["null", "string"]
          - name: transaction_id
            type: ["null", "string"]
            description: Unique ID of the transaction
          - name: transaction_info
            type: ["null", "object"]
            description: Detailed information about the transaction
            properties:
              custom_field:
                type: ["null", "string"]
              fee_amount:
                type: ["null", "object"]
                properties:
                  currency_code:
                    type: ["null", "string"]
                  value:
                    type: ["null", "string"]
              insurance_amount:
                type: ["null", "object"]
                properties:
                  currency_code:
                    type: ["null", "string"]
                  value:
                    type: ["null", "string"]
              invoice_id:
                type: ["null", "string"]
              paypal_account_id:
                type: ["null", "string"]
              paypal_reference_id:
                type: ["null", "string"]
              paypal_reference_id_type:
                type: ["null", "string"]
              protection_eligibility:
                type: ["null", "string"]
              shipping_amount:
                type: ["null", "object"]
                properties:
                  currency_code:
                    type: ["null", "string"]
                  value:
                    type: ["null", "string"]
              shipping_discount_amount:
                type: ["null", "object"]
                properties:
                  currency_code:
                    type: ["null", "string"]
                  value:
                    type: ["null", "string"]
              transaction_amount:
                type: ["null", "object"]
                properties:
                  currency_code:
                    type: ["null", "string"]
                  value:
                    type: ["null", "string"]
              transaction_event_code:
                type: ["null", "string"]
              transaction_id:
                type: ["null", "string"]
              transaction_initiation_date:
                type: ["null", "string"]
              transaction_note:
                type: ["null", "string"]
              transaction_status:
                type: ["null", "string"]
              transaction_subject:
                type: ["null", "string"]
              transaction_updated_date:
                type: ["null", "string"]
          - name: transaction_initiation_date
            type: ["null", "string"]
            description: Date and time when the transaction was initiated
          - name: transaction_updated_date
            type: ["null", "string"]
            description: Date and time when the transaction was last updated
      - entity: balances
        x-airbyte-name: balances
        suggested: true
        fields:
          - name: account_id
            type: ["null", "string"]
            description: The unique identifier of the account.
          - name: as_of_time
            type: ["null", "string"]
            description: The timestamp when the balances data was reported.
          - name: balances
            type: ["null", "array"]
            description: Object containing information about the account balances.
          - name: last_refresh_time
            type: ["null", "string"]
            description: The timestamp when the balances data was last refreshed.
      - entity: list_products
        x-airbyte-name: list_products
        suggested: true
        fields:
          - name: create_time
            type: ["null", "string"]
            description: The time when the product was created
          - name: description
            type: ["null", "string"]
            description: Detailed information or features of the product
          - name: id
            type: ["null", "string"]
            description: Unique identifier for the product
          - name: links
            type: ["null", "array"]
            description: List of links related to the fetched products.
          - name: name
            type: ["null", "string"]
            description: The name or title of the product
      - entity: show_product_details
        x-airbyte-name: show_product_details
        fields:
          - name: category
            type: ["null", "string"]
            description: The category to which the product belongs
          - name: create_time
            type: ["null", "string"]
            description: The date and time when the product was created
          - name: description
            type: ["null", "string"]
            description: The detailed description of the product
          - name: home_url
            type: ["null", "string"]
            description: The URL for the home page of the product
          - name: id
            type: ["null", "string"]
            description: The unique identifier for the product
          - name: image_url
            type: ["null", "string"]
            description: The URL to the image representing the product
          - name: links
            type: ["null", "array"]
            description: Contains links related to the product details.
          - name: name
            type: ["null", "string"]
            description: The name of the product
          - name: type
            type: ["null", "string"]
            description: The type or category of the product
          - name: update_time
            type: ["null", "string"]
            description: The date and time when the product was last updated
      - entity: list_disputes
        x-airbyte-name: list_disputes
        suggested: true
        fields:
          - name: create_time
            type: ["null", "string"]
            description: The timestamp when the dispute was created.
          - name: dispute_amount
            type: ["null", "object"]
            description: Details about the disputed amount.
            properties:
              currency_code:
                type: ["null", "string"]
              value:
                type: ["null", "string"]
          - name: dispute_channel
            type: ["null", "string"]
            description: The channel through which the dispute was initiated.
          - name: dispute_id
            type: ["null", "string"]
            description: The unique identifier for the dispute.
          - name: dispute_life_cycle_stage
            type: ["null", "string"]
            description: The stage in the life cycle of the dispute.
          - name: dispute_state
            type: ["null", "string"]
            description: The current state of the dispute.
          - name: disputed_transactions
            type: ["null", "array"]
            description: Details of transactions involved in the dispute.
          - name: links
            type: ["null", "array"]
            description: Links related to the dispute.
          - name: outcome
            type: ["null", "string"]
            description: The outcome of the dispute resolution.
          - name: reason
            type: ["null", "string"]
            description: The reason for the dispute.
          - name: status
            type: ["null", "string"]
            description: The current status of the dispute.
          - name: update_time
            type: ["null", "string"]
            description: The timestamp when the dispute was last updated.
          - name: updated_time_cut
            type: ["null", "string"]
            description: The cut-off timestamp for the last update.
      - entity: search_invoices
        x-airbyte-name: search_invoices
        suggested: true
        fields:
          - name: additional_recipients
            type: ["null", "array"]
            description: List of additional recipients associated with the invoice
          - name: amount
            type: ["null", "object"]
            description: Detailed breakdown of the invoice amount
            properties:
              breakdown:
                type: ["null", "object"]
              currency_code:
                type: ["null", "string"]
              value:
                type: ["null", "string"]
          - name: configuration
            type: ["null", "object"]
            description: Configuration settings related to the invoice
          - name: detail
            type: ["null", "object"]
            description: Detailed information about the invoice
          - name: due_amount
            type: ["null", "object"]
            description: Due amount remaining to be paid for the invoice
            properties:
              currency_code:
                type: ["null", "string"]
              value:
                type: ["null", "string"]
          - name: gratuity
            type: ["null", "object"]
            description: Gratuity amount included in the invoice
            properties:
              currency_code:
                type: ["null", "string"]
              value:
                type: ["null", "string"]
          - name: id
            type: ["null", "string"]
            description: Unique identifier of the invoice
          - name: invoicer
            type: ["null", "object"]
            description: Information about the invoicer associated with the invoice
          - name: last_update_time
            type: ["null", "string"]
            description: Date and time of the last update made to the invoice
          - name: links
            type: ["null", "array"]
            description: Links associated with the invoice
          - name: payments
            type: ["null", "object"]
            description: Payment transactions associated with the invoice
          - name: primary_recipients
            type: ["null", "array"]
            description: Primary recipients associated with the invoice
          - name: refunds
            type: ["null", "object"]
            description: Refund transactions associated with the invoice
          - name: status
            type: ["null", "string"]
            description: Current status of the invoice
      - entity: list_payments
        x-airbyte-name: list_payments
        suggested: true
        fields:
          - name: cart
            type: ["null", "string"]
            description: Details of the cart associated with the payment.
          - name: create_time
            type: ["null", "string"]
            description: The date and time when the payment was created.
          - name: id
            type: ["null", "string"]
            description: Unique identifier for the payment.
          - name: intent
            type: ["null", "string"]
            description: The intention or purpose behind the payment.
          - name: links
            type: ["null", "array"]
            description: Collection of links related to the payment
          - name: payer
            type: ["null", "object"]
            description: Details of the payer who made the payment
            properties:
              payer_info:
                type: ["null", "object"]
                properties:
                  country_code:
                    type: ["null", "string"]
                  email:
                    type: ["null", "string"]
                  first_name:
                    type: ["null", "string"]
                  last_name:
                    type: ["null", "string"]
                  payer_id:
                    type: ["null", "string"]
              payment_method:
                type: ["null", "string"]
              status:
                type: ["null", "string"]
          - name: state
            type: ["null", "string"]
            description: The state of the payment.
          - name: transactions
            type: ["null", "array"]
            description: List of transactions associated with the payment
          - name: update_time
            type: ["null", "string"]
            description: The date and time when the payment was last updated.
  x-airbyte-example-questions:
    direct:
      - "List all balances for my PayPal account"
      - "Show recent transactions from the last 7 days"
      - "List all catalog products"
      - "Show details for a specific product"
      - "List all disputes"
      - "Show recent payments"
    search:
      - "What transactions had the highest amounts last month?"
      - "Find all declined transactions"
      - "Show disputes grouped by status"
      - "What is the total balance across all currencies?"
    unsupported:
      - "Create a new payment"
      - "Refund a transaction"
      - "Delete a dispute"
      - "Update product details"
  x-airbyte-skip-auth-methods:
    - customauthenticator
  x-airbyte-replication-config:
    title: Replication Configuration
    description: Settings for data replication from PayPal.
    properties:
      start_date:
        type: string
        title: Start Date
        description: >
          Start date for data extraction in ISO 8601 format. Date must be
          in range from 3 years till 12 hours before present time.
        format: date-time
    required:
      - start_date
    replication_config_key_mapping:
      start_date: start_date

servers:
  - url: https://api-m.sandbox.paypal.com
    description: PayPal Sandbox API

security:
  - oauth2: []

paths:
  /v1/reporting/balances:
    get:
      summary: List all balances
      description: >
        List all balances for a PayPal account. Specify date time to list
        balances for that time. It takes a maximum of three hours for
        balances to appear. Lists balances up to the previous three years.
      operationId: listBalances
      x-airbyte-entity: balances
      x-airbyte-action: list
      x-airbyte-no-pagination: "The PayPal /v1/reporting/balances endpoint returns the full list of account balances across currencies in a single response; no pagination parameters are exposed."
      x-airbyte-preferred-for-check: true
      parameters:
        - name: as_of_time
          in: query
          description: >
            List balances at the date time provided in ISO 8601 format.
            Returns the last refreshed balance when not provided.
          required: false
          schema:
            type: string
        - name: currency_code
          in: query
          description: >
            Three-character ISO-4217 currency code to filter balances.
          required: false
          schema:
            type: string
            minLength: 3
            maxLength: 3
      responses:
        "200":
          description: Successful balance listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalancesResponse"
        "401":
          description: Unauthorized

  /v1/reporting/transactions:
    get:
      summary: List transactions
      description: >
        Lists transactions for a PayPal account. Specify one or more query
        parameters to filter the transactions. Requires start_date and
        end_date parameters. The maximum supported date range is 31 days.
        It takes a maximum of three hours for executed transactions to appear.
      operationId: listTransactions
      x-airbyte-entity: transactions
      x-airbyte-action: list
      x-airbyte-record-extractor: $.transaction_details
      x-airbyte-meta-extractor:
        total_items: $.total_items
        total_pages: $.total_pages
        page: $.page
      parameters:
        - name: start_date
          in: query
          required: true
          description: >
            Start date and time in ISO 8601 format. Seconds are required.
          schema:
            type: string
            default: "2024-01-01T00:00:00Z"
        - name: end_date
          in: query
          required: true
          description: >
            End date and time in ISO 8601 format. Seconds are required.
            Maximum supported range is 31 days.
          schema:
            type: string
            default: "2024-01-31T00:00:00Z"
        - name: transaction_id
          in: query
          required: false
          description: Filters by PayPal transaction ID (17-19 characters).
          schema:
            type: string
            minLength: 17
            maxLength: 19
        - name: transaction_type
          in: query
          required: false
          description: Filters by PayPal transaction event code.
          schema:
            type: string
        - name: transaction_status
          in: query
          required: false
          description: >
            Filters by PayPal transaction status code. D=Denied, P=Pending,
            S=Successful, V=Reversed.
          schema:
            type: string
            enum: ["D", "P", "S", "V"]
        - name: transaction_currency
          in: query
          required: false
          description: Three-character ISO-4217 currency code.
          schema:
            type: string
            minLength: 3
            maxLength: 3
        - name: fields
          in: query
          required: false
          description: >
            Fields to include in the response. Comma-separated list.
            Use 'all' to include all fields. Default is transaction_info.
          schema:
            type: string
            default: all
        - name: page_size
          in: query
          required: false
          description: Number of items per page (1-500).
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: page
          in: query
          required: false
          description: Page number to return.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: balance_affecting_records_only
          in: query
          required: false
          description: >
            Y to include only balance-impacting transactions (default).
            N to include all transactions.
          schema:
            type: string
            enum: ["Y", "N"]
            default: "Y"
      responses:
        "200":
          description: Successful transaction listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionsList"
        "401":
          description: Unauthorized

  /v1/payments/payment:
    get:
      summary: List payments
      description: >
        Lists payments for the PayPal account. Supports filtering by
        start and end times.
      operationId: listPayments
      x-airbyte-entity: list_payments
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next_id: $.next_id
      x-airbyte-record-extractor: $.payments
      parameters:
        - name: start_time
          in: query
          required: false
          description: Start time in ISO 8601 format.
          schema:
            type: string
        - name: end_time
          in: query
          required: false
          description: End time in ISO 8601 format.
          schema:
            type: string
        - name: count
          in: query
          required: false
          description: Number of items per page (max 20).
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
        - name: start_id
          in: query
          required: false
          description: Starting resource ID for pagination.
          schema:
            type: string
      responses:
        "200":
          description: Successful payment listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentsList"
        "401":
          description: Unauthorized

  /v1/customer/disputes:
    get:
      summary: List disputes
      description: >
        Lists disputes for the PayPal account. Supports filtering by
        update time range.
      operationId: listDisputes
      x-airbyte-entity: list_disputes
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: $.links
      x-airbyte-record-extractor: $.items
      parameters:
        - name: update_time_after
          in: query
          required: false
          description: Filter disputes updated after this time in ISO 8601 format.
          schema:
            type: string
        - name: update_time_before
          in: query
          required: false
          description: Filter disputes updated before this time in ISO 8601 format.
          schema:
            type: string
        - name: page_size
          in: query
          required: false
          description: Number of items per page (max 50).
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: next_page_token
          in: query
          required: false
          description: Token for retrieving the next page of results.
          schema:
            type: string
      responses:
        "200":
          description: Successful dispute listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputesList"
        "401":
          description: Unauthorized

  /v1/catalogs/products:
    get:
      summary: List products
      description: Lists all catalog products for the PayPal account.
      operationId: listProducts
      x-airbyte-entity: list_products
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: $.links
      x-airbyte-record-extractor: $.products
      parameters:
        - name: page_size
          in: query
          required: false
          description: Number of items per page (max 20).
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
        - name: page
          in: query
          required: false
          description: Page number starting from 1.
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Successful product listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsList"
        "401":
          description: Unauthorized

  /v1/catalogs/products/{id}:
    get:
      summary: Get product details
      description: Shows details for a catalog product by ID.
      operationId: getProductDetails
      x-airbyte-entity: show_product_details
      x-airbyte-action: get
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID.
          schema:
            type: string
      responses:
        "200":
          description: Successful product details retrieval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetails"
        "404":
          description: Product not found
        "401":
          description: Unauthorized

  /v2/invoicing/search-invoices:
    post:
      summary: Search invoices
      description: >
        Searches for invoices matching the specified criteria. Uses POST
        with a JSON body for filtering.
      operationId: searchInvoices
      x-airbyte-entity: search_invoices
      x-airbyte-action: list
      x-airbyte-meta-extractor:
        next: $.links
      x-airbyte-record-extractor: $.items
      parameters:
        - name: page_size
          in: query
          required: false
          description: Number of items per page (max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: page
          in: query
          required: false
          description: Page number starting from 1.
          schema:
            type: integer
            minimum: 1
            default: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceSearchParams"
      responses:
        "200":
          description: Successful invoice search
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoicesList"
        "401":
          description: Unauthorized

components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: >
        OAuth 2.0 Client Credentials authentication. Obtain client_id and
        client_secret from the PayPal Developer Dashboard. The SDK uses
        these to obtain and refresh access tokens automatically.
      flows:
        authorizationCode:
          authorizationUrl: https://www.paypal.com/signin/authorize
          tokenUrl: https://api-m.sandbox.paypal.com/v1/oauth2/token
          refreshUrl: https://api-m.sandbox.paypal.com/v1/oauth2/token
          scopes: {}
      x-airbyte-auth-config:
        title: PayPal OAuth2 Authentication
        type: object
        required:
          - client_id
          - client_secret
        properties:
          client_id:
            type: string
            title: Client ID
            description: The Client ID of your PayPal developer application.
          client_secret:
            type: string
            title: Client Secret
            description: The Client Secret of your PayPal developer application.
          access_token:
            type: string
            title: Access Token
            description: >
              OAuth2 access token obtained via client credentials grant.
              Use the PayPal token endpoint with your client_id and
              client_secret to obtain this.
        auth_mapping:
          client_id: "${client_id}"
          client_secret: "${client_secret}"
          access_token: "${access_token}"
        replication_auth_key_mapping:
          client_id: client_id
          client_secret: client_secret
      x-airbyte-token-refresh:
        auth_style: basic
        body_format: form

  schemas:
    Money:
      type: object
      description: Currency amount with code and value.
      properties:
        currency_code:
          type: string
          description: Three-character ISO-4217 currency code.
          minLength: 3
          maxLength: 3
        value:
          type: string
          description: Monetary value as a string.

    BalanceDetail:
      type: object
      description: Balance information for a single currency.
      properties:
        primary:
          type: boolean
          description: Whether this is the primary currency balance.
        currency:
          type: string
          description: Currency code for this balance.
        total_balance:
          $ref: "#/components/schemas/Money"
        available_balance:
          $ref: "#/components/schemas/Money"
        withheld_balance:
          $ref: "#/components/schemas/Money"

    BalancesResponse:
      type: object
      x-airbyte-entity-name: balances
      x-airbyte-stream-name: balances
      x-airbyte-ai-hints:
        summary: "PayPal account balances across currencies"
        when_to_use: "Questions about account balance or available funds"
        trigger_phrases: ["paypal balance", "account balance", "available funds"]
        freshness: live
