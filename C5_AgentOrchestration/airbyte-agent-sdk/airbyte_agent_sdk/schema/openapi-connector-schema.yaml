$defs:
  AiHints:
    additionalProperties: false
    description: 'AI hints for entity schemas — helps LLMs understand when and how
      to use an entity.


      Attached to entity response schemas via x-airbyte-ai-hints extension.

      Used by generate_tool_description() to emit per-entity guidance.'
    properties:
      summary:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: One-line description of what this entity contains
        title: Summary
      when_to_use:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: When an LLM should query this entity
        title: When To Use
      trigger_phrases:
        description: Example user queries that should trigger this entity
        items:
          type: string
        title: Trigger Phrases
        type: array
      freshness:
        anyOf:
        - enum:
          - live
          - static
          type: string
        - type: 'null'
        default: null
        description: Whether data is live or static
        title: Freshness
      example_questions:
        description: Example questions answerable by this entity
        items:
          type: string
        title: Example Questions
        type: array
      search_strategy:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Hint for LLMs on how to construct effective search queries for
          this entity
        title: Search Strategy
    title: AiHints
    type: object
  AirbyteOAuthCredentials:
    additionalProperties: false
    description: 'Airbyte OAuth credentials extension (x-airbyte-oauth-credentials).


      Describes what OAuth app credentials an organization needs to provide

      to override the default Airbyte-managed OAuth app credentials.'
    properties:
      title:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Title
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      properties:
        anyOf:
        - additionalProperties:
            $ref: '#/$defs/AuthConfigFieldSpec'
          type: object
        - type: 'null'
        default: null
        title: Properties
      required:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Required
    title: AirbyteOAuthCredentials
    type: object
  AuthConfigFieldSpec:
    additionalProperties: false
    description: 'Specification for a user-facing authentication config field.


      This defines a single input field that users provide for authentication.'
    properties:
      type:
        default: string
        enum:
        - string
        - integer
        - boolean
        - number
        title: Type
        type: string
      title:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Title
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      format:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Format
      pattern:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Pattern
      default:
        anyOf:
        - {}
        - type: 'null'
        default: null
        title: Default
      airbyte_secret:
        anyOf:
        - type: boolean
        - type: 'null'
        default: null
        title: Airbyte Secret
    title: AuthConfigFieldSpec
    type: object
  AuthConfigSpec:
    additionalProperties: false
    description: 'Airbyte auth configuration extension (x-airbyte-auth-config).


      Defines user-facing authentication configuration and how it maps to

      the underlying OpenAPI security scheme.


      For multiple authentication methods, define separate security schemes

      rather than using oneOf within a single scheme.'
    properties:
      title:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Title
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      type:
        anyOf:
        - const: object
          type: string
        - type: 'null'
        default: null
        title: Type
      required:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Required
      properties:
        anyOf:
        - additionalProperties:
            $ref: '#/$defs/AuthConfigFieldSpec'
          type: object
        - type: 'null'
        default: null
        title: Properties
      auth_mapping:
        anyOf:
        - additionalProperties:
            type: string
          type: object
        - type: 'null'
        default: null
        title: Auth Mapping
      replication_auth_key_mapping:
        anyOf:
        - additionalProperties:
            type: string
          type: object
        - type: 'null'
        default: null
        description: Mapping from source config paths (e.g., 'credentials.api_key')
          to auth config keys for direct connectors
        title: Replication Auth Key Mapping
      additional_headers:
        anyOf:
        - additionalProperties:
            type: string
          type: object
        - type: 'null'
        default: null
        description: 'Extra headers to inject with auth. Values support Jinja2 {{
          variable }} template syntax to reference secrets. Example: {''Amazon-Advertising-API-ClientId'':
          ''{{ client_id }}''}'
        title: Additional Headers
      replication_auth_key_constants:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        description: 'Constant values to always inject at source config paths (e.g.,
          ''credentials.auth_type'': ''OAuth2.0'')'
        title: Replication Auth Key Constants
    title: AuthConfigSpec
    type: object
  CacheConfig:
    additionalProperties: false
    description: "Cache configuration extension (x-airbyte-context-store).\n\nDefines\
      \ cache-enabled entities and their field mappings for api_search operations.\n\
      Supports optional name aliasing via x-airbyte-name for both entities and fields,\n\
      enabling bidirectional mapping between user-facing names and cache storage names.\n\
      \nThis extension is added to the Info model and provides field-level mapping\
      \ for\nsearch operations that use cached data.\n\nExample YAML usage:\n    info:\n\
      \      title: Stripe API\n      x-airbyte-context-store:\n        flush_batch_size_mb:\
      \ 200\n        entities:\n          - entity: customers\n            stream:\
      \ customers\n            fields:\n              - name: email\n            \
      \    type: [\"null\", \"string\"]\n                description: \"Customer email\
      \ address\"\n              - name: customer_name\n                x-airbyte-name:\
      \ name\n                type: [\"null\", \"string\"]\n                description:\
      \ \"Customer full name\""
    properties:
      entities:
        items:
          $ref: '#/$defs/CacheEntityConfig'
        title: Entities
        type: array
      kind:
        default: DATA
        description: Context-store kind. DATA (default) is the structured-records
          pipeline; FILES routes replication through the raw-file-transfer destination.
        enum:
        - DATA
        - FILES
        title: Kind
        type: string
      disable_compaction:
        default: false
        description: When true, Athena compaction (OPTIMIZE + VACUUM) is skipped for
          this connector type.
        title: Disable Compaction
        type: boolean
      flush_batch_size_mb:
        anyOf:
        - maximum: 500
          minimum: 1
          type: integer
        - type: 'null'
        default: null
        description: Optional flush batch size, in MB, for Airbyte-hosted Context
          Store destination writes.
        title: Flush Batch Size Mb
    required:
    - entities
    title: CacheConfig
    type: object
    patternProperties:
      ^x-: {}
  CacheEntityConfig:
    additionalProperties: false
    description: 'Entity configuration for cache mapping.


      Defines a cache-enabled entity with its fields and optional name aliasing

      to map between user-facing entity names and cache storage names.


      Used in x-airbyte-context-store extension for api_search operations.'
    properties:
      entity:
        title: Entity
        type: string
      suggested:
        default: false
        description: Whether this entity should be suggested for syncing by default.
        title: Suggested
        type: boolean
      x-airbyte-name:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: X-Airbyte-Name
      fields:
        items:
          $ref: '#/$defs/CacheFieldConfig'
        title: Fields
        type: array
      x-airbyte-skip-searchable-fields:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Reason why this entity does not define searchable fields. Entities
          in x-airbyte-context-store must either declare at least one field or set
          x-airbyte-skip-searchable-fields with a justification.
        title: X-Airbyte-Skip-Searchable-Fields
      x-airbyte-enrichment:
        anyOf:
        - items:
            $ref: '#/$defs/EnrichmentConfig'
          type: array
        - type: 'null'
        default: null
        description: 'Query-time enrichment joins for this entity: each entry looks
          up fields from another context-store entity and projects them onto each
          record at read time.'
        title: X-Airbyte-Enrichment
    required:
    - entity
    title: CacheEntityConfig
    type: object
    patternProperties:
      ^x-: {}
  CacheFieldConfig:
    additionalProperties: false
    description: 'Field configuration for cache mapping.


      Defines a single field in a cache entity, with optional name aliasing

      to map between user-facing field names and cache storage names.


      For object-type fields, supports nested properties to define the internal structure

      of complex nested schemas.


      Used in x-airbyte-context-store extension for api_search operations.'
    properties:
      name:
        title: Name
        type: string
      x-airbyte-name:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: X-Airbyte-Name
      type:
        anyOf:
        - type: string
        - items:
            type: string
          type: array
        title: Type
      description:
        title: Description
        type: string
      properties:
        anyOf:
        - additionalProperties:
            $ref: '#/$defs/CacheFieldProperty'
          type: object
        - type: 'null'
        default: null
        title: Properties
      x-airbyte-semantic-search:
        anyOf:
        - $ref: '#/$defs/SemanticSearchConfig'
        - type: 'null'
        default: null
        description: Semantic search annotation for this field (dormant contract;
          describes how the field value is decoded, sampled, windowed, embedded, and
          what metadata travels with each unit).
    required:
    - name
    - type
    - description
    title: CacheFieldConfig
    type: object
    patternProperties:
      ^x-: {}
  CacheFieldProperty:
    additionalProperties: false
    description: "Nested property definition for object-type cache fields.\n\nSupports\
      \ recursive nesting to represent complex nested schemas in cache field definitions.\n\
      Used when a cache field has type 'object' and needs to define its internal structure.\n\
      \nExample YAML usage:\n    - name: collaboration\n      type: ['null', 'object']\n\
      \      description: \"Collaboration data\"\n      properties:\n        brief:\n\
      \          type: ['null', 'string']\n        comments:\n          type: ['null',\
      \ 'array']"
    properties:
      type:
        anyOf:
        - type: string
        - items:
            type: string
          type: array
        title: Type
      properties:
        anyOf:
        - additionalProperties:
            $ref: '#/$defs/CacheFieldProperty'
          type: object
        - type: 'null'
        default: null
        title: Properties
    required:
    - type
    title: CacheFieldProperty
    type: object
    patternProperties:
      ^x-: {}
  Components:
    additionalProperties: false
    description: 'Reusable component definitions.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#components-object'
    properties:
      schemas:
        additionalProperties:
          $ref: '#/$defs/Schema'
        title: Schemas
        type: object
      responses:
        additionalProperties:
          $ref: '#/$defs/Response'
        title: Responses
        type: object
      parameters:
        additionalProperties:
          $ref: '#/$defs/Parameter'
        title: Parameters
        type: object
      examples:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: Examples
      requestBodies:
        additionalProperties:
          $ref: '#/$defs/RequestBody'
        title: Requestbodies
        type: object
      headers:
        anyOf:
        - additionalProperties:
            $ref: '#/$defs/Header'
          type: object
        - type: 'null'
        default: null
        title: Headers
      securitySchemes:
        additionalProperties:
          $ref: '#/$defs/SecurityScheme'
        title: Securityschemes
        type: object
      links:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: Links
      callbacks:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: Callbacks
    title: Components
    type: object
  Contact:
    additionalProperties: false
    description: 'Contact information for the API.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#contact-object'
    properties:
      name:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Name
      url:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Url
      email:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Email
    title: Contact
    type: object
  DocUrl:
    additionalProperties: false
    properties:
      url:
        title: Url
        type: string
      type:
        $ref: '#/$defs/DocUrlType'
      title:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Title
    required:
    - url
    - type
    title: DocUrl
    type: object
  DocUrlType:
    enum:
    - api_deprecations
    - api_reference
    - api_release_history
    - authentication_guide
    - changelog
    - data_model_reference
    - developer_community
    - migration_guide
    - openapi_spec
    - other
    - permissions_scopes
    - rate_limits
    - sql_reference
    - status_page
    title: DocUrlType
    type: string
  EnrichmentConfig:
    additionalProperties: false
    description: "A single query-time enrichment join (an entry of x-airbyte-enrichment).\n\
      \nDeclares that rows of the entity are decorated at read time by looking up\n\
      fields from another context-store entity (``target``), joined on one or more\n\
      ``match`` conditions, projecting ``project`` fields onto each record. The\n\
      lookup runs over the result set at read time (never a build-time pre-join).\n\
      \nExample YAML usage (on a context-store entity):\n    x-airbyte-enrichment:\n\
      \      - target: calls_extensive\n        match:\n          - { local: \"/callId\"\
      ,  foreign: \"id\" }\n          - { local: \"speakerId\", foreign: \"parties[].speakerId\"\
      \ }\n        project:\n          - { name: speakerName, from: \"parties[].name\"\
      \ }\n          - { name: speakerRole, from: \"parties[].title\" }"
    properties:
      target:
        description: Target context-store entity to look up.
        title: Target
        type: string
      match:
        description: Join conditions (AND-ed).
        items:
          $ref: '#/$defs/EnrichmentMatch'
        title: Match
        type: array
      project:
        description: Fields to project onto each record.
        items:
          $ref: '#/$defs/EnrichmentProjection'
        title: Project
        type: array
    required:
    - target
    - match
    - project
    title: EnrichmentConfig
    type: object
  EnrichmentMatch:
    additionalProperties: false
    description: 'A single join condition for an enrichment (the `match` block entries).


      ``local`` is a path into the record being read (a leading ''/'' resolves from

      the record root; otherwise relative to the record). ``foreign`` is a path

      into a target-entity row; a path containing an array segment (e.g.

      ``parties[].speakerId``) is matched element-wise in Python, while a top-level

      scalar path (e.g. ``id``) bounds the lookup query''s ``WHERE ... IN``.


      Used inside x-airbyte-enrichment on a context-store entity.'
    properties:
      local:
        description: Path to the join key on the record being read.
        title: Local
        type: string
      foreign:
        description: Path to the join key on the target-entity row.
        title: Foreign
        type: string
    required:
    - local
    - foreign
    title: EnrichmentMatch
    type: object
  EnrichmentProjection:
    additionalProperties: false
    description: 'A single field projected from the target entity onto the record
      (the

      `project` block entries).


      ``from`` resolves relative to the matched target row (or the matched array

      element when it shares an array prefix with a match condition).


      Used inside x-airbyte-enrichment on a context-store entity.'
    properties:
      name:
        description: Output field name added to the record.
        title: Name
        type: string
      from:
        description: Path to the value on the target entity to project.
        title: From
        type: string
    required:
    - name
    - from
    title: EnrichmentProjection
    type: object
  EntityRelationshipConfig:
    additionalProperties: false
    description: "Entity relationship declaration for cross-entity navigation.\n\n\
      Defines a foreign-key relationship between two entities, enabling\nthe runtime\
      \ to resolve parent-child dependencies and provide\nrelationship metadata to\
      \ agents.\n\nUsed in x-airbyte-entity-relationships extension in the Info object.\n\
      \nExample YAML usage:\n    info:\n      title: My API\n      x-airbyte-entity-relationships:\n\
      \        - source_entity: contacts\n          target_entity: accounts\n    \
      \      foreign_key: account_id\n          cardinality: many_to_one\n       \
      \   description: \"Contact belongs to an account\""
    properties:
      source_entity:
        description: Entity that holds the foreign key
        title: Source Entity
        type: string
      target_entity:
        description: Entity being referenced
        title: Target Entity
        type: string
      foreign_key:
        description: Field on source_entity that references target_entity
        title: Foreign Key
        type: string
      target_key:
        default: id
        description: Field on target_entity being referenced
        title: Target Key
        type: string
      cardinality:
        anyOf:
        - enum:
          - one_to_one
          - one_to_many
          - many_to_one
          - many_to_many
          type: string
        - type: 'null'
        default: null
        description: Optional relationship cardinality
        title: Cardinality
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Human-readable description of the relationship
        title: Description
      parent_record_filter:
        anyOf:
        - additionalProperties:
            items:
              type: string
            type: array
          type: object
        - type: 'null'
        default: null
        description: 'Optional filter applied to parent entity records during check-time
          parameter resolution. Keys are field names on the parent record, values
          are lists of acceptable values. Only records matching all conditions are
          considered when resolving the foreign key. Example: `parent_record_filter:
          {type: [list, board]}` picks only parent records whose `type` field is `list`
          or `board`.'
        title: Parent Record Filter
    required:
    - source_entity
    - target_entity
    - foreign_key
    title: EntityRelationshipConfig
    type: object
  EnvironmentMappingTransform:
    additionalProperties: false
    description: "Structured transform for environment mapping values.\n\nAllows transforming\
      \ environment values before storing in source_config.\n\nExample:\n    source:\
      \ subdomain\n    format: \"{value}.atlassian.net\"\n\nThe format string uses\
      \ {value} as a placeholder for the source value."
    properties:
      source:
        description: The environment config key to read the value from
        title: Source
        type: string
      format:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Optional format string to transform the value. Use {value} as
          placeholder.
        title: Format
    required:
    - source
    title: EnvironmentMappingTransform
    type: object
  ExampleQuestions:
    additionalProperties: false
    description: 'Example questions for AI connector documentation.


      Used to generate supported_questions.md and unsupported_questions.md files

      that appear in the connector''s README.'
    properties:
      direct:
        description: Example questions answerable via direct API operations
        items:
          type: string
        title: Direct
        type: array
      context_store_search:
        description: Example questions requiring cached context store search operations
        items:
          type: string
        title: Context Store Search
        type: array
      search:
        description: Deprecated alias for context_store_search example questions
        items:
          type: string
        title: Search
        type: array
      unsupported:
        description: Example questions the connector cannot handle
        items:
          type: string
        title: Unsupported
        type: array
    title: ExampleQuestions
    type: object
  ExternalDocs:
    additionalProperties: false
    description: 'External documentation reference.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#external-documentation-object'
    properties:
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      url:
        title: Url
        type: string
    required:
    - url
    title: ExternalDocs
    type: object
  GraphQLBodyConfig:
    additionalProperties: false
    description: 'GraphQL body type configuration for x-airbyte-body-type extension.


      Used when x-airbyte-body-type.type = "graphql"'
    properties:
      type:
        const: graphql
        description: Body type identifier (must be 'graphql')
        title: Type
        type: string
      query:
        description: GraphQL query or mutation string with optional template placeholders
          (e.g., {{ variable }})
        title: Query
        type: string
      variables:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        description: Variables to substitute in the GraphQL query using template syntax
          (e.g., {{ param_name }})
        title: Variables
      operationName:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Operation name for queries with multiple operations
        title: Operationname
      default_fields:
        anyOf:
        - type: string
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        description: Default fields to select if not provided in request parameters.
          Can be a string or array of field names.
        title: Default Fields
      x-airbyte-nullable-variables:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        description: Variable names that can be explicitly set to null (e.g., to unassign
          a user)
        title: X-Airbyte-Nullable-Variables
    required:
    - type
    - query
    title: GraphQLBodyConfig
    type: object
  Header:
    additionalProperties: false
    description: 'Header definition.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#header-object'
    properties:
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      required:
        anyOf:
        - type: boolean
        - type: 'null'
        default: null
        title: Required
      deprecated:
        anyOf:
        - type: boolean
        - type: 'null'
        default: null
        title: Deprecated
      schema:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: Schema
      example:
        anyOf:
        - {}
        - type: 'null'
        default: null
        title: Example
    title: Header
    type: object
  Info:
    additionalProperties: false
    description: "API metadata information.\n\nOpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#info-object\n\
      \nExtensions:\n- x-airbyte-connector-name: Name of the connector (Airbyte extension)\n\
      - x-airbyte-connector-display-name: Optional display name for UI rendering (Airbyte\
      \ extension)\n- x-airbyte-connector-definition-id: UUID of the connector (Airbyte\
      \ extension)\n- x-airbyte-external-documentation-urls: List of external documentation\
      \ URLs (Airbyte extension)\n- x-airbyte-retry-config: Retry configuration for\
      \ transient errors (Airbyte extension)\n- x-airbyte-example-questions: Example\
      \ questions for AI connector README (Airbyte extension)\n- x-airbyte-auth-tooltip:\
      \ Short, non-technical multiline string shown to end users in the embedded widget\
      \ to describe\n  how to authenticate the connector (Airbyte extension)\n- x-airbyte-context-store:\
      \ Cache configuration for field mapping between API and cache schemas (Airbyte\
      \ extension)\n- x-airbyte-replication-config: Replication configuration for\
      \ MULTI mode connectors (Airbyte extension)\n- x-airbyte-entity-relationships:\
      \ Entity relationship declarations (Airbyte extension)\n- x-airbyte-scoping:\
      \ Scoping parameter resolution from config (Airbyte extension)"
    properties:
      title:
        title: Title
        type: string
      version:
        title: Version
        type: string
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      termsOfService:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Termsofservice
      contact:
        anyOf:
        - $ref: '#/$defs/Contact'
        - type: 'null'
        default: null
      license:
        anyOf:
        - $ref: '#/$defs/License'
        - type: 'null'
        default: null
      x-airbyte-connector-name:
        anyOf:
        - type: string
        - type: 'null'
        default: null
