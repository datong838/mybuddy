      \ connectors to declare how to detect\nsuch errors.\n\nExample (Slack):\n  \
      \  x-airbyte-response-error-check:\n      field: \"ok\"\n      on_value: false\n\
      \      message_field: \"error\""
    properties:
      field:
        title: Field
        type: string
      on_value:
        title: On Value
      message_field:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Message Field
    required:
    - field
    - on_value
    title: ResponseErrorCheck
    type: object
  RetryConfig:
    additionalProperties: false
    description: "Configuration for retry strategy with exponential backoff.\n\nUsed\
      \ to configure automatic retries for transient errors (429, 5xx, timeouts, network\
      \ errors).\nCan be specified at the connector level via x-airbyte-retry-config\
      \ in the OpenAPI spec's info section.\n\nBy default, retries are enabled with\
      \ max_attempts=3. To disable retries, set max_attempts=1\nin your connector's\
      \ x-airbyte-retry-config.\n\nExample YAML usage:\n    info:\n      title: My\
      \ API\n      x-airbyte-retry-config:\n        max_attempts: 5\n        initial_delay_seconds:\
      \ 2.0\n        retry_after_header: \"X-RateLimit-Reset\"\n        retry_after_format:\
      \ \"unix_timestamp\""
    properties:
      max_attempts:
        default: 3
        title: Max Attempts
        type: integer
      initial_delay_seconds:
        default: 1.0
        title: Initial Delay Seconds
        type: number
      max_delay_seconds:
        default: 60.0
        title: Max Delay Seconds
        type: number
      exponential_base:
        default: 2.0
        title: Exponential Base
        type: number
      jitter:
        default: true
        title: Jitter
        type: boolean
      retry_on_status_codes:
        default:
        - 429
        - 500
        - 502
        - 503
        - 504
        items:
          type: integer
        title: Retry On Status Codes
        type: array
      retry_on_timeout:
        default: true
        title: Retry On Timeout
        type: boolean
      retry_on_network_error:
        default: true
        title: Retry On Network Error
        type: boolean
      retry_after_header:
        default: Retry-After
        title: Retry After Header
        type: string
      retry_after_format:
        default: seconds
        enum:
        - seconds
        - milliseconds
        - unix_timestamp
        title: Retry After Format
        type: string
    title: RetryConfig
    type: object
  RuntimeMode:
    description: 'Runtime mode declared in `x-airbyte-runtime-mode`.


      Each connector definition version has exactly one runtime mode:


      * `direct_only` — direct SDK/API actions only; no Context Store.

      * `context_store_only` — Context Store/search only; no direct actions.

      * `direct_and_context_store` — both direct actions and Context Store.'
    enum:
    - direct_only
    - context_store_only
    - direct_and_context_store
    title: RuntimeMode
    type: string
  Schema:
    additionalProperties: false
    description: 'JSON Schema definition for data models.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#schema-object


      Note: Uses Dict[str, Any] for properties to support nested schemas and $ref.

      Reference resolution happens at runtime in config_loader.py.


      Extensions:

      - x-airbyte-resource-name: Name of the resource this schema represents (Airbyte
      extension)'
    properties:
      type:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Type
      format:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Format
      title:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Title
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      default:
        anyOf:
        - {}
        - type: 'null'
        default: null
        title: Default
      example:
        anyOf:
        - {}
        - type: 'null'
        default: null
        title: Example
      properties:
        type: object
        additionalProperties: true
        title: Properties
      required:
        items:
          type: string
        title: Required
        type: array
      additionalProperties:
        anyOf:
        - {}
        - type: 'null'
        default: null
        title: Additionalproperties
      items:
        anyOf:
        - {}
        - type: 'null'
        default: null
        title: Items
      enum:
        anyOf:
        - items: {}
          type: array
        - type: 'null'
        default: null
        title: Enum
      minLength:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
        title: Minlength
      maxLength:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
        title: Maxlength
      minimum:
        anyOf:
        - type: number
        - type: 'null'
        default: null
        title: Minimum
      maximum:
        anyOf:
        - type: number
        - type: 'null'
        default: null
        title: Maximum
      pattern:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Pattern
      allOf:
        anyOf:
        - items: {}
          type: array
        - type: 'null'
        default: null
        title: Allof
      anyOf:
        anyOf:
        - items: {}
          type: array
        - type: 'null'
        default: null
        title: Anyof
      oneOf:
        anyOf:
        - items: {}
          type: array
        - type: 'null'
        default: null
        title: Oneof
      not:
        anyOf:
        - {}
        - type: 'null'
        default: null
        title: Not
      nullable:
        anyOf:
        - type: boolean
        - type: 'null'
        default: null
        deprecated: true
        title: Nullable
      readOnly:
        anyOf:
        - type: boolean
        - type: 'null'
        default: null
        title: Readonly
      writeOnly:
        anyOf:
        - type: boolean
        - type: 'null'
        default: null
        title: Writeonly
      deprecated:
        anyOf:
        - type: boolean
        - type: 'null'
        default: null
        title: Deprecated
      x-airbyte-entity-name:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: X-Airbyte-Entity-Name
      x-airbyte-stream-name:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: X-Airbyte-Stream-Name
      x-airbyte-ai-hints:
        anyOf:
        - $ref: '#/$defs/AiHints'
        - type: 'null'
        default: null
    title: Schema
    type: object
    patternProperties:
      ^x-: {}
  ScopingParamConfig:
    additionalProperties: false
    description: "Scoping parameter resolution from connector configuration.\n\nDeclares\
      \ a path parameter that should be resolved from the connector's\n`config_values`\
      \ at runtime, rather than being supplied per-request.\nThe resolution applies\
      \ to **all executor operations** — `execute()`,\n`execute_batch()`, `check_entities()`,\
      \ and download operations — not\nonly probe/check calls.\n\nWhen a path template\
      \ contains a placeholder matching `param`, the\nexecutor looks up `config_key`\
      \ (defaulting to `param`) in\n`config_values`, optionally renders `value_template`,\
      \ and injects the\nvalue automatically.  Explicitly supplied `params` always\
      \ take precedence\nover the scoped default.\n\nUsed in `x-airbyte-scoping` extension\
      \ in the Info object.\n\nExample YAML usage:\n\n    info:\n      title: My API\n\
      \      x-airbyte-scoping:\n        - param: account_id\n          config_key:\
      \ account_id\n        - param: owner\n          config_key: repositories\n \
      \         value_template: \"{{ value.split('/')[0] }}\""
    properties:
      param:
        description: Path parameter name to resolve from config
        title: Param
        type: string
      config_key:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Config key to read. Defaults to param name if omitted.
        title: Config Key
      value_template:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Optional Jinja template rendered with `value`, `config`, and
          `param` before injecting the scoped value. Templates that render to `none`,
          `null`, or an empty string leave the parameter unresolved.
        title: Value Template
    required:
    - param
    title: ScopingParamConfig
    type: object
  SecurityScheme:
    additionalProperties: true
    description: 'Security scheme definition.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#security-scheme-object


      Supported Types:

      - apiKey: API key in header/query/cookie

      - http: HTTP authentication (basic, bearer, digest, etc.)

      - oauth2: OAuth 2.0 flows


      Extensions:

      - x-airbyte-token-path: JSON path to extract token from auth response (Airbyte
      extension)

      - x-airbyte-token-refresh: OAuth2 token refresh configuration (dict with auth_style,
      body_format)

      - x-airbyte-auth-config: User-facing authentication configuration (Airbyte extension)

      - x-airbyte-oauth-credentials: OAuth app credential override specification (Airbyte
      extension)


      Future extensions (not yet active):

      - x-grant-type: OAuth grant type for refresh tokens

      - x-refresh-endpoint: Custom refresh endpoint URL'
    properties:
      type:
        enum:
        - apiKey
        - http
        - oauth2
        - openIdConnect
        title: Type
        type: string
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      name:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Name
      in:
        anyOf:
        - enum:
          - query
          - header
          - cookie
          type: string
        - type: 'null'
        default: null
        title: In
      scheme:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Scheme
      bearerFormat:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Bearerformat
      flows:
        anyOf:
        - $ref: '#/$defs/OAuth2Flows'
        - type: 'null'
        default: null
      openIdConnectUrl:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Openidconnecturl
      x-airbyte-token-path:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: X-Airbyte-Token-Path
      x-airbyte-token-refresh:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: X-Airbyte-Token-Refresh
      x-airbyte-auth-config:
        anyOf:
        - $ref: '#/$defs/AuthConfigSpec'
        - type: 'null'
        default: null
      x-airbyte-token-extract:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        description: List of fields to extract from OAuth2 token responses and use
          as server variables
        title: X-Airbyte-Token-Extract
      x-airbyte-oauth-credentials:
        anyOf:
        - $ref: '#/$defs/AirbyteOAuthCredentials'
        - type: 'null'
        default: null
        description: Describes what OAuth app credentials an organization needs to
          provide for credential override
      x-airbyte-untested:
        default: false
        description: Mark this auth scheme as untested to skip cassette coverage validation
        title: X-Airbyte-Untested
        type: boolean
    required:
    - type
    title: SecurityScheme
    type: object
  SemanticEmbedding:
    additionalProperties: false
    description: 'Embedding configuration for semantic search (the `embedding` block).


      Used inside x-airbyte-semantic-search on a context-store field.'
    properties:
      model:
        description: Embedding model identifier (e.g. 'text-embedding-3-small').
        title: Model
        type: string
      template:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Template for the embedded context text. Each '{name}' placeholder
          is replaced with the named sample's value (the windowed sample's window
          text, or a scalar sample's resolved value). Required when there are >=2
          samples; forbidden for a single sample (which defaults to '{<windowed name>}').
        title: Template
    required:
    - model
    title: SemanticEmbedding
    type: object
  SemanticMetadataField:
    additionalProperties: false
    description: 'A single metadata field carried alongside each embedded unit.


      ``type`` MUST be ``string`` or ``array``. ``array`` is required when the

      metadata ``path`` resolves below the sample anchor (cardinality > 1 per

      unit) -- i.e. when the path yields multiple values for a single unit.


      Used inside x-airbyte-semantic-search on a context-store field.'
    properties:
      name:
        description: Metadata column name.
        title: Name
        type: string
      path:
        description: Path to the metadata value relative to the sample anchor (a leading
          '/' resolves from the record root).
        title: Path
        type: string
      type:
        default: string
        description: Metadata value type. Use 'array' when the path resolves below
          the sample anchor (cardinality > 1 per unit); 'string' otherwise.
        enum:
        - string
        - array
        title: Type
        type: string
    required:
    - name
    - path
    title: SemanticMetadataField
    type: object
  SemanticSample:
    additionalProperties: false
    description: 'A single sample contributing to a semantic-search field''s embedded
      text.


      A field declares a list of samples. Exactly one sample is ``windowed`` -- it

      carries the ``sampling`` block that splits the decoded field value into the

      units that get embedded and that drives table/column naming. Every other

      sample is scalar: it resolves a single record-level value via ``path`` and is

      rendered into the embedding template alongside the windowed text.


      Used inside x-airbyte-semantic-search on a context-store field.'
    properties:
      name:
        description: Template key for this sample; must be unique across the field's
          samples.
        title: Name
        type: string
      path:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: 'Scalar samples only: path to the record-level value (a leading
          ''/'' resolves from the record root).'
        title: Path
      windowed:
        default: false
        description: Whether this sample is the windowed sample (exactly one per field).
        title: Windowed
        type: boolean
      sampling:
        anyOf:
        - $ref: '#/$defs/SemanticSampling'
        - type: 'null'
        default: null
        description: 'Windowed sample only: how the decoded field value is split into
          units.'
    required:
    - name
    title: SemanticSample
    type: object
  SemanticSampling:
    additionalProperties: false
    description: "Sampling configuration for semantic search (the `sampling` block).\n\
      \nDeclares how a decoded field value is split into discrete units that get\n\
      embedded. The `sample_type` makes the cardinality intent explicit:\n\n- ``element``:\
      \ the field value is a structured collection; ``sample_path``\n  anchors each\
      \ unit and ``text_path`` selects the text leaves under that\n  anchor.\n- ``regex``:\
      \ the decoded text is split into units with ``split_pattern``.\n- ``whole``:\
      \ the decoded value is a single unit (optionally with ``text_path``\n  to pull\
      \ text leaves out of a structured value).\n\nUsed inside x-airbyte-semantic-search\
      \ on a context-store field."
    properties:
      sample_type:
        description: Explicit cardinality intent for how the field value is split
          into units.
        enum:
        - element
        - regex
        - whole
        title: Sample Type
        type: string
      unit_label:
        default: chunk
        description: Names the unit; drives table/column naming. Defaults to 'chunk'.
        title: Unit Label
        type: string
      sample_path:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: 'element: anchor (relative to the field value) for each unit.'
        title: Sample Path
      text_path:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: 'element/whole: path to text leaves under the anchor.'
        title: Text Path
      stitch:
        default: '

          '
        description: Separator used to join multiple text leaves into a unit's text.
          Defaults to '\n'.
        title: Stitch
        type: string
      split_pattern:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: 'regex: boundary pattern used to split the decoded text into
          samples.'
        title: Split Pattern
    required:
    - sample_type
    title: SemanticSampling
    type: object
  SemanticSearchConfig:
    additionalProperties: false
    description: "Semantic search configuration extension (x-airbyte-semantic-search).\n\
      \nDeclares, per context-store field, how the raw field value is decoded,\nsplit\
      \ into units, windowed, embedded, and what metadata travels with each\nunit.\
      \ This is the annotation contract consumed by the semantic search\nengine.\n\
      \nExample YAML usage (on a context-store field):\n    x-airbyte-semantic-search:\n\
      \      content_type: json\n      samples:\n        - name: speaker_turn\n  \
      \        windowed: true\n          sampling:\n            sample_type: element\n\
      \            unit_label: speaker_turn\n            sample_path: \"[]\"\n   \
      \         text_path: \"sentences[].text\"\n            stitch: \"\\n\"\n   \
      \   windowing:\n        context_max_chars: 2048\n        context_boundary: whole_unit\n\
      \      embedding:\n        model: text-embedding-3-small\n      metadata:\n\
      \        - { name: speakerId, path: \"speakerId\", type: string }\n        -\
      \ { name: callId, path: \"/callId\", type: string }"
    properties:
      content_type:
        description: How to decode the raw field value before sampling.
        enum:
        - json
        - html
        - xhtml_storage
        - adf
        - markdown
        - plaintext
        - document
        title: Content Type
        type: string
      samples:
        items:
          $ref: '#/$defs/SemanticSample'
        title: Samples
        type: array
      windowing:
        $ref: '#/$defs/SemanticWindowing'
      embedding:
        $ref: '#/$defs/SemanticEmbedding'
      metadata:
        items:
          $ref: '#/$defs/SemanticMetadataField'
        title: Metadata
        type: array
    required:
    - content_type
    - samples
    - embedding
    title: SemanticSearchConfig
    type: object
  SemanticWindowing:
    additionalProperties: false
    description: 'Windowing configuration for semantic search (the `windowing` block).


      Controls how much surrounding context is embedded alongside each unit.

      When ``context_max_chars`` is 0 or omitted, only the unit itself is embedded.


      Used inside x-airbyte-semantic-search on a context-store field.'
    properties:
      context_max_chars:
        default: 0
        description: Max characters of surrounding context to embed. 0/omitted =>
          embed the unit only.
        minimum: 0
        title: Context Max Chars
        type: integer
      context_boundary:
        default: whole_unit
        description: How context is bounded around a unit. Defaults to 'whole_unit'.
        enum:
        - whole_unit
        - char
        - regex
        title: Context Boundary
        type: string
      context_boundary_pattern:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Boundary pattern used when context_boundary is 'regex'.
        title: Context Boundary Pattern
    title: SemanticWindowing
    type: object
  Server:
    additionalProperties: false
    description: 'Server URL and variable definitions.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#server-object'
    properties:
      url:
        title: Url
        type: string
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      variables:
        additionalProperties:
          $ref: '#/$defs/ServerVariable'
        title: Variables
        type: object
      x-airbyte-replication-environment-mapping:
        anyOf:
        - additionalProperties:
            anyOf:
            - type: string
            - $ref: '#/$defs/EnvironmentMappingTransform'
          type: object
        - type: 'null'
        default: null
        title: X-Airbyte-Replication-Environment-Mapping
      x-airbyte-replication-environment-constants:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        description: 'Constant values to always inject at environment config paths
          (e.g., ''region'': ''us-east-1'')'
        title: X-Airbyte-Replication-Environment-Constants
    required:
    - url
    title: Server
    type: object
  ServerVariable:
    additionalProperties: false
    description: 'Variable for server URL templating.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#server-variable-object'
    properties:
      enum:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Enum
      default:
        type: string
        title: Default
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
    required:
    - default
    title: ServerVariable
    type: object
  Tag:
    additionalProperties: false
    description: 'Tag metadata for grouping operations.


      OpenAPI Reference: https://spec.openapis.org/oas/v3.1.0#tag-object'
    properties:
      name:
        title: Name
        type: string
      description:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Description
      externalDocs:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
        title: Externaldocs
    required:
    - name
    title: Tag
    type: object
additionalProperties: false
description: OpenAPI 3.0 specification extended with Airbyte-specific fields for defining
  connectors with type-safe operations.
properties:
  openapi:
    title: Openapi
    type: string
  info:
    $ref: '#/$defs/Info'
  paths:
    additionalProperties:
      $ref: '#/$defs/PathItem'
    title: Paths
    type: object
  servers:
    items:
      $ref: '#/$defs/Server'
    title: Servers
    type: array
  components:
    anyOf:
    - $ref: '#/$defs/Components'
    - type: 'null'
    default: null
  security:
    anyOf:
    - items:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      type: array
    - type: 'null'
    default: null
    title: Security
  tags:
    anyOf:
    - items:
        $ref: '#/$defs/Tag'
      type: array
    - type: 'null'
    default: null
    title: Tags
  externalDocs:
    anyOf:
    - $ref: '#/$defs/ExternalDocs'
    - type: 'null'
    default: null
required:
- openapi
- info
title: Airbyte OpenAPI Connector Specification
type: object
$id: https://airbyte.io/schemas/openapi-connector-v1.yaml
