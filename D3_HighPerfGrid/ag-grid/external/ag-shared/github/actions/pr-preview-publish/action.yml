name: 'PR preview — publish UMD bundles'
description: Stage caller-supplied bundle files under pr-<N>/ and deploy them to gh-pages (served at https://<owner>.github.io/<repo>/pr-<N>/<bundle>). Skips cleanly when no bundle exists.

inputs:
    pr_number:
        description: 'PR number — bundles are published under pr-<pr_number>/.'
        required: true
    files:
        description: 'Newline-separated bundle paths to publish (a sibling <file>.map is included when present).'
        required: true
    github_token:
        description: 'Token with contents:write for the publish branch.'
        required: false
        default: ${{ github.token }}
    publish_branch:
        description: 'Branch to publish to.'
        required: false
        default: gh-pages

runs:
    using: composite
    steps:
        - name: Stage publish tree
          id: stage
          shell: bash
          env:
              PR_NUMBER: ${{ inputs.pr_number }}
              FILES: ${{ inputs.files }}
          run: |
              set -euo pipefail
              DEST="_publish/pr-${PR_NUMBER}"
              found=0
              while IFS= read -r f; do
                  [ -z "$f" ] && continue
                  if [ -f "$f" ]; then
                      mkdir -p "$DEST"
                      cp "$f" "$DEST/"
                      [ -f "${f}.map" ] && cp "${f}.map" "$DEST/"
                      found=$((found + 1))
                  else
                      echo "::warning::PR preview: listed bundle not found, skipping: $f"
                  fi
              done <<< "$FILES"

              if [ "$found" -eq 0 ]; then
                  echo "::warning::PR preview: no bundles to publish — skipping deploy."
                  echo "publish=false" >> "$GITHUB_OUTPUT"
                  exit 0
              fi
              touch _publish/.nojekyll  # disable Jekyll on gh-pages
              echo "publish=true" >> "$GITHUB_OUTPUT"

        - name: Deploy to ${{ inputs.publish_branch }}
          if: steps.stage.outputs.publish == 'true'
          uses: peaceiris/actions-gh-pages@v3
          with:
              github_token: ${{ inputs.github_token }}
              publish_dir: _publish
              publish_branch: ${{ inputs.publish_branch }}
              keep_files: true
              commit_message: 'pr-preview: publish pr-${{ inputs.pr_number }}'
              user_name: 'github-actions[bot]'
              user_email: 'github-actions[bot]@users.noreply.github.com'
