name: Full Clean Build

# disabling this until we can verify steps that fail are reported correctly
# so far I've found that the validateDistFolders step has been failing but is not reported correctly

on:
  #  schedule:
  #    - cron: '0 0 * * *' # Daily at midnight UTC against the latest branch
  workflow_dispatch:
    inputs:
      notify:
        description: 'Notify Slack channel'
        type: boolean
        default: true
        required: true
      fast_build:
        description: 'Run a fast build'
        type: boolean
        default: false
        required: true
      force_dispatch_docs_tests:
        description: 'Force dispatch docs-tests workflow'
        type: boolean
        default: false
        required: true

permissions:
  contents: read
  actions: read

