name: Post-Deploy Page Verification

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: ['latest']
  workflow_dispatch:
    inputs:
      staging_url:
        description: 'URL to test against (leave blank to use the staging URL from baseUrlUtils.js)'
        required: false
        default: ''

env:
  CI: true
  YARN_REGISTRY: 'https://registry.ag-grid.com'

concurrency:
  group: post-deploy-verification-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

permissions:
  contents: read
  # read is sufficient: the only actions-scope consumer is `gh run list` below.
  actions: read

jobs:
  page-verification:
    runs-on: ubuntu-latest
    name: Page Verification (Staging)
    # For manual dispatch: always run.
    # For workflow_run: only proceed if triggered by a push to this repo (not a fork PR),
    # and only if the upstream CI run succeeded. This guards against the untrusted-checkout
    # risk flagged by OSSF/Scorecard for workflow_run triggers.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Check out the default-branch HEAD (github.sha). In a workflow_run
          # context this is the branch the run was triggered on; combined with the
          # job-level `if:` (same-repo push only), the deployed commit is at HEAD.
          # Avoid referencing workflow_run.head_sha here: it is an untrusted-input
          # pattern flagged by OSSF/Scorecard for privileged workflow_run checkouts.
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install Playwright
        run: |
          npm init -y --prefix /tmp/pw
          npm install --prefix /tmp/pw @playwright/test@1.59.1 playwright-ctrf-json-reporter@0.0.29
          ln -s /tmp/pw/node_modules documentation/ag-grid-docs/node_modules
          /tmp/pw/node_modules/.bin/playwright install chromium --with-deps

      - name: Resolve staging URL
        id: staging_url
        run: |
          URL=$(node -e "
            const { getBaseUrl } = require('./scripts/deployments/prep_and_archive/baseUrlUtils');
            console.log(getBaseUrl({ env: 'staging' }).baseUrl);
          ")
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Resolved staging URL: ${URL}"

      - name: Run page verification tests
        id: run_tests
        working-directory: documentation/ag-grid-docs
        env:
          BASE_URL: ${{ inputs.staging_url || steps.staging_url.outputs.url }}
        run: /tmp/pw/node_modules/.bin/playwright test --project=page-verification

      - name: Publish CTRF Report
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'reports/ag-grid-examples-interactive-default.json'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: page-verification-results
          path: |
            reports/
            documentation/ag-grid-docs/test-results/
          retention-days: 14

      - name: Check previous run status
        id: prev_run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The current run is still in_progress, so --status completed gives us
          # the last finished run — i.e. the one before this one.
          PREV=$(gh run list \
            --workflow post-deploy-verification.yml \
            --branch latest \
            --status completed \
            --limit 1 \
            --json headSha,conclusion \
            --jq '.[0] // {}')

          echo "sha=$(echo "$PREV" | jq -r '.headSha // ""')" >> $GITHUB_OUTPUT
          echo "outcome=$(echo "$PREV" | jq -r '.conclusion // ""')" >> $GITHUB_OUTPUT

      - name: Notify Slack
        # Always notify on failure. On success, only notify if the previous run
        # failed - a "back to green" signal - so a routine passing run doesn't
        # spam the channel.
        if: >
          always() &&
          (steps.run_tests.outcome == 'failure' ||
           (steps.run_tests.outcome == 'success' && steps.prev_run.outputs.outcome == 'failure'))
        uses: ./external/ag-shared/github/actions/slack-integration
        with:
          AG_LIBRARY: grid
          SLACK_BOT_OAUTH_TOKEN: ${{ secrets.SLACK_BOT_OAUTH_TOKEN }}
          SLACK_CHANNEL: '#teamcity_status'
          CTRF_REPORT_FILE: reports/ag-grid-examples-interactive-default.json
          CURRENT_COMMIT_SHA: ${{ github.sha }}
          PREV_COMMIT_SHA: ${{ steps.prev_run.outputs.sha }}
          IS_SUCCESS: ${{ steps.run_tests.outcome == 'success' }}
