name: Accessibility
  
on:
  push:
    branches:
      - 'seanlandsman-patch-9'
#  issue_comment:
#    types: [created]
  workflow_dispatch:
    inputs:
      notify:
        description: 'Notify Slack channel'
        type: boolean
        default: false
        required: true
      force_jira_ticket:
        description: 'Force create a Jira ticket even if the run is not scheduled'
        type: boolean
        default: false
        required: true
#  schedule:
#    - cron: '0 0 * * *' # Run daily at midnight UTC

env:
  NX_NO_CLOUD: true
  NX_BRANCH: ${{ github.ref }}
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  SHARP_IGNORE_GLOBAL_LIBVIPS: true
  YARN_REGISTRY: "https://registry.ag-grid.com"
  CI: true
  REPORTS_PATH: ./reports
  CTRF_FILE: ./reports/ctrf.json
  PREV_COMMIT_SHA_FILE: ./commit-sha.txt
  SLACK_CHANNEL: '#ci-grid-gate'
  AG_LIBRARY: grid

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/latest' }}

permissions:
  contents: read

jobs:
  setup:
    name: Setup
    outputs:
      nx_base: ${{ steps.setup.outputs.base }}
      setup: ${{ steps.setup.outcome || '' }}
      e2e_accessiblity_count: ${{ steps.matrix.outputs.e2e_accessiblity_count }}
      e2e_accessiblity_matrix: ${{ steps.matrix.outputs.e2e_accessiblity_matrix }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # shallow copy

      - name: Fetch Refs
        run: |
          git fetch origin --depth 1 latest
          git fetch origin --depth 1 tag latest-success

      - name: Setup
        id: setup
        uses: ./.github/actions/setup-nx
        with:
          cache_mode: ro

      - name: calculate matrix
        id: matrix
        run: |
          accessiblity_count=30
          e2e_accessiblity_matrix=$(node ./external/ag-shared/scripts/shard/calculate-shards.js eval --ratio 1 ${accessiblity_count})
          echo "e2e_accessiblity_matrix=${e2e_accessiblity_matrix}" >> $GITHUB_OUTPUT
          echo "e2e_accessiblity_count=${accessiblity_count}" >> $GITHUB_OUTPUT
          echo "e2e accessiblity matrix determined to be: ${e2e_accessiblity_matrix}"

  e2e_accessibility:
    runs-on: ubuntu-latest
    name: e2e accessibility Tests
    needs: setup
    if: needs.setup.outputs.e2e_accessiblity_count > 0
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.e2e_accessiblity_matrix )}}
      fail-fast: false
    env:
      NX_PARALLEL: 1
      NX_BASE: ${{ needs.setup.outputs.nx_base }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # shallow copy

      - name: Setup
        id: setup
        uses: ./.github/actions/setup-nx
        with:
          cache_mode: ro

      - name: nx test:e2e:accessibility
        id: tests
        env:
          PW_REPORT_PATH: '${{ env.REPORTS_PATH }}/ag-accessibility-e2e.json'
        run: yarn nx run ag-grid-accessibility:test:e2e:accessibility --shard=${{ matrix.shard }}/$((${{ strategy.job-total }}))

      - name: Persist test results
        if: always() && matrix.shard != 0
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e-accessiblity-shard-${{matrix.shard}}
          path: ${{ env.REPORTS_PATH }}

  report:
    runs-on: ubuntu-24.04
    permissions: write-all
    needs: [ setup, e2e_accessibility ]
    if: cancelled() != true
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch Refs
        run: |
          git fetch origin --depth 1 latest
          git fetch origin --depth 1 tag latest-success

      - name: Setup
        id: setup
        uses: ./.github/actions/setup-nx
        with:
          cache_mode: ro

      - name: Download all test reports
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.REPORTS_PATH }}/

      - name: Publish Combined Test Report
        id: ctrf
        uses: ctrf-io/github-test-reporter@v1.0.17
        with:
          report-path: '${{ env.REPORTS_PATH }}/**/*.json'
          summary-report: true
          failed-report: true
          flaky-report: true
          skipped-report: true
          write-ctrf-to-file: ${{ env.CTRF_FILE }}

      - name: Get previous run commit SHA
        id: prev-commit-sha
        uses: actions/cache/restore@v4
        with:
          restore-keys: |
            accessibility-prev-commit-
            accessibility-prev-commit-${{ github.ref }}
          path: ${{ env.PREV_COMMIT_SHA_FILE }}
          key: accessibility-prev-commit-${{ github.ref }}-${{ github.sha }}

      - name: Load files into environment
        continue-on-error: true
        run: |
          {
            if [ -f ${{ env.PREV_COMMIT_SHA_FILE }} ]; then
              echo 'PREV_COMMIT_SHA<<EOF'
              cat ${{ env.PREV_COMMIT_SHA_FILE }}
              echo 'EOF'
            else
              echo 'PREV_COMMIT_SHA_FILE not found'
            fi
          } >> $GITHUB_ENV

      - name: Slack Notification
        if: ${{ github.event_name == 'schedule' || inputs.notify }}
        continue-on-error: true
        uses: ./external/ag-shared/github/actions/slack-integration
        with:
          AG_LIBRARY: ${{ env.AG_LIBRARY }}
          CTRF_REPORT_FILE: ${{ env.CTRF_FILE }}
          SLACK_BOT_OAUTH_TOKEN: ${{ secrets.SLACK_BOT_OAUTH_TOKEN }}
          SLACK_CHANNEL: ${{ env.SLACK_CHANNEL }}
          PREV_COMMIT_SHA: ${{ env.PREV_COMMIT_SHA }}
          CURRENT_COMMIT_SHA: ${{ github.sha }}
          IS_SUCCESS: ${{ needs.e2e_accessibility.result != 'failure' }}

      - name: Create Jira Ticket
        uses: ./.github/actions/jira-integration
        continue-on-error: true
        if: ${{ github.event_name == 'schedule' || inputs.force_jira_ticket }}
        with:
          JIRA_API_AUTH: ${{ secrets.JIRA_API_AUTH }}
          JIRA_SUMMARY: "[NR] CI/CD workflow '${{ github.workflow }}' is failing."
          CTRF_REPORT_FILE: ${{ env.CTRF_FILE }}
          IS_SUCCESS: ${{ needs.e2e_accessibility.result != 'failure' }}
          PREV_COMMIT_SHA: ${{ env.PREV_COMMIT_SHA }}
          CURRENT_COMMIT_SHA: ${{ github.sha }}

      - name: Set commit SHA
        id: set-commit-sha
        run: |
          echo ${{ github.sha }} > ${{ env.PREV_COMMIT_SHA_FILE }}

      - name: Save Current Commit Hash
        uses: actions/cache/save@v4
        with:
          path: ${{ env.PREV_COMMIT_SHA_FILE }}
          key: ${{ steps.prev-commit-sha.outputs.cache-primary-key }}

      - name: Output Report URL
        run: |
          echo "Accessibility Report URL: ${{ steps.testReport.outputs.url_html }}"

