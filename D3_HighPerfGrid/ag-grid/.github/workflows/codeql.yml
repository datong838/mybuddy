name: 'CodeQL Advanced'

on:
    push:
        branches: ['latest', 'b[0-9][0-9].[0-9].[0-9]', 'lts']
    pull_request:
        branches: ['latest', 'b[0-9][0-9].[0-9].[0-9]', 'lts']
        types: [opened, synchronize, reopened, ready_for_review]

# Least-privilege default; the analyze job overrides this with its own block.
permissions:
    contents: read

jobs:
    analyze:
        name: Analyze (${{ matrix.language }})
        runs-on: 'ubuntu-latest'
        permissions:
            # required for all workflows
            security-events: write

            # required to fetch internal or private CodeQL packs
            packages: read

            # only required for workflows in private repositories
            actions: read
            contents: read

        strategy:
            fail-fast: false
            matrix:
                include:
                    - language: javascript-typescript
                      build-mode: none

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1 # shallow copy

            - name: Setup
              id: setup
              uses: ./.github/actions/setup-nx
              with:
                  cache_mode: 'ro'
                  base_ref: ${{ github.event.pull_request.base.ref || github.event.base_ref || 'latest' }}

            - name: nx pack:verify
              id: pack-verify
              if: steps.setup.outputs.type != 'pr'
              run: |
                  yarn nx pack:verify --prod

            - name: Initialize CodeQL (PR)
              uses: github/codeql-action/init@v3
              if: steps.setup.outputs.type == 'pr'
              with:
                  config-file: ./.github/codeql/codeql-config-pr.yml
                  languages: ${{ matrix.language }}
                  build-mode: ${{ matrix.build-mode }}
                  trap-caching: false

            - name: Initialize CodeQL (latest)
              uses: github/codeql-action/init@v3
              if: steps.setup.outputs.type != 'pr'
              with:
                  config-file: ./.github/codeql/codeql-config-latest.yml
                  languages: ${{ matrix.language }}
                  build-mode: ${{ matrix.build-mode }}
                  trap-caching: false

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                  category: '/language:${{matrix.language}}'
