name: Module Size Comparison

on:
  pull_request:
    branches:
      - 'latest'
      - 'b[0-9][0-9]?.[0-9][0-9]?.[0-9][0-9]?'
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to compare (for manual runs)'
        type: number
        required: true

env:
  NX_NO_CLOUD: true
  NX_BRANCH: ${{ github.ref }}
  SHARP_IGNORE_GLOBAL_LIBVIPS: true
  YARN_REGISTRY: "https://registry.ag-grid.com"
  CI: true
  SHARD_COUNT: 3

concurrency:
  group: module-size-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  prepare:
    name: Prepare Context
    runs-on: ubuntu-latest
    outputs:
      pr-number: ${{ steps.resolve.outputs.pr-number }}
      head-sha: ${{ steps.resolve.outputs.head-sha }}
      is-draft: ${{ steps.resolve.outputs.is-draft }}
      base-ref: ${{ steps.resolve.outputs.base-ref }}
      shard-matrix: ${{ steps.resolve.outputs.shard-matrix }}
    steps:
      - name: Resolve PR details
        id: resolve
        uses: actions/github-script@v7
        env:
          SHARD_COUNT: ${{ env.SHARD_COUNT }}
        with:
          script: |
            const shardCount = parseInt(process.env.SHARD_COUNT, 10);
            const shards = Array.from({ length: shardCount }, (_, i) => i + 1);
            core.setOutput('shard-matrix', JSON.stringify(shards));

            const eventName = context.eventName;
            if (eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              core.setOutput('pr-number', pr.number.toString());
              core.setOutput('head-sha', pr.head.sha);
              core.setOutput('is-draft', pr.draft ? 'true' : 'false');
              core.setOutput('base-ref', pr.base.ref);
              return;
            }

            const manualPrNumber = context.payload?.inputs?.pr_number;
            if (!manualPrNumber) {
              core.setFailed('workflow_dispatch requires pr_number input.');
              return;
            }

            const pull_number = Number(manualPrNumber);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
            });

            if (!pr) {
              core.setFailed(`Could not load pull request ${pull_number}.`);
              return;
            }

            core.setOutput('pr-number', pr.number.toString());
            core.setOutput('head-sha', pr.head.sha);
            core.setOutput('is-draft', pr.draft ? 'true' : 'false');
            core.setOutput('base-ref', pr.base.ref);

  # Check for cached base results
  check-base-cache:
    name: Check Base Cache
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.is-draft != 'true'
    outputs:
      cache-hit: ${{ steps.cache-check.outputs.cache-hit }}
      base-sha: ${{ steps.get-merge-base.outputs.sha }}
    steps:
      - name: Checkout to find merge base
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head-sha }}
          fetch-depth: 0

      - name: Get merge base SHA
        id: get-merge-base
        run: |
          BASE_REF="${{ needs.prepare.outputs.base-ref }}"
          HEAD_SHA="${{ needs.prepare.outputs.head-sha }}"

          # Fetch the base branch
          git fetch origin ${BASE_REF}

          # Find the merge base (common ancestor)
          MERGE_BASE=$(git merge-base origin/${BASE_REF} ${HEAD_SHA})

          echo "sha=${MERGE_BASE}" >> $GITHUB_OUTPUT
          echo "Base branch: ${BASE_REF}"
          echo "PR head: ${HEAD_SHA}"
          echo "Merge base SHA: ${MERGE_BASE}"

      - name: Check cache for base results
        id: cache-check
        uses: actions/cache/restore@v4
        with:
          path: ./base-results.json
          key: module-size-base-${{ steps.get-merge-base.outputs.sha }}
          lookup-only: true

  # Build and run module size tests on the PR branch (sharded)
  module-size-pr:
    name: Module Size PR (${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.is-draft != 'true'
    strategy:
      matrix:
        shard: ${{ fromJSON(needs.prepare.outputs.shard-matrix) }}
      fail-fast: false
    steps:
      - name: Checkout for actions
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head-sha }}
          fetch-depth: 1

      - name: Run module size tests
        uses: ./.github/actions/module-size-test
        with:
          ref: ${{ needs.prepare.outputs.head-sha }}
          shard: ${{ matrix.shard }}
          total-shards: ${{ strategy.job-total }}
          artifact-prefix: module-size-pr
          artifact-suffix: ${{ needs.prepare.outputs.pr-number }}

  # Build and run module size tests on the merge base (sharded) - only if cache miss
  module-size-base:
    name: Module Size Base (${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    needs: [prepare, check-base-cache]
    if: needs.prepare.outputs.is-draft != 'true' && needs.check-base-cache.outputs.cache-hit != 'true'
    strategy:
      matrix:
        shard: ${{ fromJSON(needs.prepare.outputs.shard-matrix) }}
      fail-fast: false
    steps:
      - name: Checkout for actions
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head-sha }}
          fetch-depth: 1

      - name: Run module size tests
        uses: ./.github/actions/module-size-test
        with:
          ref: ${{ needs.check-base-cache.outputs.base-sha }}
          shard: ${{ matrix.shard }}
          total-shards: ${{ strategy.job-total }}
          artifact-prefix: module-size-base
          artifact-suffix: ${{ needs.prepare.outputs.pr-number }}
          base-ref: ${{ needs.prepare.outputs.base-ref }}
          actions-ref: ${{ needs.prepare.outputs.head-sha }}

  # Merge base shards and save to cache (only when we had to build)
  cache-base-results:
    name: Cache Base Results
    runs-on: ubuntu-latest
    needs: [prepare, check-base-cache, module-size-base]
    if: always() && needs.module-size-base.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/ci/merge-module-size-results.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download all base shard results
        uses: actions/download-artifact@v4
        with:
          pattern: module-size-base-shard-*-${{ needs.prepare.outputs.pr-number }}
          path: ./base-shards
          merge-multiple: true

      - name: Merge shard results
        run: |
          node scripts/ci/merge-module-size-results.mjs ./base-shards ./base-results.json

      - name: Save to cache
        uses: actions/cache/save@v4
        with:
          path: ./base-results.json
          key: module-size-base-${{ needs.check-base-cache.outputs.base-sha }}

  # Compare results and post PR comment
  compare-and-report:
    name: Compare & Report
    runs-on: ubuntu-latest
    needs: [prepare, check-base-cache, module-size-pr, module-size-base, cache-base-results]
    # Run if PR tests succeeded AND either cache hit OR base tests succeeded
    if: |
      always() &&
      needs.module-size-pr.result == 'success' &&
      (needs.check-base-cache.outputs.cache-hit == 'true' || needs.module-size-base.result == 'success')
    env:
      PR_NUMBER: ${{ needs.prepare.outputs.pr-number }}
      CACHE_HIT: ${{ needs.check-base-cache.outputs.cache-hit }}
      BASE_SHA: ${{ needs.check-base-cache.outputs.base-sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/ci/compare-module-sizes.mjs
            scripts/ci/merge-module-size-results.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download all PR shard results
        uses: actions/download-artifact@v4
        with:
          pattern: module-size-pr-shard-*-${{ env.PR_NUMBER }}
          path: ./pr-shards
          merge-multiple: true

      - name: Merge PR shard results
        run: |
          node scripts/ci/merge-module-size-results.mjs ./pr-shards ./pr-results.json

      # If cache hit, restore from cache
      - name: Restore base results from cache
        if: env.CACHE_HIT == 'true'
        uses: actions/cache/restore@v4
        with:
          path: ./base-results.json
          key: module-size-base-${{ env.BASE_SHA }}
          fail-on-cache-miss: true

      # If cache miss, download artifacts and merge
      - name: Download all base shard results
        if: env.CACHE_HIT != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: module-size-base-shard-*-${{ env.PR_NUMBER }}
          path: ./base-shards
          merge-multiple: true

      - name: Merge base shard results
        if: env.CACHE_HIT != 'true'
        run: |
          node scripts/ci/merge-module-size-results.mjs ./base-shards ./base-results.json

      - name: Compare module sizes
        id: compare
        run: |
          node scripts/ci/compare-module-sizes.mjs \
            ./base-results.json \
            ./pr-results.json \
            ./comparison-report.md

      - name: Find existing comment
        id: find-comment
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.PR_NUMBER, 10),
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('## Module Size Comparison')
            );

            return botComment ? botComment.id : '';

      - name: Post or update comment
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.find-comment.outputs.result }}
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('./comparison-report.md', 'utf8');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = parseInt(process.env.PR_NUMBER, 10);
            const comment_id = process.env.COMMENT_ID;

            const body = report + '\n\n---\n*Updated: ' + new Date().toISOString() + '*';

            if (comment_id) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: parseInt(comment_id, 10),
                body
              });
              console.log(`Updated comment ${comment_id}`);
            } else {
              const { data: comment } = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
              console.log(`Created comment ${comment.id}`);
            }

      - name: Upload comparison report
        uses: actions/upload-artifact@v4
        with:
          name: module-size-comparison-${{ env.PR_NUMBER }}
          path: ./comparison-report.md
          retention-days: 30

  # Status check job - this is what branch protection should require
  # It ensures the workflow properly blocks PRs when jobs fail
  status:
    name: Module Size Status
    runs-on: ubuntu-latest
    needs: [prepare, check-base-cache, module-size-pr, module-size-base, compare-and-report]
    if: always() && needs.prepare.outputs.is-draft != 'true'
    steps:
      - name: Check job results
        run: |
          echo "Checking job results..."
          echo "prepare: ${{ needs.prepare.result }}"
          echo "check-base-cache: ${{ needs.check-base-cache.result }}"
          echo "module-size-pr: ${{ needs.module-size-pr.result }}"
          echo "module-size-base: ${{ needs.module-size-base.result }}"
          echo "compare-and-report: ${{ needs.compare-and-report.result }}"

          # prepare must succeed
          if [[ "${{ needs.prepare.result }}" != "success" ]]; then
            echo "::error::prepare job failed"
            exit 1
          fi

          # check-base-cache must succeed
          if [[ "${{ needs.check-base-cache.result }}" != "success" ]]; then
            echo "::error::check-base-cache job failed"
            exit 1
          fi

          # module-size-pr must succeed
          if [[ "${{ needs.module-size-pr.result }}" != "success" ]]; then
            echo "::error::module-size-pr job failed"
            exit 1
          fi

          # module-size-base must succeed or be skipped (skipped when cache hit)
          if [[ "${{ needs.module-size-base.result }}" != "success" && "${{ needs.module-size-base.result }}" != "skipped" ]]; then
            echo "::error::module-size-base job failed"
            exit 1
          fi

          # compare-and-report must succeed
          if [[ "${{ needs.compare-and-report.result }}" != "success" ]]; then
            echo "::error::compare-and-report job failed"
            exit 1
          fi

          echo "All required jobs completed successfully!"
