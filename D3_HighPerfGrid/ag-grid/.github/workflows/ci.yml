name: CI

on:
  push:
    branches:
      - 'latest'
      - 'b[0-9][0-9]?.[0-9][0-9]?.[0-9][0-9]?'
  pull_request:
    branches:
      - 'latest'
      - 'next'
      - 'b[0-9][0-9]?.[0-9][0-9]?.[0-9][0-9]?'
    types: [ opened, synchronize, reopened, ready_for_review ]
  workflow_dispatch:
    inputs:
      skip_docs:
        description: 'Skip docs build & link checker'
        type: boolean
        default: false
        required: true
      run_package_tests:
        description: 'Run package tests'
        type: boolean
        default: false
        required: true
      nx_command:
        type: 'choice'
        required: true
        default: 'affected'
        options:
          - 'affected'
          - 'run-many'
env:
  NX_NO_CLOUD: true
  IBM_TELEMETRY_DISABLED: true
  NX_BRANCH: ${{ github.ref }}
  NX_COMMAND_TYPE: ${{ github.event.inputs.nx_command }}
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  SLACK_CHANNEL: '#ci-grid-gate'
  LIBRARY_WEBSITE_STATUS_CHANNEL: '#grid-website-status'
  AG_LIBRARY: grid
  SHARP_IGNORE_GLOBAL_LIBVIPS: true
  YARN_REGISTRY: "https://registry.ag-grid.com"
  CI: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/latest' }}

permissions:
  contents: read
  actions: read

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    name: Detect Changes
    outputs:
      run_code_ci: ${{ steps.decide.outputs.run_code_ci }}
      run_docs_ci: ${{ steps.decide.outputs.run_docs_ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect file changes (PR only)
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'packages/**'
              - 'plugins/**'
              - 'community-modules/**'
              - 'testing/**'
              - 'external/ag-website-shared/**'
              - 'external/ag-shared/scripts/**'
              - 'external/ag-shared/github/**'
              - 'external/ag-shared/src/**'
              - 'external/ag-shared/tools/**'
              - 'external/ag-shared/*.json'
              - '*.json'
              - '*.ts'
              - '*.js'
              - '*.cjs'
              - '*.mjs'
              - 'yarn.lock'
              - 'nx.json'
              - 'tsconfig.*.json'
              - 'jest.preset.js'
              # The .htaccess / CSP generation lives under documentation/ but is exercised
              # by code-CI jobs — the e2e htaccess harness (test:htaccess) and its own unit
              # tests (cspRules/htaccessRules .test.ts) — so route changes here through full
              # code CI rather than the docs-only path, where both would be skipped.
              - 'documentation/ag-grid-docs/src/utils/htaccess/**'
              - 'documentation/ag-grid-docs/src/utils/csp/**'
            ci:
              - '.github/**'
            docs:
              - 'documentation/ag-grid-docs/src/**'
              - 'external/ag-website-shared/**'

      - name: Decide what to run
        id: decide
        run: |
          # Always run full CI for push events and manual triggers
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run_code_ci=true" >> $GITHUB_OUTPUT
            echo "run_docs_ci=true" >> $GITHUB_OUTPUT
            echo "Non-PR event (${{ github.event_name }}), running full CI"
            exit 0
          fi

          # For PRs, check if code or CI files changed
          if [[ "${{ steps.filter.outputs.code }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.ci }}" == "true" ]]; then
            echo "run_code_ci=true" >> $GITHUB_OUTPUT
            echo "run_docs_ci=false" >> $GITHUB_OUTPUT
            echo "Code or CI changes detected (code=${{ steps.filter.outputs.code }}, ci=${{ steps.filter.outputs.ci }}), running full CI"
          elif [[ "${{ steps.filter.outputs.docs }}" == "true" ]]; then
            echo "run_code_ci=false" >> $GITHUB_OUTPUT
            echo "run_docs_ci=true" >> $GITHUB_OUTPUT
            echo "Docs content changes detected, running docs build and link checker"
          else
            echo "run_code_ci=false" >> $GITHUB_OUTPUT
            echo "run_docs_ci=false" >> $GITHUB_OUTPUT
            echo "Only non-code changes detected, running lint only"
          fi

  init:
    name: Initialise Workflow
    needs: detect-changes
    if: (github.event.pull_request.draft == false || startsWith(github.head_ref, 'ghabot-ag-')) &&
      (needs.detect-changes.outputs.run_code_ci == 'true' ||
      needs.detect-changes.outputs.run_docs_ci == 'true')
    permissions:
      contents: write
    outputs:
      nx_base: ${{ steps.setup.outputs.base }}
      build_type: ${{ steps.setup.outputs.type }}
      snapshot_branch: ${{ steps.snapshot-prepare.outputs.branch }}
      test_count: ${{ steps.matrix.outputs.test_count }}
      test_pkg_matrix: ${{ steps.matrix.outputs.pkg_matrix }}
      e2e_test_count: ${{ steps.matrix.outputs.e2e_test_count }}
      e2e_test_matrix: ${{ steps.matrix.outputs.e2e_test_matrix }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # shallow copy

      - name: Fetch Refs
        run: |
          git fetch origin --depth 1 latest
          git fetch origin --depth 1 tag latest-success

      - name: Setup
        id: setup
        uses: ./.github/actions/setup-nx
        with:
          cache_mode: 'rw'

      - name: Prepare Snapshot Branch
        uses: ./.github/actions/snapshot-prepare
        id: snapshot-prepare

      - name: Calculate Matrix
        id: matrix
        run: |
          # Unit-test shards are a static matrix in the `test` job (shard 0 + 3 behavioural
          # shards); here we only emit test_count so that job can skip when nothing is affected.
          if [[ "${{ github.event.inputs.nx_command || 'affected' }}" == "run-many" ]] ; then
            count=10
          else
            count=$(yarn -s nx show projects --affected --base ${{ steps.setup.outputs.base }} -t test | wc -l)
          fi
          echo "test_count=${count}" >> $GITHUB_OUTPUT
          echo "Affected test project count: ${count}"

          if [[ "${{ github.event.inputs.nx_command || 'affected' }}" == "run-many" ]] ; then
            e2e_count=10
          else
            e2e_count=$(yarn -s nx show projects --affected --base ${{ steps.setup.outputs.base }} -t test:e2e --exclude 'tag:module-size' --exclude all | wc -l)
          fi

          # not enough non-bundle size e2e tests to shard atm
          e2e_matrix={"shard":[0]}
          echo "e2e_test_matrix=${e2e_matrix}" >> $GITHUB_OUTPUT
          echo "e2e_test_count=${e2e_count}" >> $GITHUB_OUTPUT
          echo "e2e Test matrix determined to be: ${e2e_matrix} (e2e_test_count=${e2e_count})"

          pkg_matrix=$(node ./external/ag-shared/scripts/shard/calculate-pkg-shards.js)
          echo "pkg_matrix=${pkg_matrix}" >> $GITHUB_OUTPUT
          echo "Package test matrix determined to be: ${pkg_matrix}"

  test:
    runs-on: ubuntu-24.04
    name: Unit Tests (${{ matrix.shard }}/${{ strategy.job-total }})
    needs: [ detect-changes, init ]
    if: needs.detect-changes.outputs.run_code_ci == 'true' &&
      needs.init.outputs.test_count > 0
    strategy:
      # Static matrix: shard 0 runs every affected test project not tagged `sharding`
      # (the bulk — each too small to split); shards 1-3 split the one `sharding`-tagged
      # project (ag-behavioural-testing) via Vitest --shard. behavioural is the only
      # suite large enough to benefit, so the shard count is fixed rather than computed.
      matrix:
        shard: [0, 1, 2, 3]
      fail-fast: false
    env:
      NX_PARALLEL: 1
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # shallow copy

      - name: Fetch Refs
        run: |
          git fetch origin --depth 1 latest
          git fetch origin --depth 1 tag latest-success

      - name: Setup
        id: setup
        uses: ./.github/actions/setup-nx
        with:
          cache_mode: ro

      - name: nx test
        if: matrix.shard != 0
        id: test
        run: yarn nx ${{ github.event.inputs.nx_command || 'affected' }} -t test
          -c=staging --exclude '*,!tag:sharding' --shard=${{
          matrix.shard }}/$((${{ strategy.job-total }} - 1))
      - name: nx test (non-sharded)
        if: matrix.shard == 0
        id: test-no-shard
        run: yarn nx ${{ github.event.inputs.nx_command || 'affected' }} -t test -c
          staging --exclude tag:sharding --exclude all
      - name: nx pack:verify
        if: matrix.shard == 0
        id: pack-verify
        run: |
          yarn nx ${{ github.event.inputs.nx_command || 'affected' }} -t pack:verify --prod
      - name: Assert No Debugger
        if: matrix.shard == 0
        id: assertNoDebugger
        run: |
          ./scripts/assertNoDebugger.sh
      - name: Persist test results
        # All shards upload: shard 0 now runs the package unit tests (community/enterprise
        # etc.) that emit JUnit XML, while shards 1-3 run the behavioural suite. The artifact
        # name is keyed by shard, so there is no collision.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{matrix.shard}}
          path: |
            reports/
            packages/**/__diff_output__/*

  e2e:
    runs-on: ubuntu-latest
    name: e2e Tests
    needs: [ detect-changes, init ]
    if: needs.detect-changes.outputs.run_code_ci == 'true' &&
      needs.init.outputs.e2e_test_count > 0
    strategy:
      matrix: ${{ fromJson(needs.init.outputs.e2e_test_matrix )}}
      fail-fast: false
    env:
      NX_PARALLEL: 1
      # Turn the htaccess redirect harness (test:htaccess, a dependsOn of test:e2e) into a hard
      # gate in CI: ubuntu-latest ships apache2, so a skip here means Apache went missing rather
      # than a legitimately-unavailable environment. Local runs without Apache still skip.
      HTTPD_REQUIRED: 1
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # shallow copy

      - name: Setup
        id: setup
        uses: ./.github/actions/setup-nx
        with:
          cache_mode: ro

      - name: nx test:e2e
        id: tests
        run: yarn nx ${{ github.event.inputs.nx_command || 'affected' }} -t test:e2e -c
          staging --exclude 'tag:module-size' --exclude all

      - name: Persist test results
        if: always() && matrix.shard != 0
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e-shard-${{matrix.shard}}
          path: |
            reports/

  lint:
    runs-on: ubuntu-latest
    name: Lint & Format Check
    needs: [ detect-changes ]
    if: ${{ always() && needs.detect-changes.result == 'success' }}
    outputs:
      format: ${{ steps.format.outcome || '' }}
      lint: ${{ steps.lint.outcome || '' }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # shallow copy

      - name: Setup
        id: setup
        uses: ./.github/actions/setup-nx
        with:
          cache_mode: ro

      - name: nx format:check
        id: format
        if: steps.setup.outcome == 'success' || steps.setup.outcome == 'skipped'
        run: |
          if [[ "${{ github.event.inputs.nx_command || 'affected' }}" == "run-many" ]] ; then
            yarn nx format:check --all
          else
            yarn nx format:check --base ${{ steps.setup.outputs.base }}
          fi

      - name: nx lint
        id: lint
        run: |
          yarn nx lint

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [ detect-changes ]
    if: needs.detect-changes.outputs.run_code_ci == 'true' &&
      (github.event.pull_request.draft == false || startsWith(github.head_ref, 'ghabot-ag-'))
    outputs:
      build: ${{ steps.build.outcome || '' }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # shallow copy

      - name: Setup
        id: setup
        uses: ./.github/actions/setup-nx
        with:
          cache_mode: ro

      - name: nx build
        id: build
        run: |
          yarn nx run-many --t build -c staging --exclude ag-grid-docs --exclude all

      # The enterprise UMD loads ag-grid-community at runtime, so publish both even when nx rebuilt only one.
      - name: Build UMD bundles for PR preview
        id: build_umd
        if: github.event_name == 'pull_request' && steps.build.outcome == 'success'
        run: |
          yarn nx run-many -t build:umd -p ag-grid-community ag-grid-enterprise

      - name: Upload UMD bundles for PR preview
        if: github.event_name == 'pull_request' && steps.build_umd.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-umd
          if-no-files-found: ignore
          retention-days: 14
          # ag-grid UMD builds with sourcemap:false, so there are no .map files.
          path: |
            packages/ag-grid-community/dist/ag-grid-community.min.js
            packages/ag-grid-enterprise/dist/ag-grid-enterprise.min.js

  pr_preview:
    runs-on: ubuntu-latest
    name: PR Preview (UMD)
    needs: [ build ]
    # Same-repo PRs only (fork PRs can't hold the write token) — see pr-review.yml.
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.build.outputs.build == 'success'
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: pr-preview-gh-pages
      cancel-in-progress: false
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      # Needed for the local shared action below; same-repo gate (job if) is the guard.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download UMD artifact
        id: download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pr-preview-umd
          path: _umd

      - name: Resolve UMD bundle paths
        id: stage
        if: steps.download.outcome == 'success'
        run: |
          set -euo pipefail
          # upload-artifact@v4 strips the common path prefix, so find by filename.
          COMMUNITY=$(find _umd -type f -name 'ag-grid-community.min.js' -print -quit)
          ENTERPRISE=$(find _umd -type f -name 'ag-grid-enterprise.min.js' -print -quit)
          if [ -z "$COMMUNITY" ] && [ -z "$ENTERPRISE" ]; then
            echo "::warning No UMD bundles in artifact — likely tooling-only PR; skipping publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$COMMUNITY" ] || [ -z "$ENTERPRISE" ]; then
            echo "::error exactly one UMD bundle present; expected both or neither." >&2
            ls -laR _umd || true
            exit 1
          fi
          {
            echo "files<<__FILES_EOF__"
            echo "$COMMUNITY"
            echo "$ENTERPRISE"
            echo "__FILES_EOF__"
          } >> "$GITHUB_OUTPUT"
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish PR preview to gh-pages
        if: steps.stage.outputs.publish == 'true'
        uses: ./external/ag-shared/github/actions/pr-preview-publish
        with:
          pr_number: ${{ env.PR_NUMBER }}
          files: ${{ steps.stage.outputs.files }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post sticky PR comment
        if: steps.stage.outputs.publish == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview-umd
          message: |
            ### Live-test this PR in Plunker

            Paste these two `<script>` tags into a Plunker (or any vanilla-JS host) to load the UMD bundles built from this PR:

            ```html
            <script src="https://ag-grid.github.io/ag-grid/pr-${{ env.PR_NUMBER }}/ag-grid-community.min.js"></script>
            <script src="https://ag-grid.github.io/ag-grid/pr-${{ env.PR_NUMBER }}/ag-grid-enterprise.min.js"></script>
            ```

            Bundles are removed automatically when the PR is closed. Updated on every push.

  docs:
    runs-on: ubuntu-latest
    name: Docs Build & Link Checker
    needs: [ detect-changes ]
    if: ${{ (needs.detect-changes.outputs.run_code_ci == 'true' ||
      needs.detect-changes.outputs.run_docs_ci == 'true') &&
      (github.event.pull_request.draft == false || startsWith(github.head_ref, 'ghabot-ag-')) && !inputs.skip_docs }}
    strategy:
      fail-fast: false
    outputs:
      docs_deployed: ${{ steps.deploy_to_staging.outcome }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # shallow copy

      - name: Setup
        id: setup
        uses: ./.github/actions/setup-nx
        with:
          cache_mode: ro

      - name: update base url
        run: node scripts/deployments/prep_and_archive/updateBaseUrl.js staging

      - name: validate grid modules
        run: node scripts/deployments/validateGridModulesList.js

      - name: docs build and link checker
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]] || [[ "${{ needs.detect-changes.outputs.run_docs_ci }}" == "true" ]]; then
            export CHECK_LINKS=true CHECK_REDIRECTS=true
          fi
          yarn nx run ag-grid-docs:build -c staging

      - name: validate base url
        run: node scripts/deployments/sanityCheckBaseUrl.js staging

      - name: Deploy to Staging
        id: deploy_to_staging
        if: ${{ github.ref == 'refs/heads/latest' }}
        env:
          SSH_PRIVATE_KEY: |
            ${{ secrets.STAGING_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_HOST }}
          SSH_USER: ubuntu
          SSH_KEY_LOCATION: ${{ github.workspace }}/staging.pem
          WWW_ROOT_DIR: ${{ vars.WWW_ROOT_DIR }}
        run: |
          echo "$SSH_PRIVATE_KEY" > $SSH_KEY_LOCATION
          chmod 400 $SSH_KEY_LOCATION
          ./scripts/deployments/createAndDeployDocsToTCGH.sh

      - name: Persist test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-docs
          path: |
            reports/

  fw_pkg_test:
    runs-on: ubuntu-24.04
    name: Framework Package Tests (${{ matrix.framework }})
    permissions:
      contents: write
    needs: [ init ]
    if: (needs.init.outputs.build_type == 'latest' || needs.init.outputs.build_type
      == 'release') || inputs.run_package_tests
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.init.outputs.test_pkg_matrix )}}
    env:
      NX_BASE: ${{ needs.init.outputs.nx_base }}
    steps:
      - name: Checkout
        id: checkout
        if: matrix.framework != 'none'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup
        id: setup
        if: matrix.framework != 'none'
        uses: ./.github/actions/setup-nx
        with:
          cache_mode: ro

      - name: nx package:test
        id: package-test
        if: matrix.framework != 'none'
        run: yarn nx run-many -t test:package -p ${{ matrix.framework }}-package-tests
          --configuration=update

      - name: Snapshot Branch
        if: matrix.framework != 'none'
        uses: ./.github/actions/snapshot-branch
        with:
          path: testing/*-package-tests/e2e/*-snapshots/
          source_branch: ${{ github.head_ref || 'latest' }}
          branch: ${{ needs.init.outputs.snapshot_branch }}
          type: ${{ matrix.framework }}-package-tests:test:package

  report:
    runs-on: ubuntu-24.04
    needs:
      [
        detect-changes,
        init,
        test,
        e2e,
        lint,
        build,
        docs,
        fw_pkg_test
      ]
    if: always() && !cancelled() && (github.event.pull_request.draft == false || startsWith(github.head_ref, 'ghabot-ag-'))
    permissions:
      contents: write
      actions: read
      checks: write
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # The report job runs no nx command and needs no workspace dependencies:
      # JUnit merging uses a globally-installed jrm, the Slack scripts import only
      # node builtins, and everything else is git/gh or self-contained actions. So
      # skip the full setup-nx (node_modules restore + yarn install) and just provide
      # a node runtime — this is the main time sink for what is otherwise a fast job.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Fetch Refs
        run: |
          git fetch origin --depth 1 latest
          git fetch origin --depth 1 tag latest-success

      - uses: actions/download-artifact@v4
        if: needs.test.result == 'success' || needs.test.result == 'failure' ||
          needs.e2e.result == 'success' || needs.e2e.result == 'failure'
        with:
          path: test-results/

      - name: Merge JUnit Report XMLs
        if: needs.test.result == 'success' || needs.test.result == 'failure' ||
          needs.e2e.result == 'success' || needs.e2e.result == 'failure'
        run: |
          mkdir -p reports/
          if [ ! -d test-results/ ]; then
            echo "No test-results/ directory; nothing to merge."
            exit 0
          fi
          reports=$(find test-results/ -name \*.xml -type f -exec basename \{\} \; | sort | uniq)
          if [ -z "$reports" ]; then
            echo "No JUnit XML files found under test-results/; nothing to merge."
            exit 0
          fi
          YARN_REGISTRY=
          yarn global add junit-report-merger
          echo "$reports" | (while read name ; do
            yarn exec -s jrm reports/${name} "test-results/**/${name}"
          done)

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: needs.test.result == 'success' || needs.test.result == 'failure' ||
          needs.e2e.result == 'success' || needs.e2e.result == 'failure'
        id: testReport
        continue-on-error: true
        with:
          name: 'Tests Results'
          path: reports/*.xml
          reporter: jest-junit

      - name: Check last job status
        id: lastJobStatus
        if: always()
        run: |
          WORKFLOW_STATUS="success"
          if [[ "${{ needs.init.result }}" == "failure" ]] ; then
            WORKFLOW_STATUS="failure"
          elif [ "${{ needs.test.result }}" == "failure" ] ; then
            WORKFLOW_STATUS="failure"
          elif [ "${{ needs.e2e.result }}" == "failure" ] ; then
            WORKFLOW_STATUS="failure"
          elif [ "${{ needs.lint.result }}" == "failure" ] ; then
            WORKFLOW_STATUS="failure"
          elif [ "${{ needs.build.result }}" == "failure" ] ; then
            WORKFLOW_STATUS="failure"
          elif [ "${{ needs.docs.result }}" == "failure" ] ; then
            WORKFLOW_STATUS="failure"
          elif [ "${{ needs.fw_pkg_test.result }}" == "failure" ] ; then
            WORKFLOW_STATUS="failure"
          fi
          echo "workflowStatus=${WORKFLOW_STATUS}" >> $GITHUB_OUTPUT

          LAST_WORKFLOW_STATUS=$(gh run list --workflow .github/workflows/ci.yml -b latest | grep -oh "completed.*" | grep -v "cancelled" | head -1 | awk '{print $2}')
          if [ "$GITHUB_RUN_ATTEMPT" -ge 2 ]; then
            # Handle re-run cases - there is no way to query the previous run status, so we assume the most
            # common scenario will be re-run after failure.
            LAST_WORKFLOW_STATUS="failure"
          fi
          if [ "$LAST_WORKFLOW_STATUS" != "$WORKFLOW_STATUS" ]; then
            echo "status changed from $LAST_WORKFLOW_STATUS to $WORKFLOW_STATUS"
            echo "changedState=true" >> $GITHUB_OUTPUT
          else
            echo "status is still $WORKFLOW_STATUS"
            echo "changedState=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit History
        id: commits
        if: always() && job.status != 'cancelled' && github.ref == 'refs/heads/latest'
          && steps.lastJobStatus.outputs.changedState == 'true'
        run: |
          GIT_LOG=$(git log HEAD ^${{ needs.init.outputs.nx_base }} --format="%an (%h) %s")
          echo "GIT_LOG<<EOF" >> $GITHUB_ENV
          echo "$GIT_LOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Tag Latest Successful Commit
        if: success() && github.ref == 'refs/heads/latest' &&
          steps.lastJobStatus.outputs.workflowStatus != 'failure'
        uses: EndBug/latest-tag@latest
        with:
          ref: latest-success
          description: Latest commit to pass GitHub Actions workflow on latest branch.

      - name: Find matching workflow
        if: always() && job.status != 'cancelled' && github.ref == 'refs/heads/latest'
        id: find_latest_sha
        uses: SamhammerAG/last-successful-build-action@v4
        with:
          branch: "latest"
          workflow: "ci"
          verify: false

      - name: SlackBot
        if: always() && job.status != 'cancelled' && github.ref == 'refs/heads/latest'
        uses: ./external/ag-shared/github/actions/slack-ci-notification
        with:
          SLACK_BOT_OAUTH_TOKEN: ${{ secrets.SLACK_BOT_OAUTH_TOKEN }}
          NOTION_API_TOKEN: ${{ secrets.SLACK_USER_CONFIG_NOTION_API_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.SLACK_USER_CONFIG_NOTION_DATA_SOURCE_ID }}
          AG_PROJECT: AgGrid
          LAST_SUCCESSFUL_SHA: ${{ steps.find_latest_sha.outputs.sha }}
          TEAM_CHANNEL: ${{ env.SLACK_CHANNEL }}
          DEBUG_CHANNEL: ${{ secrets.SLACK_DEBUG_CHANNEL }}
          WEBSITE_STATUS_CHANNEL: ${{ secrets.WEBSITE_STATUS_CHANNEL }}
          LIBRARY_WEBSITE_STATUS_CHANNEL: ${{ env.LIBRARY_WEBSITE_STATUS_CHANNEL }}
          REPORT_URL: ${{ steps.testReport.outputs.url_html }}
          CHANGED_STATE: ${{ steps.lastJobStatus.outputs.changedState }}
          DEPLOY_TO_STAGING: ${{ needs.docs.outputs.docs_deployed == 'success' }}
          JOB_STATUSES: >
            {
              "Format": "${{ needs.lint.outputs.format }}",
              "Lint": "${{ needs.lint.outputs.lint }}",
              "Build": "${{ needs.build.outputs.build }}",
              "Test": "${{ needs.test.result }}",
              "e2e": "${{ needs.e2e.result }}",
              "FW_Pkg": "${{ needs.fw_pkg_test.result }}",
              "Docs": "${{ needs.docs.result }}"
            }

      - name: Fail job if workflow failed
        if: success() && steps.lastJobStatus.outputs.workflowStatus == 'failure'
        run: |
          echo "Workflow failed, failing the build."
          exit 1
