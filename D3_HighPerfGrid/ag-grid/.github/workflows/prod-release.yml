name: Publish Package

on:
  push:
    workflow_dispatch:
    tags:
      - 'release-*'

env:
  CI: true
  IBM_TELEMETRY_DISABLED: true
  DEPLOYMENT_APP_ID: 957224
  TAG_NAME: ${{ github.head_ref || github.ref_name }}

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Authenticate with GitHub App
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: app-token
        with:
          app-id: ${{ env.DEPLOYMENT_APP_ID }}
          private-key: ${{ secrets.DEPLOYMENT_APP_PRIVATE_KEY }}

      - name: Checkout
        id: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1 # shallow copy

      - name: Fetch Refs
        run: |
          git fetch origin --depth 1 ${{ github.ref_name }}

      - name: Set Env
        run: |
          RELEASE_VERSION=$(echo $TAG_NAME | sed 's/release-//')
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: package.json
          registry-url: 'https://registry.npmjs.org'

      - name: Yarn
        run: |
          yarn install --ci

      - name: Build
        run: |
          NODE_ENV=production yarn nx pack:verify --prod --skip-nx-cache

      - name: Generate SBOM
        run: |
          npx --yes @cyclonedx/cyclonedx-npm -o ./dist/artifacts/packages/sbom.json --ignore-npm-errors --omit dev --omit peer --omit optional

      # Ensure npm 11.5.1 or later is installed - required for OIDC
      # pinned to 11.10.1 due to https://github.com/npm/cli/issues/9151
      - name: Update npm
        run: npm install -g npm@11.10.1

      - name: Sanity Check Base URL
        run: |
          node scripts/deployments/sanityCheckBaseUrl.js production

      - name: Validate Dist Folders
        run: |
          ./scripts/deployments/validateDistFolders.sh

      - name: Publish to npm
        run: ./scripts/deployments/release/publishDistArtifactsToNpm.sh

      - name: Sign Artifacts
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          GPG_PRIVATE_KEY_LOCATION: ${{ github.workspace }}/gpg-key.pem
        run: |
          echo "$GPG_PRIVATE_KEY" > $GPG_PRIVATE_KEY_LOCATION
          gpg --import $GPG_PRIVATE_KEY_LOCATION
          ./scripts/deployments/release/performSigningActions.sh "$GPG_PUBLIC_KEY"

      - name: Create GitHub Release
        env:
          PRIVATE_KEY: |
            ${{ secrets.DEPLOYMENT_APP_PRIVATE_KEY }}
          KEY_LOCATION: ${{ github.workspace }}/key.pem
        run: |
          echo "$PRIVATE_KEY" > $KEY_LOCATION

          node ./scripts/deployments/release/createGitHubReleaseAttachArtifacts.mjs \
            --app-id=${{ env.DEPLOYMENT_APP_ID }} \
            --installation-id=${{ secrets.AG_AUTOMATED_RELEASE_INSTALLATION_ID }} \
            --private-key-path=$KEY_LOCATION \
            --release-version=$RELEASE_VERSION \
            --artifacts-path=./dist/artifacts


